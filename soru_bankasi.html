ni ortaya çıkmış, supin pozisyonda kaybolmayan SAĞ varikosel. İlk düşünce?","options":["Normal varyant, takip","Retroperitoneal kitle / renal tümör (sekonder varikosel) araştır","Hemen mikrocerrahi","Skleroterapi"],"correct":1,"answer":"Sağ taraflı, ani başlangıçlı veya supin'de <b>kaybolmayan</b> varikosel <b>sekonder</b> kabul edilir → <b>retroperitoneal kitle / renal tümör (renal ven trombüsü)</b> için görüntüleme şart.","cat":"mcq","id":"disgenital_1019","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Valsalva olmadan palpe edilen ama deriden görünmeyen varikosel hangi derecedir?","options":["Grade 1","Grade 2","Grade 3","Subklinik"],"correct":1,"answer":"<b>Dubin-Amelar:</b> G1 sadece Valsalva ile palpe; <b>G2 Valsalva olmadan palpe</b>; G3 deriden görünür; subklinik sadece US ile.","cat":"mcq","id":"disgenital_1020","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Adolesan varikoselde cerrahi için ana objektif endikasyon?","options":["Her grade 3 varikosel","İpsilateral testis hipotrofisi >2 mL veya >%20 (2 vizitte doğrulanmış)","Tek taraflı subklinik varikosel","Hafif aralıklı ağrı"],"correct":1,"answer":"Adolesanda semen analizi nadir → ana surrogate <b>testis hipotrofisi</b>. Cerrahi: <b>&gt;2 mL veya &gt;%20 fark, 6 ay arayla 2 vizitte doğrulanmış</b> (+ bilateral palpabl, soliter testis, ağrı, patolojik semen).","cat":"mcq","id":"disgenital_1021","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"\"Varikoselektomide en sık komplikasyon nedir ve nasıl önlersin? Altın standart teknik hangisi?\"","answer":"","cat":"oral","id":"disgenital_1022","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"İstemli işeme kontrolü kaç yaşta kazanılır ve bu eşik neden önemli?","answer":"<b>~5 yaş.</b> LUTS bu yaştan sonra sürerse <b>LUTD</b> denir; enürezis tedavisine 5 yaşından önce başlanmaz.","cat":"","id":"iseme_1023","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"EAU 2026'da 'Neurogenic Bladder' bölümü hangi başlıkla yeniden adlandırıldı?","answer":"<b>Spinal dysraphism in children and adolescents</b> (Bölüm 3.13). Kavram aynı, başlık değişti.","cat":"","id":"iseme_1024","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"ICCS'ye göre LUTD'nin iki ana grubu ve faz ayrımı nedir?","answer":"<b>OAB</b> = dolum (depolama) fazı bozukluğu (urgency, sıklık). <b>Disfonksiyonel işeme (DV)</b> = boşaltım fazı bozukluğu (sfinkter gevşeyemez).","cat":"","id":"iseme_1025","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Disfonksiyonel işemede tipik üroflow paterni nedir?","answer":"<b>Staccato</b> (dalgalı – pelvik taban eksik gevşemesi) veya <b>kesintili/interrupted</b> (abdominal ıkınmayla, akış durur). Yüksek basınç + yüksek PVR.","cat":"","id":"iseme_1026","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Hangi eski terim terk edildi, yerine ne kullanılır?","answer":"<b>'Tembel mesane' (lazy bladder)</b> yanlış → <b>underactive bladder</b>. Büyük kapasite, ıkınarak işeme, yüksek PVR.","cat":"","id":"iseme_1027","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Voiding postponement hangi davranışsal bozuklukla güçlü ilişkili?","answer":"<b>Oppozisyonel defiant bozukluk (ODD).</b> Davranışsal kökenli; OAB'yi tetikleyebilir.","cat":"","id":"iseme_1028","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Gülme inkontinansının (giggle incontinence) özellikleri?","answer":"Gülmeyle tam/parsiyel boşalma; <b>kızlarda</b>; genelde kendini sınırlar; <b>ürodinami normal</b>. Metilfenidat denenmiştir.","cat":"","id":"iseme_1029","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"BBD'de tedavinin altın kuralı nedir?","answer":"BBD/konstipasyon varsa <b>alt üriner sistemi ele almadan ÖNCE bağırsağı tedavi et.</b> Tercih edilen ajan <b>senna</b>.","cat":"","id":"iseme_1030","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"İYE oluşumunda LUTD mi VUR mu daha belirleyici?","answer":"<b>LUTD (disfonksiyonel işeme), VUR'un kendisinden daha belirleyicidir.</b> DV tedavisiyle hem İYE hem sıklıkla VUR geriler.","cat":"","id":"iseme_1031","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Pediatrik LUTD'de valide semptom skoru hangisidir?","answer":"<b>DVSS</b> — Dysfunctional Voiding Scoring System (Farhat 2000).","cat":"","id":"iseme_1032","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Çocukta ürodinami ne zaman yapılır?","answer":"<b>Rutin DEĞİL</b> (invaziv). Yalnızca: tedaviye dirençli DV, invaziv tedavi adayı, tanı belirsizliği.","cat":"","id":"iseme_1033","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Cinsel istismar şüphesinde hangi işlemler kontrendike?","answer":"<b>VCUG ve ürodinami</b> (ve invaziv intra-anal cihazlar) kontrendike.","cat":"","id":"iseme_1034","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Fonksiyonel LUTD'de fizik muayenede atlanmaması gereken bölge?","answer":"<b>Lumbosakral bölge</b> (kıllanma, gamze, lipom → gizli spinal disrafizm). Tedaviye dirençlilikte spinal MR.","cat":"","id":"iseme_1035","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Fonksiyonel LUTD'de 1. basamak tedavi nedir?","answer":"<b>Ürotörapi.</b> Standart (eğitim, sıvı düzeni, zamanlı işeme ~6/gün, oturuş, double voiding, konstipasyon) + spesifik (<b>biofeedback</b>, pelvik taban fizyoterapisi).","cat":"","id":"iseme_1036","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"OAB'de 2. basamak farmakoterapi seçenekleri?","answer":"<b>Antimuskarinik</b> (oksibutinin, tolterodin, solifenasin, propiverin) ve <b>β3-agonist (mirabegron)</b> — tek doz, az yan etki, giderek 1. sıra.","cat":"","id":"iseme_1037","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Disfonksiyonel işemede spesifik tedavi nedir, başarı oranı?","answer":"<b>Biofeedback</b> — sfinkter gevşemesini öğretir. Başarı <b>~%80</b>.","cat":"","id":"iseme_1038","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Monosemptomatik enürezisin patofizyolojik 3 ayağı?","answer":"<b>1)</b> Gece poliürisi (AVP) <b>2)</b> küçük gece mesane kapasitesi/DO <b>3)</b> yüksek uyanma eşiği.","cat":"","id":"iseme_1039","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Enürezis tedavisine kaç yaşından önce başlanmaz?","answer":"<b>5 yaşından önce TEDAVİ ETME.</b> Spontan kür yüksek; aileyi bilgilendir, ceza zararlı.","cat":"","id":"iseme_1040","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"İki birinci basamak tedavi ve hangi çocukta tercih?","answer":"<b>Desmopressin</b> → gece poliürisi + normal kapasite. <b>Alarm</b> → poliüri yok/küçük kapasite; en kalıcı yanıt, en düşük nüks ama aile yükü yüksek. Her ikisi kanıt 1 / öneri A.","cat":"","id":"iseme_1041","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Nöropatik mesanenin en sık nedeni ve en sık malformasyonu?","answer":"En sık neden <b>spina bifida</b>; en sık malformasyon <b>lumbosakral miyelomeningosel (MMC)</b>.","cat":"","id":"iseme_1042","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Spinal lezyon seviyesi mesane fenotipini öngörür mü?","answer":"<b>HAYIR.</b> Seviye paterni güvenilir öngörmez → fenotipi <b>ÜRODİNAMİ</b> belirler. Bu yüzden her spinal disrafizm hastasına ürodinami.","cat":"","id":"iseme_1043","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"MMC'de üst üriner sistemi en ciddi tehdit eden fenotip?","answer":"<b>Aşırı aktif/yüksek basınçlı detrusor + gevşemeyen sfinkter = DSD</b> ('hostile bladder'). Düşük kompliyans tehlikeyi artırır.","cat":"","id":"iseme_1044","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"DLPP'nin klasik eşiği nedir ve tartışmalı yönü?","answer":"<b>McGuire 1981: &gt;40 cmH₂O</b> üst sistem hasarıyla ilişkili. <b>Savunma (Tarcan, ICS 2017):</b> kesin güvenli cutoff yok, DLPP tek başına kullanılmamalı.","cat":"","id":"iseme_1045","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Spinal disrafizmde en önemli erken tedavi prensibi?","answer":"<b>Doğumdan hemen sonra TAK</b> → renal komplikasyon ve ileride ogmentasyon ihtiyacını azaltır. İstisna: belirgin underactive sfinkter + DO yok → ertelenebilir (yakın izlem).","cat":"","id":"iseme_1046","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Pediatrik nörojenik DO'da en sık antikolinerjik ve dozu?","answer":"<b>Oksibutinin 0.3 mg/kg/gün</b>, 2 doza bölünmüş, kiloyla titre. Oral toleranssızlıkta <b>intravezikal oksibutinin</b>.","cat":"","id":"iseme_1047","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Antimuskarinik yetersiz kalan NDO'da bir sonraki basamak?","answer":"<b>Detrusora botulinum toksin A.</b> Kapasite/kompliyansı düzeltir, tekrarlanabilir. Ogmentasyon SON seçenek.","cat":"","id":"iseme_1048","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Mesane ogmentasyonunun uzun dönem komplikasyonları?","answer":"<b>Mesane taşı, metabolik (hiperkloremik) asidoz, kemik demineralizasyonu, nütrisyonel sorunlar, sekonder malignite.</b> → sürveyans sistoskopi + DMSA.","cat":"","id":"iseme_1049","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Tethered cord / kötüleşme uyarı işaretleri (tekrar ürodinami)?","answer":"<b>TAK sıklığı artışı, kontinans bozulması, tekrarlayan İYE, yürüme/alt ekstremite değişikliği.</b> Adolesan büyüme atılımı ikinci riskli dönem.","cat":"","id":"iseme_1050","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"MOMS trial'ın mesane sonucu açısından kritik mesajı?","answer":"Fetal MMC onarımı <b>motor fonksiyon ve VP şant ihtiyacını iyileştirir</b>, ancak <b>ürolojik/mesane sonuçlarında net düzelme göstermez.</b>","cat":"","id":"iseme_1051","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"EAU ve ICCS arasındaki izlem farkı nedir?","answer":"<b>EAU:</b> stabil TAK hastasında invaziv ürodinamiyi klinik/radyolojik endikasyona saklar. <b>ICCS:</b> daha sık invaziv izlem önerir.","cat":"","id":"iseme_1052","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"open","q":"Serebral palside mesane disfonksiyonunun tipik ürodinamik paterni?","answer":"<b>DO sık</b>, ancak <b>DSD nadir (&lt;%10)</b> → gereksiz cerrahiden kaçın. İnkontinans %5–10.","cat":"","id":"iseme_1053","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Miyelomeningoselde üst idrar yolunu en ciddi şekilde tehdit eden veziko-üretral disfonksiyon türü hangisidir?","options":["Az aktif mesane + inaktif sfinkter","Aşırı aktif mesane + inaktif sfinkter","Az aktif mesane + aşırı aktif sfinkter","Aşırı aktif mesane + aşırı aktif sfinkter (DSD)"],"correct":3,"answer":"<b>Aşırı aktif/yüksek basınçlı detrusor + gevşemeyen sfinkter (DSD)</b> = en yüksek depolama basıncı → hidronefroz, VUR, böbrek yetmezliği ('hostile bladder'). İnaktif sfinkterde basınç düşer, risk azalır.","cat":"Nöropatik mesane","id":"iseme_1054","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Multipl sklerozda en sık görülen ürodinamik bozukluk hangisidir?","options":["Detrusor arefleksisi","Detrusor aşırı aktivitesi","Bozulmuş detrusor kontraktilitesi","Ürodinamik stres inkontinansı"],"correct":1,"answer":"MS'te en sık <b>detrusor aşırı aktivitesi</b>. DSD de sık eşlik eder; ileri/progresif hastalıkta hipo-/akontraktil detrusor görülebilir.","cat":"Nörolojik LUTD","id":"iseme_1055","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Tek belirtili (monosemptomatik) enürezisli bir çocukta tedaviye hangi yaşta başlanması uygundur?","options":["3 yaş","5 yaş","7 yaş","10 yaş"],"correct":1,"answer":"EAU: <b>5 yaşından önce tedavi etme</b> — spontan kür beklenir. Eşik 5 yaştır; pratikte motivasyon ve uyum nedeniyle aktif tedavi sıklıkla 6–7 yaşta başlatılır. Bank cevabı <b>5</b>; nüansı sözlüde belirt.","cat":"Enürezis","id":"iseme_1056","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Çocuk işeme bozukluğunda ilk basamak tedavi yaklaşımı nedir?","options":["Antimuskarinik başla","Ürotörapi (bağırsak yönetimi dahil)","Mesane botoks","Sakral nöromodülasyon"],"correct":1,"answer":"<b>Ürotörapi</b> her zaman 1. basamak. BBD varsa <b>önce bağırsağı tedavi et</b>. Farmakoterapi (antimuskarinik/β3) 2. basamaktır. Botoks/SNS dirençli ağır olgular için.","cat":"Fonksiyonel LUTD","id":"iseme_1057","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"7 yaşında kız, gündüz sıkışma + sıkışma kaçırma, idrarı tutmak için çömeliyor (curtsy). İYE öyküsü var, kabız. İlk yapacağın?","options":["Hemen ürodinami","Öykü+günlük+DVSS, idrar analizi, üroflow+PVR; kabızlığı tedavi et","Direkt antimuskarinik + profilaksi","VCUG + DMSA iste"],"correct":1,"answer":"Klasik <b>OAB + BBD</b>. Non-invaziv değerlendirme (günlük, <b>DVSS</b>, üroflow+PVR) + <b>önce konstipasyon tedavisi</b> ile başla. Ürodinami invaziv, rutin değil.","cat":"Cüneyt Hoca — vaka","id":"iseme_1058","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Spinal disrafizmli yenidoğanda mesane-sfinkter davranışını en güvenilir şekilde ne belirler?","options":["Lezyonun spinal seviyesi","MR'da konus seviyesi","Ürodinamik çalışma","Bacaklardaki motor kayıp derecesi"],"correct":2,"answer":"<b>Seviye paterni öngörmez.</b> Fenotipi <b>ürodinami</b> belirler → her hastaya ürodinami (EAU güçlü öneri). Bauer'in klasik yenidoğan ürodinami çalışması prediktif değer gösterdi.","cat":"Önder Hoca — kavram","id":"iseme_1059","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Spina bifidalı yenidoğanda renal korumada en kritik erken yönetim adımı?","options":["6 ay bekle, sonra ürodinami","Doğumdan hemen sonra temiz aralıklı kateterizasyon (TAK)","Profilaktik nefrostomi","Erken mesane ogmentasyonu"],"correct":1,"answer":"<b>Doğumdan hemen sonra TAK</b> renal komplikasyon ve ileride ogmentasyon ihtiyacını azaltır (proaktif yönetim). İstisna: belirgin underactive sfinkter + DO yokluğunda ertelenebilir (yakın izlem).","cat":"Nöropatik mesane","id":"iseme_1060","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"İşeme sırasında akış aniden tamamen durup tekrar başlıyor (kesintili akım), çocuk ıkınarak işiyor, PVR yüksek. Bu tablo?","options":["Aşırı aktif mesane","Disfonksiyonel işeme / underactive bladder","Vajinal reflü","Giggle incontinence"],"correct":1,"answer":"Kesintili akım + ıkınma + yüksek PVR → <b>boşaltım fazı bozukluğu</b> (disfonksiyonel işeme; ileri evrede underactive bladder). 'Tembel mesane' terimi terk edildi. Tedavi: <b>biofeedback</b>.","cat":"Melih Hoca — tanım","id":"iseme_1061","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"McGuire'a göre üst üriner sistem hasarıyla klasik olarak ilişkili detrusor kaçırma noktası basıncı (DLPP) eşiği?","options":["20 cmH₂O","40 cmH₂O","60 cmH₂O","100 cmH₂O"],"correct":1,"answer":"<b>McGuire 1981: &gt;40 cmH₂O.</b> Savunma noktası (Tarcan, ICS 2017): kesin 'güvenli' cutoff yoktur, kompliyans gibi faktörler de etkiler → DLPP tek başına kullanılmamalı.","cat":"Nöropatik mesane","id":"iseme_1062","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Gece poliürisi olan, mesane kapasitesi normal monosemptomatik enürezisli çocukta rasyonel 1. basamak?","options":["Enürezis alarmı","Desmopressin","Oksibutinin","İmipramin"],"correct":1,"answer":"<b>Desmopressin</b> (AVP analoğu) → gece poliürisinde mantıklı. <b>Alarm</b> ise poliürisi olmayan/küçük kapasiteli çocukta tercih (en kalıcı yanıt, en düşük nüks). İkisi de kanıt 1 / öneri A.","cat":"Enürezis","id":"iseme_1063","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"MMC'li 6 aylık bebek, TAK + oksibutinin altında. Son haftalarda TAK arası kaçırma arttı, 2 İYE geçirdi, sağ ayakta yeni güçsüzlük var. İlk düşüncen?","options":["Oksibutinin dozunu artır, izle","Tethered cord / nörolojik kötüleşme → tekrar ürodinami + spinal görüntüleme","Hemen ogmentasyon planla","Antibiyotik profilaksisi yeterli"],"correct":1,"answer":"Kontinans bozulması + tekrarlayan İYE + <b>alt ekstremite değişikliği</b> = klasik <b>tethered cord / kötüleşme</b> üçlüsü → <b>tekrar ürodinami</b> ve spinal değerlendirme. Adolesan büyüme de ikinci riskli dönem.","cat":"Kerem Hoca — vaka","id":"iseme_1064","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Antimuskariniklere dirençli nörojenik detrusor aşırı aktivitesinde mesane ogmentasyonundan ÖNCE gelen basamak?","options":["Üretral dilatasyon","Detrusora botulinum toksin A","Sakral rizotomi","Sistektomi"],"correct":1,"answer":"<b>Detrusora botulinum toksin A</b> kapasite/kompliyansı düzeltir, tekrarlanabilir. <b>Mesane ogmentasyonu son seçenektir</b> (yüksek komplikasyon).","cat":"Nöropatik mesane","id":"iseme_1065","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Enterosistoplasti (mesane ogmentasyonu) yapılan hastada uzun dönemde MUTLAKA akılda tutulması gereken ciddi komplikasyon?","options":["Hipertansiyon","Sekonder mesane malignitesi","Hipertiroidi","Katarakt"],"correct":1,"answer":"Uzun dönem: <b>mesane taşı, hiperkloremik metabolik asidoz, kemik demineralizasyonu, nütrisyonel sorunlar ve sekonder malignite</b> → sürveyans sistoskopi + DMSA gerekir.","cat":"Özdal Hoca — komplikasyon","id":"iseme_1066","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Oral antimuskariniğe (oksibutinin) sistemik yan etkiler nedeniyle tolerans gösteremeyen nörojenik mesaneli çocukta pratik alternatif?","options":["İlacı kes, sadece TAK","İntravezikal oksibutinin","Yüksek doz oral oksibutinin","İmipramin"],"correct":1,"answer":"<b>İntravezikal oksibutinin</b> — etkinlik korunur, sistemik yan etki azalır. Başlangıçta spina bifida çocukları için önerilmişti.","cat":"Nazım Hoca — pratik","id":"iseme_1067","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Disfonksiyonel işemede ürotörapi yetersiz kalırsa bir sonraki spesifik adım nedir?","options":["Antimuskarinik","Biofeedback (sfinkter gevşeme eğitimi)","Antibiyotik profilaksisi","Mesane botoks"],"correct":1,"answer":"DV bir <b>boşaltım/koordinasyon</b> sorunudur → <b>biofeedback</b> (sfinkteri işemede gevşetmeyi öğretir, başarı ~%80). Antimuskarinik OAB içindir, DV'de uygun değil.","cat":"Fonksiyonel LUTD","id":"iseme_1068","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"type":"mcq","q":"Dirençli 'fonksiyonel' işeme bozukluğu, normal nörolojik muayene ama tedaviye yanıtsız. Atlamamak için hangi tetkik?","options":["Sistoskopi","Lumbosakral spinal MR","Sintigrafi","Sistometri tek başına"],"correct":1,"answer":"Dirençli olguda <b>gizli spinal disrafizm / tethered cord</b> dışlanmalı → <b>lumbosakral spinal MR</b> (± video-ürodinami). 'Non-nörojenik nörojenik mesane' (Hinman) tartışması buradan.","cat":"Cüneyt Hoca — ayırıcı","id":"iseme_1069","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","src":"","flag":false},{"id":"rcc_x10000","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","type":"open","q":"Berrak hücreli (ccRCC) — özellikleri?","answer":"Sıklık: %70-85 · Genetik: <i>VHL</i> / 3p del · Prognoz / not: En sık; en çok metastaz","cat":"2.2 Üç ana RCC tipi","src":"Böbrek Tümörü (RCC) tam notu · 2.2 Üç ana RCC tipi (Aşama 2 — nottan türetildi)","flag":true},{"id":"rcc_x10001","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","type":"open","q":"Papiller (pRCC) — özellikleri?","answer":"Sıklık: %10-15 · Genetik: <i>MET</i> (herediter tip 1) · Prognoz / not: WHO 2022 tip 1/2'yi kaldırdı","cat":"2.2 Üç ana RCC tipi","src":"Böbrek Tümörü (RCC) tam notu · 2.2 Üç ana RCC :"open","q":"Sadece mukoza — Tedavi?","answer":"<b>TURP + BCG</b>; üst sistem görüntüleme takibi (12. ay, sonra 1–2 yılda bir, 10 yıla kadar)","cat":"(a) Prostatik üretra ürotelyal karsinom","src":"Penis & Üretra Kanseri tam notu · (a) Prostatik üretra ürotelyal karsinom (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10157","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"Duktus/asini — Tedavi?","answer":"Sisto-prostatektomi ± üretrektomi <b>VEYA</b> TUR+BCG","cat":"(a) Prostatik üretra ürotelyal karsinom","src":"Penis & Üretra Kanseri tam notu · (a) Prostatik üretra ürotelyal karsinom (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10158","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"Stromal invazyon — Tedavi?","answer":"Sisto-prostatektomi ± üretrektomi ± <b>neoadjuvan kemoterapi</b> (almadıysa adjuvan)","cat":"(a) Prostatik üretra ürotelyal karsinom","src":"Penis & Üretra Kanseri tam notu · (a) Prostatik üretra ürotelyal karsinom (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10159","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"Metastatik — Tedavi?","answer":"Sistemik tedavi","cat":"(a) Prostatik üretra ürotelyal karsinom","src":"Penis & Üretra Kanseri tam notu · (a) Prostatik üretra ürotelyal karsinom (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10160","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"Tis–T1 — Tedavi?","answer":"Tekrar TUR + <b>intraüretral kemo/BCG</b>; sistektomi+kutanöz diversiyon sonrası total üretrektomi düşünülebilir","cat":"(b) Non-prostatik erkek / kadın PUC (TNM'e göre)","src":"Penis & Üretra Kanseri tam notu · (b) Non-prostatik erkek / kadın PUC (TNM'e göre) (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10161","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"T2 distal/pendulöz (erkek) — Tedavi?","answer":"<b>Distal üretrektomi</b> veya parsiyel penektomi (sınır negatifse penis korunur)","cat":"(b) Non-prostatik erkek / kadın PUC (TNM'e göre)","src":"Penis & Üretra Kanseri tam notu · (b) Non-prostatik erkek / kadın PUC (TNM'e göre) (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10162","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"T2 bulbar (erkek) — Tedavi?","answer":"Üretrektomi ± sisto-prostatektomi","cat":"(b) Non-prostatik erkek / kadın PUC (TNM'e göre)","src":"Penis & Üretra Kanseri tam notu · (b) Non-prostatik erkek / kadın PUC (TNM'e göre) (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10163","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"T2 (kadın) — Tedavi?","answer":"Kemoradyoterapi <b>veya</b> üretrektomi ± sistektomi / distal üretrektomi","cat":"(b) Non-prostatik erkek / kadın PUC (TNM'e göre)","src":"Penis & Üretra Kanseri tam notu · (b) Non-prostatik erkek / kadın PUC (TNM'e göre) (Aşama 2 — nottan türetildi)","flag":true},{"id":"penisuretraca_x10164","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","type":"open","q":"Lokal ileri / proksimal — Tedavi?","answer":"<b>Multidisipliner.</b> PUC'de <b>sisplatin temelli kemoterapi</b> küratif niyetle cerrahi öncesi; <b>SCC'de RT + radyosensitize kemo (kemoradyoterapi)</b> genital koruma amaçlı definitif tedavi","cat":"(b) Non-prostatik erkek / kadın PUC (TNM'e göre)","src":"Penis & Üretra Kanseri tam notu · (b) Non-prostatik erkek / kadın PUC (TNM'e göre) (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10165","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"Ta — özellikleri?","answer":"Renal pelvis: Non-invaziv papiller · Üreter: Non-invaziv papiller","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10166","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"Tis — özellikleri?","answer":"Renal pelvis: CIS · Üreter: CIS","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10167","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"T1 — özellikleri?","answer":"Renal pelvis: Subepitelyal bağ dokusu · Üreter: Subepitelyal bağ dokusu","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10168","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"T2 — özellikleri?","answer":"Renal pelvis: Kas tabakası (muskularis) · Üreter: Kas tabakası","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10169","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"T3 — özellikleri?","answer":"Renal pelvis: Muskularisi aşıp <b>peripelvik yağ VEYA böbrek parankimi</b> · Üreter: Muskularisi aşıp <b>periüreterik yağ</b>","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10170","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"T4 — özellikleri?","answer":"Renal pelvis: Komşu organ / yağ yoluyla böbrek · Üreter: Komşu organ / yağ yoluyla böbrek","cat":"5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER","src":"UTUC tam notu · 5. EVRELEME (TNM) VE PROGNOSTİK FAKTÖRLER (Aşama 2 — nottan türetildi)","flag":true},{"id":"utuc_x10171","topic":"utuc","group":0,"topicTitle":"UTUC","type":"open","q":"Defans (jüri buradan sıkıştırır): Klinik evreleme zayıf — açıkla","answer":"yüksek-dereceli biyopsi kas-invazyonunu yalnızca <b>%60–68</b> öngörür, klinik modeller %70–90. → <b>aşırı tedavi riski</b> (pT1'de NAC'siz 5-yıl DSS %92). Üstelik bazı \"UTUC\" olguları aslında ürotelyal değildir (RNU serisinde malignite çıkmayan veya non-ürotelyal olgular). Gözlenen \"yanıt\" gerçek downstaging mi yoksa baştan düşük-evre mi belirsiz.","cat":"9.1 Neoadjuvan kemoterapi (NAC) — henüz formel öneri DEĞİL","src":"UTUC tam notu · 9.1 Neoadjuvan kemoterapi (NAC) — henüz formel öneri DEĞİL (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10172","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"BPH — özellikleri?","answer":"Tanım: Stromal + glandüler nodüler hiperplazi · Tanı düzeyi: Histolojik (mikroskopik)","cat":"1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE","src":"BPH & Erkek LUTS tam notu · 1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10173","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"BPE — özellikleri?","answer":"Tanım: Benign prostat büyümesi (büyümüş bez) · Tanı düzeyi: Klinik/görüntüleme; BPH'ye sekonder","cat":"1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE","src":"BPH & Erkek LUTS tam notu · 1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10174","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"BOO — özellikleri?","answer":"Tanım: Mesane çıkım tıkanıklığı = artmış detrusor basıncı + azalmış akış · Tanı düzeyi: Ürodinamik","cat":"1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE","src":"BPH & Erkek LUTS tam notu · 1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10175","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"BPO — özellikleri?","answer":"Tanım: BPE'nin neden olduğu BOO alt tipi · Tanı düzeyi: Ürodinamik (nedeni bilinen)","cat":"1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE","src":"BPH & Erkek LUTS tam notu · 1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10176","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"LUTS — özellikleri?","answer":"Tanım: Şemsiye semptom terimi · Tanı düzeyi: Klinik (semptomatik)","cat":"1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE","src":"BPH & Erkek LUTS tam notu · 1. TERMİNOLOJİ VE KAVRAMSAL ÇERÇEVE (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10177","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Obezite — açıkla","answer":"her 1 kg/m² BMI artışı ≈ <b>+0.4 mL</b> prostat hacmi; BMI >35 olanda prostat büyüme riski <b>3.5 kat</b>.","cat":"2.4 Ek risk faktörleri","src":"BPH & Erkek LUTS tam notu · 2.4 Ek risk faktörleri (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10178","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Öykü + beklenti — Not / kanıt?","answer":"Komorbidite (DM, KKY, nörolojik), ilaç, yaşam tarzı, cinsel fonksiyon, hasta değerleri","cat":"4.1 Temel testler (HER hastada)","src":"BPH & Erkek LUTS tam notu · 4.1 Temel testler (HER hastada) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10179","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"IPSS — Not / kanıt?","answer":"En yaygın semptom skoru; depolama vs boşaltma baskınlığını ayırır. <b>Nedeni TANIMLAMAZ.</b> Zayıflık: post-void damlama ve inkontinansı ölçmez. Alternatifler: ICIQ-MLUTS, DAN-PSS","cat":"4.1 Temel testler (HER hastada)","src":"BPH & Erkek LUTS tam notu · 4.1 Temel testler (HER hastada) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10180","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"İdrar tahlili — Not / kanıt?","answer":"Lökositüri, mikrohematüri, glukozüri (DM), proteinüri → ayırıcı tanı","cat":"4.1 Temel testler (HER hastada)","src":"BPH & Erkek LUTS tam notu · 4.1 Temel testler (HER hastada) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10181","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Fizik muayene + DRE — Not / kanıt?","answer":"DRE: hacmi kabaca verir (küçük bezde abartır, büyük bezde küçümser → <b>TRUS daha doğru</b>). Anal sfinkter tonusu/sakral refleks (nörolojik), kanser şüphesi","cat":"4.1 Temel testler (HER hastada)","src":"BPH & Erkek LUTS tam notu · 4.1 Temel testler (HER hastada) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10182","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"PVR — Not / kanıt?","answer":"USG (hasta dostu, kantitatif kesin değil) / kateter (en doğru). <b>Eşik yok</b>, uzmanlar 100–300 mL. PVR ↔ LUTS şiddeti korele DEĞİL. Yüksek bazal PVR → semptomatik progresyon riski; sürekli artış → AÜR riski","cat":"4.1 Temel testler (HER hastada)","src":"BPH & Erkek LUTS tam notu · 4.1 Temel testler (HER hastada) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10183","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"PSA — açıkla","answer":"Hacmin güçlü prediktörü; semptom/QoL/Qmax değişiminin, <b>klinik progresyonun, AÜR ve cerrahi ihtiyacının</b> prediktörü. Yalnızca <b>karar değiştirecekse</b> veya kanser şüphesinde; yarar-zarar hastayla konuşulur.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10184","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Kreatinin/eGFR — açıkla","answer":"böbrek yetmezliği şüphesi / cerrahi planı. BPO'nun renal yetmezliğin primer nedeni olduğuna dair kesin kanıt yok.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10185","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"FVC / mesane günlüğü — açıkla","answer":"≥3 gün; baskın depolama/noktüri/noktürnal poliüride şart.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10186","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Üroflowmetri — açıkla","answer":"Qmax, işenen hacim, akış paterni. <b>>150 mL</b> ile yapılmalı, patolojikse tekrarla. <b>Cerrahi öncesi önerilir.</b> Eşik tuzakları: Qmax <10 mL/s → spesifite %70/sensitivite %47; <15 mL/s → spesifite %38/sensitivite %82 (BOO için). <b>Sınır: BOO mu DUA mı ayıramaz.</b>","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10187","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Akış paternleri — açıkla","answer":"normal (çan), BPO (plato/uzamış), striktür (kutu/düz plato), DUA (ıkınma ile kesintili).","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10188","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Üst ÜS görüntüleme (USG) — açıkla","answer":"rutin DEĞİL; büyük PVR, hematüri, taş öyküsünde.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10189","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Prostat görüntüleme (TRUS > transabdominal) — açıkla","answer":"cerrahi öncesi <b>hacim → işlem seçimi</b> (TUIP vs TURP vs enükleasyon). <b>Median lob</b> varlığı bazı MİT'ler için kontrendikasyon.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10190","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Sistoskopi — açıkla","answer":"yalnız hematüri, striktür/mesane Ca şüphesi öyküsünde. \"Kissing lobes\"/trabekülasyon ile BOO korelasyonu zayıf → <b>BOO tanısı için kullanılamaz.</b>","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10191","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Ürodinami / Basınç-akış (PFS) — açıkla","answer":"BOO <b>altın standardı</b> (yüksek detrusor basıncı + düşük akış). DUA = düşük basınç + bozuk akış. İnvazyon öncesi endikasyon: <150 mL işeyemeyen; PVR >300 mL; baskın boşaltma LUTS; <b>>80 veya <50 yaş</b>; Qmax >10 mL/s olduğu halde invazif tedavi düşünülen olgu; önceki başarısız invazif tedavi.","cat":"4.2 Seçili testler","src":"BPH & Erkek LUTS tam notu · 4.2 Seçili testler (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10192","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Tek HASTALIK-MODİFİYE EDİCİ ajan — açıkla","answer":"AÜR ve cerrahi ihtiyacını azaltır","cat":"5-ARI (5-alfa redüktaz inhibitörleri)","src":"BPH & Erkek LUTS tam notu · 5-ARI (5-alfa redüktaz inhibitörleri) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10193","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"PSA tuzağı — açıkla","answer":"değeri 2× düzelt; tedavi altında PSA artışı şüpheli (dikkatle yorumla)","cat":"5-ARI (5-alfa redüktaz inhibitörleri)","src":"BPH & Erkek LUTS tam notu · 5-ARI (5-alfa redüktaz inhibitörleri) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10194","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"α1-bloker + 5-ARI — açıkla","answer":"orta-şiddetli LUTS + büyümüş bez + progresyon riski. Kanıt: <b>MTOPS</b> (doksazosin+finasterid) ve <b>CombAT</b> (dutasterid+tamsulosin, 4 yıl). Kombinasyon progresyon/AÜR/cerrahi ihtiyacını monoterapiden daha çok azaltır; advers olay daha fazla. PREDICT trial da bu kombinasyonu destekler.","cat":"5.3 Kombinasyon tedavileri","src":"BPH & Erkek LUTS tam notu · 5.3 Kombinasyon tedavileri (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10195","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"α1-bloker + antimuskarinik — açıkla","answer":"monoterapiyle depolama semptomu yeterince gerilemeyen olguda. Depolama (urgency/frekans/noktüri) kontrolü ↑, boşaltma fazını etkilemez.","cat":"5.3 Kombinasyon tedavileri","src":"BPH & Erkek LUTS tam notu · 5.3 Kombinasyon tedavileri (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10196","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"<30 mL (median lob yok) — özellikleri?","answer":"Standart / ilk seçim: <b>TUIP</b> · Alternatifler: TURP","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10197","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"30–80 mL — özellikleri?","answer":"Standart / ilk seçim: <b>TURP (mono/bipolar)</b> · Alternatifler: HoLEP/ThuLEP, PVP (KTP/LBO lazer vapor.), bipolar TUVP, Aquablation","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10198","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":">80 mL — özellikleri?","answer":"Standart / ilk seçim: <b>Endoskopik enükleasyon (HoLEP/ThuLEP/bipolar)</b> veya <b>açık/lap/robotik basit prostatektomi</b> · Alternatifler: —","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10199","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Holmium (Ho:YAG, 2140 nm) — açıkla","answer":"suya yüksek absorbe; <b>HoLEP</b> = açık adenomektominin endoskopik replikası. Boyuttan bağımsız, en düşük re-tedavi, antikoagülanda avantajlı.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10200","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Thulium (Tm:YAG, 2010-2013 nm) — açıkla","answer":"ThuLEP/ThuVEP/ThuVARP.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10201","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"KTP/LBO (532 nm) PVP — açıkla","answer":"30–80 mL'de TURP alternatifi; antikoagülanda iyi.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10202","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Diode (980/1318 nm) — açıkla","answer":"vaporizasyon/enükleasyon, kanıt sınırlı.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10203","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"PUL (UroLift) — açıkla","answer":"sütur implantlarla lobları çeker. <b>PV <70 mL, median lob YOK.</b> Antegrad ejakülasyonu korur. L.I.F.T. (vs sham), BPH6 (vs TURP — TURP fonksiyonel olarak üstün ama PUL iyileşme/ejakülasyonda üstün).","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10204","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Rezum (su buharı termal terapi) — açıkla","answer":"ayaktan, hücre nekrozu → büzülme; cinsel fonksiyon korur. AUA <80 mL'de önerir; EAU daha çok RCT ister.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10205","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"iTind (geçici nitinol cihaz) — açıkla","answer":"~5 gün kalır, lokal anesteziyle çıkarılır; <b>bası nekroziyle</b> mesane boynu/prostatik üretrayı yeniden şekillendirir.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10206","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"Aquablation — açıkla","answer":"görüntü-kılavuzlu robotik su jeti; kapsülü korur; 30–80 mL'de 5 yılda TURP'ye benzer, büyük bezde de uygun; cinsel fonksiyon korur.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10207","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"PAE (prostatik arter embolizasyonu) — açıkla","answer":"girişimsel radyolog + ürolog iş birliği, seçili merkez; büyük bezde daha iyi. AUA hâlâ sadece klinik çalışma kapsamında görür.","cat":"5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma)","src":"BPH & Erkek LUTS tam notu · 5.4 Cerrahi tedavi (EAU hacim-bazlı algoritma) (Aşama 2 — nottan türetildi)","flag":true},{"id":"bph_x10208","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"63 y, akış ↓ + noktüri, DRE'de prostat büyük değil, BOO'yu en ikna edici destekleyen ürodinamik bulgu?","answer":"<b>Yüksek boşaltma basıncıyla tepe akış hızında azalma</b> (yüksek basınç + düşük akış).","cat":"6.1 EBU 26 — faktüel taban (cevaplara körü körüne güvenme, EAU ile çapraz doğruladık)","src":"BPH & Erkek LUTS tam notu · 6.1 EBU 26 — faktüel taban (cevaplara körü körüne güvenme, EAU ile çapraz doğruladık) (Aşama 2 — nottan türetildi)","flag":false},{"id":"bph_x10209","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","type":"open","q":"LUTS/BPH takibinde doğru ifade?","answe  gece deksametazon supresyon testi (DST) — açıkla","answer":"CS'de supresyon başarısız.","cat":"2.5 Cushing Sendromu","src":"Böbrek Nakli & Adrenal tam notu · 2.5 Cushing Sendromu (Aşama 2 — nottan türetildi)","flag":true},{"id":"nakil_x10305","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"Tanı: tam hormonal work-up — 1-mg DST, 24-saat idrar kortizol, plazma ACTH (ACTH-bağımsız?), testosteron/estradiol/DHEA-S/17-OH-progesteron/androstenedion/11-deoksikortizol/K/aldo/renin, + metanefrin (pheo dışla). Kombine otonom sekresyon paterni","answer":"ACC lehine; kortizol fazlası → prognostik + perioperatif steroid.","cat":"2.7 Adrenokortikal Karsinom (ACC)","src":"Böbrek Nakli & Adrenal tam notu · 2.7 Adrenokortikal Karsinom (ACC) (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10306","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Anastomoz sırası neden ven önce?\"","answer":"Böbrek tethered olmadan bacak iskemisini sınırlamak; N. Amerika'da arter-önce de kabul (küçük anastomoz, hareketli böbrek, yuvarlak punch).","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10307","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"CNI tamamen kesilebilir mi?\"","answer":"Hayır; RKÇ'ler rejeksiyon↑. Azaltma/steroid çekme için MMF.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10308","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Pheo'da neden önce alfa sonra beta?\"","answer":"Karşılıksız alfa stimülasyonu (beta-önce) → hipertansif kriz. Ve <b>veni önce bağla</b>.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10309","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Conn'da neden parsiyel değil?\"","answer":"AVS lateralize eder ama intraglandüler kaynağı göstermez; multinodüler hiperplazi sık.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10310","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"≤10 HU 7 cm kitle — takip?\"","answer":"ESE 2023: homojen ≤10 HU → <b>benign, takip yok</b> (boyuttan bağımsız). (Eski refleks: büyükse çıkar — güncel değil.)","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10311","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"PPGL malignite histolojiden anlaşılır mı?\"","answer":"Hayır, <b>yalnız metastaz</b>; öngörücü ekstra-adrenal/>5cm/SDHB.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10312","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Nakil 1 numara ölüm nedeni?\"","answer":"Kardiyovasküler (rejeksiyon değil).","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10313","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Üreter implant tekniği + EAU?\"","answer":"<b>Lich-Gregoire + rutin JJ stent</b>.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10314","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"ACC'de lap ne zaman?\"","answer":"≤6 cm, uzman, onkolojik ilke korunursa; aksi <b>açık</b>.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"nakil_x10315","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","type":"open","q":"\"Aldosteron Na konsantrasyonunu artırır mı?\"","answer":"Hayır, <b>toplam vücut volümünü</b> etkiler, konsantrasyon değişmez.","cat":"⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI","src":"Böbrek Nakli & Adrenal tam notu · ⚡ JÜRİ SAVUNMA / SIK ÇELİŞKİ NOKTALARI (Aşama 2 — nottan türetildi)","flag":false},{"id":"norouroloji_x10316","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Parasempatik (pelvik sinir) — özellikleri?","answer":"Çıkış segmenti: <b>S2–S4</b> · Tip: Otonomik · Nörotransmitter / reseptör: Asetilkolin → <b>M3 (ve M2)</b> muskarinik (detrusor) · İşlev: <b>Detrusor kontraksiyonu</b> (boşaltma)","cat":"1.1. Üç periferik yol","src":"Nöroüroloji & Ürodinami tam notu · 1.1. Üç periferik yol (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10317","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Sempatik (hipogastrik sinir) — özellikleri?","answer":"Çıkış segmenti: <b>T10–L2</b> · Tip: Otonomik · Nörotransmitter / reseptör: NA → <b>β3</b> (detrusor gevşemesi), <b>α1</b> (mesane boynu/proksimal üretra kontraksiyonu) · İşlev: <b>Depolama</b>: detrusoru gevşetir, çıkışı kapatır","cat":"1.1. Üç periferik yol","src":"Nöroüroloji & Ürodinami tam notu · 1.1. Üç periferik yol (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10318","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Somatik (pudendal sinir) — özellikleri?","answer":"Çıkış segmenti: <b>S2–S4 (Onuf çekirdeği)</b> · Tip: İstemli · Nörotransmitter / reseptör: ACh → nikotinik (çizgili dış sfinkter) · İşlev: <b>Dış üretral sfinkter</b> istemli kontrol","cat":"1.1. Üç periferik yol","src":"Nöroüroloji & Ürodinami tam notu · 1.1. Üç periferik yol (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10319","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Periakuaduktal gri madde (PAG) — açıkla","answer":"mesane dolum sinyalini afferentlerden alır, kortekse iletir; PMC'ye geçiş kararının kapısı.","cat":"1.2. Santral kontrol — miksiyon \"switch\"i","src":"Nöroüroloji & Ürodinami tam notu · 1.2. Santral kontrol — miksiyon \"switch\"i (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10320","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Serebral korteks (özellikle medial prefrontal korteks) ve bazal gangliyonlar — açıkla","answer":"miksiyon üzerinde <b>tonik inhibitör (baskılayıcı)</b> kontrol uygular. Bu inhibisyonun kalkması → <b>detrusor aşırı aktivitesi (DO)</b>. İnme, demans, Parkinson, frontal tümörlerde mekanizma budur.","cat":"1.2. Santral kontrol — miksiyon \"switch\"i","src":"Nöroüroloji & Ürodinami tam notu · 1.2. Santral kontrol — miksiyon \"switch\"i (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10321","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Depolama (guarding refleksi) — açıkla","answer":"mesane dolarken afferent (Aδ lifleri) uyarıyla sempatik (β3 detrusor gevşemesi, α1 çıkış kapanması) ve pudendal (sfinkter kasılması) aktive olur → düşük basınçlı, kontinan depolama.","cat":"1.3. Refleksler ve fazlar","src":"Nöroüroloji & Ürodinami tam notu · 1.3. Refleksler ve fazlar (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10322","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Boşaltma — açıkla","answer":"kritik dolum eşiğinde PAG→PMC anahtarı çevrilir; pudendal ve sempatik baskılanır (sfinkter gevşer), parasempatik aktive olur (detrusor kasılır) → <b>sinerjik, tam, düşük rezidülü</b> boşaltma.","cat":"1.3. Refleksler ve fazlar","src":"Nöroüroloji & Ürodinami tam notu · 1.3. Refleksler ve fazlar (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10323","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"C-lifleri — açıkla","answer":"normalde sessiz, mekanik/soğuk uyarana duyarlı afferentler. <b>Suprasakral SCI sonrası</b> ön plana geçerek <b>spinal segmental refleksi</b> (NDO) tetikler. → <b>Buz suyu testinin (ice water test)</b> ve <b>botoks duyusal etkisinin</b> nörofizyolojik temeli.","cat":"1.3. Refleksler ve fazlar","src":"Nöroüroloji & Ürodinami tam notu · 1.3. Refleksler ve fazlar (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10324","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Suprapontin (inme, Parkinson, demans, tümör) — özellikleri?","answer":"Detrusor: <b>Aşırı aktif (DO)</b> · Sfinkter / koordinasyon: Koordinasyon <b>korunur</b> (DSD YOK) · Tipik öykü: Ağırlıklı <b>depolama</b> semptomları (urgency, sıklık, urge inkontinans) · PVR: Genelde düşük · Üst üriner sistem riski: <b>Düşük</b>","cat":"2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo)","src":"Nöroüroloji & Ürodinami tam notu · 2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10325","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Suprasakral spinal (infrapontin–suprasakral) (servikal/torakal SCI, MS, transvers miyelit) — özellikleri?","answer":"Detrusor: <b>Aşırı aktif (NDO)</b> · Sfinkter / koordinasyon: <b>DSD (+)</b> — koordinasyon bozuk · Tipik öykü: Hem depolama hem boşaltma semptomları · PVR: <b>Yüksek</b> · Üst üriner sistem riski: <b>YÜKSEK</b> (NDO + DSD → yüksek basınç)","cat":"2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo)","src":"Nöroüroloji & Ürodinami tam notu · 2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10326","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Sakral / infrasakral (konus/kauda lezyonu, sakral SCI) — özellikleri?","answer":"Detrusor: <b>Hipo/akontraktil (arefleksi)</b> · Sfinkter / koordinasyon: Sfinkter <b>inkompetan/zayıf</b> olabilir · Tipik öykü: Ağırlıklı <b>boşaltma</b> semptomları, retansiyon, taşma · PVR: <b>Yüksek</b> · Üst üriner sistem riski: Değişken (kompliyans düşerse risk)","cat":"2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo)","src":"Nöroüroloji & Ürodinami tam notu · 2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10327","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Periferik / polinöropati (DM, pelvik cerrahi, disk hernisi) — özellikleri?","answer":"Detrusor: <b>Detrusor underaktivite</b> (azalmış kontraktilite) · Sfinkter / koordinasyon: Değişken · Tipik öykü: Boşaltma güçlüğü, yetersiz boşalma · PVR: <b>Yüksek</b> · Üst üriner sistem riski: Düşük-orta","cat":"2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo)","src":"Nöroüroloji & Ürodinami tam notu · 2. LEZYON SEVİYESİNE GÖRE PATERN (jürinin en sevdiği tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10328","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Fizyolojik dolum hızı — açıkla","answer":"vücut ağırlığı (kg) / 4 ml/dk'yı aşmamalı (nöro hastada hızlı dolum DO'yu yapay tetikleyebilir).","cat":"7.3. Dolum sistometrisi (depolama fazı)","src":"Nöroüroloji & Ürodinami tam notu · 7.3. Dolum sistometrisi (depolama fazı) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10329","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"\"Suprapontin lezyonda neden DSD yok ama suprasakral lezyonda var?\"","answer":"PMC sfinkter koordinasyonunun merkezidir; suprapontin lezyon PMC'yi korur (koordinasyon sağlam), suprasakral lezyon PMC ile sakral merkez arasındaki yolu keser → koordinasyon bozulur.","cat":"10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle)","src":"Nöroüroloji & Ürodinami tam notu · 10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle) (Aşama 2 — nottan türetildi)","flag":false},{"id":"norouroloji_x10330","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"\"Bu hastanın böbreği neden tehlikede?\"","answer":"Yüksek depolama basıncı (DLPP >40 / düşük kompliyans) ve/veya NDO+DSD → reflü + hidronefroz → renal hasar. Çözüm: basıncı düşür (antimuskarinik→botoks→augmentasyon) + tam boşalt (TAK).","cat":"10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle)","src":"Nöroüroloji & Ürodinami tam notu · 10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle) (Aşama 2 — nottan türetildi)","flag":false},{"id":"norouroloji_x10331","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"\"En kritik müdahale nedir?\"","answer":"TAK + basıncı 40 cmH₂O altına indirmek.","cat":"10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle)","src":"Nöroüroloji & Ürodinami tam notu · 10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle) (Aşama 2 — nottan türetildi)","flag":false},{"id":"norouroloji_x10332","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"\"T6 üstü SCI'da ürodinami sırasında baş ağrısı + HT?\"","answer":"Otonomik disrefleksi; otur, tetikleyiciyi gider (mesaneyi boşalt), gerekirse nifedipin.","cat":"10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle)","src":"Nöroüroloji & Ürodinami tam notu · 10.1. Sık sorulan \"neden\" zincirleri (cevabı ezberle) (Aşama 2 — nottan türetildi)","flag":false},{"id":"norouroloji_x10333","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"Mirabegron NDO'da: subjektif iyilik var ama ürodinamik parametreyi düzeltmez — açıkla","answer":"antimuskarinik kadar güvenilir değil.","cat":"10.2. Tartışmalı / nüanslı noktalar (jüri burada zorlar)","src":"Nöroüroloji & Ürodinami tam notu · 10.2. Tartışmalı / nüanslı noktalar (jüri burada zorlar) (Aşama 2 — nottan türetildi)","flag":true},{"id":"norouroloji_x10334","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","type":"open","q":"**Botoks trigon dahil mi hariç mi?","answer":"** — eski dogma trigon korunsun (reflü kaygısı), yeni veri trigon dahil daha etkili ve güvenli.","cat":"10.2. Tartışmalı / nüanslı noktalar (jüri burada zorlar)","src":"Nöroüroloji & Ürodinami tam notu · 10.2. Tartışmalı / nüanslı noktalar (jüri burada zorlar) (Aşama 2 — nottan türetildi)","flag":false},{"id":"kadinuroloji_x10335","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","type":"open","q":"Suprapontin (CVA, demans, PD) — özellikleri?","answer":"Öykü: ağırlıklı <b>depolama</b> · PVR: düşük · Ürodinami: <b>Detrusor overaktivite (DO)</b>, sensasyon korunur, DSD YOK","cat":"2.1 Lezyon seviyesi → patern (ezberlenecek tablo)","src":"Fonksiyonel & Kadın Ürolojisi tam notu · 2.1 Lezyon seviyesi → patern (ezberlenecek tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"kadinuroloji_x10336","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","type":"open","q":"Suprasakral spinal (infrapontin-suprasakral; SCI, MS) — özellikleri?","answer":"Öykü: depolama <b>+</b> boşaltma · PVR: sıklıkla yüksek · Ürodinami: <b>DO + DSD</b> (yüksek basınç!)","cat":"2.1 Lezyon seviyesi → patern (ezberlenecek tablo)","src":"Fonksiyonel & Kadın Ürolojisi tam notu · 2.1 Lezyon seviyesi → patern (ezberlenecek tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"kadinuroloji_x10337","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","type":"open","q":"Sakral / infrasakral (cauda equina, sakral SCI) — özellikleri?","answer":"Öykü: ağırlıklı <b>boşaltma</b> · PVR: yüksek · Ürodinami: <b>Detrusor hipo/akontraktil</b>, sfinkter de gevşemez olabilir","cat":"2.1 Lezyon seviyesi → patern (ezberlenecek tablo)","src":"Fonksiyonel & Kadın Ürolojisi tam notu · 2.1 Lezyon seviyesi → patern (ezberlenecek tablo) (Aşama 2 — nottan türetildi)","flag":true},{"id":"kadinuroloji_x10338","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","type":"open","q":"**SUI cerrahisi öncesi ÜDS gerekli mi?","answer":"**","cat":"3.2 Klinik uygulamalar — anahtar çalışmalar (jüri çok sorar)","src":"Fonksiyonel & Kadın Ürolojisi tam notu · 3.2 Klinik uygulamalar — anahtar çalışmalar (jüri çok sorar) (Aşama 2 — nottan türetildi)","flag":false},{"id":"androloji_x10339","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Sildenafil — Özellik?","answer":"yiyecekle emilim ↓, ~4 sa etki","cat":"Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10340","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Vardenafil — Özellik?","answer":"sildenafile benzer","cat":"Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10341","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Tadalafil — Özellik?","answer":"<b>en uzun yarı ömür (~17.5 sa), 36 sa \"hafta sonu hapı\"</b>; <b>günlük 5 mg</b> formu LUTS/BPH'de de onaylı","cat":"Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10342","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Avanafil — Özellik?","answer":"en hızlı başlangıç (~15-30 dk)","cat":"Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10343","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Başarısızlık nedeni çoğunlukla yanlış kullanım — açıkla","answer":"cinsel uyarı yokluğu, yetersiz doz, yetersiz deneme sayısı (≥4-6 maksimum doz denenmeli), hipogonadizm.","cat":"Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamak basamak — Melih Hoca'nın \"ilk basamak\" sorusu) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10344","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Oral: Pentoksifilin, potasyum para-aminobenzoat (POTABA), E vitamini — açıkla","answer":"kanıt zayıf, ağrı için NSAİİ.","cat":"Tedavi (basamaklı — EAU 2025 algoritması)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamaklı — EAU 2025 algoritması) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10345","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"İntralezyonel: Kollajenaz Clostridium histolyticum (CCH, Xiapex) — açıkla","answer":"<b>FDA onaylı, kanıtı en güçlü minimal invaziv tedavi</b>; <b>>30° dorsal/lateral eğrilikte</b> endike, faz 3 RCT'lerle (Gelbard) desteklenir. Diğerleri: verapamil (RCT'de plaseboya üstün değil, hatta cerrahiyi zorlaştırabilir), interferon-α2b, hyaluronik asit.","cat":"Tedavi (basamaklı — EAU 2025 algoritması)","src":"Androloji & Seksüel Disfonksiyon tam notu · Tedavi (basamaklı — EAU 2025 algoritması) (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10346","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Mekanizma — özellikleri?","answer":"İskemik (low-flow): veno-oklüzif, akış YOK = <b>kompartman sendromu</b> · Non-iskemik (high-flow): arteriyokavernöz fistül (genelde <b>travma</b>: perine/straddle) · Stuttering (tekrarlayan iskemik): tekrarlayan kısa iskemik ataklar","cat":"F. PRİAPİZM","src":"Androloji & Seksüel Disfonksiyon tam notu · F. PRİAPİZM (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10347","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Ağrı — özellikleri?","answer":"İskemik (low-flow): <b>ağrılı, rijit</b> · Non-iskemik (high-flow): ağrısız, kısmen rijit · Stuttering (tekrarlayan iskemik): ağrılı ataklar","cat":"F. PRİAPİZM","src":"Androloji & Seksüel Disfonksiyon tam notu · F. PRİAPİZM (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10348","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Kan gazı (kritik!) — özellikleri?","answer":"İskemik (low-flow): <b>hipoksi + hiperkapni + asidoz</b> (PO₂<30, PCO₂>60, pH<7.25) · Non-iskemik (high-flow): arteriyel benzeri (normoksi) · Stuttering (tekrarlayan iskemik): iskemik","cat":"F. PRİAPİZM","src":"Androloji & Seksüel Disfonksiyon tam notu · F. PRİAPİZM (Aşama 2 — nottan türetildi)","flag":true},{"id":"androloji_x10349","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","type":"open","q":"Aciliyet — özellikleri?","answer":"İskemik (low-flow): <b>GERÇEK ACİL</b> (zaman bağımlı doku nekrozu) · Non-iskemik (high-flow): acil değil · Stuttering (tekrarlayan iskemik): profilaksi gerektirir","cat":"F. PRİAPİZM","src":"Androloji & Seksüel Disfonksiyon tam notu · F. PRİAPİZM (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10350","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Mekanizma — özellikleri?","answer":"Primer VUR: Doğuştan UVJ yetersizliği (kısa tünel) · Sekonder VUR: Artmış intravezikal basınç UVJ'yi bozar","cat":"Primer vs sekonder VUR","src":"VUR & Çocukta İYE tam notu · Primer vs sekonder VUR (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10351","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Nedenler — özellikleri?","answer":"Primer VUR: İzole konjenital anomali · Sekonder VUR: PUV, nörojen mesane, BBD/işeme disfonksiyonu, üretral darlık","cat":"Primer vs sekonder VUR","src":"VUR & Çocukta İYE tam notu · Primer vs sekonder VUR (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10352","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Yönetim ilkesi — özellikleri?","answer":"Primer VUR: Risk profiline göre · Sekonder VUR: <b>Önce nedeni düzelt</b> (valf ablasyonu, BBD/üropati tedavisi); refü çoğu kez geriler","cat":"Primer vs sekonder VUR","src":"VUR & Çocukta İYE tam notu · Primer vs sekonder VUR (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10353","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"II — VCUG bulgusu?","answer":"Pelvikalisiyel sisteme kaçış; <b>dilatasyon yok</b>, forniksler keskin","cat":"3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V","src":"VUR & Çocukta İYE tam notu · 3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10354","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"III — VCUG bulgusu?","answer":"Hafif/orta dilatasyon ± kıvrım; forniksler <b>hafif künt</b>","cat":"3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V","src":"VUR & Çocukta İYE tam notu · 3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10355","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"IV — VCUG bulgusu?","answer":"Orta dilatasyon + tortuoz üreter; papiller izlenim <b>korunmuş</b>","cat":"3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V","src":"VUR & Çocukta İYE tam notu · 3. Sınıflama — Uluslararası Reflü Çalışması (IRSC, 1985), Grade I–V (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10356","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Asemptomatik genel çocuk — VUR prevalansı?","answer":"%0,4–1,8","cat":"4. Epidemiyoloji ve prezentasyon (sayılarıyla)","src":"VUR & Çocukta İYE tam notu · 4. Epidemiyoloji ve prezentasyon (sayılarıyla) (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10357","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"İYE geçiren çocuk — VUR prevalansı?","answer":"%30–50","cat":"4. Epidemiyoloji ve prezentasyon (sayılarıyla)","src":"VUR & Çocukta İYE tam notu · 4. Epidemiyoloji ve prezentasyon (sayılarıyla) (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10358","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Kardeş — VUR prevalansı?","answer":"<b>%27,4 (3–51)</b>","cat":"4. Epidemiyoloji ve prezentasyon (sayılarıyla)","src":"VUR & Çocukta İYE tam notu · 4. Epidemiyoloji ve prezentasyon (sayılarıyla) (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10359","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Çocuk (offspring) — VUR prevalansı?","answer":"<b>%35,7 (21–61)</b>","cat":"4. Epidemiyoloji ve prezentasyon (sayılarıyla)","src":"VUR & Çocukta İYE tam notu · 4. Epidemiyoloji ve prezentasyon (sayılarıyla) (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10360","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Renal-mesane US — Rolü?","answer":"İlk basamak. Kortikal incelme/düzensizlik/artmış ekojenite, dupleks + HN, üreterosel, üreter dilatasyonu, bilateral yüksek dereceli HN, anormal mesane → <b>VCUG'u zorunlu kıl.</b>","cat":"6. Tanısal değerlendirme","src":"VUR & Çocukta İYE tam notu · 6. Tanısal değerlendirme (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10361","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"VCUG — Rolü?","answer":"<b>VUR tanısının altın standardı.</b> Dereceleme + üretra (erkekte <b>PUV ekartasyonu</b>). Siklik VCUG duyarlılığı artırır.","cat":"6. Tanısal değerlendirme","src":"VUR & Çocukta İYE tam notu · 6. Tanısal değerlendirme (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10362","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"DMSA — Rolü?","answer":"Kortikal hasarın kantitatif altın standardı. Akut faz (4–6 hafta) → pyelonefrit (perfüzyon defekti). 3–6 ay → kalıcı <b>skar</b>. Split fonksiyon.","cat":"6. Tanısal değerlendirme","src":"VUR & Çocukta İYE tam notu · 6. Tanısal değerlendirme (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10363","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Nükleer (direkt) sistografi — Rolü?","answer":"Düşük radyasyon; takip ve kız çocuğunda tarama için. Dereceleme VCUG kadar ince değil; üretrayı göstermez.","cat":"6. Tanısal değerlendirme","src":"VUR & Çocukta İYE tam notu · 6. Tanısal değerlendirme (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10364","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"VUDS (video-ürodinami) — Rolü?","answer":"LUTD + febril İYE öyküsü olan veya standart LUTD tedavisine yanıtsız çocukta; VCUG ile kombine.","cat":"6. Tanısal değerlendirme","src":"VUR & Çocukta İYE tam notu · 6. Tanısal değerlendirme (Aşama 2 — nottan türetildi)","flag":true},{"id":"vur_x10365","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","type":"open","q":"Erken infantta sünnet — açıkla","answer":"normal çocukta bile İYE riskini azaltır; yüksek emi en çok tehdit eden disfonksiyon?","answer":"<b>Detrusor aşırı aktivite + sfinkter aşırı aktivite (DSD)</b> — yüksek depolama basıncı.","cat":"EBU 26 SORU ANALİZİ (bu bloktan çıkanlar + doğru mantık)","src":"VUR & Çocukta İYE tam notu · EBU 26 SORU ANALİZİ (bu bloktan çıkanlar + doğru mantık) (Aşama 2 — nottan türetildi)","flag":false},{"id":"konjenital_x10380","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"SFU (Society for Fetal Urology) grade 0–4 — açıkla","answer":"pelvikalisiyel dilatasyon + parankim temelli, gözlemciler arası uyumu düşük.","cat":"0.1 Neden ölçüm değişti? SFU → APRPD → UTD","src":"Konjenital Obstrüksiyon tam notu · 0.1 Neden ölçüm değişti? SFU → APRPD → UTD (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10381","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"APRPD (Anterior-Posterior Renal Pelvis Diameter) — açıkla","answer":"objektif tek ölçü ama tek başına yetersiz.","cat":"0.1 Neden ölçüm değişti? SFU → APRPD → UTD","src":"Konjenital Obstrüksiyon tam notu · 0.1 Neden ölçüm değişti? SFU → APRPD → UTD (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10382","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"UTD (Urinary Tract Dilation, 2014; 2021 güncellemesi) — açıkla","answer":"8 derneğin (ACR, AIUM, ASPN, SFU, SMFM, SPU, SPR, SRU) ortak dilidir. Hem pre- hem postnatal, böbreğin yanında <b>üreter, mesane, parankim, amniyon</b> dahil tüm sistemi değerlendirir; gözlemciler arası uyumu SFU'dan iyidir.","cat":"0.1 Neden ölçüm değişti? SFU → APRPD → UTD","src":"Konjenital Obstrüksiyon tam notu · 0.1 Neden ölçüm değişti? SFU → APRPD → UTD (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10383","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"Akciğer — özellikleri?","answer":"Etki: Pulmoner hipoplazi · Geri dönüş: Yenidoğanda <b>ölümcül</b> olabilir u · 5.3 En sık sorulan eşleştirmeler (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10388","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"UPJ — özellikleri?","answer":"\"En\" / kilit: Üreterin en sık konjenital anomalisi; sol+erkek · Tedavi çapası: Anderson-Hynes (>%96), <%40/-%10 cerrahi","cat":"5.3 En sık sorulan eşleştirmeler","src":"Konjenital Obstrüksiyon tam notu · 5.3 En sık sorulan eşleştirmeler (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10389","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"Megaüreter — özellikleri?","answer":"\"En\" / kilit: Çap >7 mm; %85 spontan rezolüsyon · Tedavi çapası: İzlem+CAP → Hendren tapering + Cohen reimplant","cat":"5.3 En sık sorulan eşleştirmeler","src":"Konjenital Obstrüksiyon tam notu · 5.3 En sık sorulan eşleştirmeler (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10390","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"Üreterosel — özellikleri?","answer":"\"En\" / kilit: Kız>erkek; %80 duplex üst pol; Weigert-Meyer · Tedavi çapası: Obstrükte/febrilde endoskopik insizyon","cat":"5.3 En sık sorulan eşleştirmeler","src":"Konjenital Obstrüksiyon tam notu · 5.3 En sık sorulan eşleştirmeler (Aşama 2 — nottan türetildi)","flag":true},{"id":"konjenital_x10391","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","type":"open","q":"Ektopik üreter — özellikleri?","answer":"\"En\" / kilit: Kız:erkek 5:1; erkekte inkontinans YOK · Tedavi çapası: Heminefroüreterektomi / rekonstrüksiyon","cat":"5.3 En sık sorulan eşleştirmeler","src":"Konjenital Obstrüksiyon tam notu · 5.3 En sık sorulan eşleştirmeler (Aşama 2 — nottan türetildi)","flag":true},{"id":"disgenital_x10392","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","type":"open","q":"\"Neden en geç 18 ay?\"","answer":"germ/Leydig hücre kaybı + Ad spermatogonia dönüşümü.",
