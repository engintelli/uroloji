T mantığı). 5-ARI PSA'yı yarıya indirir, takipte 2× düzelt.","cat":"","id":"bph_417","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"BPH, BPE, BOO, BPO, LUTS terimlerini tanı düzeyleriyle ayır ve EAU'nun paradigma kaymasını açıkla.","answer":"<b>BPH</b> histolojik, <b>BPE</b> klinik (büyük bez), <b>BOO</b> ürodinamik (↑basınç+↓akış), <b>BPO</b> BPE'ye bağlı BOO, <b>LUTS</b> semptom şemsiyesi. EAU odağı BPH→LUTS'a kaydırdı: tedavi edilen LUTS'a neden olan BPO; alt ÜS fonksiyonel ünite; 2025'te <b>holistik &gt; sıralı</b> yönetim.","cat":"","id":"bph_418","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Hasta soruyor: 'PVR kaç olunca ameliyat olmalıyım?' Jüri de aynı eşiği sorgular. Cevabın?","answer":"<b>Kesin PVR eşiği YOKTUR.</b> PVR ile LUTS şiddeti korele değil; tek başına cerrahi kararı vermez. Uzmanlar kabaca 100–300 mL aralığını işaret eder; karar semptom + komplikasyon + risk bütününe göre.","cat":"","id":"bph_419","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"İdrar taşlarının yaklaşık yüzde kaçı kalsiyum içerir?","answer":"<b>~%75.</b> En sık kalsiyum oksalat; kalsiyum fosfat/brushite alkali idrarda.","cat":"","id":"tas_420","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"En sert, SWL'ye en dirençli kalsiyum oksalat formu hangisi?","answer":"<b>Kalsiyum oksalat monohidrat (whewellit, COM).</b> Dihidrat (weddellit) daha kırılgan.","cat":"","id":"tas_421","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Radyolüsen (düz grafide görünmeyen) taşlar?","answer":"<b>Ürik asit / ürat</b>, ksantin, 2,8-DHA, <b>indinavir</b>. BT'de görünür (indinavir BT'de bile zor → kontrast).","cat":"","id":"tas_422","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Ürik asit taşı oluşumunun üçlüsü?","answer":"<b>Düşük idrar pH (&lt;5.5)</b> + hiperürikozüri + düşük idrar hacmi. İlişkili: gut, DM, ileostomi.","cat":"","id":"tas_423","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Hangi taş tek başına oral kemolizle eritilebilir?","answer":"<b>Saf ürik asit taşı.</b> Sodyum/amonyum ürat <span class='hl'>erimez</span>. Hedef pH 7.0–7.2.","cat":"","id":"tas_424","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Struvit (enfeksiyon) taşına yol açan bakteriler? Hangisi yapmaz?","answer":"<b>Üreaz üretenler:</b> Proteus (klasik), Klebsiella, Pseudomonas, Staph. <span class='hl'>E. coli üreaz YAPMAZ.</span>","cat":"","id":"tas_425","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Struvit taşı mekanizması ve klasik görünümü?","answer":"Üreaz → amonyak → idrar pH &gt;7 → magnezyum amonyum fosfat çöker. <b>Staghorn'ların çoğu.</b> Radyoopak, hızlı büyür.","cat":"","id":"tas_426","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Sistinürinin transport defekti hangi aminoasitleri kapsar?","answer":"<b>COLA:</b> sistin, ornitin, lizin, arjinin. Otozomal resesif. Heksagonal kristal. Sert, SWL'ye dirençli, erken yaş → yüksek risk.","cat":"","id":"tas_427","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Akut yan ağrısında ilk görüntüleme yöntemi?","answer":"<b>USG</b> — radyasyonsuz, ucuz; gebe/çocukta zorunlu tercih. &lt;5 mm taşı büyük gösterir.","cat":"","id":"tas_428","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Taş tanısında altın standart görüntüleme?","answer":"<b>Düşük-doz kontrastsız BT (NCCT).</b> En yüksek duyarlılık/özgüllük. USG negatif + şüphe yüksek → düşük doz spiral BT.","cat":"","id":"tas_429","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Hangi HU değeri üstünde taş SWL'ye dirençlidir?","answer":"<b>&gt;1000 HU</b> (+ yüksek homojenite). Tipik: COM, brushite, sistin.","cat":"","id":"tas_430","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Ürik asit ↔ kalsifiye taş ayrımını hangi BT yapar?","answer":"<b>Dual-energy BT.</b> Saf COM'u tanır, mikst taşları ayıramaz.","cat":"","id":"tas_431","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Gebede taş görüntüleme sırası?","answer":"<b>USG → MR.</b> Radyasyondan kaçın (30 mGy ile çocukluk kanseri riski 2 katına çıkar).","cat":"","id":"tas_432","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Taş analizinin tercih edilen yöntemleri?","answer":"<b>İnfrared spektroskopi</b> veya <b>X-ışını difraksiyonu.</b> Taş geçen her hastada önerilir.","cat":"","id":"tas_433","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"İdrar sitrat atılımını belirleyen ana faktör?","answer":"<b>Asit-baz dengesi.</b> Asidoz → tübülde sitrat reabsorpsiyonu↑ → hipositratüri.","cat":"","id":"tas_434","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Renal kolikte birinci ve ikinci basamak analjezi?","answer":"<b>1. NSAİİ</b> (diklofenak) + parasetamol. <b>2. opioid.</b> Dirençli ağrı → drenaj/URS.","cat":"","id":"tas_435","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Obstrükte + enfekte böbrekte (ürosepsis) yönetim?","answer":"<b>Acil dekompresyon</b> — perkütan nefrostomi <span class='hl'>veya</span> üreteral stent (eş etkili). Kesin taş tedavisi sepsis düzelene kadar <b>ertelenir.</b> Kültür + hemen antibiyotik.","cat":"","id":"tas_436","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Piyelonefrit/ürosepsiste gentamisin dozu?","answer":"<b>5 mg/kg/gün.</b>","cat":"","id":"tas_437","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"≤4 mm üreter taşlarının pasaj oranı?","answer":"<b>~%95'i 40 gün içinde</b> spontan düşer.","cat":"","id":"tas_438","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"MET (α-bloker) en çok hangi taşta yararlı?","answer":"<b>&gt;5 mm distal üreter</b> taşı (tamsulosin, güçlü öneri). <span class='hl'>PDE-5 veya kortikosteroid eklemenin yararı yok.</span>","cat":"","id":"tas_439","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"MET hangi durumlarda kesilip aktif çıkarmaya geçilir?","answer":"<b>Enfeksiyon, dirençli ağrı, böbrek fonksiyonu bozulması.</b>","cat":"","id":"tas_440","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"1.2 cm distal üreter taşı + ağır hidronefroz + dirençli ağrı (yaşlı, KBH/KAH) → tedavi?","answer":"<b>URS + lazer litotripsi.</b> Büyük & dirençli → MET/gözlem yetersiz; PCNL uygun değil; SWL dezavantajlı.","cat":"","id":"tas_441","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Oral kemolizde hedef idrar pH'sı ve nedeni?","answer":"<b>7.0–7.2.</b> Daha yüksek pH eritmeyi artırır ama <span class='hl'>kalsiyum fosfat çökeltir.</span>","cat":"","id":"tas_442","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Struvit için perkütan irrigasyon kemoliz solüsyonu?","answer":"<b>Suby's G solüsyonu</b> (%10 hemiasidrin, pH 3.5–4). Nadir kullanılır.","cat":"","id":"tas_443","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Renal taş: &lt;10 mm tedavisi?","answer":"<b>SWL veya RIRS.</b>","cat":"","id":"tas_444","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Renal taş: 10–20 mm tedavisi?","answer":"<b>SWL veya endoüroloji</b> (PNL/RIRS).","cat":"","id":"tas_445","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Renal taş: &gt;20 mm ve staghorn birinci basamak?","answer":"<b>PNL.</b> Etkinliği taş boyutundan bağımsız. Staghorn'da ±RIRS kombine.","cat":"","id":"tas_446","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Alt pol taşında SWL neden zayıf, ne tercih edilir?","answer":"Fragmanlar yer çekimiyle kalikste kalır → düşük SFR. <b>&gt;1 cm bile PNL/RIRS</b> tercih. Aleyhe: dik infundibulopelvik açı, uzun kaliks, dar infundibulum.","cat":"","id":"tas_447","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Üreter taşında her boyutta en yüksek başarılı yöntem?","answer":"<b>URS</b> (Ho:YAG / tülyum fiber lazer).","cat":"","id":"tas_448","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Kanama riski sıralaması (düşükten yükseğe)?","answer":"<b>SWL &lt; URS &lt; PNL.</b> En düşük = SWL.","cat":"","id":"tas_449","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Antitrombotik kesilemeyen hastada tercih?","answer":"<b>Fleksibl URS</b> — SWL/PNL'ye göre en düşük morbidite.","cat":"","id":"tas_450","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"SWL kontrendikasyonları?","answer":"Gebelik, düzeltilmemiş kanama diyatezi, kontrolsüz İYE, ağır deformite/obezite, <b>komşu arteryel anevrizma</b>, distal anatomik obstrüksiyon.","cat":"","id":"tas_451","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"PNL'de sepsisi azaltan intraoperatif önlem?","answer":"<b>İrrigasyon basıncı &lt;30 mmHg</b> + engelsiz drenaj. İntraoperatif taş kültürü yararlı.","cat":"","id":"tas_452","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Tüm taş hastalarına ortak önlemler?","answer":"<b>Bol sıvı (idrar &gt;2–2.5 L/gün)</b>, tuz kısıtı, <b>normal kalsiyum.</b>","cat":"","id":"tas_453","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Diyet kalsiyum kısıtlaması neden yanlıştır?","answer":"Barsakta serbest oksalat↑ → emilim↑ → <b>hiperokzalüri.</b> Doğru: normal Ca. <span class='hl'>Enterik hiperoksalüride ise oral kalsiyum EKLE.</span>","cat":"","id":"tas_454","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Hiperkalsiüri tedavisi?","answer":"<b>Tiyazid</b> (HKT/klortalidon/indapamid).","cat":"","id":"tas_455","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Primer hiperoksalüri (PH) ana ilacı?","answer":"<b>Piridoksin (B6).</b> + Mg, alkali sitrat, hiperdiürez.","cat":"","id":"tas_456","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Hiperürikozüri birinci ve ikinci sıra ilaç?","answer":"<b>Allopurinol</b> (1. sıra) → <b>febuksostat</b> (2. sıra).","cat":"","id":"tas_457","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Sistin taşı metafilaksisi (pH ve ilaç eşiği)?","answer":"pH <b>&gt;7.5.</b> Sistin &lt;3 mmol/gün → K-sitrat; &gt;3 mmol/gün → <b>tiopronin.</b>","cat":"","id":"tas_458","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Struvit taşı tedavi temeli?","answer":"<b>Tam cerrahi temizlik</b> (rezidü = devam eden enfeksiyon) + idrar asidifikasyonu (L-metiyonin) ± asetohidroksamik asit (üreaz inhibitörü).","cat":"","id":"tas_459","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"Kalsiyum fosfat taşında primer hiperparatiroidi ve RTA tedavisi?","answer":"<b>Hiperparatiroidi → cerrahi</b> (paratiroidektomi). <b>RTA tip 1 → tiyazid + alkali</b> (sitrat/bikarbonat).","cat":"","id":"tas_460","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"İdrar taşlarının yaklaşık %75'i kalsiyum içerir. Diyetle alınan kalsiyumu kısıtlamak ne yapar?","options":["Oksalat emilimini artırır","Tüm böbrek taşı hastaları için önerilir","Ürik asit atılımını azaltır","Sistin çözünürlüğünü artırır"],"correct":0,"answer":"<b>Kalsiyum kısıtı yanlıştır:</b> barsakta serbest oksalat artar → emilim ve hiperokzalüri↑. Rutin hastaya normal kalsiyum; <b>enterik hiperoksalüride ise oral kalsiyum eklenir</b> (yemekle, oksalatı bağlar).","cat":"mcq","id":"tas_461","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Böbrek taşı tedavisinde kanama riski en DÜŞÜK yöntem hangisidir?","options":["Perkütan nefrolitotomi","Üreteroskopi","Şok dalga litotripsi (SWL)","Açık taş cerrahisi"],"correct":2,"answer":"Kanama riski sıralaması: <b>SWL &lt; URS &lt; PNL.</b> SWL en az invaziv / tek non-invaziv modalite.","cat":"mcq","id":"tas_462","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"İdrardaki sitrat atılımını belirleyen başlıca faktör nedir?","options":["İdrarla atılan sodyum","Diyetteki protein miktarı","İdrarla kalsiyum atılımı","Asit-baz dengesi"],"correct":3,"answer":"<b>Asit-baz dengesi.</b> Asidoz → proksimal tübülde sitrat reabsorpsiyonu↑ → hipositratüri. Bu yüzden RTA ve kronik diyarede hipositratüri görülür.","cat":"mcq","id":"tas_463","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"İdrarın alkalileştirilmesi hangi taşın çözülmesine yardımcı olur?","options":["Ürik asit","Magnezyum amonyum fosfat (struvit)","Brushite","Kalsiyum oksalat"],"correct":0,"answer":"<b>Yalnız saf ürik asit taşı</b> oral kemolizle (pH 7.0–7.2) erir. Sodyum/amonyum ürat erimez; daha yüksek pH kalsiyum fosfat çökeltebilir.","cat":"mcq","id":"tas_464","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"72 yaş erkek, KAH ve evre 3 KBH. Akut, analjeziye dirençli sol yan ağrısı + hematüri. NCCT: sol distal üreterde 1.2 cm taş + ağır hidronefroz. Ateşsiz, enfeksiyon yok. En uygun yönetim?","options":["Üreteroskopi + lazer litotripsi","α-bloker ile medikal ekspulsif tedavi","Hidrasyon + ağrı kontrolü ile gözlem","Perkütan nefrolitotomi (PCNL)"],"correct":0,"answer":"<b>URS + lazer litotripsi.</b> 1.2 cm MET için büyük; dirençli ağrı + yüksek dereceli obstrüksiyon → gözlem/MET yetersiz. PCNL distal üreter taşı için uygun değil; SWL bu komorbid profilde dezavantajlı. URS = en uygun, en düşük morbiditeli aktif seçenek.","cat":"case","id":"tas_465","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Renal kolik şüphesinde USG ile taş saptanamazsa tanıyı doğrulamak için önerilen görüntüleme?","options":["Karın düz röntgeni (KUB)","Düşük dozlu spiral BT","Kontrastlı BT","MRG"],"correct":1,"answer":"<b>Düşük-doz kontrastsız spiral BT</b> = altın standart (duyarlılık ~%95). Radyasyonu azaltır, klinik anlamlı taşta doğruluğu korur.","cat":"mcq","id":"tas_466","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Piyelonefrit / ürosepsis hastasında önerilen günlük gentamisin dozu?","options":["0,5 mg/kg","1 mg/kg","5 mg/kg","15 mg/kg"],"correct":2,"answer":"<b>5 mg/kg/gün.</b> (Nazım Hoca antibiyotik dozlarını sorar.)","cat":"mcq","id":"tas_467","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Düz grafide görünmeyen (non-opak), idrar pH'sı kalıcı olarak düşük olan bir hastada en olası taş tipi ve tek başına eritme yöntemi nedir?","options":["Sistin — tiopronin","Ürik asit — oral alkalileştirme","Struvit — asidifikasyon","Kalsiyum oksalat — tiyazid"],"correct":1,"answer":"<b>Ürik asit taşı</b> radyolüsen, asidik idrarda oluşur ve <b>oral alkalileştirme (pH 7.0–7.2)</b> ile eritilebilen tek taştır. (Cüneyt Hoca'nın non-opak taş + pH ayarı favorisi.)","cat":"case","id":"tas_468","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Tekrarlayan İYE, idrar pH &gt;7, hızlı büyüyen staghorn taşı olan hastada idrar kültüründe Proteus üredi. Mekanizma ve etken sınıfı?","options":["Üreaz üreten bakteri → struvit (enfeksiyon) taşı","Sitrat eksikliği → kalsiyum oksalat","Asidik pH → ürik asit","APRT eksikliği → 2,8-DHA"],"correct":0,"answer":"<b>Üreaz üreten bakteri (Proteus klasik)</b> → üre→amonyak → pH↑ → magnezyum amonyum fosfat (struvit). <b>E. coli üreaz yapmaz.</b> Tedavi: tam cerrahi temizlik + asidifikasyon ± asetohidroksamik asit.","cat":"case","id":"tas_469","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Obstrükte böbrek + sepsis tablosu (ürolojik acil). İlk yapılması gereken?","options":["Acil definitif taş cerrahisi (PCNL)","Yalnız oral antibiyotik + izlem","Acil dekompresyon (nefrostomi veya stent) + antibiyotik","SWL ile acil fragmantasyon"],"correct":2,"answer":"<b>Acil dekompresyon</b> (perkütan nefrostomi VEYA üreteral stent — eş etkili) + idrar kültürü + hemen antibiyotik. <b>Kesin taş tedavisi sepsis düzelene kadar ertelenir.</b> Dekompresyon mortaliteyi belirgin azaltır.","cat":"case","id":"tas_470","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"20 mm üzeri böbrek taşında birinci basamak tedavi?","options":["SWL","RIRS","PCNL","Gözlem"],"correct":2,"answer":"<b>PCNL</b> birinci basamaktır (etkinliği taş boyutundan bağımsız). Staghorn taşlarda da primer PCNL (±RIRS).","cat":"mcq","id":"tas_471","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"10 mm altı (alt pol dışı) böbrek taşında birinci basamak seçenekler?","options":["Yalnız açık cerrahi","SWL veya RIRS","Yalnız PCNL","Yalnız gözlem"],"correct":1,"answer":"<b>SWL veya RIRS.</b> 10–20 mm'de SWL veya endoüroloji; &gt;20 mm'de PCNL.","cat":"mcq","id":"tas_472","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Alt pol böbrek taşı, dik infundibulopelvik açı ve uzun cilt-taş mesafesi var. Hangi yöntem tercih edilmez / hangisi uygundur?","options":["SWL ideal, RIRS gereksiz","SWL zayıf → PCNL/RIRS tercih","Yalnız gözlem yeterli","Açık cerrahi ilk tercih"],"correct":1,"answer":"Alt polde fragmanlar yer çekimiyle kalır + olumsuz anatomi → <b>SWL etkinliği düşük.</b> &gt;1 cm bile <b>PCNL veya RIRS</b> tercih edilir.","cat":"case","id":"tas_473","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Antitrombotik tedavisi kesilemeyen hastada taş çıkarımı için tercih edilen yöntem?","options":["SWL","PCNL","Fleksibl URS","Açık cerrahi"],"correct":2,"answer":"<b>Fleksibl URS</b> — SWL ve PCNL'ye göre en düşük morbidite; antitrombotik altında en güvenli aktif seçenek.","cat":"mcq","id":"tas_474","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Renal kolikte birinci basamak analjezi?","options":["Opioid","NSAİİ (örn. diklofenak) + parasetamol","Yalnız antispazmodik","Kortikosteroid"],"correct":1,"answer":"<b>NSAİİ + parasetamol</b> birinci basamak; opioid ikinci basamak. NSAİİ tekrar kolik epizodlarını da azaltır.","cat":"mcq","id":"tas_475","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"≤4 mm üreter taşlarının spontan pasaj oranı?","options":["~%20'si 40 günde","~%50'si 40 günde","~%95'i 40 günde","Hiçbiri kendiliğinden düşmez"],"correct":2,"answer":"<b>~%95'i 40 gün içinde</b> kendiliğinden düşer. MET (α-bloker) en çok &gt;5 mm distal üreter taşında yararlı.","cat":"mcq","id":"tas_476","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"MET'e (α-bloker) hızlandırıcı olarak eklemenin yararı KANITLANMAMIŞ ajan(lar)?","options":["PDE-5 inhibitörü ve kortikosteroid","Tek başına tamsulosin","Sıvı alımı","NSAİİ"],"correct":0,"answer":"<b>PDE-5 inhibitörü ve kortikosteroid</b> eklemenin hızlandırıcı yararı yetersiz kanıt (LE 2a). MET asıl &gt;5 mm distal üreter taşında geçerli.","cat":"mcq","id":"tas_477","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Hangi taş kompozisyonu SWL'ye en dirençlidir?","options":["Kalsiyum oksalat dihidrat","Ürik asit","Kalsiyum oksalat monohidrat / brushite / sistin","Struvit"],"correct":2,"answer":"<b>COM, brushite ve sistin</b> sert taşlardır; ayrıca <b>&gt;1000 HU</b> taşlar SWL'ye dirençli.","cat":"mcq","id":"tas_478","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"İdiopatik hiperkalsiürik kalsiyum taşı hastasında rekürrensi azaltan ilaç?","options":["Allopurinol","Tiyazid","Asetohidroksamik asit","Piridoksin"],"correct":1,"answer":"<b>Tiyazid</b> üriner kalsiyumu azaltır ve rekürrensi belirgin düşürür (LE 1a). Hipositratüri gelişirse alkali sitrat eklenir.","cat":"mcq","id":"tas_479","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"mcq","q":"Sistin taşı olan hastada idrar sistini 4 mmol/gün (&gt;3). Alkalileştirme yetersiz kaldı. Sonraki adım?","options":["Allopurinol","Tiopronin","Tiyazid","Febuksostat"],"correct":1,"answer":"Sistin &gt;3 mmol/gün veya alkalileştirme (pH &gt;7.5) yetersizse <b>tiopronin</b> (α-merkaptopropionilglisin) eklenir. Kaptopril ikinci sıra.","cat":"case","id":"tas_480","topic":"tas","group":1,"topicTitle":"Üriner Sistem Taşları","src":"","flag":false},{"type":"open","q":"EAU 2025 ÜSE'yi nasıl yeni sınıflandırdı?","answer":"<b>Lokalize</b> (=sistit, sistemik bulgu yok) vs <b>Sistemik</b> (ateş/titreme ± lokalize). Her ikisi risk faktörlü/faktörsüz. <span class='flag'>'Basit/komplike' obsolet.</span>","cat":"","id":"enfeksiyon_481","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Bakteriyel persistans vs reenfeksiyon farkı?","answer":"<b>Persistans:</b> aynı organizma, nidustan (enfekte taş, nonfonksiyone segment, üreteral güdük, fistül) → cerrahi gerekir. <b>Reenfeksiyon:</b> farklı organizma/serotip.","cat":"","id":"enfeksiyon_482","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Rekürren ÜSE tanımı?","answer":"≥2 epizod / 6 ay <b>veya</b> ≥3 epizod / yıl.","cat":"","id":"enfeksiyon_483","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Piyelonefrit ile en güçlü ilişkili UPEC virülans faktörü?","answer":"<b>P fimbria (PapG adezini)</b> — mannoz-dirençli, böbrek Gal-Gal reseptörüne bağlanır, piyelonefrit + bakteriyemi. (Tip 1/FimH mannoz-duyarlı → sistit.)","cat":"","id":"enfeksiyon_484","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Üreaz üreten patojen ve sonucu?","answer":"<b>Proteus</b> → üre→amonyak → idrar alkalinizasyonu → <b>strüvit (enfeksiyon taşı)/staghorn</b> → bakteriyel persistans.","cat":"","id":"enfeksiyon_485","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Steril piyüri ayırıcı tanısı?","answer":"Eksik antibiyotik tedavisi · ürolitiazis · yabancı cisim · <b>M. tuberculosis</b> · <b>C. trachomatis</b>.","cat":"","id":"enfeksiyon_486","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Asemptomatik bakteriüri ne zaman tedavi edilir?","answer":"Yalnızca: <b>gebelik</b> ve <b>mukozal travma yapacak girişim öncesi</b> (preemptif). Diğer her durumda (DM, yaşlı, kateterli) TEDAVİ ETME.","cat":"","id":"enfeksiyon_487","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Basit sistit birinci basamak tedavisi (kadın)?","answer":"<b>Fosfomisin trometamol 3 g tek doz</b>, nitrofurantoin 100 mg 2×1 (5g), pivmesilinam 400 mg 3×1 (3–5g).","cat":"","id":"enfeksiyon_488","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Nitrofurantoin hangi durumlarda KULLANILMAZ?","answer":"<b>Üst/komplike ÜSE</b> (dokuya geçmez). <b>Proteus/Pseudomonas/Morganella'ya etkisiz.</b> G6PD eksikliği (hemoliz). Uzun profilakside pulmoner fibrozis.","cat":"","id":"enfeksiyon_489","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"TMP-SMX ne zaman birinci tercih olabilir?","answer":"Yalnızca yerel E. coli direnci <b>&lt;%20</b> ise. (Piyelonefritte FQ için eşik &lt;%10.)","cat":"","id":"enfeksiyon_490","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Gebelikte sistit tedavisinde nitrofurantoin kullanımı?","answer":"Yalnızca <b>ilk iki trimester</b>. Trimetoprim 1. trimesterde, sülfonamid son trimesterde kaçınılır. Penisilin/sefalosporin/fosfomisin güvenli.","cat":"","id":"enfeksiyon_491","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Rekürren sistitte EAU'nun GÜÇLÜ önerdiği antibiyotik-dışı yöntem?","answer":"<b>OM-89 (immünoaktif profilaksi)</b> — tüm yaş gruplarında kadın. (Kranberry/probiyotik/D-mannoz kanıt yetersiz; vajinal östrojen postmenopozalde zayıf.)","cat":"","id":"enfeksiyon_492","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Piyelonefritin basit sistitten en önemli tanısal farkı?","answer":"<b>Tüm vakalarda idrar kültürü + antibiyogram</b> zorunlu (sistitte odaklı anamnez yeterli).","cat":"","id":"enfeksiyon_493","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Piyelonefritte ne zaman BT çekilir?","answer":"<b>72 saatte ateş düşmezse</b> veya klinik kötüleşirse (ya da derhal kötüleşmede). İlk basamak USG (taş/obstrüksiyon dışlama).","cat":"","id":"enfeksiyon_494","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Obstrüktif piyelonefrit / apse yönetimi?","answer":"<b>ACİL dekompresyon: DJ stent veya perkütan nefrostomi</b> + gerekirse apse drenajı. Ürosepsise hızla ilerler.","cat":"","id":"enfeksiyon_495","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Erkekte febril ÜSE/piyelonefrit tedavi süresi?","answer":"<b>En az 2 hafta</b>, tercihen florokinolon (prostatik tutulum sık).","cat":"","id":"enfeksiyon_496","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"CAUTI önlemede EAU güçlü önerileri?","answer":"Topikal antiseptik UYGULAMA · profilaktik antimikrobiyal KULLANMA · kateter süresini minimumda tut · <b>hidrofilik kaplı kateter</b> · qSOFA.","cat":"","id":"enfeksiyon_497","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Ürosepsiste en sık altta yatan neden?","answer":"<b>Obstrüksiyon (&gt;2/3 vaka)</b> — ürolitiazis, BPH, malignite. Mortalite %20–40.","cat":"","id":"enfeksiyon_498","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"qSOFA üç değişkeni? (Çeldirici nedir?)","answer":"① Mental durum (GKS≤14) ② Solunum ≥22/dk ③ sKB ≤100 mmHg. <span class='flag'>Nabız &gt;90 qSOFA DEĞİL — SIRS kriteridir!</span>","cat":"","id":"enfeksiyon_499","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Sepsiste en güvenilir biyobelirteç?","answer":"<b>Prokalsitonin (PCT) &gt; CRP</b>. &gt;2 ng/mL ağır sepsisi olası kılar; viral enfeksiyonda yükselmez.","cat":"","id":"enfeksiyon_500","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"ESBL'nin tüm Enterobacteriaceae içindeki oranı?","answer":"<b>~%45</b> (GPIU çalışması). Ürosepsis/MDR şüphesinde baştan ESBL kapsamı.","cat":"","id":"enfeksiyon_501","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Septik şokta birinci vazopresör ve refrakter şokta eklenen?","answer":"<b>Norepinefrin</b> birinci; sıvı+vazopresöre rağmen MAP&lt;65 ise <b>hidrokortizon</b>. Hb hedef 7–9 g/dL, glukoz ≤180.","cat":"","id":"enfeksiyon_502","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Akut bakteriyel prostatitte kesinlikle yapılMAMASI gereken?","answer":"<b>Prostat masajı</b> (EAU güçlü öneri — bakteriyemi riski). PSA %83 yükselir.","cat":"","id":"enfeksiyon_503","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Kronik bakteriyel prostatit (NIH II) tanı testi ve tedavisi?","answer":"Tanı: <b>Meares-Stamey 4 cam</b> (basit 2 cam: VB2+VB3). Tedavi: <b>florokinolon 4–6 hafta</b>.","cat":"","id":"enfeksiyon_504","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"En sık prostatit kategorisi?","answer":"<b>NIH Kategori III — CP/CPPS</b> (~%90). IIIa inflamatuar / IIIb noninflamatuar. NIH-CPSI skoru.","cat":"","id":"enfeksiyon_505","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Akut skrotumda ilk adım?","answer":"<b>Testis torsiyonunu dışla.</b> Doppler: epididimit → epididim hiperperfüze; torsiyon → perfüzyon yok.","cat":"","id":"enfeksiyon_506","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Genç cinsel aktif erkekte epididimit etkeni ve tedavisi?","answer":"<b>C. trachomatis, N. gonorrhoeae.</b> Gonore olası → seftriakson IM tek doz + doksisiklin 100 mg 2×1, 10–14 gün.","cat":"","id":"enfeksiyon_507","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Kronik granülomatöz epididimitin en sık infeksiyöz nedeni?","answer":"<b>Tüberküloz</b> (ayrıca intravezikal BCG, sarkoidoz, brusella, Behçet, amiodaron).","cat":"","id":"enfeksiyon_508","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"NGU etiyolojik ajanları?","answer":"<b>C. trachomatis</b> (en sık), M. genitalium, <b>U. urealyticum</b> (U. parvum değil — EAU 2025), T. vaginalis.","cat":"","id":"enfeksiyon_509","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Gonokoksik üretrit GÜNCEL tedavisi (EAU 2025)?","answer":"<b>Tek doz seftriakson 1000 mg IM veya IV + C. trachomatis'e etkili antibiyotik kürü.</b> <span class='flag'>Azitromisin monoterapi (makrolid direnci) terk edildi — Primer tablosu eski.</span>","cat":"","id":"enfeksiyon_510","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Makrolid dirençli M. genitalium tedavisi?","answer":"<b>Moksifloksasin</b> 400 mg, 7–14 gün.","cat":"","id":"enfeksiyon_511","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Fournier gangreninde en önemli predispozan?","answer":"<b>Diyabet.</b> İnsidans ~1.6/100.000 erkek, pik 50–79 yaş. Polimikrobiyal nekrotizan fasiit.","cat":"","id":"enfeksiyon_512","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Fournier tedavisinin üç temel ayağı?","answer":"① Üçlü ampirik antibiyotik (penisilin/3.kuşak sefalosporin + gentamisin + metronidazol/klindamisin) ② <b>Acil ve geniş debridman</b> ③ VAC → rekonstrüksiyon.","cat":"","id":"enfeksiyon_513","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"LRINEC skoru eşik değerleri?","answer":"<b>≥6 şüphe, ≥8 yüksek olası.</b> Bileşenler: CRP, lökosit, Hb, Na, kreatinin, glukoz. UFGSI sağkalım için prediktif.","cat":"","id":"enfeksiyon_514","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Ürogenital TB klasik idrar triadı ve görüntü bulguları?","answer":"<b>Steril piyüri + asidik idrar + hematüri.</b> Üreter boncuk dizisi, otonefrektomi (putty kidney), thimble bladder. Tedavi 6 ay (2 HRZE+4 HR).","cat":"","id":"enfeksiyon_515","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"XGP'nin tipik BT görünümü ve tedavisi?","answer":"<b>'Ayı pençesi (bear paw)'</b>, taş+nonfonksiyone büyük böbrek; RCC taklidi. Tedavi: <b>nefrektomi</b>. Proteus/E. coli.","cat":"","id":"enfeksiyon_516","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Amfizematöz piyelonefrit hangi hastada, tedavi?","answer":"<b>%90 diyabetik</b>; gaz oluşturan (E. coli/Klebsiella). Huang-Tseng sınıflaması. Resüsitasyon+antibiyotik+<b>perkütan drenaj</b>.","cat":"","id":"enfeksiyon_517","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"S. haematobium kronik enfeksiyonu hangi kansere yol açar?","answer":"<b>Skuamöz hücreli mesane karsinomu.</b> Mesane kalsifikasyonu, terminal hematüri. Tedavi: prazikuantel.","cat":"","id":"enfeksiyon_518","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Malakoplakide patognomonik histoloji?","answer":"<b>Michaelis-Gutmann cisimcikleri</b> (von Hansemann histiyositleri içinde). Kronik koliform enfeksiyon + makrofaj defekti.","cat":"","id":"enfeksiyon_519","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Hangi işlemlerde antimikrobiyal profilaksi ÖNERİLMEZ, hangilerinde ÖNERİLİR?","answer":"Önerilmez: <b>üretrosistoskopi, ürodinami, düşük riskli SWL</b>. Önerilir: <b>URS, PNL, TUR-P</b>. TUR-T risk faktörüne göre.","cat":"","id":"enfeksiyon_520","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"EAU 2025 kılavuzu üriner sistem enfeksiyonu sınıflamasında hangi değişikliği getirmiştir?","options":["Basit/komplike ayrımını koruyarak alt gruplar eklemiştir","'Lokalize' ve 'sistemik' ÜSE kavramlarını getirip basit/komplike dikotomisini obsolet ilan etmiştir","ORENUC sınıflamasını yeniden yürürlüğe koymuştur","Sınıflamayı yalnızca patojen tipine dayandırmıştır"],"correct":1,"answer":"EAU 2025 (Bölüm 3.1) <b>lokalize (=sistit) / sistemik</b> ayrımına geçti; her ikisi risk faktörlü/faktörsüz. Eski sistem klinik şiddeti yansıtmadığı için terk edildi.","cat":"mcq","id":"enfeksiyon_521","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi qSOFA skorunun bir bileşeni DEĞİLDİR?","options":["Mental durum değişikliği (GKS ≤14)","Solunum sayısı ≥22/dk","Sistolik kan basıncı ≤100 mmHg","Nabız >90/dk"],"correct":3,"answer":"<b>Nabız >90 qSOFA değil, SIRS kriteridir.</b> qSOFA = mental durum + solunum ≥22 + sKB ≤100. Klasik çeldirici.","cat":"mcq","id":"enfeksiyon_522","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"24 yaşında, daha önce hiç ÜSE geçirmemiş, sağlıklı, gebe olmayan kadın; 2 gündür dizüri, pollaküri, urgency. Vajinal akıntı yok. Dipstik: nitrit (+), lökosit esteraz (+). Ateş, yan ağrısı yok. En uygun ilk basamak yaklaşım?","options":["İdrar kültürü gönder, sonucu bekle","Florokinolon başla","Fosfomisin trometamol 3 g tek doz","Renal USG iste"],"correct":2,"answer":"Basit (lokalize) sistit: odaklı anamnez tanı için yeterli, kültür şart değil. Birinci basamak <b>fosfomisin 3 g tek doz</b> (alternatif nitrofurantoin). FQ kısıtlı (Avrupa Komisyonu 2019).","cat":"case","id":"enfeksiyon_523","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Nitrofurantoin hangi durumda kullanılMAZ?","options":["Basit sistit","Akut piyelonefrit (üst üriner sistem)","Rekürren ÜSE profilaksisi","Gebeliğin ilk trimesteri"],"correct":1,"answer":"Nitrofurantoin <b>dokuya geçmez</b> ve idrarda hızla atılır → <b>üst/komplike ÜSE'de etkisiz</b>. Ayrıca Proteus/Pseudomonas/Morganella'ya etkisiz.","cat":"mcq","id":"enfeksiyon_524","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"68 yaşında diyabetik erkek; sağ yan ağrısı, 39°C ateş, bulantı. Tansiyon 90/60, bilinç hafif konfüze, solunum 24/dk. BT: sağ üreter taşı + hidronefroz, böbrekte piyelonefritik görünüm. En kritik acil girişim nedir?","options":["Yüksek doz oral florokinolon ve taburculuk","Sadece IV sıvı ve gözlem","Acil dekompresyon (DJ stent veya perkütan nefrostomi) + IV antibiyotik","Elektif üreteroskopi planla"],"correct":2,"answer":"Obstrüktif piyelonefrit + qSOFA pozitif (konfüzyon+solunum≥22+sKB≤100) = ürosepsis. <b>Kaynak kontrolü acil dekompresyon</b> şarttır; taş tedavisi stabilizasyon sonrası elektif.","cat":"case","id":"enfeksiyon_525","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Asemptomatik bakteriüri aşağıdaki hangi grupta tedavi edilir?","options":["İyi kontrollü diyabetik kadın","Gebe kadın","Kalıcı kateterli yaşlı erkek","Sağlıklı premenopozal kadın"],"correct":1,"answer":"ABU yalnızca <b>gebelikte</b> ve <b>mukozal travma yapacak girişim öncesi</b> tedavi edilir. Diğer gruplarda tedavi direnç artırır, fayda sağlamaz.","cat":"mcq","id":"enfeksiyon_526","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"26 yaşında erkek; 4 gündür dizüri ve sarımsı üretral akıntı. Yeni cinsel partner. Gram boyamada intrasellüler gram-negatif diplokoklar. EAU 2025'e göre en uygun tedavi?","options":["Tek doz azitromisin 1 g","Tek doz seftriakson 1000 mg IM/IV + C. trachomatis'e etkili antibiyotik","Sadece doksisiklin 7 gün","Tek doz siprofloksasin 500 mg"],"correct":1,"answer":"Gonokoksik üretrit: <b>tek doz seftriakson 1000 mg IM veya IV + anti-klamidyal kür</b>. Azitromisin monoterapi makrolid direnci nedeniyle terk edildi (Primer'in eski tablosuna güvenmeyin).","cat":"case","id":"enfeksiyon_527","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Akut bakteriyel prostatitte kesinlikle kaçınılması gereken işlem?","options":["İdrar kültürü","Prostat masajı","Serum PSA ölçümü","Parenteral antibiyotik"],"correct":1,"answer":"<b>Prostat masajı kontrendike</b> (EAU güçlü öneri — bakteriyemi riski). Akut prostatitte PSA %83'te yükselir; bu tanısal değil.","cat":"mcq","id":"enfeksiyon_528","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"19 yaşında erkek; 3 saattir ani başlangıçlı şiddetli sol skrotal ağrı, bulantı. Sol testis yüksek konumda, kremaster refleksi yok. İlk yapılması gereken?","options":["Antibiyotik başla, epididimit tedavi et","Renkli Doppler USG ile torsiyon-epididimit ayrımı / acil cerrahi eksplorasyon","İdrar NAAT gönder, sonucu bekle","NSAİİ ver, ayaktan takip"],"correct":1,"answer":"Akut skrotumda <b>önce torsiyon dışlanır</b>. Ani başlangıç + yüksek testis + kremaster refleksi yokluğu torsiyon lehine. Doppler (perfüzyon yok) / şüphede acil eksplorasyon.","cat":"case","id":"enfeksiyon_529","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Ürosepsiste en sık altta yatan neden ve yaklaşık mortalite?","options":["İmmünsüpresyon; %5–10","Obstrüksiyon (>2/3 vaka); %20–40","Diyabet; %50–60","Kateterizasyon; %10–15"],"correct":1,"answer":"Ürosepsisin en sık nedeni <b>obstrüksiyon (>2/3)</b>; mortalite <b>%20–40</b>. Tüm sepsisin %9–31'i üriner kaynaklı.","cat":"mcq","id":"enfeksiyon_530","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Sepsiste C-reaktif proteine kıyasla daha güvenilir kabul edilen biyobelirteç?","options":["Lökosit sayısı","Prokalsitonin","Proadrenomedullin","Laktat dehidrogenaz"],"correct":1,"answer":"<b>Prokalsitonin (PCT)</b> CRP'den daha güvenilir; >2 ng/mL ağır sepsisi olası kılar, viral enfeksiyonda yükselmez.","cat":"mcq","id":"enfeksiyon_531","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"55 yaşında kontrolsüz diyabetik erkek; günlerdir perineal-skrotal ağrı, ateş. Muayenede skrotal eritem, krepitasyon ve kötü kokulu eksuda. BT: skrotum/perinede subkutan gaz. Tanı ve en kritik tedavi adımı?","options":["Selülit; oral antibiyotik","Fournier gangreni; acil ve geniş cerrahi debridman + üçlü ampirik antibiyotik","Epididimit; skrotal elevasyon","Skrotal apse; sadece iğne aspirasyonu"],"correct":1,"answer":"<b>Fournier gangreni.</b> Subkutan gaz cerrahi için mutlak endikasyon. Tedavi: erken üçlü antibiyotik + <b>acil/geniş debridman</b> (gecikme = mortalite). İç nekroz dış görünümden daima fazla.","cat":"case","id":"enfeksiyon_532","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Ksantogranülomatöz piyelonefritin (XGP) tipik BT görünümü ve standart tedavisi?","options":["Multipl kistler; konservatif","'Ayı pençesi' görünümü, taş + nonfonksiyone böbrek; nefrektomi","Kortikal incelme; antibiyotik","Soliter kitle; parsiyel nefrektomi"],"correct":1,"answer":"XGP: taş + obstrüksiyon + kronik enfeksiyon (Proteus/E.coli); <b>'bear paw' BT</b>, nonfonksiyone büyük böbrek, RCC taklidi. Tedavi genellikle <b>nefrektomi</b>.","cat":"mcq","id":"enfeksiyon_533","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Steril piyüri saptanan hastada hangi iki spesifik enfeksiyon mutlaka düşünülmelidir?","options":["E. coli ve Klebsiella","M. tuberculosis ve C. trachomatis","Candida ve Enterococcus","Proteus ve Pseudomonas"],"correct":1,"answer":"Steril piyüri ayırıcı tanısında <b>M. tuberculosis ve C. trachomatis</b> klasiktir (ayrıca eksik antibiyotik, taş, yabancı cisim).","cat":"mcq","id":"enfeksiyon_534","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"34 yaşında kadın, son 1 yılda 4 kez kültür-doğrulanmış sistit. Atak paterni postkoital değil, gebe değil, üriner sistem normal. Davranışsal önlemler yetersiz kalmış. EAU'nun GÜÇLÜ önerdiği antibiyotik-dışı bir sonraki adım?","options":["Kranberry tableti","D-mannoz tozu","OM-89 immünoaktif profilaksi","Profilaktik aylık florokinolon"],"correct":2,"answer":"Rekürren sistitte EAU <b>OM-89 immünoaktif profilaksiyi tüm yaş gruplarında GÜÇLÜ önerir</b>. Kranberry/D-mannoz kanıtı yetersiz. Antibiyotik profilaksisi en son basamak.","cat":"case","id":"enfeksiyon_535","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"mcq","q":"Aşağıdaki ürolojik işlemlerden hangisinde antimikrobiyal profilaksi rutin ÖNERİLMEZ?","options":["TUR-P","Perkütan nefrolitotomi (PNL)","Tanısal üretrosistoskopi","Üreteroskopi"],"correct":2,"answer":"Düşük post-prosedürel UTI riski ve stewardship nedeniyle <b>üretrosistoskopide profilaksi önerilmez</b>. TUR-P, PNL, URS'de önerilir.","cat":"mcq","id":"enfeksiyon_536","topic":"enfeksiyon","group":1,"topicTitle":"Ürolojik Enfeksiyonlar","src":"","flag":false},{"type":"open","q":"Böbrek travmasının çoğunluğu hangi mekanizma ile olur ve organ neden hassastır?","answer":"<b>%80-90 künt</b> (deselerasyon). Böbrek yalnız <span class='hi'>vasküler pedikül + renal pelvis</span> ile asılı olduğu için deselerasyona aşırı hassas → intimal yırtık → arter trombozu.","cat":"","id":"travma_537","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Renal travmada görüntüleme endikasyonları (5)?","answer":"<ul><li>Visible hematüri</li><li>Non-visible hematüri + <b>≥1 hipotansiyon epizodu</b></li><li>Hızlı deselerasyon / ciddi eşlik eden yaralanma</li><li>Penetran travma</li><li>Klinik işaret (yan ağrısı, kot kırığı, kitle)</li></ul>","cat":"","id":"travma_538","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Hematüri derecesi yaralanma şiddetini gösterir mi?","answer":"<span class='hi'>Hayır.</span> Orantılı değildir. <b>UPJ disrupsiyonu, pedikül yaralanması, segmenter arter trombozu, bıçak yaraları</b> hematürisiz olabilir (%25-50). Yokluğu majör yaralanmayı dışlamaz.","cat":"","id":"travma_539","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Stabil hastada renal travmada altın standart görüntüleme ve fazları?","answer":"<b>3 fazlı kontrastlı BT.</b><ul><li>Arteriyel → vasküler / aktif ekstravazasyon</li><li>Nefrografik → parankim laserasyonu</li><li><span class='hi'>Geç (5 dk)</span> → toplayıcı sistem / üreter</li></ul>Hipovolemikte geç faz güvenilmez olabilir.","cat":"","id":"travma_540","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"AAST Grade 3 ile Grade 4 renal yaralanma farkı nedir?","answer":"<b>Grade 3:</b> laserasyon >1 cm, toplayıcı sistem <span class='hi'>sağlam</span> (ekstravazasyon yok).<br><b>Grade 4:</b> toplayıcı sisteme uzanır <span class='hi'>+ idrar ekstravazasyonu</span>; veya segmenter damar; veya Gerota ötesi kanama.","cat":"","id":"travma_541","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"AAST Grade 5 renal yaralanma neleri kapsar?","answer":"<b>Parçalanmış (shattered) böbrek;</b> ana renal arter/ven laserasyonu veya <span class='hi'>hilus avülsiyonu</span>; aktif kanayan devaskülarize böbrek.","cat":"","id":"travma_542","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Bilateral renal yaralanmada AAST derecesi nasıl uygulanır?","answer":"<b>Dereceyi 1 kademe artır — en fazla <span class='hi'>Grade 3</span>'e kadar.</b>","cat":"","id":"travma_543","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Renal travmada cerrahi eksplorasyon endikasyonları?","answer":"<ul><li>Sıvı resüsitasyonuna <b>yanıtsız/geçici yanıtlı</b> instabilite</li><li>Laparotomide <span class='hi'>pulsatil/genişleyen</span> perirenal hematom</li><li>Hemodinamik instabil <b>Grade 5 vasküler</b> yaralanma</li></ul>","cat":"","id":"travma_544","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Selektif anjioembolizasyon (SAE) endikasyonları?","answer":"<b>Aktif kontrast ekstravazasyonu · AVF · psödoanevrizma.</b> Aktif ekstravazasyon + büyük perirenal hematom (>25 mm derinlik) birlikteliği SAE ihtiyacını öngörür.","cat":"","id":"travma_545","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"2026: Stabil asemptomatik Grade 4'te toplayıcı sistem yaralanmasına rutin üreter stenti gerekir mi?","answer":"<span class='hi'>Hayır.</span> Rutin stent yararı kanıtlanmadı. Girişim (stent/nefrostomi/drenaj) ancak <b>semptom gelişince</b> (yan ağrısı, ateş, lökositoz).","cat":"","id":"travma_546","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Renal travmada hipertansiyon nedenleri (akut/kronik)?","answer":"Akut → perirenal hematom basısı (<span class='hi'>Page böbrek</span>). Kronik → skar, renal arter trombozu/stenozu (<span class='hi'>Goldblatt böbrek</span>), AVF. Takipte <b>yıllık TA ölçümü.</b>","cat":"","id":"travma_547","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Üreter yaralanmalarının çoğu hangi kökenlidir, en sık nerede olur?","answer":"<b>%80 iyatrojenik</b> (jinekolojik, kolorektal, üreteroskopi). Dış travma %20. En sık yer: <span class='hi'>UPJ</span>, sonra UVJ.","cat":"","id":"travma_548","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Üreter yaralanmasında hematüri ne kadar güvenilirdir?","answer":"Güvenilmez — <b>%25-45 vakada yoktur.</b> Yokluğu yaralanmayı dışlamaz. Postop şüphede <span class='hi'>BT ürografi.</span>","cat":"","id":"travma_549","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"İyatrojenik üreter yaralanması yönetimi (erken vs geç tanı)?","answer":"<b>Cerrahi sırasında tanınan → hemen onar</b> (Strong).<br><b>Geç tanınan → nefrostomi/JJ stent diversiyon</b> + geç rekonstrüksiyon.","cat":"","id":"travma_550","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Profilaktik üreter stenti yaralanmayı önler mi? (2025/26)","answer":"<span class='hi'>Hayır.</span> Stent yaralanmayı <b>önlemez</b>; sadece tanınmasına yardımcı olabilir. Bu öneri zayıflatıldı (Weak).","cat":"","id":"travma_551","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Künt mesane yaralanması hangi kemik patolojiyle birliktedir?","answer":"<b>Pelvik kırık (%83-95).</b> Dolu mesane boş mesaneden daha yaralanabilir.","cat":"","id":"travma_552","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"İntraperitoneal (IP) mesane rüptürü mekanizması ve riski?","answer":"Dolu mesaneye ani darbe → intravezikal basınç artışı → en az desteklenen <span class='hi'>kubbe</span> patlar → idrar peritona → <b>peritonit/sepsis.</b> Genelde büyük (>5 cm).","cat":"","id":"travma_553","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Mesane yaralanmasında altın standart görüntüleme ve teknik detay?","answer":"<b>Sistografi</b> (röntgen veya BT). Retrograd, yer çekimiyle <span class='hi'>en az 300-350 mL</span> seyreltik kontrast. Röntgen sistografide <b>post-drenaj film şart;</b> BT sistografide gerekmez.","cat":"","id":"travma_554","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"IP vs EP mesane rüptürü tedavisi?","answer":"<b>IP → cerrahi onarım</b> (peritonit riski; leak testi, kateter 7-14 gün).<br><b>EP → sadece kateter drenajı</b> (çoğu); 10. günde sistogram; 4 haftada iyileşmezse cerrahi.","cat":"","id":"travma_555","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"EP mesane rüptüründe cerrahi gerektiren istisnalar?","answer":"<ul><li>Mesane boynu tutulumu</li><li>Vajinal/rektal yaralanma</li><li>Kemik fragmanı/yabancı cisim</li><li>Pelvik kırığın internal fiksasyonu</li><li>Başka nedenle laparotomi</li></ul>","cat":"","id":"travma_556","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"TUR sırasında EP mesane perforasyonu → tek doz intravezikal kemoterapi?","answer":"<span class='hi'>Kontrendike değildir</span> — kateterle konservatif yönetilir. (Buna karşılık <b>IP perforasyonda instilasyon yapılmaz, cerrahi gerekir.</b>)","cat":"","id":"travma_557","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Üretra yaralanmasının kardinal bulgusu nedir?","answer":"<span class='hi'>Meatusta kan.</span> Çoğu vakada var; yokluğu dışlamaz. İdrar yapamama + palpabl mesane → komplet rüptür.","cat":"","id":"travma_558","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Posterior ve anterior üretra yaralanmasının ana nedenleri?","answer":"<b>Posterior (membranöz):</b> pelvik kırık (PFUI).<br><b>Anterior (bulbar):</b> straddle/ata-biner yaralanması. Penil fraktürün %15'inde penil üretra tutulur.","cat":"","id":"travma_559","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Üretra yaralanmasında standart tanı yöntemi ve istisnaları?","answer":"<b>Retrograd üretrografi (RUG)</b> (30° oblik, ekstravazasyon patognomonik).<br>İstisna → <span class='hi'>kadın üretrası + penil fraktür</span>: sistoüretroskopi tercih.","cat":"","id":"travma_560","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Her tip üretra yaralanmasında acil tedavi nedir?","answer":"<b>İdrar diversiyonu</b> — transüretral veya <span class='hi'>suprapubik kateter</span> ('damage control').","cat":"","id":"travma_561","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Erkek posterior PFUI: zamanlama kuralları?","answer":"<ul><li><b><48h acil üretroplasti YAPMA</b> (Strong)</li><li>Komplet + seçili hasta → erken üretroplasti <span class='hi'>2 gün–6 hafta</span> (Strong)</li><li>Alternatif: SP diversiyon + ≥3 ay geç üretroplasti (Weak)</li></ul>","cat":"","id":"travma_562","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Kadın PFUI yönetimi nasıl farklıdır?","answer":"<b>Erken onarım (<7 gün)</b> (Strong) — geç onarım veya erken realignment <span class='hi'>değil.</span> (Kısa üretra geç onarımı zorlaştırır.)","cat":"","id":"travma_563","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"2026 kritik güncelleme — anterior künt üretra yaralanması?","answer":"\"Uzman varsa acil üretroplasti\" önerisi <span class='hi'>2025'te kaldırıldı.</span> Güncel: acil üretroplasti tartışmalı, yalnız özel üretra cerrahı; <b>mantıklı olan sadece idrar diversiyonuyla başlamak</b> (SPC / erken endoskopik realignment).","cat":"","id":"travma_564","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Penil fraktür patofizyolojisi ve klasik bulgular?","answer":"Ereksiyondaki penise künt travma → <b>tunika albuginea rüptürü.</b> Klasik: <span class='hi'>çatlama/pop sesi + ani detümesans + ağrı + eggplant deformitesi.</span> Üretra tutulumu %10-22.","cat":"","id":"travma_565","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Penil fraktür tanısı ve tedavisi?","answer":"Tanı <b>klinik;</b> şüphede US/MR (kavernografi). Üretra şüphesi → RUG/fleksibl sistoskopi. Tedavi: <span class='hi'>erken cerrahi onarım</span> (tunika kapatma; Gittes testi). Konservatif → geç komplikasyon (fibrozis, impotans).","cat":"","id":"travma_566","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Testiküler rüptür: tanı ve tedavi?","answer":"Künt skrotal travmaların ~%50'si. <b>Skrotal Doppler US</b> (sınır kaybı, heterojen ekotekstür). <span class='hi'>Erken cerrahi eksplorasyon + tunika kapatma</span> → testis kurtarma; infarkt → orşiektomi.","cat":"","id":"travma_567","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"İntratestiküler hematom yönetimi neye göre belirlenir?","answer":"<b>Boyut.</b> Küçük + rüptür yok → konservatif. Büyük → <span class='hi'>kompartman sendromu riski</span> (basınç → iskemi) → eksplorasyon/drenaj.","cat":"","id":"travma_568","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Travmatik hematosel ne zaman cerrahi gerektirir?","answer":"Kontralateral testisin <span class='hi'>3 katından büyükse</span> cerrahi. %80'i testis rüptüründen kaynaklanır.","cat":"","id":"travma_569","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Penetran genital travmada unutulmaması gereken iki nokta?","answer":"<b>Tetanoz profilaksisi.</b> Kadın genital travmada daima <span class='hi'>cinsel istismar olasılığını sorgula.</span>","cat":"","id":"travma_570","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"AAST böbrek yaralanması sınıflamasına göre Grade 4 yaralanmada uygun yönetim hangisidir?","options":["Grade 4: minimal invaziv endovasküler ve/veya gerekirse perkütan idrar drenajı","Grade 4: tüm vakalarda acil cerrahi eksplorasyon","Grade 4: 3 hafta yatak istirahati + USG","Grade 4: rutin nefrektomi"],"correct":0,"answer":"Grade 4 çoğunlukla <span class='hi'>konservatif</span> yönetilir; aktif kanama → SAE, persistan idrar ekstravazasyonu → stent/perkütan drenaj. Stabil asemptomatikte rutin stent gerekmez.","cat":"","id":"travma_571","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"AAST böbrek ölçeğinde bilateral yaralanmalar nasıl ele alınır?","options":["Dereceyi etkilemez","Her biri için bağımsız değerlendirilir","Dereceyi 1 kademe artır — en fazla Grade 3'e kadar","En yüksek ilerlemeyen dereceye göre belirlenir"],"correct":2,"answer":"Kural: <span class='hi'>bilateral yaralanmada 1 kademe artır, max Grade 3.</span> En sık sorulan EBU tuzaklarından.","cat":"","id":"travma_572","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"3. derece (Grade 3) böbrek travmasının tanımı nedir?","options":["Gerota ile sınırlı, genişlemeyen perirenal hematom","Parankimde >1 cm laserasyon, toplayıcı sistemde yırtık/idrar sızıntısı YOK","Toplayıcı sisteme uzanan laserasyon + idrar ekstravazasyonu","Ana renal arter/ven yırtığı, devaskülarize böbrek"],"correct":1,"answer":"<span class='hi'>Grade 3 = laserasyon >1 cm + toplayıcı sistem sağlam.</span> İdrar ekstravazasyonu olursa Grade 4'e geçer.","cat":"","id":"travma_573","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Hemodinamik olarak stabil hastada renal yaralanmanın tanı ve evrelemesinde en etkili görüntüleme?","options":["Ultrasonografi","İntravenöz piyelografi (IVP)","Çok fazlı (3 fazlı) kontrastlı BT","MR"],"correct":2,"answer":"<span class='hi'>3 fazlı kontrastlı BT</span> altın standart: arteriyel (vasküler), nefrografik (parankim), geç faz (toplayıcı sistem). FAST solid organ için yetersiz; IVP tek-atış kötü.","cat":"","id":"travma_574","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Jinekolojik cerrahi sonrası 2. günde üreter yaralanması şüphesinde en uygun ilk görüntüleme?","options":["İV kontrastlı pelvik US","Kontrastsız batın BT","BT ürografi","MR ürografi"],"correct":2,"answer":"Geç tanınan iyatrojenik üreter yaralanmasında <span class='hi'>BT ürografi (geç faz)</span> ekstravazasyon/obstrüksiyonu gösterir.","cat":"","id":"travma_575","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Mesane tümörü TUR'u sırasında ekstraperitoneal mesane perforasyonu olursa hangisi doğrudur?","options":["Tek doz intravezikal kemoterapi için kontrendikasyon değildir","İlk tercih bilateral nefrostomi olmalı","Tüm vakalarda cerrahi onarım gerekir","Sadece sistektomi ile yönetilir"],"correct":0,"answer":"EP perforasyon kateterle <span class='hi'>konservatif</span> yönetilir ve tek doz instilasyon için mutlak kontrendikasyon değildir. (İP perforasyonda instilasyon yapılmaz, cerrahi gerekir.)","cat":"","id":"travma_576","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Üretra yaralanmasının kardinal (en tipik) bulgusu nedir?","options":["Hematüri","Meatusta kan","Anüri","Skrotal ödem"],"correct":1,"answer":"<span class='hi'>Meatusta kan</span> kardinal bulgudur; çoğu vakada vardır ama yokluğu yaralanmayı dışlamaz.","cat":"","id":"travma_577","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Penil fraktüre bağlı üretra yaralanması veya kadın üretra yaralanması şüphesinde RUG yerine ne tercih edilir?","options":["Kontrastsız BT","Fleksibl sistoüretroskopi","Sintigrafi","Retrograd piyelografi"],"correct":1,"answer":"Bu iki durumda RUG güvenilmezdir (lokal şişlik / kısa üretra-vulvar ödem) → <span class='hi'>sistoüretroskopi</span> tercih edilir.","cat":"","id":"travma_578","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Erkek pelvik kırık üretra yaralanmasında (PFUI) doğru zamanlama önerisi hangisidir?","options":["Tüm vakalarda <48 saatte acil üretroplasti","<48 saatte acil üretroplasti yapma; komplette seçili hastada 2 gün-6 hafta erken üretroplasti","İlk 24 saatte mutlaka açık realignment","Hiçbir zaman cerrahi yapılmaz, sadece kateter"],"correct":1,"answer":"<span class='hi'><48h acil üretroplasti yapılmaz (Strong).</span> Komplet disrupsiyon + seçili hasta → erken üretroplasti 2 gün-6 hafta; alternatif SP + ≥3 ay geç üretroplasti.","cat":"","id":"travma_579","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"mcq","q":"Testiküler rüptür yönetiminde doğru yaklaşım hangisidir?","options":["Tüm vakalarda konservatif izlem","Erken cerrahi eksplorasyon + tunika albuginea onarımı","6 hafta yatak istirahati","Primer orşiektomi"],"correct":1,"answer":"<span class='hi'>Erken cerrahi eksplorasyon + tunika kapatma</span> testis kurtarmayı artırır; gecikme orşiektomiye gider. İnfarkt (Doppler'da vaskülarite yok) → orşiektomi.","cat":"","id":"travma_580","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Motosiklet kazası. Hasta hipotansif, taşikardik; FAST pozitif. Laparotomide üreter çevresinde genişleyen retroperitoneal hematom görülüyor. Bu hastada renal yaralanmayı nasıl derecelendirip yönetirsin? Eksplorasyon kararını neye göre verirsin?","answer":"","cat":"Kerem Hoca · vaka tabanlı","id":"travma_581","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Pelvik kırıklı hasta, alt batın hassasiyeti, idrar yapamıyor, gross hematüri. Sistografide kubbeden batına kontrast kaçışı. Tanın nedir, nasıl yönetirsin? EP olsaydı yönetim nasıl değişirdi?","answer":"","cat":"Cüneyt Hoca · klinik akış","id":"travma_582","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Cinsel ilişki sırasında 'çatlama sesi', ani sönme, ağrı; penil şaft şişmiş ve mor (patlıcan görünümü). İdrarda kan yok. Tanı, ek tetkik ve tedavi planın nedir?","answer":"","cat":"Melih/Genel · genital vaka","id":"travma_583","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Trafik kazası, instabil pelvik kırık. Meatusta kan, palpabl mesane, idrar yapamıyor. ED kateter denemesi başarısız. İlk yönetimin nedir? Tanıyı nasıl koyar, definitif tedaviyi nasıl planlarsın?","answer":"","cat":"Hasan/Genel · üretra vaka","id":"travma_584","topic":"travma","group":1,"topicTitle":"Ürogenital Travma","src":"","flag":false},{"type":"open","q":"Üretral darlık ile stenoz arasındaki temel ayrım nedir?","answer":"<b>Darlık:</b> spongiozumla çevrili <span class='hi'>anterior</span> üretranın daralması + spongiofibrozis. <b>Stenoz:</b> spongiozumun çevrelemediği membranöz/prostatik üretra veya <span class='hi'>mesane boynu</span> daralması.","cat":"Tanım & Anatomi","id":"uretra_585","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Spongiofibrozis neden klinik olarak önemlidir?","answer":"Korpus spongiozumun skarıdır → darlığın <b>dilatasyon sonrası neden tekrar daraldığını</b> ve <span class='hi'>tekrarlayan enstrümantasyonla kötüleştiğini</span> açıklar.","cat":"Tanım & Anatomi","id":"uretra_586","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Greft ile flep arasındaki fark nedir?","answer":"<b>Greft:</b> kendi kan desteği OLMADAN taşınan doku (bukkal mukoza). <b>Flep:</b> <span class='hi'>kendi kan desteğiyle</span> taşınan doku (penil ada flebi).","cat":"Tanım & Anatomi","id":"uretra_587","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Liken skleroz neden posterior üretraya yayılmaz?","answer":"Posterior üretra (membranöz+prostatik) <b>transizyonel epitel</b> taşır; LS transizyonel epiteli tutmaz. Anterior üretra çok katlı epitellidir → <span class='hi'>LS buraya yayılır</span>.","cat":"Tanım & Anatomi","id":"uretra_588","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretra çift dolaşımı sayesinde hangi cerrahi mümkün olur?","answer":"Antegrad (bulbar+sirkumfleks kavernozal) + retrograd (dorsal penil arter → glanstan geri) beslenme → <b>tam transeksiyon + re-anastomoz (EPA)</b>; distal segment <span class='hi'>iskemiye girmez</span>.","cat":"Tanım & Anatomi","id":"uretra_589","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Gelişmiş dünyada üretral darlık etiyolojisinde en sık neden nedir?","answer":"<b>İdiyopatik</b> (en sık) > iatrojenik (~%20) > inflamatuar (LS) > travmatik > enfektif (gonokoksik, nadir).","cat":"Etiyoloji","id":"uretra_590","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Cobb's collar nedir?","answer":"Anterior-posterior üretra füzyon hattında, <b>bulbar üretrada</b> nadir konjenital daralma. <span class='hi'>Spongiozum tutulmaz.</span> Öyküsü olmayan genç erkekte kısa bulbar darlık.","cat":"Etiyoloji","id":"uretra_591","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Liken skleroza bağlı darlıkta hangi greft KULLANILMAZ ve neden?","answer":"<b>Penil/genital deri kullanılmaz</b> — LS deride nükseder. Yerine <span class='hi'>oral/bukkal mukoza</span> kullanılır.","cat":"Etiyoloji","id":"uretra_592","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"En sık künt bulbar üretra yaralanma mekanizması nedir?","answer":"<b>Straddle (fall-astride)</b> — bulbar üretra inferior pubik simfize sıkışır.","cat":"Etiyoloji","id":"uretra_593","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Penil fraktürde üretral uzanım oranı nedir?","answer":"<b>~%15.</b> (Tunika albuginea yırtığının penil üretraya uzanımı.)","cat":"Etiyoloji","id":"uretra_594","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretral darlıkta üroflow paterni nedir ve neden tanısal değildir?","answer":"<b>Uzamış plato paterni</b>, düşük Qmax (<10 mL/s). <span class='hi'>DU ve BOO ile de görülür</span> → tanısal değil.","cat":"Tanı & Sınıflama","id":"uretra_595","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Akımın bozulması için lümen hangi kalibrenin altına inmeli?","answer":"<b>~11 Fr.</b> Daha hafif daralmalar asemptomatik olabilir ama enstrümantasyonu engelleyebilir.","cat":"Tanı & Sınıflama","id":"uretra_596","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Hangi görüntüleme posterior/bulbar darlıkta, hangisi kompleks penilde tercih edilir?","answer":"Posterior/bulbar → <b>esnek üretroskopi</b>. Kompleks penil + uzunluk → <span class='hi'>RUG ± VCUG</span>.","cat":"Tanı & Sınıflama","id":"uretra_597","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Kalibre derecelendirmesinde Grade 1 ve Grade 5 nedir?","answer":"<b>G1:</b> >16 Fr · <b>G5:</b> tam obliterasyon. (Aralarda G2 11–15, G3 4–10, G4 1–3 Fr.)","cat":"Tanı & Sınıflama","id":"uretra_598","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Penil üretra dorsal duvarında sistoskopide görülen bez açıklığı nedir?","answer":"<b>Littré bezleri.</b> (Bulbar üretraya açılan = Cowper bezleri — EBU 26 sorusu.)","cat":"Tanı & Sınıflama","id":"uretra_599","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"DVIU hangi tip darlıkta uygun bir ilk tedavi seçeneğidir? (EBU 26)","answer":"<b>Bulbar üretrada tek, kısa (<2 cm), obliteratif olmayan darlık.</b> <span class='hi'>Penil veya uzun >2 cm darlıkta değil.</span>","cat":"Endoskopik & DCB","id":"uretra_600","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"İlk, ikinci ve üçüncü DVIU sonrası kür beklentisi nedir?","answer":"İlk DVIU kısa bulbar darlıkta <b>~%70 kür</b>; ikinci daha az; <span class='hi'>üçüncüden sonra hepsi tekrarlar → palyatif</span>.","cat":"Endoskopik & DCB","id":"uretra_601","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"OPEN trial neyi gösterdi?","answer":"Rekürren bulbar darlıkta reintervansiyon <b>üretrotomide > üretroplastide</b> → kalıcı kür için <span class='hi'>üretroplasti üstün</span>. EAU 2026: rekürrende tekrar endoskopi yerine üretroplasti öner.","cat":"Endoskopik & DCB","id":"uretra_602","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Optilume ilaç-kaplı balonun aktif maddesi ve endikasyonu nedir?","answer":"<b>Paklitaksel</b> (antimitotik). Endikasyon: tek bulbar, <2–3 cm, lümen <12 Fr, 1–4 önceki endoskopik girişim. <span class='hi'>Dışlama: LS, radyasyon, önceki üretroplasti.</span> Kanıt: ROBUST III/I.","cat":"Endoskopik & DCB","id":"uretra_603","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"İlaç-kaplı balonun en önemli üreme sağlığı uyarısı nedir?","answer":"<b>Paklitaksel semende 6 aya kadar saptanır</b> → eşi gebe kalabilecekse <span class='hi'>kontrasepsiyon önerilir</span>.","cat":"Endoskopik & DCB","id":"uretra_604","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretral stent hangi darlıkta kontrendikedir?","answer":"<b>Penil üretral darlık.</b> Genelde sadece cerrahiye uygun olmayanda; başarısız olunca üretroplastiyi zorlaştırır.","cat":"Endoskopik & DCB","id":"uretra_605","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Penil darlıkta neden EPA yapılmaz?","answer":"Penil üretrayı kısaltıp <b>postop kordi (eğrilik)</b> yapar → penilde <span class='hi'>augmentasyon zorunlu</span>.","cat":"Üretroplasti","id":"uretra_606","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Barbagli ile Asopa tekniği arasındaki fark nedir?","answer":"<b>Barbagli:</b> dorsal insizyon, dorsal onlay. <b>Asopa:</b> ventral+dorsal insizyon, <span class='hi'>dorsal inlay — daha kolay/hızlı</span> (başarı eşit).","cat":"Üretroplasti","id":"uretra_607","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Kompleks penil darlıkta (LS/hipospadias) tercih edilen yöntem nedir?","answer":"<b>İki-aşamalı Bracka.</b> 1. aşama: skarlı üretra eksize + oral mukoza greft (plak açık). <span class='hi'>6–9 ay sonra</span> 2. aşama re-tübülarizasyon.","cat":"Üretroplasti","id":"uretra_608","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Kısa (<2 cm) bulbar darlıkta standart cerrahi nedir?","answer":"<b>EPA (eksizyon + primer anastomoz)</b> — en güvenilir. Cinsel fonksiyon için <span class='hi'>non-transekte (Heineke-Mikulicz)</span> alternatif (ED kanıtı zayıf).","cat":"Üretroplasti","id":"uretra_609","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Uzun (>2 cm) bulbar darlıkta standart cerrahi nedir?","answer":"<b>Oral mukoza onlay greft</b> (dorsal/ventral/lateral). Çok dar/oblitere segment varsa <span class='hi'>augmented anastomotik</span>.","cat":"Üretroplasti","id":"uretra_610","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Tam-boy darlıkta tek-aşamalı seçenek nedir?","answer":"<b>Kulkarni</b> (lateral). Alternatif: bulbar tek-aşama + penil iki-aşama kombine. <span class='hi'>LS'ye bağlı tam-boy = en zor</span>.","cat":"Üretroplasti","id":"uretra_611","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretroplasti sonrası de novo ED riski uzun dönemde nedir?","answer":"<b>9. ayda ~%3.</b> Transeksiyonun ED'yi artırdığı kanıtı <span class='hi'>zayıf, RKÇ yok</span> (meta-analizler çelişkili).","cat":"Komplikasyon & Takip","id":"uretra_612","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretrokütanöz fistül en sık nerede ve hangi oranda görülür?","answer":"Sıklıkla <b>korona</b>da. Basit darlıkta ~%5, <span class='hi'>post-hipospadias ~%10</span>. 3. ayda onarılır.","cat":"Komplikasyon & Takip","id":"uretra_613","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Post-miksiyon damlatmanın (PMD) cerrahi tedavisi var mıdır?","answer":"<b>Hayır, cerrahi kürü YOK</b> (greft daha az elastik). Perineal milking + pelvik taban egzersizi.","cat":"Komplikasyon & Takip","id":"uretra_614","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretroplasti takibinde neden sadece üroflow yeterli değildir?","answer":"<b>Restenoz %35'e kadar</b> akım iyi olsa da olabilir → <span class='hi'>anatomik değerlendirme (üretroskopi/üretrografi) şart</span>.","cat":"Komplikasyon & Takip","id":"uretra_615","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"PFUI ile en yüksek ilişkili instabil pelvik kırıklar hangileridir?","answer":"<b>Straddle kırığı</b> (4 pubik ramus) + <b>Malgaigne kırığı</b> (2 ramus + Sİ eklem diastazı).","cat":"Travma","id":"uretra_616","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Posterior üretra yaralanmasında akut yönetimin altın kuralı nedir?","answer":"\"<b>Treat first what kills first</b>\" — üretra yaralanması hayatı tehdit etmez. Tam rüptürde transüretral kateter geçmez → <span class='hi'>ekografi eşliğinde suprapubik diversiyon</span>.","cat":"Travma","id":"uretra_617","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Membranöz üretra yaralanmasında immediate üretroplasti neden kontrendikedir?","answer":"Pelvik hematom dekompresyonuyla <b>ağır kanama</b> + sonradan yüksek <span class='hi'>darlık/inkontinans/impotans</span> oranı.","cat":"Travma","id":"uretra_618","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"PFUI'da tercih edilen tedavi yolu ve başarı oranı nedir?","answer":"<b>SP diversiyon + geç üretroplasti (>3 ay)</b>, perineal anastomotik onarım. Başarı <span class='hi'>~%86</span>; erektil fonksiyon değişmez.","cat":"Travma","id":"uretra_619","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Geç üretroplastide gerginlik azaltan 4 ardışık manevra nedir?","answer":"<b>Bulbar mobilizasyon → korporal separasyon → inferior pubektomi → suprakrural rerouting.</b>","cat":"Travma","id":"uretra_620","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Kadın üretral divertikülünün klasik '3 D' triadı ve en iyi görüntülemesi nedir?","answer":"<b>Dizüri, dispareuni, postmiksiyon damlatma.</b> Tanıda <span class='hi'>MR</span> üstün. Tedavi: transvajinal eksizyon ± Martius flep.","cat":"Diğer Hastalıklar","id":"uretra_621","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"Üretra kanserinde en sık histoloji ve cinsiyet farkı nedir?","answer":"<b>SCC</b> en sık (bulbomembranöz). <span class='hi'>Kadında daha agresif</span>; distal lezyon HPV ilişkili olabilir.","cat":"Diğer Hastalıklar","id":"uretra_622","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Üretral darlıkların hangi tipinde direkt görüşlü internal üretrotomi (DVIU) uygulanabilir bir ilk tedavi seçeneği olarak kabul edilir? <i>(EBU 26)</i>","options":["Penis üretrasında tek, kısa (<2 cm), tıkanıklığa yol açmayan darlık","Penis ve bulbar üretral darlıklar","Bulbar üretrada tek, kısa (<2 cm), tıkanıklığa yol açmayan darlık","Uzun (>2 cm) bulbar üretral darlıklar"],"correct":2,"answer":"DVIU yalnızca <b>bulbar, tek, kısa (<2 cm), obliteratif olmayan</b> darlıkta uygun ilk seçenektir. Penil darlık ve uzun darlıklarda başarısı düşüktür — bunlarda <span class='hi'>üretroplasti</span> tercih edilir.","cat":"mcq","id":"uretra_623","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Sistoskopi sırasında penis üretrasının dorsal duvarında görülen bez açıklıkları nedir? <i>(EBU 26)</i>","options":["Cowper bezi","Littré bezi","Dış üretral açıklık","Skene kanalı"],"correct":1,"answer":"Penil üretra boyunca açılan mukoza bezleri = <b>Littré bezleri</b>. <span class='hi'>Cowper bezleri</span> ise bulbar üretraya açılır; Skene kanalı kadına özgüdür.","cat":"mcq","id":"uretra_624","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Cüneyt Hoca tarzı.</b> 'Üretral darlık nedir? Stenozdan farkı nedir?' Net ayrımı yap.","options":["İkisi de aynı; lokalizasyon farkıdır","Darlık = spongiozumlu anterior üretra + spongiofibrozis; Stenoz = spongiozumsuz (membranöz/prostatik/mesane boynu)","Darlık posteriorda, stenoz anteriordadır","Stenoz daima konjenital, darlık daima edinseldir"],"correct":1,"answer":"<b>Darlık</b> spongiozumla çevrili anterior üretranın daralması + spongiofibrozis; <b>stenoz</b> spongiozumun çevrelemediği bölge (membranöz/prostatik üretra, mesane boynu). <span class='hi'>PFUI lezyonu teknik olarak stenoz/distraksiyon defektidir, darlık değil.</span>","cat":"oral","id":"uretra_625","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Vaka.</b> 33 yaş erkek, 6 aydır zayıf akım. Distal penil üretrada darlık için 2 kez dilatasyon öyküsü. Sünnetli, meatus stenotik, glansa uzanan beyaz skar. En olası altta yatan tanı? <i>(Primer Case 1)</i>","options":["İdiyopatik darlık","Liken skleroz (BXO)","Cobb's collar","Gonokoksik darlık"],"correct":1,"answer":"Meatus çevresinde <b>beyaz skarlaşma + glansa uzanım</b> klasik <b>liken skleroz</b> bulgusudur. Tedavi: tek/iki-aşama penil substitüsyon üretroplasti. <span class='hi'>LS'de penil deri greft olarak KULLANILMAZ</span> — oral mukoza kullanılır.","cat":"oral","id":"uretra_626","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Savunma.</b> 'EPA'da üretrayı tamamen kesiyorsun; distal segment iskemiye girmez mi?' Nasıl açıkla
