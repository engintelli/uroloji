","src":"","flag":false},{"type":"mcq","q":"BCG'nin etki mekanizmasında tümör hücrelerine bağlanmada rol oynayan molekül hangisidir?","options":["İntegrin αvβ3","Fibronektin","E-kaderin","Laminin-5"],"correct":1,"answer":"BCG, ürotelyuma <b>fibronektin</b> aracılığıyla bağlanır; ardından internalizasyon ve lokal <b>Th1 immün yanıt</b> (IL-2, IFN-γ, TNF) gelişir.","cat":"MCQ","id":"nmibc_214","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"'BCG-yanıtsız (unresponsive)' tanımı için en doğru ifade hangisidir?","options":["Toksisite nedeniyle tedaviyi tamamlayamamak","Yeterli BCG sonrası tam yanıt elde edip 2 yıl sonra nüks","Refrakter hastalık veya yeterli BCG sonrası 6–12 ayda yüksek dereceli rekürren","İlk indüksiyondan sonra düşük dereceli Ta nüksü"],"correct":2,"answer":"<b>BCG-yanıtsız</b> = refrakter (3. ayda HG persistans/idamede progresyon) + yeterli BCG sonrası <b>6–12 ayda HG rekürren.</b> Bu grupta tekrar BCG faydasızdır. İlk seçenek 'intoleran'ı tanımlar.","cat":"MCQ","id":"nmibc_215","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"BCG-yanıtsız CIS'i olan, ciddi komorbiditeleri nedeniyle sistektomiye uygun olmayan hastada güncel (2025) en yüksek tam yanıt oranlı mesane koruyucu seçenek hangisidir?","options":["Valrubisin","Pembrolizumab (KEYNOTE-057)","TAR-200 / gemsitabin intravezikal sistem (Inlexzo)","Tekrar tam doz BCG indüksiyonu"],"correct":2,"answer":"<b>TAR-200 (Inlexzo)</b> — SunRISe-1 kohort 2'de CR <b>%82</b>, ~%51 1 yılda korundu; <b>FDA 2025</b> onayı. Pembrolizumab KEYNOTE-057'de CRR ~%40. <span class='w'>TAR-200 Primer'de yer almaz (en yeni gelişme).</span>","cat":"VAKA","id":"nmibc_216","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"BCG-yanıtsız NMIBC'de altın standart tedavi nedir?","options":["Pembrolizumab","Radikal sistektomi","Nadofaragene firadenovec","Gemsitabin + dosetaksel"],"correct":1,"answer":"<b>Radikal sistektomi</b> (Strong öneri). Diğerleri sistektomiye uygun olmayan / reddeden hastalarda mesane koruyucu seçeneklerdir.","cat":"MCQ","id":"nmibc_217","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"EAU 2026 kılavuzunda BCG-naïf yüksek/çok yüksek riskli seçilmiş hastalarda BCG'ye eklenmesi tartışılan ajanlar hangileridir?","options":["Mitomisin C ve epirubisin","Sasanlimab (CREST) ve durvalumab (POTOMAC)","Valrubisin ve tiotepa","Sadece interferon-α"],"correct":1,"answer":"<b>Sasanlimab (CREST)</b> ve <b>durvalumab (POTOMAC)</b> — BCG idame ile kombinasyon, seçilmiş BCG-naïf yüksek/çok yüksek riskli hastalarda (EAU 2026 yeni öneri, Primer'de yok).","cat":"MCQ","id":"nmibc_218","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Mikropapiller varyant NMIBC'de en uygun yaklaşım hangisidir?","options":["Standart BCG indüksiyon + idame","Tek erken instilasyon yeterlidir","Erken radikal sistektomi (intravezikal tedavi etkisiz)","Sadece izlem"],"correct":2,"answer":"Mikropapiller varyantta intravezikal tedavi etkisizdir (Kamat serisinde yüksek progresyon/metastaz) → <b>erken radikal sistektomi</b> önerilir.","cat":"MCQ","id":"nmibc_219","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Güncel EAU risk gruplaması kaç katmanlıdır?","options":["İki: NMIBC / MIBC","Üç: düşük / orta / yüksek","Dört: düşük / orta / yüksek / çok yüksek","Beş kademeli sayısal sistem"],"correct":2,"answer":"<b>Dört katman:</b> düşük / orta / yüksek / <b>çok yüksek.</b> Primer'in bazı bölümlerindeki 3 katmanlı sınıflama güncel değildir. EAU 'HG Ta ≤3 cm'i yüksek risk tutar (AUA orta riske indirir).","cat":"MCQ","id":"nmibc_220","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"KİMK (MIBC) tanımı ve evre eşiği nedir?","answer":"<b>Detrusor kasına (muscularis propria) invazyon = ≥T2.</b> Tanıda mesane kanserlerinin ~%25'i kas-invaze; çoğu <b>de novo</b> gelişir (sadece ~%15 NMIBC'den progresyon).","cat":"Tanım","id":"mibc_221","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Hangi varyant histoloji NAK'tan fayda görmez?","answer":"<b>Skuamöz hücreli karsinom.</b> Şistozomiazis ve kronik irritasyonla ilişkili. Mikropapiller/plazmasitoid/sarkomatoid → agresif, erken sistektomi eğilimi.","cat":"Biyoloji","id":"mibc_222","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"En önemli ve modifiye edilebilir risk faktörü?","answer":"<b>Sigara</b> — riski 3-4 kat artırır. Diğerleri: aromatik aminler (benzidin, β-naftilamin), siklofosfamid, pelvik RT, şistozomiazis.","cat":"Biyoloji","id":"mibc_223","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"T2a ile T2b farkı nedir?","answer":"<b>T2a = yüzeyel kas</b> (iç yarı), <b>T2b = derin kas</b> (dış yarı) invazyonu.","cat":"Evreleme","id":"mibc_224","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"N3 mesane kanserinde neyi ifade eder?","answer":"<b>Common iliac lenf nodu</b> metastazı — hâlâ rejyonel kabul edilir. Common iliac üstü LN = M1a.","cat":"Evreleme","id":"mibc_225","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"M1a ile M1b ayrımı?","answer":"<b>M1a = rejyonel olmayan lenf nodu</b> metastazı. <b>M1b = diğer uzak organ</b> metastazı (kemik, akciğer, karaciğer).","cat":"Evreleme","id":"mibc_226","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Özkürkçügil'in beklediği ilk adım nedir?","answer":"<b>Anamnez + fizik muayene</b> — herhangi bir tetkik adından önce. Tüm tutanaklarda tutarlı.","cat":"Tanı","id":"mibc_227","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"TURBT'nin temel kalite kriteri nedir?","answer":"<b>Örnekte detrusor kası bulunması.</b> Yoksa understaging, rezidü hastalık ve erken nüks riski → <b>yeniden TUR</b> gerekir.","cat":"Tanı/TUR","id":"mibc_228","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"En-blok rezeksiyonun amacı?","answer":"<b>T-evrelemesinin doğruluğunu artırmak</b> (kauter artefaktını azaltır, invazyon derinliğini netleştirir).","cat":"Tanı/TUR","id":"mibc_229","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"CIS şüphesinde TURBT sırasında ne yapılır?","answer":"<b>Prostatik üretra biyopsisi.</b> Ayrıca <b>mavi ışık (PDD/fotodinamik) sistoskopi</b> CIS saptamada en faydalıdır.","cat":"Tanı/TUR","id":"mibc_230","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"NAK kimlere ve hangi ilaçla verilir?","answer":"<b>T2-T4a cN0M0, cisplatin-uygun</b> hastaya. <b>cisplatin-bazlı</b> (ddMVAC+G-CSF veya GC). 5 yılda anlamlı mutlak OS yararı (Düzey 1).","cat":"Neoadjuvan","id":"mibc_231","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Cisplatin uygunsuzluk kriterleri (Galsky)?","answer":"≥1 varsa uygunsuz: <b>ECOG ≥2, GFR &lt;60, grade &gt;2 işitme kaybı, periferik nöropati, NYHA III KKY.</b>","cat":"Neoadjuvan","id":"mibc_232","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"NAK ve sistektomi zamanlaması?","answer":"NAK <b>8 hafta içinde</b> başlanmalı (gecikme → upstaging). Upfront sistektomi tanıdan ≤<b>12 hafta</b>.","cat":"Neoadjuvan","id":"mibc_233","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"NIAGARA çalışması neyi değiştirdi?","answer":"Perioperatif <b>durvalumab</b> + neoadjuvan GC → sistektomi → adjuvan durvalumab. İlk faz 3 perioperatif immünoterapi; EFS+OS yararı, cerrahi sonuçlarını etkilemedi. FDA+EMA onaylı, NCCN kat-1.","cat":"🔴 NIAGARA","id":"mibc_234","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"NIAGARA için EAU GFR eşiği klasik NAK'tan nasıl farklı?","answer":"Perioperatif durvalumab için <b>GFR &gt;40 mL/dk</b> yeterli (klasik NAK'ta &lt;60 uygunsuzluk kriteriydi). Cisplatin- VE immünoterapi-uygun T2-T4a cN0M0'a önerilir.","cat":"🔴 NIAGARA","id":"mibc_235","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Erkekte standart RC neyi içerir?","answer":"<b>Mesane + prostat + seminal veziküller + distal üreterler + rejyonel LN.</b>","cat":"Sistektomi","id":"mibc_236","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Kadında standart RC neyi içerir?","answer":"<b>Mesane + üretra + anterior vajen duvarı + uterus + distal üreterler + rejyonel LN.</b>","cat":"Sistektomi","id":"mibc_237","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"RC öncesi bağırsak hazırlığı zorunlu mu?","answer":"<b>Hayır, zorunlu değil.</b> ERAS / fast-track önlemleri bağırsak iyileşmesini hızlandırır. (Klasik çeldirici.)","cat":"Sistektomi","id":"mibc_238","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"SWOG S1011 lenf nodu diseksiyonu hakkında ne gösterdi?","answer":"<b>Genişletilmiş (extended) LND, standart LND'ye kıyasla ek sağkalım yararı GÖSTERMEDİ</b>, komplikasyon arttı. Dogma kırıcı güncel veri.","cat":"Sistektomi","id":"mibc_239","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Robotik RC için ana randomize kanıtlar?","answer":"<b>RAZOR</b> (faz 3 non-inferiority) ve <b>iROC</b> (intrakorporeal diversiyon) → robotik açığa non-inferior.","cat":"Sistektomi","id":"mibc_240","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Ortotopik neobladder kontrendikasyonları?","answer":"<b>Üretral tümör / pozitif üretral sınır</b>, böbrek yetmezliği, bağırsak hastalığı, kötü performans, kognitif yetersizlik.","cat":"Diversiyon","id":"mibc_241","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Üriner diversiyonun tipik metabolik komplikasyonları?","answer":"<b>Hiperkloremik metabolik asidoz</b>, <b>B12 eksikliği</b> (terminal ileum), taş, anastomoz darlığı, kemik kaybı.","cat":"Diversiyon","id":"mibc_242","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Trimodal tedavi ideal adayı?","answer":"<b>≤T2, &lt;3 cm, CIS yok, hidronefroz yok</b>, iyi renal fonksiyon, tek odaklı, iyi performans, takibe uyumlu. Maksimal TURBT + eş zamanlı kemoradyoterapi.","cat":"TMT","id":"mibc_243","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Lokalize MIBC'de hangi tek modaliteler küratif DEĞİL?","answer":"<b>TUR tek başına, RT tek başına, KT tek başına</b> — hiçbiri tek başına küratif değil (güçlü öneri).","cat":"TMT","id":"mibc_244","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Sisplatin-bazlı adjuvan KT kime verilir?","answer":"<b>NAK almamış, patolojik pT3/pT4 ve/veya pN+</b> hastaya.","cat":"Adjuvan","id":"mibc_245","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"CheckMate 274 neyi gösterdi?","answer":"Sistektomi sonrası yüksek riskli MIBC'de <b>adjuvan nivolumab</b> → DFS yararı; FDA onaylı. PD-L1 ≥%1 alt grubunda belirgin.","cat":"🔴 Adjuvan","id":"mibc_246","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"IMvigor011'in yeni konsepti?","answer":"Sistektomi sonrası <b>ctDNA-pozitif</b> hastada adjuvan atezolizumab — minimal rezidüel hastalık (MRD) yönlendirmeli tedavi.","cat":"🔴 Adjuvan","id":"mibc_247","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Metastatik ürotelyal kanserde GÜNCEL birinci basamak standart?","answer":"<b>Enfortumab vedotin + Pembrolizumab (EV+P)</b> — EV-302/KEYNOTE-A39. Platinum KT'ye kıyasla OS'yi neredeyse iki kat uzattı. <b>Cisplatin uygunluğundan bağımsız.</b>","cat":"🔴 Metastatik","id":"mibc_248","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Enfortumab vedotin etki mekanizması ve yan etkileri?","answer":"<b>Nectin-4 hedefli antikor-ilaç konjugatı (ADC)</b>, MMAE taşır. Yan etki: <b>periferik nöropati, deri döküntüsü, hiperglisemi</b>, oküler etkiler.","cat":"🔴 Metastatik","id":"mibc_249","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"EV+P uygun değilse birinci basamak ve idame?","answer":"<b>Platinum-bazlı KT</b> (GC/ddMVAC) → progresyon yoksa <b>avelumab idame</b> (<span class='t'>JAVELIN Bladder 100</span>, HR 0.69). Alternatif: nivolumab+GC (CheckMate 901).","cat":"🔴 Metastatik","id":"mibc_250","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"FGFR2/3 alterasyonu olanda hedefe yönelik ilaç?","answer":"<b>Erdafitinib</b> (<span class='t'>THOR</span>). Yan etki: hiperfosfatemi, santral seröz retinopati, stomatit.","cat":"Metastatik","id":"mibc_251","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Trop-2 hedefli ADC hangisidir?","answer":"<b>Sacituzumab govitecan</b> (<span class='t'>TROPHY-U-01</span>) — sonraki basamak.","cat":"Metastatik","id":"mibc_252","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"RC sonrası UTUC nüks takibi neden önemli?","answer":"Üst üriner sistemde nüks geç ortaya çıkabilir → üst üriner sistem görüntüleme + üretral yıkama sitolojisi (üretra korunduysa) ile takip.","cat":"Takip","id":"mibc_253","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Radikal sistektomi ile ilgili aşağıdaki ifadelerden hangisi YANLIŞTIR?","options":["Radikal sistektomi 12 hafta içinde yapılmalıdır.","Üretrada tümörü olan hastaya ortotopik mesane diversiyonu önerilmez.","Lenf nodu diseksiyonu sistektominin ayrılmaz bir parçasıdır.","Ameliyat öncesi bağırsak hazırlığı zorunludur."],"correct":3,"answer":"<b>Bağırsak hazırlığı zorunlu DEĞİL.</b> ERAS/fast-track önlemleri bağırsak iyileşmesini hızlandırır. Diğer üç ifade doğru: ≤12 hafta zamanlama, üretral tümörde neobladder yok, LND integral parça.","cat":"ebu","id":"mibc_254","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"TURBT örneğinde detrusor kasının bulunmaması ne ile ilişkilidir?","options":["Ameliyat sonrası hematüri riski daha yüksektir.","Kalıntı hastalık, erken nüks ve evrelemenin yanlış belirlenmesi riski daha yüksektir.","pT2 hastalığı riski daha yüksektir.","Hiçbir klinik anlamı yoktur."],"correct":1,"answer":"Detrusor kası yokluğu → <b>understaging, rezidü hastalık ve erken nüks</b> riski. Bu durumda <b>yeniden TUR</b> endikedir. Örnekte detrusor kası = temel kalite kriteri.","cat":"ebu","id":"mibc_255","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Mesane tümörlerinin en-blok rezeksiyonunun temel amacı nedir?","options":["İşlem sırasında kanamayı azaltmak.","T evrelemesinin doğruluğunu artırmak.","Cerrahi alanın görselleştirilmesini iyileştirmek.","İşlem süresini kısaltmak."],"correct":1,"answer":"En-blok rezeksiyon <b>T-evreleme doğruluğunu artırır</b> — kauter artefaktı azalır, invazyon derinliği daha net değerlendirilir.","cat":"ebu","id":"mibc_256","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Özkürkçügil Hoca: 68 yaşında, 20 paket-yıl sigara öyküsü olan erkek, 2 aydır ağrısız makroskobik hematüri ile başvuruyor. İlk yaklaşımınız ne olur?","options":["Hemen BT ürografi isterim.","Önce ayrıntılı anamnez ve fizik muayene, ardından idrar tetkiki/sitoloji ve sistoskopi planlarım.","Doğrudan TURBT planlarım.","Sistektomi için onkoloji konseyine yönlendiririm."],"correct":1,"answer":"Özkürkçügil her vakada <b>önce anamnez + fizik muayene</b> bekler. Tetkik adı saymadan önce bu adımı belirtmek kritik. Sonra sitoloji, sistoskopi, TURBT ve evreleme görüntülemesi gelir.","cat":"vaka","id":"mibc_257","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Vaka: pT2a, fokal CIS, lenfovasküler invazyon, cN0M0 ürotelyal karsinom. GFR 75, ECOG 0. En uygun tedavi stratejisi?","options":["Doğrudan radikal sistektomi.","Sadece kemoradyoterapi.","Neoadjuvan sisplatin-bazlı kemoterapi (veya perioperatif durvalumab+GC) sonrası radikal sistektomi + genişletilmiş LND.","Yalnız geniş re-TUR ve takip."],"correct":2,"answer":"Cisplatin-uygun (GFR 75, ECOG 0) MIBC → <b>neoadjuvan KT sonrası RC</b>. Güncel olarak <b>NIAGARA</b> bazlı perioperatif durvalumab + GC seçeneği de uygundur (immünoterapi-uygunsa). NAK ~%5-8 mutlak OS yararı.","cat":"vaka","id":"mibc_258","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"TURBT sırasında prostatik üretra biyopsisi ne zaman önerilir?","options":["Her mesane tümöründe.","Mesane karsinoma in situ (CIS) mevcut veya şüpheli olduğunda.","Hasta 50 yaşın altında olduğunda.","Önceki TUR işlemleri varlığında."],"correct":1,"answer":"<b>CIS varlığı/şüphesinde</b> prostatik üretra biyopsisi yapılır. CIS saptamada ayrıca mavi ışık (PDD) sistoskopi en faydalıdır.","cat":"ebu","id":"mibc_259","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Özdal Hoca: 'Metastatik ürotelyal kanserde bugün birinci basamak standart tedavi nedir, ilaç isimleriyle söyleyin.'","options":["Gemsitabin-sisplatin kemoterapisi.","Enfortumab vedotin + pembrolizumab.","Tek başına pembrolizumab.","MVAC kemoterapisi."],"correct":1,"answer":"Güncel standart <b>Enfortumab vedotin + Pembrolizumab (EV+P)</b> — EV-302/KEYNOTE-A39. OS'yi platinum KT'ye kıyasla neredeyse iki kat uzattı, cisplatin uygunluğundan bağımsız. (Primer hâlâ cisplatin-KT diyor — güncel değil; Özdal ilaç ismi ve güncel protokol ister.)","cat":"vaka","id":"mibc_260","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Vaka: Metastatik ürotelyal kanser, EV+P uygun değil. Platinum-bazlı KT'ye yanıt alındı, progresyon yok. İdame için ne önerirsiniz?","options":["Erdafitinib.","Avelumab idame tedavisi.","Sacituzumab govitecan.","Takip, idame tedavi gereksiz."],"correct":1,"answer":"<b>Avelumab idame</b> (switch maintenance) — JAVELIN Bladder 100: median OS 21.4 vs 14.3 ay, HR 0.69. Platinum yanıtlı/stabil hastada progresyon yoksa standarttır.","cat":"vaka","id":"mibc_261","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Cüneyt Hoca: 'Genişletilmiş lenf nodu diseksiyonu her zaman standart diseksiyondan daha iyi sağkalım sağlar mı?'","options":["Evet, her zaman üstündür.","Hayır; SWOG S1011'de genişletilmiş LND ek sağkalım yararı göstermedi, komplikasyon arttı.","Evet, sadece T4 hastalarda.","LND'nin sağkalıma etkisi yoktur."],"correct":1,"answer":"<b>SWOG S1011</b> randomize çalışması genişletilmiş LND'nin standart LND'ye <b>ek sağkalım yararı sağlamadığını</b> gösterdi; komplikasyon arttı. LND integral parçadır ama genişliği tartışmalıdır — bu güncel dogma-kırıcı veri.","cat":"vaka","id":"mibc_262","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"BCG instilasyonu sonrası sistit semptomları gelişirse birinci basamak yönetim nedir?","options":["Antihistaminikler.","Antikolinerjikler.","Non-steroid antiinflamatuar ilaçlar (NSAİİ).","Kızılcık suyu."],"correct":2,"answer":"BCG sonrası lokal sistit semptomlarında birinci basamak <b>NSAİİ</b> ve semptomatik tedavidir. (NMIBC ile bağlantılı klasik ebu sorusu — MIBC öncesi evrede karşılaşılır.)","cat":"ebu","id":"mibc_263","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Vaka: Lokalize MIBC, hasta cerrahiyi reddediyor; ≤T2, 2.5 cm soliter tümör, CIS yok, hidronefroz yok, GFR iyi. En uygun mesane koruyucu yaklaşım?","options":["Tek başına radyoterapi.","Tek başına TUR + takip.","Maksimal TURBT + eş zamanlı kemoradyoterapi (trimodal tedavi).","Tek başına sistemik kemoterapi."],"correct":2,"answer":"İdeal mesane koruyucu aday → <b>trimodal tedavi (maksimal TURBT + eş zamanlı kemoradyoterapi)</b>. Tek modalite (TUR/RT/KT tek başına) küratif değildir (güçlü öneri).","cat":"vaka","id":"mibc_264","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Özdal Hoca: 'Hangi hastaya sistektomi sonrası adjuvan nivolumab düşünürsünüz?'","options":["Tüm pT1 hastalara.","Sistektomi sonrası yüksek riskli MIBC hastasına (CheckMate 274).","Yalnız metastatik hastalara.","Adjuvan immünoterapinin yeri yoktur."],"correct":1,"answer":"<b>CheckMate 274</b>: sistektomi sonrası yüksek riskli MIBC'de <b>adjuvan nivolumab</b> DFS yararı sağlar; FDA onaylı, PD-L1 ≥%1 alt grubunda belirgin. NAK alan/almayan her iki grupta uygulanabilir.","cat":"vaka","id":"mibc_265","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi cisplatin-bazlı kemoterapiye uygunsuzluk kriteridir (Galsky)?","options":["Yaş > 60.","GFR < 60 mL/dk.","Hipertansiyon.","PSA yüksekliği."],"correct":1,"answer":"Galsky kriterleri (≥1 = uygunsuz): <b>GFR &lt;60</b>, ECOG ≥2, grade &gt;2 işitme kaybı, periferik nöropati, NYHA III KKY. Yaş tek başına kriter değildir.","cat":"ebu","id":"mibc_266","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"mcq","q":"Vaka: Metastatik ürotelyal kanser, ileri basamakta tümörde FGFR3 alterasyonu saptandı. Hedefe yönelik seçenek?","options":["Erdafitinib.","Olaparib.","Abirateron.","Trastuzumab."],"correct":0,"answer":"<b>Erdafitinib</b> — FGFR2/FGFR3 alterasyonu olanlarda (THOR çalışması). Yan etki: hiperfosfatemi, santral seröz retinopati, stomatit.","cat":"vaka","id":"mibc_267","topic":"mibc","group":0,"topicTitle":"Mesane Ca — KİMK & Metastatik","src":"","flag":false},{"type":"open","q":"Penis SCC karsinogenez yolakları?","answer":"<ul><li><span class='h'>HPV-ilişkili:</span> HPV 16/18 → E6→p53, E7→Rb; <b>p16(+)</b>; bazaloid/warty.</li><li><span class='h'>HPV-bağımsız:</span> kronik inflamasyon/liken skleroz; TP53; <b>p16(−)</b>; usual/verrüköz.</li></ul>","cat":"İki yolak (WHO 2022)","id":"penisuretraca_268","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"HPV ile en güçlü ilişkili histolojik alt tip?","answer":"<b>Bazaloid karsinom.</b> (Warty da HPV+; verrüköz ve papiller HPV-bağımsızdır.)","cat":"Alt tip","id":"penisuretraca_269","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"p16 immünohistokimyası neyi gösterir?","answer":"<b>HPV vekil belirteci</b> → HPV-ilişkili yolak. MIB-1/Ki-67 >%20 agresiflik gösterir.","cat":"Belirteç","id":"penisuretraca_270","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"En önemli prognostik faktör nedir? 5-yıl OS sırası?","answer":"<b>Lenf nodu (N) durumu.</b> pN0 &gt; pN1 &gt; pN2 &gt; pN3 sırasıyla belirgin düşüş.","cat":"Prognoz","id":"penisuretraca_271","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"pN3 neyi kapsar? (EBU favorisi)","answer":"<b>Pelvik nod (uni/bilateral) VEYA herhangi bir ekstranodal yayılım (ENE).</b> Tek nodda bile ENE → pN3 → multimodal tedavi.","cat":"Evreleme","id":"penisuretraca_272","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"pN1 ve pN2 farkı?","answer":"<ul><li><b>pN1:</b> 1–2 inguinal nod, ENE yok.</li><li><b>pN2:</b> &gt;2 unilateral veya bilateral inguinal nod.</li></ul>","cat":"Evreleme","id":"penisuretraca_273","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis kanserinde ilk tutulan lenf nodları?","answer":"<b>İnguinal nodlar.</b> Sentinel → ipsilateral yüzeyel inguinal → derin inguinal → pelvik. <b>Kontralateral çapraz yayılım olmaz.</b>","cat":"Yayılım","id":"penisuretraca_274","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"T1a vs T1b ayrımı?","answer":"<ul><li><b>T1a:</b> LVI/perinöral YOK, iyi/orta diferansiye → düşük risk.</li><li><b>T1b:</b> LVI/perinöral VAR veya G3 → yüksek risk.</li></ul>","cat":"Evreleme","id":"penisuretraca_275","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Verrüköz karsinomda ILND gerekir mi?","answer":"<b>Hayır.</b> Saf verrüköz karsinom metastaz yapmaz → ILND gereksiz.","cat":"Tedavi","id":"penisuretraca_276","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis primer tümörde cerrahi sınır kaç mm?","answer":"<b>&gt;1 mm negatif sınır yeterli.</b> Eski 5 mm dogması terk edildi → organ koruma kolaylaştı.","cat":"GÜNCEL","id":"penisuretraca_277","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"T2 glans tümöründe tercih edilen cerrahi?","answer":"<b>Glansektomi</b> (± distal üretrektomi) + SSG ile neo-glans rekonstrüksiyonu.","cat":"Tedavi","id":"penisuretraca_278","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"cN0 + yüksek risk (≥T1b): hangi nodal evreleme?","answer":"<b>DSNB artık ILND'ye TERCİH edilen yöntem</b> (EAU-ASCO) — morbidite çok düşük. <b>PET/CT cN0'da işe yaramaz.</b>","cat":"GÜNCEL ★","id":"penisuretraca_279","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"cN0 düşük risk (Tis/Ta/T1a) yaklaşım?","answer":"<b>Gözlem (surveillance).</b> Cerrahi nodal evreleme gereksiz.","cat":"Tedavi","id":"penisuretraca_280","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"cN+ palpabl nod yaklaşımı?","answer":"<b>US ± FNAC ile doğrula → radikal ILND.</b> ≥2 nod veya ENE → <b>PLND</b>. Tek nod (ENE yok) → 3 ayda takip.","cat":"Tedavi","id":"penisuretraca_281","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"cN3 / unrezektabl nodal hastalık?","answer":"<b>Neoadjuvan kemoterapi (TIP) → cerrahi konsolidasyon.</b>","cat":"Tedavi","id":"penisuretraca_282","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis neoadjuvan kemo rejimi TIP nedir?","answer":"<b>T</b>aksan (paklitaksel) + <b>I</b>fosfamid + sis<b>P</b>latin.","cat":"Sistemik","id":"penisuretraca_283","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"İleri evre penis kanserinde yeni tedavi cephesi?","answer":"<b>İmmünoterapi + kemo. HERCULES:</b> pembrolizumab + platin + 5-FU. <b>EPIC-A:</b> semiplimab + kemo.","cat":"GÜNCEL","id":"penisuretraca_284","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis kanseri TNM hangi baskı?","answer":"<b>UICC 8. baskı</b> (WHO 2022 ile uyumlu). Dikkat: üretra 9. baskı!","cat":"Evreleme","id":"penisuretraca_285","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Buschke-Löwenstein tümörü özellikleri?","answer":"Dev kondiloma akuminatum, <b>HPV 6/11</b>, lokal invaziv, <b>metastaz yapmaz</b>; SCC dönüşümü olabilir → derin biyopsi şart.","cat":"Premalign","id":"penisuretraca_286","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Takip süresi ne kadar?","answer":"Maksimum <b>5 yıl</b> (geç nüks nadir). Kendi kendine penis + kasık muayenesi öğretilir.","cat":"Takip","id":"penisuretraca_287","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Üretra kanserinde en sık histoloji?","answer":"<b>Ürotelyal karsinom</b> — her iki cinste de en sık.","cat":"Histoloji","id":"penisuretraca_288","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Erkek üretra epitel dağılımı?","answer":"<ul><li>Prostatik → ürotelyum</li><li>Membranöz–fossa naviküler arası → psödostratifiye kolumnar</li><li>Fossa naviküler → stratifiye skuamöz</li></ul>","cat":"Anatomi","id":"penisuretraca_289","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Kadın üretra epitel dağılımı?","answer":"Proksimal 1/3 → <b>ürotelyum</b>; distal 2/3 → <b>skuamöz.</b>","cat":"Anatomi","id":"penisuretraca_290","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Üretra kanseri TNM hangi baskı?","answer":"<b>UICC/AJCC 9. baskı (2025).</b> EAU 2026 entegre etti; kaynaktaki 8. baskı eskidi.","cat":"GÜNCEL ★","id":"penisuretraca_291","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Üretrada palpabl nod ne kadar gerçek metastaz?","answer":"<b>~%84</b> gerçek metastaz (peniste ~%41). Yani üretrada nod = ciddiye al.","cat":"Tanı","id":"penisuretraca_292","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Lokal T evreleme için en iyi görüntüleme?","answer":"<b>Pelvik MR</b>; retrograd üretrografi uzunluk/cerrahi plan için; CT ürografi tüm ürotel taraması.","cat":"Tanı","id":"penisuretraca_293","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Prostatik üretra ürotelyal Ca — sadece mukozal tutulum tedavisi?","answer":"<b>TUR + BCG</b> + üst sistem görüntüleme takibi.","cat":"Tedavi","id":"penisuretraca_294","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Erkek T2 distal (pendulöz) üretra tümörü tedavisi?","answer":"<b>Distal üretrektomi</b> veya parsiyel penektomi (sınır negatifse penis korunur).","cat":"Tedavi","id":"penisuretraca_295","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Erkek T2 bulbar üretra tümörü tedavisi?","answer":"<b>Üretrektomi ± sisto-prostatektomi.</b>","cat":"Tedavi","id":"penisuretraca_296","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Lokal ileri üretra SCC'sinde genital koruma yaklaşımı?","answer":"<b>RT + radyosensitize kemoterapi (kemoradyoterapi)</b> definitif tedavi olarak.","cat":"Tedavi","id":"penisuretraca_297","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Lokal ileri PUC'de küratif niyetli sistemik tedavi?","answer":"<b>Sisplatin temelli kemoterapi</b>, cerrahi öncesi.","cat":"Tedavi","id":"penisuretraca_298","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Üretra kanserinde kötü prognostik faktörler?","answer":"İleri yaş (&gt;60), <b>T3/T4, M1</b>, proksimal lokalizasyon, eşlik eden mesane ca.","cat":"Prognoz","id":"penisuretraca_299","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Kadın üretra divertikülünde hangi histoloji akla gelir?","answer":"<b>Adenokarsinom.</b>","cat":"Histoloji","id":"penisuretraca_300","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Üretra kanseri risk faktörleri?","answer":"Üretral <b>darlık</b>, kronik inflamasyon, <b>HPV</b> (erkek SCC), divertikül (kadın), kronik üretrit.","cat":"Etiyoloji","id":"penisuretraca_301","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Penis kanserinde pN3 hastalığı neyi kapsar? <i>(EBU 26)</i>","options":["Tek taraflı ikiden fazla veya çift taraflı kasık nodunda metastaz","Bölgesel lenf nodu metastazının ekstranodal yayılımı (ENE)","Bir veya iki kasık nodunda metastaz","İki taraflı kasık nodlarında metastaz"],"correct":1,"answer":"<span class='h'>pN3 = ENE veya pelvik nod tutulumu.</span> Tek nodda bile ENE pN3'tür. A şıkkı pN2'dir, C pN1, D pN2.","cat":"","id":"penisuretraca_302","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"HPV ile en güçlü ilişkili penis SCC alt tipi? <i>(EBU 26)</i>","options":["Warty karsinom","Verrüköz karsinom","Bazaloid karsinom","Papiller karsinom"],"correct":2,"answer":"<span class='h'>Bazaloid.</span> Warty da HPV+ ama bazaloid en güçlü/agresif HPV-ilişkili tip. Verrüköz ve papiller HPV-<b>bağımsızdır.</b>","cat":"","id":"penisuretraca_303","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Penis kanserinde ilk tutulan lenf nodları hangisidir? <i>(EBU 26)</i>","options":["Para-aortik","Obturator","İnguinal","Supraklaviküler"],"correct":2,"answer":"<span class='h'>İnguinal nodlar.</span> Sentinel → yüzeyel inguinal → derin inguinal → pelvik. Kontralateral çapraz yayılım olmaz.","cat":"","id":"penisuretraca_304","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"cN0 + yüksek riskli (≥T1b) penis kanserinde tercih edilen nodal evreleme yöntemi? <i>(EAU-ASCO güncel)</i>","options":["Radikal ILND","Dinamik sentinel lenf nodu biyopsisi (DSNB)","PET/CT","Sadece gözlem"],"correct":1,"answer":"<span class='h'>DSNB artık ILND'ye tercih</b> (morbidite çok düşük; sens %92–96). PET/CT cN0'da işe yaramaz.","cat":"","id":"penisuretraca_305","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Penis primer tümöründe kabul edilen güncel negatif cerrahi sınır?","options":[">1 mm",">5 mm",">10 mm","≥2 cm"],"correct":0,"answer":"<span class='h'>&gt;1 mm yeterli.</span> Eski 5 mm dogması terk edildi → organ koruma cerrahisinin önü açıldı.","cat":"","id":"penisuretraca_306","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Penis kanseri neoadjuvan kemo rejimi TIP'in açılımı?","options":["Tiyotepa-Ifosfamid-Paklitaksel","Paklitaksel-Ifosfamid-Sisplatin","Topotekan-Irinotekan-Platin","Taksan-Idarubisin-Prednizon"],"correct":1,"answer":"<span class='h'>TIP = Paklitaksel + Ifosfamid + Sisplatin.</span> cN3/bulky veya seçilmiş cN2'de neoadjuvan.","cat":"","id":"penisuretraca_307","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"İleri evre penis SCC'sinde immünoterapiyi öne çıkaran çalışma?","options":["KEYNOTE-564","HERCULES","CheckMate 214","CARMENA"],"correct":1,"answer":"<span class='h'>HERCULES (LACOG 0218):</b> pembrolizumab + platin + 5-FU. EPIC-A ise semiplimab + kemo. Diğerleri RCC çalışmalarıdır.","cat":"","id":"penisuretraca_308","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Üretra kanseri için EAU'nun güncel kullandığı TNM baskısı?","options":["7. baskı","8. baskı","9. baskı (2025)","TNM kullanılmaz"],"correct":2,"answer":"<span class='h'>9. baskı (2025).</span> EAU 2026 PUC kılavuzu entegre etti. (Dikkat: penis hâlâ 8. baskı!)","cat":"","id":"penisuretraca_309","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Üretra kanserinde her iki cinste en sık histoloji?","options":["Skuamöz hücreli karsinom","Adenokarsinom","Ürotelyal karsinom","Melanom"],"correct":2,"answer":"<span class='h'>Ürotelyal karsinom</b> her iki cinste de en sık. (Kadın divertikülünde adeno akla gelir.)","cat":"","id":"penisuretraca_310","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Prostatik üretra ürotelyal karsinomda sadece mukozal tutulum varsa tedavi?","options":["Radikal sisto-prostatektomi","TUR + BCG","Radyoterapi","Total penektomi"],"correct":1,"answer":"<span class='h'>TUR + BCG</b> + üst sistem görüntüleme takibi. Stromal invazyonda sisto-prostatektomi gerekir.","cat":"","id":"penisuretraca_311","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Verrüköz karsinomda lenf nodu diseksiyonu?","options":["Her zaman ILND gerekir","Saf formda metastaz yapmaz → gereksiz","Pelvik LND zorunlu","DSNB önerilir"],"correct":1,"answer":"<span class='h'>Saf verrüköz karsinom metastaz yapmaz</b> → ILND gereksiz. Çok iyi prognozlu, lokal tümör.","cat":"","id":"penisuretraca_312","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"Üretrada büyümüş palpabl nod hangi oranda gerçek metastazı gösterir?","options":["~%41 (peniste olduğu gibi)","~%84","~%20","~%5"],"correct":1,"answer":"<span class='h'>~%84</b> gerçek metastaz (peniste ~%41). Üretrada palpabl nod ciddiye alınmalı.","cat":"","id":"penisuretraca_313","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"mcq","q":"p16 immünohistokimya pozitifliği penis kanserinde neyi gösterir?","options":["Kötü diferansiyasyon","HPV-ilişkili yolak","Uzak metastaz","Verrüköz histoloji"],"correct":1,"answer":"<span class='h'>HPV vekil belirteci</b> → HPV-ilişkili yolak (E6/E7 → p53/Rb). p16(−) = HPV-bağımsız.","cat":"","id":"penisuretraca_314","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"63 yaşında, sünnetsiz, fimozisli erkek; glansta 1,5 cm ülsere lezyon. Biyopsi: SCC, korpus spongiozuma sınırlı. Kasıklar palpasyonda temiz. <b>Yaklaşımın nedir?</b>","answer":"<ul><li>Lezyon T2 (spongiozum), klinik <b>cN0.</b></li><li>Primer: glansa sınırlıysa <b>glansektomi</b> (±distal üretrektomi) + neo-glans; sınır &gt;1 mm yeterli.</li><li>Patoloji ≥T1b/G2+ ise nodal evreleme: <b>cN0 yüksek risk → DSNB</b> (artık ILND yerine).</li><li>HPV/p16 durumu ve alt tip raporlanmalı.</li></ul>","cat":"","id":"penisuretraca_315","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"İnoperabl, bulky inguinal nodlu (cN3) penis SCC hastası. <b>Sistemik tedavi olarak ne verirsin, rejimi say.</b>","answer":"<ul><li><b>Neoadjuvan TIP:</b> paklitaksel + ifosfamid + sisplatin → yanıt alınırsa <b>cerrahi konsolidasyon (ILND±PLND).</b></li><li>pN2–N3/ENE sonrası adjuvan kemo±RT.</li><li><span class='h'>Güncel:</span> ileri/metastatik → <b>pembrolizumab + platin + 5-FU (HERCULES)</b>; alternatif semiplimab+kemo (EPIC-A).</li></ul>","cat":"","id":"penisuretraca_316","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis kanserinde pN evrelemesini ve 5-yıllık sağkalımla ilişkisini anlat. <b>pN3'ü tam tanımla.</b>","answer":"<ul><li><b>pN1:</b> 1–2 inguinal nod, ENE yok. <b>pN2:</b> &gt;2 unilateral veya bilateral inguinal nod.</li><li><b>pN3:</b> pelvik nod (uni/bilateral) <b>VEYA herhangi bir ENE</b> — tek nodda bile.</li><li>Nodal durum en güçlü prognostik faktör; pN0 en iyi, pN3 en kötü sağkalım.</li></ul>","cat":"","id":"penisuretraca_317","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"50 yaş erkek, tekrarlayan üretra darlığı öyküsü, akut retansiyon. Perinede palpabl kitle; MR: bulbar üretrada korpus spongiozuma infiltre 4 cm; biyopsi: kötü diferansiye SCC. <b>Tanı ve plan?</b>","answer":"<ul><li><b>Primer üretral karsinom (bulbar SCC), cT2N0M0.</b> Darlık/kronik inflamasyon zemini tipik.</li><li>Evreleme: pelvik MR + toraks-batın-pelvis CT, CT ürografi.</li><li>Bulbar: <b>üretrektomi ± sisto-prostatektomi</b>; lokal ileri SCC'de genital koruma için <b>kemoradyoterapi</b> seçeneği.</li><li>TNM <b>9. baskı</b> ile evrele.</li></ul>","cat":"","id":"penisuretraca_318","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Distal üretra kanserinde penisi korumak istiyorsun. <b>Hangi cerrahi, neye dikkat edersin?</b>","answer":"<ul><li><b>Distal üretrektomi</b> = penil amputasyona alternatif (lokalize distal tümörde).</li><li><b>İntraoperatif frozen section</b> kritik: pozitif proksimal sınır → progresyon riski yüksek.</li><li>&lt;5 mm tümörsüz sınır distal pT1-3N0-2'de onkolojiyi bozmuyor.</li></ul>","cat":"","id":"penisuretraca_319","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"Penis kanserinin iki karsinogenez yolağını ve bunun klinik/patolojik karşılığını anlat.","answer":"<ul><li><b>HPV-ilişkili:</b> HPV 16/18 → E6 (p53), E7 (Rb) inaktivasyonu; <b>p16(+)</b>; bazaloid/warty histoloji.</li><li><b>HPV-bağımsız:</b> liken skleroz/kronik inflamasyon; TP53; <b>p16(−)</b>; usual/verrüköz.</li><li>WHO 2022 tümörleri bu iki yolağa göre sınıflar; rapor HPV/p16 durumunu içermeli.</li></ul>","cat":"","id":"penisuretraca_320","topic":"penisuretraca","group":0,"topicTitle":"Penis & Üretra Kanseri","src":"","flag":false},{"type":"open","q":"UTUC tüm ürotelyal kanserlerin yüzde kaçı ve tanı anında ne kadarı invaziv?","answer":"<b>%5–10</b>; tanı anında <span class=\"hl\">~%60 invaziv</span> (mesanenin tersine, geç tanı + ince duvar).","cat":"","id":"utuc_321","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"UTUC en sık nerede yerleşir?","answer":"Pelvikalisiyel tümör üreterden <b>~2 kat sık</b>; üreterde en sık <span class=\"hl\">distal üreter</span>.","cat":"","id":"utuc_322","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"\"Alan etkisi\"nin üç klinik yansıması nedir?","answer":"<ul><li>Tedavi sonrası <b>mesane nüksü ~%30</b></li><li>Eşlik eden mesane tümörü tanıda <b>>%15</b></li><li>Karşı üst sistem nüksü <b>~%2–6</b></li></ul>Bunlar takipte sistoskopi, RNU'da mesane kafı ve tek-doz intravezikal KT'yi açıklar.","cat":"","id":"utuc_323","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Aristolokik asitin iki klinik tablosu ve karakteristik özellikleri?","answer":"<b>Çin bitkisel ilaç nefropatisi</b> + <b>Balkan endemik nefropatisi</b>. <span class=\"hl\">Bilateral, kadın baskın, üst sistem</span>; A→T transversiyon mutasyonu.","cat":"","id":"utuc_324","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Lynch sendromu (HNPCC) taraması ne zaman ve hangi gen ön planda?","answer":"UTUC + <b>yaş &lt;60</b> veya aile/kişisel Lynch-spektrum öyküsü → <b>MMR/MSI testi + genetik danışma</b>. En sık <span class=\"hl\">MSH2</span>.","cat":"","id":"utuc_325","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Sigara bırakmanın UTUC üzerindeki etkisi konusunda nüans nedir?","answer":">10 yıl önce bırakmak <b>onkolojik sonucu iyileştirir</b>, ancak <span class=\"hl\">nüks riskini azaltmaz</span> (alan etkisi yerleşmiştir).","cat":"","id":"utuc_326","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"UTUC'nin tipik moleküler profili ve klinik karşılığı?","answer":"<b>Luminal-papiller, T-hücreden fakir (\"soğuk\"), FGFR3-aktive</b>. Soğuk ortam → adjuvan IO çelişkisi; <span class=\"hl\">FGFR3 → erdafitinib</span> rasyoneli.","cat":"","id":"utuc_327","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Hangi varyant histoloji \"benign taklit eder ama kötü gidişli\"dir?","answer":"<b>Nested varyant</b> — bland görünür ama agresiftir (tuzak). Diğer agresif: mikropapiller, sarkomatoid, plazmasitoid, lenfoepitelyoma-benzeri.","cat":"","id":"utuc_328","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"UTUC'de altın standart görüntüleme ve sınırı?","answer":"<b>BT-Ürografi (CTU)</b> = altın standart (dolma defekti). <span class=\"hl\">T-evrelemesi/invazyon ayrımı güvenilir değildir</span>.","cat":"","id":"utuc_329","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"MR-Ürografi ne zaman ve hangi uyarıyla?","answer":"Yalnız <b>CTU kontrendike</b> ise (alerji/böbrek yetmezliği). <span class=\"hl\">Ciddi böbrek yetmezliğinde gadolinyum → NSF (nefrojenik sistemik fibroz) riski</span>.","cat":"","id":"utuc_330","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Tanısal üreteroskopinin en önemli zararı nedir?","answer":"Sonradan RNU yapılsa bile <span class=\"hl\">mesane nüksü riskini ~%50 artırır</span> (hücre dökülmesi/implantasyon). Bu yüzden rutin değil — yalnız tanıyı/tedaviyi değiştirecekse.","cat":"","id":"utuc_331","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Sitoloji hangi sistemle raporlanır, ne zaman üst sistem dışlanır?","answer":"<b>Paris sistemi</b>; voided + selektif (in situ) sitoloji. <span class=\"hl\">Sistoskopi negatif + sitoloji pozitif</span> → üst sistem dışlanmalı.","cat":"","id":"utuc_332","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"UTUC'de ana (en güçlü) prognostik faktör nedir?","answer":"<b>Patolojik tümör evresi (pT)</b>. (Derece, CIS, hidronefroz, LVI ikincildir.)","cat":"","id":"utuc_333","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Renal pelvis T3'ün tanımı nedir?","answer":"Muskülarisi aşıp <span class=\"hl\">peripelvik yağa VEYA böbrek parankimine</span> invazyon. (Üreterde: periüreterik yağ.)","cat":"","id":"utuc_334","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Renal pelviste T3 (parankim) ile T4 (yağ) arasındaki fark?","answer":"<ul><li><b>T3</b>: böbrek dokusunun içine girer, <span class=\"hl\">böbreğin içinde kalır</span> → organ-confined.</li><li><b>T4</b>: parankimi <b>baştan başa geçip dışındaki perinefrik yağa</b> çıkar / komşu organ → non-organ-confined.</li></ul>Yağ: peripelvik (T3, içeride) vs perinefrik (T4, dışarıda).","cat":"","id":"utuc_335","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Sessil mimari ne demektir ve önemi?","answer":"<b>Geniş tabanlı, sapsız, düz</b> büyüyen tümör (papillerin karşıtı). <span class=\"hl\">Papillere göre daha kötü onkolojik sonuç</span> (organ-dışı, yüksek derece, nüks); ≥pT2'nin bağımsız öngörücüsü.","cat":"","id":"utuc_336","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Düşük-risk UTUC kriterleri (hepsi gerekli)?","answer":"<b>Unifokal · &lt;2 cm · düşük-dereceli biyopsi · düşük-dereceli sitoloji · görüntülemede invaziv görünüm yok.</b> Hepsi bir arada olmalı.","cat":"","id":"utuc_337","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"EAU 2025 dipnotu: düşük-dereceli tümörde hangi faktörler \"güçlü öngörücü değil\"?","answer":"<span class=\"hl\">Boyut (>2cm), multifokalite, hidronefroz</span> — kanıt düzeyi düşük. <b>Derece baskındır.</b> Düşük-derecede bu faktörler invazyonu güçlü öngörmez → otomatik RNU değil, KSS/RNU ortak kararı.","cat":"","id":"utuc_338","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Risk sınıflamasında \"en önemli surrogat faktör\" hangisidir?","answer":"<b>Derece</b> — tümör evresi ve agresifliğini en iyi yansıtan surrogat.","cat":"","id":"utuc_339","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"EAU 2025'e göre düşük-riskli UTUC'de birincil tedavi nedir?","answer":"<b>Böbrek-koruyucu cerrahi (KSS)</b> — güçlü öneri. <span class=\"hl\">Karşı böbrek normal olsa bile</span> tüm düşük-riskli olgularda tartışılır.","cat":"","id":"utuc_340","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"İkinci-bakış URS ne zaman yapılır?","answer":"İlk endoskopik tedaviden sonra <b>8 hafta içinde</b> (EAU 2025 yeni öneri).","cat":"","id":"utuc_341","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"İmperatif KSS endikasyonları?","answer":"<b>Soliter böbrek, bilateral tümör, ciddi böbrek yetmezliği</b> → yüksek-riskte bile KSS olgu-bazında tartışılır.","cat":"","id":"utuc_342","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Distal üreter düşük-riskli tümörde seçenekler ve mutlaka yapılması gereken?","answer":"<b>Endoskopi VEYA distal üreterektomi</b> (ortak karar). Distal üreterektomide <span class=\"hl\">orifis mutlaka mesane kafıyla</span> çıkarılır; reimplantasyon (psoas hitch / Boari).","cat":"","id":"utuc_343","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Üst sistemde CIS varlığında adjuvan instilasyon nedir?","answer":"<b>BCG</b> (en yerleşik). Tam rezeksiyon şart. UGN-101 (MMC + ters-termal jel) düşük-dereceli pyelokalisiyel için.","cat":"","id":"utuc_344","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Yüksek-riskli UTUC'de standart cerrahi nedir?","answer":"<b>Radikal nefroüreterektomi + mesane kafı eksizyonu</b> (+ ≥cT2'de template LND), <span class=\"hl\">tümör yeri ne olursa olsun</span>.","cat":"","id":"utuc_345","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Mesane kafı neden çıkarılır?","answer":"İntramural üreter + orifis bırakılırsa <span class=\"hl\">orada nüks olur</span> (alan etkisi). Kaf çıkarılmazsa nüks artar.","cat":"","id":"utuc_346","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"EAU 2025 cerrahi yaklaşım: hangi durumda açık tercih?","answer":"Açık/lap/robotik genel olarak benzer; ancak <b>ileri/≥cT3 veya organ-dışı hastalıkta AÇIK tercih</b> — lap/robotik bu grupta önerilmez.","cat":"","id":"utuc_347","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"RNU sonrası mesane nüksünü azaltmak için ne verilir?","answer":"<b>Tek-doz intravezikal kemoterapi (MMC veya THP)</b> — <span class=\"hl\">ODMIT-C</span> ve <span class=\"hl\">THP</span> RCT'leri.","cat":"","id":"utuc_348","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Template LND kimlere önerilir?","answer":"Yalnız <b>yüksek-riskli (≥cT2)</b> UTUC; evreleme + olası terapötik yarar. Ta/T1'de yarar sınırlı.","cat":"","id":"utuc_349","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"UTUC'ye özgü tek faz III adjuvan çalışma ve sonucu?","answer":"<span class=\"hl\">POUT</span>: pT2–T4 ve/veya N+ → adjuvan platin-bazlı KT; <b>DFS belirgin iyileşir</b> (~%62 vs %45, 5-yıl). Düzey-1 kanıt.","cat":"","id":"utuc_350","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Adjuvan IO çelişkisi: pembrolizumab vs nivolumab UTUC'de?","answer":"<ul><li><span class=\"hl\">AMBASSADOR</span> (pembrolizumab): DFS↑; UTUC'de <b>üreterde fayda, renal pelviste yok</b>.</li><li><span class=\"hl\">CheckMate-274</span> (nivolumab): genel pozitif ama <b>UTUC alt grubunda fayda yok</b>.</li></ul>EAU 2025: platine uygunsuz/reddeden ≥pT3/N+/sınır+ → adjuvan pembrolizumab tartışılır.","cat":"","id":"utuc_351","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Neoadjuvan KT neden cazip, ama neden formel öneri değil?","answer":"<b>Cazip:</b> RNU öncesi maks böbrek fonksiyonuyla sisplatin. <b>Defans:</b> klinik evreleme zayıf (yüksek-dereceli biyopsi kas-invazyonu ~%60–68 öngörür) → <span class=\"hl\">aşırı tedavi riski</span>. URANUS bekleniyor.","cat":"","id":"utuc_352","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"Metastatik UTUC'de güncel birinci basamak tedavi?","answer":"<b>Enfortumab vedotin + Pembrolizumab</b> (<span class=\"hl\">EV-302</span>) — OS ~31–34 ay, yeni bakım standardı.","cat":"","id":"utuc_353","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"FGFR2/3 değişimi olan metastatik hastada hedefe yönelik ajan?","answer":"<b>Erdafitinib</b> (FGFR inhibitörü) — <span class=\"hl\">THOR</span> çalışması (IO sonrası kemoterapiye üstün OS).","cat":"","id":"utuc_354","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"KSS sonrası takibin RNU'dan farkı?","answer":"<b>Daha sık ve invazif</b> (URS + sitoloji + görüntüleme), ipsilateral nüks için. <span class=\"hl\">Hasta uyumu kritik</span>; ikinci-bakış URS 6–8 hafta.","cat":"","id":"utuc_355","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"<span class=\"vig\">70 y, iyi genel durum. Distal üreterde unifokal 1.5 cm tümör; görüntülemede invazyon/metastaz yok; yüksek-dereceli sitoloji negatif; URS biyopsisi düşük dereceli.</span>En uygun yaklaşım?","options":["Radikal nefroüreterektomi + mesane kafı","Böbrek-koruyucu: endoskopik ablasyon veya distal üreterektomi","Yalnızca aktif izlem","Eksternal radyoterapi"],"correct":1,"answer":"Tümör <b>düşük-riskli</b> (unifokal, &lt;2 cm, düşük-dereceli biyopsi+sitoloji, invazyon yok). EAU 2025: düşük-riskte <b>KSS birincil seçenek</b>; distal üreterde <b>endoskopi VEYA distal üreterektomi</b> ortak kararla. RNU bu olgu için aşırı tedavi.","cat":"Tedavi (EBU)","id":"utuc_356","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"UTUC'de en güçlü (ana) prognostik faktör hangisidir?","options":["Tümör derecesi","Patolojik tümör evresi (pT)","Hidronefroz varlığı","Hasta yaşı"],"correct":1,"answer":"<b>Patolojik T evresi (pT)</b> ana prognostik faktördür. Derece, eşlik eden CIS, hidronefroz, LVI ikincil belirteçlerdir.","cat":"Prognoz (EBU)","id":"utuc_357","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Renal pelvis tümöründe T3 kategorisini en iyi tanımlayan ifade?","options":["Tümör subepitelyal bağ dokuya invaze","Tümör muskülarisi aşıp peripelvik yağa veya böbrek parankimine invaze","Tümör büyük damarlara/ipsilateral adrenale invaze","Tümör yalnız muskülarise sınırlı"],"correct":1,"answer":"Renal pelvis <b>T3</b> = muskülarisi aşıp <b>peripelvik yağa veya böbrek parankimine</b>. \"Büyük damar/adrenal\" T4 düzeyine ait çeldiricidir; muskülaris sınırlı = T2.","cat":"Evreleme (EBU)","id":"utuc_358","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"<span class=\"vig\">Renal pelvis tümörü hem T3 hem T4'te \"böbrek\" geçebiliyor.</span>T3 (parankim) ile T4 ayrımı nasıl yapılır?","options":["T3 böbreğin içinde kalır; T4 parankimi geçip dışındaki perinefrik yağa/komşu organa ulaşır","T3 ve T4 aynı şeydir, ayrım keyfidir","T3 daima üreteri, T4 daima pelvisi ilgilendirir","T3 lenf nodu tutulumu, T4 uzak metastaz demektir"],"correct":0,"answer":"<b>T3</b>: tümör böbrek parankimine girer ama <b>böbreğin içinde</b> (organ-confined). <b>T4</b>: parankimi <b>baştan başa geçip dışındaki perinefrik yağa</b> veya komşu organa (non-organ-confined). Yağ ayrımı: peripelvik (T3, içeride) vs perinefrik (T4, dışarıda).","cat":"Evreleme","id":"utuc_359","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"UTUC'de MR-ürografi ile ilgili hangi ifade doğrudur?","options":["Tüm hastalarda ilk tercih görüntülemedir","Ciddi böbrek yetmezliğinde gadolinyum, nefrojenik sistemik fibroz riski nedeniyle dikkatli kullanılmalıdır","İyot kontrastı içerdiği için alerjide kontrendikedir","T-evrelemesinde CTU'dan üstündür"],"correct":1,"answer":"MRU yalnız <b>CTU kontrendike</b> olduğunda kullanılır. <b>Ciddi böbrek yetmezliğinde gadolinyum → NSF riski</b> nedeniyle dikkatli. (Gadolinyum iyot değildir.)","cat":"Tanı (EBU)","id":"utuc_360","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Tanısal üreteroskopi (URS) + biyopsi ile ilgili en kritik uyarı nedir?","options":["Hiçbir komplikasyon riski taşımaz","Sonradan RNU yapılsa bile mesane nüksü riskini ~%50 artırır","Daima RNU'dan önce rutin yapılmalıdır","T-evrelemesini kesin belirler"],"correct":1,"answer":"Tanısal URS <b>mesane nüksünü ~%50 artırır</b> (hücre dökülmesi/implantasyon). Bu yüzden rutin değil; yalnız tanıyı/tedaviyi değiştirecekse (belirsiz olgu, soliter böbrek, KSS planı).","cat":"Tanı","id":"utuc_361","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi tek başına UTUC'yi YÜKSEK-RİSK sınıfına sokar?","options":["Tümör boyutu 1.8 cm","Yüksek-dereceli sitoloji","Unifokal yerleşim","Düşük-dereceli biyopsi"],"correct":1,"answer":"Yüksek risk = <b>herhangi biri</b>: yüksek-dereceli sitoloji/biyopsi, &gt;2 cm, multifokal, hidronefroz, invaziv görünüm, varyant histoloji, sistektomi öyküsü. Düşük risk için <b>hepsinin</b> düşük-risk olması gerekir.","cat":"Risk","id":"utuc_362","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"EAU 2025 dipnotuna göre, biyopsi DÜŞÜK-DERECELİ çıkmış bir tümörde aşağıdaki faktörler için doğru olan?","options":["Boyut/multifokalite/hidronefroz invazyonu güçlü öngörür, otomatik RNU gerekir","Boyut/multifokalite/hidronefroz invazyonu güçlü ÖNGÖRMEZ; KSS/RNU ortak kararı önerilir","Derece önemsizdir, boyut tek belirleyicidir","Düşük derece daima RNU gerektirir"],"correct":1,"answer":"<b>Derece baskın faktördür.</b> Düşük-dereceli tümörde boyut, multifokalite ve hidronefrozun kanıt düzeyi düşüktür; invazyonu güçlü öngörmezler. → otomatik RNU yerine <b>ortak karar (KSS vs RNU)</b>. Amaç düşük-derecede gereksiz nefron kaybını önlemek.","cat":"Risk (2025 nüans)","id":"utuc_363","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"RNU sırasında mesane kafı (bladder cuff) eksizyonunun gerekçesi nedir?","options":["Üreteral kanamayı azaltmak","Bırakılan intramural üreter+orifiste nüks olmasını önlemek","Ameliyat süresini kısaltmak","Lenf nodu diseksiyonunu kolaylaştırmak"],"correct":1,"answer":"İntramural üreter + orifis bırakılırsa <b>orada nüks gelişir</b> (alan etkisi). Mesane kafı eksizyonu nüksü azaltır; \"stripping/intussusception\" kafa eşdeğer değildir.","cat":"Cerrahi","id":"utuc_364","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"<span class=\"vig\">cT3, organ-dışı görünümlü yüksek-hacimli renal pelvis tümörü.</span>EAU 2025'e göre tercih edilen cerrahi yaklaşım?","options":["Laparoskopik RNU","Robotik RNU","Açık RNU","Perkütan rezeksiyon"],"correct":2,"answer":"Genel olarak açık/lap/robotik benzer sonuç verir; ancak <b>ileri/≥cT3 veya organ-dışı hastalıkta AÇIK cerrahi tercih edilir</b> (daha iyi OS/RFS, daha düşük mesane nüksü). Lap/robotik bu grupta önerilmez.","cat":"Cerrahi (2025)","id":"utuc_365","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"RNU sonrası mesane nüksünü azaltmak için kanıta dayalı uygulama?","options":["Rutin adjuvan radyoterapi","Tek-doz intravezikal kemoterapi (mitomisin C / THP)","6 hafta sistemik BCG","Profilaktik sistektomi"],"correct":1,"answer":"<b>RNU sonrası tek-doz intravezikal MMC (veya THP)</b> mesane nüksünü azaltır (ODMIT-C, THP RCT'leri). Ekstravazasyon dışlandıktan sonra verilir.","cat":"Cerrahi","id":"utuc_366","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Yüksek-riskli (pT2–T4 ve/veya N+) UTUC'de RNU sonrası adjuvan kemoterapinin düzey-1 kanıtı hangi çalışmadan gelir?","options":["CheckMate-274","POUT","EV-302","JAVELIN Bladder 100"],"correct":1,"answer":"<b>POUT</b> = UTUC'ye özgü tek faz III. Adjuvan platin-bazlı KT 5-yıl DFS'yi belirgin iyileştirir (~%62 vs %45). Standart.","cat":"Sistemik","id":"utuc_367","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Adjuvan immünoterapi ile ilgili UTUC'ye özgü çelişki hangisidir?","options":["Hem pembrolizumab hem nivolumab UTUC'de güçlü fayda gösterdi","Nivolumab (CheckMate-274) UTUC alt grubunda net fayda göstermedi; pembrolizumab (AMBASSADOR) öne çıkar","İkisi de UTUC'de tamamen etkisizdir","UTUC'de yalnız atezolizumab onaylıdır"],"correct":1,"answer":"<b>CheckMate-274</b>: nivolumab UTUC alt grubunda fayda yok (HR ~1.25). <b>AMBASSADOR</b>: pembrolizumab DFS↑ (üreterde fayda, renal pelviste yok). EAU 2025: platine uygunsuz/reddeden ≥pT3/N+/sınır+ → adjuvan pembrolizumab tartışılır.","cat":"Sistemik","id":"utuc_368","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"Metastatik ürotelyal karsinomda güncel birinci basamak standart tedavi?","options":["Gemsitabin + sisplatin","Enfortumab vedotin + pembrolizumab","Tek ajan atezolizumab","MVAC"],"correct":1,"answer":"<b>Enfortumab vedotin + pembrolizumab</b> (EV-302; OS ~31–34 ay vs ~16 ay) yeni bakım standardıdır. FGFR değişiminde erdafitinib (THOR).","cat":"Sistemik","id":"utuc_369","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"<span class=\"vig\">52 y kadın, bilateral üst sistem tümörü, kronik böbrek yetmezliği, Balkan kökenli.</span>En olası etyolojik faktör?","options":["Sigara","Aristolokik asit","Schistosoma","BK virüs"],"correct":1,"answer":"<b>Aristolokik asit</b> (Balkan endemik nefropatisi / Çin bitkisel ilaç nefropatisi): bilateral, kadın baskın, üst sistem yerleşimli. A→T transversiyon imzası.","cat":"Etyoloji","id":"utuc_370","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"mcq","q":"<span class=\"vig\">48 y erkek, UTUC; annesinde kolon, teyzesinde endometriyum kanseri.</span>Hangi adım uygundur?","options":["Sadece RNU, ek tetkik gereksiz","MMR/MSI testi + genetik danışmaya yönlendirme","Yalnızca PSA takibi","Tüm kolonun profilaktik rezeksiyonu"],"correct":1,"answer":"Genç yaş (&lt;60) + aile Lynch-spektrum öyküsü → <b>Lynch sendromu (HNPCC)</b> taraması: MMR/MSI testi, genetik danışma. En sık MSH2.","cat":"Etyoloji","id":"utuc_371","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"<span class=\"vig\">Özdal hoca tarzı:</span> \"Toplayıcı sistemde transizyonel hücreli karsinom. Cerrahi tedavin ne olur? Tümör üreterin en ucunda ve küçükse ne yaparsın?\"","answer":"","cat":"Sözlü vaka","id":"utuc_372","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"<span class=\"vig\">İlaç ismi sorusu (Mutlu/Özdal tarzı):</span> \"Metastatik ürotelyal kanserde birinci basamak ve sonraki seçenekleri ticari/etken adlarıyla say.\"","answer":"","cat":"Sözlü vaka","id":"utuc_373","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"<span class=\"vig\">Özkürkçügil tarzı:</span> \"Hematüri ile gelen, üst sistemde dolma defekti saptanan hastada nasıl ilerlersin?\"","answer":"","cat":"Sözlü vaka","id":"utuc_374","topic":"utuc","group":0,"topicTitle":"UTUC","src":"","flag":false},{"type":"open","q":"BPH, BPE, BOO, BPO, LUTS — her birinin tanı düzeyi?","answer":"<b>BPH</b>: histolojik (nodüler hiperplazi). <b>BPE</b>: klinik/görüntüleme (büyük bez). <b>BOO</b>: ürodinamik (↑detrusor basıncı + ↓akış). <b>BPO</b>: BPE'ye bağlı BOO. <b>LUTS</b>: klinik semptom şemsiyesi.","cat":"","id":"bph_375","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"EAU neden 'BPH' yerine 'LUTS' odaklı?","answer":"BPH yalnızca <b>histolojik</b> tanı; klinik etiket olarak uygunsuz. Tedavi edilen, LUTS'a neden olduğunda <b>BPO</b> (ürodinamik). 2025 vurgusu: yönetim <b>holistik &gt; sıralı</b>.","cat":"","id":"bph_376","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"LUTS hangi 3 alt gruba ayrılır?","answer":"<b>Depolama</b> (urgency, frekans, noktüri, urge inkontinans), <b>boşaltma</b> (zayıf akım, hezitasyon, ıkınma), <b>işeme-sonrası</b> (terminal/post-void damlama).","cat":"","id":"bph_377","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"DHT hipotezini açıkla.","answer":"Testosteron → stromal hücrede <b>5-AR tip 2</b> → DHT (prostatik androjenin ~%90'ı). DHT proliferasyon/apoptoz dengesini düzenler. Yaşla DHT birikimi → denge proliferasyon lehine → BPH.","cat":"","id":"bph_378","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Hangi zonda glandüler, hangisinde stromal nodüller? Posterior zon?","answer":"<b>Transizyonel zon</b>: glandüler nodüller (ana yer). <b>Periüretral zon</b>: stromal nodüller. <b>Posterior zon</b>: hiperplazi YOK (periferik = kanser bölgesi).","cat":"","id":"bph_379","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"BPH için iki kurulu risk faktörü nedir?","answer":"<b>Yaşlanma</b> ve <b>testiküler androjen</b>. Kastrelerde BPH gelişmez. Diğer: metabolik sendrom, obezite, HT, genetik.","cat":"","id":"bph_380","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"BPH'de cerrahi gerektiren 'sert' komplikasyonlar?","answer":"Refrakter <b>AÜR</b>, <b>mesane taşı</b>, rekürren <b>İYE</b>, refrakter <b>hematüri</b>, <b>hidronefroz/böbrek fonksiyon kaybı</b>, taşma inkontinansı.","cat":"","id":"bph_381","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Her LUTS hastasında yapılması gereken temel testler?","answer":"Öykü+beklenti, <b>IPSS</b>, idrar tahlili, FM+<b>DRE</b>, <b>PVR</b>. PSA yalnız karar değiştirecekse/Ca şüphesinde.","cat":"","id":"bph_382","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"IPSS'in tanısal sınırı nedir?","answer":"Semptomu <b>kantifiye eder</b> ve depolama/boşaltma baskınlığını ayırır ama <b>nedeni (etiyolojiyi) TANIMLAMAZ</b>. Post-void damlama ve inkontinansı ölçmez.","cat":"","id":"bph_383","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"BOO'nun ürodinamik altın standart bulgusu?","answer":"<b>Basınç-akış (PFS)</b>: yüksek detrusor basıncı + düşük akış hızı. DUA = düşük basınç + bozuk akış.","cat":"","id":"bph_384","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Üroflowmetrinin temel kısıtı?","answer":"Qmax düşüklüğü hem <b>BOO</b> hem <b>DUA</b>'da olur → ikisini ayıramaz. >150 mL ile yapılmalı.","cat":"","id":"bph_385","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"MTOPS progresyon prediktörleri (5 parametre)?","answer":"<b>PV ≥31</b> · <b>PSA ≥1.6</b> · <b>Qmax &lt;10.6</b> · <b>PVR ≥39</b> · <b>yaş ≥62</b>.","cat":"","id":"bph_386","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Sistoskopi LUTS'ta ne zaman endike? BOO tanısı koyar mı?","answer":"Yalnız hematüri, striktür veya mesane Ca şüphesi/öyküsünde. <b>BOO tanısı KOYMAZ</b> (kissing lobes/trabekülasyon korelasyonu zayıf).","cat":"","id":"bph_387","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"α1-bloker: basamak, etki hızı, doğal seyre etki?","answer":"<b>1. basamak</b> orta-şiddetli LUTS. <b>Hızlı</b> etki. Hacim/PSA değiştirmez, <b>doğal seyri etkilemez</b>. AÜR sonrası kateteresiz başarıyı ↑.","cat":"","id":"bph_388","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Tamsulosin'in cerrahi açıdan kritik yan etkisi?","answer":"<b>İntraoperatif floppy iris sendromu</b> (katarakt cerrahisi öncesi mutlaka sorgula). Ayrıca retrograd/anejakülasyon.","cat":"","id":"bph_389","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"5-ARI: hacim ve PSA'ya etki, endikasyon, en önemli YE?","answer":"6–12 ayda hacim ~%30 ↓, <b>PSA ~%50 ↓</b>. Endikasyon: <b>PV &gt;40 mL + progresyon riski</b>. Tek hastalık-modifiye edici. En önemli YE: <b>cinsel</b>.","cat":"","id":"bph_390","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Finasterid vs dutasterid izoenzim farkı?","answer":"<b>Finasterid: tip II</b>. <b>Dutasterid: tip I + II</b>. AÜR/cerrahi ihtiyacı azaltmada benzer etkinlik.","cat":"","id":"bph_391","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"5-ARI + PSA takip tuzağı?","answer":"PSA'yı ~%50 düşürür → takipte gerçek değeri <b>2× kabul et</b>. Tedavi altında PSA artışı şüpheli, dikkatle yorumla.","cat":"","id":"bph_392","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Antimuskarinik kime, ne zaman kaçın?","answer":"<b>Baskın depolama semptomu</b> (urgency/frekans). Büyük PVR / belirgin BOO'da dikkatli — PVR'yi artırır, retansiyon riski.","cat":"","id":"bph_393","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"β3-agonistin antimuskarinikten üstünlüğü + kontrendikasyonu?","answer":"<b>PVR'yi artırmaz</b> (post-void rezidüye etki yok). Mirabegron/vibegron. KE: <b>şiddetli kontrolsüz HT</b>.","cat":"","id":"bph_394","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"LUTS'ta hangi PDE5i ruhsatlı, kontrendikasyonları?","answer":"Sadece <b>tadalafil 5 mg/gün</b>. Qmax'a etki zayıf. KE: <b>nitrat, nikorandil, doksazosin/terazosin</b>, yeni Mİ/inme, NAİON.","cat":"","id":"bph_395","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Desmopressin takibinde kritik nokta?","answer":"Noktürnal poliüride. <b>Serum Na: 3. gün, 7. gün ve 1. ay</b> (hiponatremi riski).","cat":"","id":"bph_396","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"α-bloker + 5-ARI kombinasyonu kime? Kanıt?","answer":"Orta-şiddetli LUTS + <b>büyük bez + progresyon riski</b>. Kanıt: <b>MTOPS</b>, <b>CombAT</b> (4 yıl), PREDICT.","cat":"","id":"bph_397","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"Prostat hacmine göre cerrahi algoritma?","answer":"<b>&lt;30 mL</b>: TUIP. <b>30–80 mL</b>: TURP (mono/bipolar). <b>&gt;80 mL</b>: enükleasyon (HoLEP) / basit prostatektomi.","cat":"","id":"bph_398","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"B-TURP vs M-TURP farkları?","answer":"Etkinlik <b>benzer</b>; B-TURP'de perioperatif morbidite ↓. <b>TUR sendromu B-TURP'de yok denecek kadar az</b> (salin irrigasyon).","cat":"","id":"bph_399","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"HoLEP'in avantajları?","answer":"<b>Boyuttan bağımsız</b> etkinlik, açık cerrahiye eşdeğer + daha iyi perioperatif güvenlik, en düşük re-tedavi, <b>antikoagülan hastada</b> avantaj.","cat":"","id":"bph_400","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"PUL (UroLift) için hasta seçim kriterleri?","answer":"<b>PV &lt;70 mL</b>, <b>median lob YOK</b>, ejakülasyon korumak isteyen. Antegrad ejakülasyon korunur.","cat":"","id":"bph_401","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"iTind ve Rezum nasıl çalışır?","answer":"<b>iTind</b>: geçici nitinol cihaz, ~5 gün kalır, <b>bası nekroziyle</b> remodeling. <b>Rezum</b>: su buharı/termal, ayaktan, cinsel fonksiyon korur.","cat":"","id":"bph_402","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"EAU'nun önermediği intraprostatik enjeksiyon?","answer":"<b>İntraprostatik botulinum toksin-A enjeksiyonu ÖNERİLMEZ.</b>","cat":"","id":"bph_403","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"DRE'de büyük olmayan prostat + BOO bulgusu — tanıyı ne koyar?","answer":"Küçük bez de obstrüksiyon yapar (mesane boynu/median lob). Tanıyı <b>PFS koyar: yüksek basınç + düşük akış</b>.","cat":"","id":"bph_404","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"PVR için cerrahi/medikal karar eşiği var mı?","answer":"<b>HAYIR, kesin eşik yok.</b> PVR ↔ LUTS şiddeti korele değil. Uzmanlar 100–300 mL arası önerir.","cat":"","id":"bph_405","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"63 y erkek, idrar akışında azalma ve noktüri. DRE'de prostat büyümüş DEĞİL. Mesane çıkış tıkanıklığını en ikna edici destekleyen ürodinamik bulgu?","options":["Düşük uyumlu aşırı duyarlı mesane","Üretral kapanma basıncının en yüksek olması","Düşük boşaltma basıncıyla tepe akış hızında azalma","Yüksek boşaltma basıncıyla tepe akış hızında azalma"],"correct":3,"answer":"BOO = <b>yüksek detrusor (boşaltma) basıncı + düşük akış</b>. Küçük bez de obstrüksiyon yapar (mesane boynu/median lob); düşük basınç + düşük akış ise DUA'yı düşündürür.","cat":"","id":"bph_406","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"LUTS/BPH takibiyle ilgili hangisi DOĞRU?","options":["Gözlem 2 ay sonra ve her 3 ayda gözden geçirilir","α1-bloker hastaları 6 ay sonra kontrole gelir","Desmopressin'de serum Na 3. ve 7. gün + 1 ay sonra ölçülür","5-ARI monoterapisi 1 hafta sonra ve 3 ayda bir değerlendirilir"],"correct":2,"answer":"Desmopressin → hiponatremi riski → <b>Na: 3. gün, 7. gün, 1. ay</b>. α-bloker kontrolü ~4-6 hafta; 5-ARI yanıtı ~12 haftada değerlendirilir; WW 6. ay sonra yıllık.","cat":"","id":"bph_407","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"Muskarinik reseptör antagonisti hangi hastada düşünülebilir?","options":["Yalnız hafif LUTS'lu erkekte","Yalnız prostat &lt;40 mL'de","Şiddetli BOO'lu erkekte","Baskın mesane depolama semptomu olan erkekte"],"correct":3,"answer":"Antimuskarinik → <b>baskın depolama semptomu</b> (urgency/frekans). Şiddetli BOO/büyük PVR'de retansiyon riski nedeniyle dikkatli.","cat":"","id":"bph_408","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"BOO bulgusu + prostat hacmi 25 mL, kesin cerrahi gereken hasta için önerilen teknik?","options":["TURP veya TUIP","HoLEP","Prostatik üretral kaldırma (PUL)","Lazerle enükleasyon"],"correct":0,"answer":"Küçük bez (&lt;30 mL) → <b>TUIP veya TURP</b>. Enükleasyon büyük bez (&gt;80 mL) için; küçük bezde gereksiz.","cat":"","id":"bph_409","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"LUTS'lu erkeklerde PDE5i + α-bloker, tek α-blokere göre anlamlı olarak neyi iyileştirir?","options":["IPSS","İdrar kalıntısını (PVR)","Ameliyat riskini","AÜR riskini"],"correct":0,"answer":"Kombinasyon <b>IPSS</b>'yi anlamlı iyileştirir. Qmax/PVR'ye etki sınırlı; AÜR/cerrahi riskini azaltan kombinasyon α-bloker+5-ARI'dir.","cat":"","id":"bph_410","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"Mirabegron kullanımının kontrendikasyonu?","options":["PVR &gt;150 mL","Solifenasin ile birlikte","Child-Pugh A karaciğer yetmezliği","Şiddetli ve kontrol altına alınamayan hipertansiyon"],"correct":3,"answer":"β3-agonist mirabegron → <b>şiddetli kontrolsüz HT</b> kontrendike. Antimuskariniğin aksine PVR'yi belirgin artırmaz.","cat":"","id":"bph_411","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"LUTS tedavisinde 5-ARI hakkında hangisi DOĞRU?","options":["2 yılda prostat %50 küçülür","Oral uygulamadan 48 saat sonra maks etki","PV &gt;80 mL en önemli sonuç belirleyicisi","En önemli yan etkiler cinsel işlevle ilgilidir"],"correct":3,"answer":"En önemli YE: <b>cinsel</b> (libido↓, ED, ejakülasyon bozukluğu). Hacim ~%30 küçülür (6-12 ay), etki yavaştır; '48 saat' / '%50 küçülme' yanlış.","cat":"","id":"bph_412","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"Bipolar TURP (salinde rezeksiyon) hakkında hangisi DOĞRU?","options":["Monopolar TURP kanama riskini azaltır","Mono ve bipolar TURP klinik etkinliği karşılaştırılabilir","B-TURP'nin en büyük avantajı daha kısa rezeksiyon süresi","B-TURP'de TUR sendromu daha sık"],"correct":1,"answer":"Mono ve bipolar TURP <b>etkinliği benzer</b>; B-TURP'de perioperatif morbidite ↓ ve <b>TUR sendromu yok denecek kadar az</b> (salin).","cat":"","id":"bph_413","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"54 y, 6 aydır tamsulosin alıyor, minimal düzelme. Ejakülasyon korumak istiyor, dutasterid'i reddetti. IPSS 12, PV 40 mL, median lob YOK, Qmax 9 mL/s. En uygun girişim?","options":["HoLEP","Açık prostatektomi","Prostatik üretral kaldırma (PUL/UroLift)","Radikal prostatektomi"],"correct":2,"answer":"Ejakülasyon korumak isteyen, <b>PV &lt;70 mL, median lob YOK</b> → <b>PUL</b> ideal. Antegrad ejakülasyon korunur.","cat":"","id":"bph_414","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"mcq","q":"70 y, tamsulosin+finasterid'e rağmen şikayetler sürüyor. IPSS 23, PV 120 mL, 25 mm mesane taşı, Qmax 6.4 mL/s. Merkez endoskopik enükleasyon sunmuyor. En uygun?","options":["Tekrar medikal tedavi","TUIP","Transvezikal (Freyer) basit prostatektomi + taş çıkarımı","PUL"],"correct":2,"answer":"Çok büyük bez (&gt;80 mL) + mesane taşı + EEP yok → <b>açık (Freyer) basit prostatektomi</b> + eşzamanlı taş çıkarımı. İlk seçim normalde EEP/HoLEP.","cat":"","id":"bph_415","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"BPH'de cerrahinin MUTLAK/güçlü endikasyonlarını sırala (ilaç ister, yüzeysel konuşma kızdırır).","answer":"<b>Refrakter AÜR</b> (kateteresiz başarısız deneme), <b>mesane taşı</b>, rekürren <b>İYE</b>, refrakter <b>prostatik hematüri</b>, <b>hidronefroz/böbrek fonksiyon kaybı</b>, taşma inkontinansı. Bunlar 'sert' komplikasyonlar = medikal tedaviyi atla.","cat":"","id":"bph_416","topic":"bph","group":1,"topicTitle":"BPH & Erkek LUTS","src":"","flag":false},{"type":"open","q":"60 y, orta-şiddetli LUTS, PV 55 mL, PSA 2.4, progresyon riski yüksek. Reçeteni mantığıyla yaz (pratik klinik yaklaşım).","answer":"<b>α1-bloker</b> (örn. tamsulosin 0.4 mg/gün) hızlı semptom kontrolü için + <b>5-ARI</b> (dutasterid 0.5 mg veya finasterid 5 mg/gün) hacim &gt;40 mL + progresyon riski olduğundan doğal seyri değiştirmek için → <b>kombinasyon</b> (MTOPS/CombA
