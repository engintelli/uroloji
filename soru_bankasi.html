kmak tabloyu kötüleştirir. Tedavi: retraining, biofeedback, pelvik fizyoterapi (gevşetme), bağırsak düzeni.","cat":"EBU MCQ","id":"kadinuroloji_807","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"EAU'ya göre üretral divertikülektomi sırasında bothersome SUI nasıl ele alınmalı?","options":["Sentetik mid-üretral sling","Non-sentetik (otolog) sling, danışmanlıkla","Hiçbir şey yapılmamalı","Bulking ajan"],"correct":1,"answer":"<b>Non-sentetik (otolog) sling.</b> Divertikülektomi alanında sentetik mesh erozyon/fistül riski taşıdığı için otolog sling tercih edilir.","cat":"EBU MCQ","id":"kadinuroloji_808","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Ereksiyonun ana proerektil sinir sistemi ve mediatörü?","answer":"<b>Parasempatik</b> sistem; mediatör <b>nitrik oksit (NO)</b> → guanilat siklaz → <b>cGMP↑</b> → düz kas gevşemesi.","cat":"Fizyoloji","id":"androloji_809","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"cGMP'yi parçalayan enzim ve PDE5i'nin etki mekanizması?","answer":"<b>PDE5</b> cGMP'yi yıkar. PDE5i bu yıkımı engeller; <em>NO üretmez</em> → cinsel uyarı şart.","cat":"Fizyoloji","id":"androloji_810","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Detümesans / flaksitenin ana mediatörü?","answer":"<b>Noradrenalin (α-adrenerjik, sempatik)</b>, ayrıca endotelin-1 ve Rho-kinaz yolağı.","cat":"Fizyoloji","id":"androloji_811","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Testosteron PDE5i yanıtını nasıl etkiler?","answer":"Testosteron PDE5 ekspresyonu ve NO sentazı destekler. Hipogonadalde PDE5i yanıtı↓; <b>TRT yanıtı restore eder</b>.","cat":"Fizyoloji","id":"androloji_812","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"ED'nin NIH 1992 tanımı?","answer":"Tatmin edici cinsel performansa yetecek ereksiyonu <b>sağlayamama ve/veya sürdürememe</b>.","cat":"ED","id":"androloji_813","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"ED'nin sistemik önemi (defans cümlesi)?","answer":"ED <b>kardiyovasküler hastalığın erken habercisidir</b> — ince penil arterler endotel disfonksiyonunu önce gösterir.","cat":"ED","id":"androloji_814","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Psikojenik ED'yi düşündüren ipucu?","answer":"Ani başlangıç, durumsal, partner-spesifik, <b>sabah ereksiyonu/gece tümesansı korunmuş</b>.","cat":"ED","id":"androloji_815","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"En sık organik ED tipi?","answer":"<b>Vaskülojenik</b> (arteriyel + venöz kaçak).","cat":"ED","id":"androloji_816","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"ED'de birinci basamak tedavi?","answer":"<em>Oral PDE5 inhibitörü</em> (yaşam tarzı/etyoloji düzeltmesiyle birlikte).","cat":"ED","id":"androloji_817","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Hangi PDE5i en uzun, hangisi en hızlı etkili?","answer":"En uzun: <b>tadalafil</b> (~17.5 sa / 36 sa). En hızlı: <b>avanafil</b> (~15–30 dk).","cat":"ED","id":"androloji_818","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"PDE5i'nin mutlak kontrendikasyonu?","answer":"<b>Nitrat / NO-donörü</b> ile birlikte kullanım (ölümcül hipotansiyon). α-bloker ile ≥4 sa ara.","cat":"ED","id":"androloji_819","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"ICI tedavisinde tek ruhsatlı ajan ve kombinasyonlar?","answer":"<b>Alprostadil (PGE1, 5–40 µg)</b>; Bimix (papaverin+fentolamin), Trimix (+alprostadil). Yan etki: ağrı ~%50, priapizm ~%1.","cat":"ED","id":"androloji_820","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Penil protezde en korkulan komplikasyon ve memnuniyet oranı?","answer":"En korkulan <b>enfeksiyon (&lt;%3)</b>; hasta+partner memnuniyeti <b>~%90</b>.","cat":"ED","id":"androloji_821","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"PE tanısının üç bileşeni?","answer":"Kısa <b>IELT</b> + <b>kontrol kaybı</b> + <b>negatif kişisel sonuç (distres)</b>.","cat":"PE","id":"androloji_822","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Lifelong vs acquired PE IELT eşikleri?","answer":"Lifelong: hep <b>&lt;~1 dk</b> (AUA: 2 dk). Acquired: belirgin↓, genelde <b>&lt;3 dk</b>.","cat":"PE","id":"androloji_823","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Lifelong PE'de birinci basamak tedavi?","answer":"<em>Dapoksetin</em> (on-demand, PE'de ruhsatlı tek SSRI) <b>veya lidokain/prilokain sprey (Fortacin)</b>.","cat":"PE","id":"androloji_824","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"PE'de ikinci ve üçüncü basamak?","answer":"2.: off-label günlük SSRI (<b>paroksetin en güçlü</b>), klomipramin. 3.: <b>tramadol</b> (dikkatli).","cat":"PE","id":"androloji_825","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Ejakülasyonu inhibe eden nörotransmiter?","answer":"<b>Serotonin (5-HT)</b> → SSRI tedavisinin temeli.","cat":"PE","id":"androloji_826","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"'Kuru orgazm' / retrograd ejakülasyon en sık ilaç nedeni?","answer":"<b>α-blokerler — özellikle silodosin/tamsulosin</b>; ayrıca mesane boynu cerrahisi, DM. Tanı: post-orgazm idrarda sperm.","cat":"PE","id":"androloji_827","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"En sık konjenital primer (hipergonadotropik) hipogonadizm?","answer":"<b>Klinefelter sendromu (47,XXY)</b> — T↓, LH/FSH↑.","cat":"Hipogonadizm","id":"androloji_828","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Kallmann sendromunun ayırt edici özelliği?","answer":"<b>Hipogonadotropik hipogonadizm + anosmi</b> (GnRH eksikliği).","cat":"Hipogonadizm","id":"androloji_829","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"LOH tanısında testosteron eşiği (EAU)?","answer":"Sabah açlık <b>TT &lt;12 nmol/L (~3.5 ng/mL) + semptom</b>; &lt;8 kesin, 8–12 'gri zon'.","cat":"Hipogonadizm","id":"androloji_830","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Hangi belirteç zorunlu ve neden?","answer":"<b>SHBG</b> — obezite/DM'de SHBG↓ total T'yi yanıltır → serbest T (Vermeulen).","cat":"Hipogonadizm","id":"androloji_831","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Primer↔sekonder ayrımı hangi hormonla?","answer":"<b>LH/FSH</b>: yüksek = hipergonadotropik (primer); düşük/uygunsuz normal = hipogonadotropik (sekonder).","cat":"Hipogonadizm","id":"androloji_832","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"TRT'nin mutlak kontrendikasyonları?","answer":"İleri/metastatik prostat ca, meme ca, <b>aktif babalık isteği</b>, <b>Hct ≥%54</b>, kontrolsüz KKY.","cat":"Hipogonadizm","id":"androloji_833","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Fertilite isteyen hipogonadalde kontrendike ilaç ve alternatif?","answer":"<b>Testosteron kontrendike</b> (spermatogenezi baskılar). Yerine <b>klomifen, hCG, hMG, anastrozol</b>.","cat":"Hipogonadizm","id":"androloji_834","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"TRT'de tedaviyi durdurma eşiği?","answer":"<b>Hematokrit &gt;%54</b> → kes / venesection; normalize olunca düşük doz/topikal.","cat":"Hipogonadizm","id":"androloji_835","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Peyronie ile güçlü ilişkili el patolojisi?","answer":"<b>Dupuytren kontraktürü</b> (ortak fibromatöz diyatez).","cat":"Peyronie","id":"androloji_836","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Akut vs kronik faz farkı ve cerrahi zamanı?","answer":"Akut: <b>ağrılı, değişken eğrilik</b> → cerrahi yok. Kronik: <b>≥3 ay stabil</b>, ağrısız → cerrahi adayı.","cat":"Peyronie","id":"androloji_837","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"En güçlü kanıtlı minimal invaziv tedavi ve endikasyonu?","answer":"<b>Kollajenaz C. histolyticum (CCH/Xiapex)</b> — <b>&gt;30° dorsal/lateral eğrilik</b>.","cat":"Peyronie","id":"androloji_838","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Kısaltma vs uzatma cerrahisi?","answer":"Kısaltma: <b>Nesbit/plikasyon</b> (basit eğrilik, ED yok). Uzatma: <b>plak insizyon/eksizyon+greft (Lue)</b> (ciddi).","cat":"Peyronie","id":"androloji_839","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Peyronie + ciddi ED'de 3. basamak çözüm?","answer":"<b>Penil protez (± düzleştirme/modelleme)</b>.","cat":"Peyronie","id":"androloji_840","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Priapizm tanımı (süre)?","answer":"Cinsel uyarıdan bağımsız <b>&gt;4 saat</b> süren patolojik ereksiyon.","cat":"Priapizm","id":"androloji_841","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"İskemik priapizmde kan gazı değerleri?","answer":"<b>Hipoksi + hiperkapni + asidoz</b> (PO₂↓, PCO₂↑, pH↓). Gerçek acil = kompartman sendromu.","cat":"Priapizm","id":"androloji_842","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"İskemik priapizmde basamaklı tedavi?","answer":"1. Aspirasyon ± irrigasyon + <b>intrakavernöz fenilefrin</b> (200 µg, maks 1 mg/sa). 2. <b>Distal şant</b>. 3. Penil protez (&gt;36 sa).","cat":"Priapizm","id":"androloji_843","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Çocukta low-flow priapizmin en sık nedeni?","answer":"<b>Orak hücre hastalığı</b>.","cat":"Priapizm","id":"androloji_844","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Non-iskemik priapizm yaklaşımı?","answer":"Acil değil; çoğu spontan geriler; gerekirse <b>selektif arteriyel embolizasyon</b>. Genelde travma → fistül.","cat":"Priapizm","id":"androloji_845","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"WHO 2021 semen alt referans sınırları?","answer":"Volüm <b>1.4 mL</b> · konsantrasyon <b>16 M/mL</b> · total sayı <b>39 M</b> · total motilite <b>%42</b> · morfoloji <b>%4</b> · vitalite %54.","cat":"İnfertilite","id":"androloji_846","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Sertoli ve Leydig hücrelerinin temel rolleri?","answer":"<b>Sertoli:</b> kan-testis bariyeri, <b>inhibin B</b>, ABP (FSH etkisi). <b>Leydig:</b> LH→testosteron.","cat":"İnfertilite","id":"androloji_847","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Azoospermide OA vs NOA ayrımı?","answer":"<b>OA:</b> normal volüm + <b>normal FSH</b> → rekonstrüksiyon. <b>NOA:</b> küçük testis + <b>FSH↑</b> → micro-TESE → ICSI.","cat":"İnfertilite","id":"androloji_848","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Hangi durumlarda karyotip/genetik test?","answer":"Azoospermi veya ağır oligozoospermi (&lt;5 M): <b>karyotip, Y-mikrodelesyon (AZF), bilateral vas yok → CFTR</b>.","cat":"İnfertilite","id":"androloji_849","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"Varikoselektomi endikasyonu?","answer":"<b>Palpe edilebilir varikosel + anormal semen + infertilite</b>. Subklinik/normal semende rutin onarım yok. (Sol&gt;sağ)","cat":"İnfertilite","id":"androloji_850","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Hangi fosfodiesteraz tip 5 inhibitörünün etki süresi en uzundur?","options":["Vardenafil","Sildenafil","Tadalafil","Avanafil"],"correct":2,"answer":"<b>Tadalafil</b> ~17.5 sa yarı ömür, ~36 saatlik etki ('hafta sonu hapı'). Avanafil en hızlı başlayan, sildenafil yiyecekle emilim azalır.","cat":"","id":"androloji_851","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"İskemik priapizm vakalarında ilk korporal aspiratta tipik kan gazı değerleri nelerdir?","options":["Normoksi, hipokapni, alkaloz","Hipoksi, hiperkapni, asidoz","Hipoksi, hipokapni, alkaloz","Normoksi, hiperkapni, asidoz"],"correct":1,"answer":"İskemik (low-flow) priapizm bir <em>kompartman sendromu</em>dur: akış durur → <b>hipoksi + hiperkapni + asidoz</b>. Non-iskemikte arteriyel benzeri (normoksik) gaz görülür.","cat":"","id":"androloji_852","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Aşağıdaki ilaçlardan hangisi en sık retrograd ejakülasyon ('kuru orgazm') ile ilişkilidir?","options":["Sertralin","Sildenafil","Silodosin","Solifenasin"],"correct":2,"answer":"<b>Silodosin</b> (yüksek seçicilikli α1A-bloker) mesane boynu gevşemesiyle retrograd ejakülasyona en sık yol açar. Tamsulosin de benzer; mesane boynu cerrahisi ve DM diğer nedenler.","cat":"","id":"androloji_853","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Fertilitesini korumak isteyen erkekte hipogonadizm tedavisinde KESİNLİKLE kontrendike ilaç hangisidir?","options":["Anastrozol","Klomifen","İnsan koryonik gonadotropini (hCG)","Testosteron"],"correct":3,"answer":"Egzojen <b>testosteron</b> negatif feedback ile spermatogenezi baskılar → fertilite kaybı. Yerine <em>klomifen (SERM), hCG, hMG, anastrozol</em> ile endojen üretim korunur.","cat":"","id":"androloji_854","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Hangi durum dolaşımdaki SHBG düzeyinde AZALMAYA neden olur?","options":["Yaşlanma","Sigara","Hipertiroidizm","Obezite"],"correct":3,"answer":"<b>Obezite</b> (ve T2DM) SHBG'yi düşürür → total testosteron yanıltıcı düşük çıkar; bu yüzden bu hastalarda <em>serbest testosteron</em> (Vermeulen) ölçülmeli. Yaşlanma ve hipertiroidi SHBG'yi artırır.","cat":"","id":"androloji_855","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Doğuştan primer (hipergonadotropik) hipogonadizmin EN YAYGIN nedeni nedir?","options":["Kallmann sendromu","Noonan sendromu","Klinefelter sendromu","Hemokromatozis"],"correct":2,"answer":"<b>Klinefelter (47,XXY)</b> — en sık konjenital primer hipogonadizm: T↓, LH/FSH↑, küçük sert testis. Kallmann ise hipo<u>gonadotropik</u> (anosmi ile).","cat":"","id":"androloji_856","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi hipergonadotropik hipogonadizmin bir nedenidir?","options":["GnRH agonisti/antagonisti","Östrojenler","Testosteron sentez inhibitörleri","Androjenik anabolik steroidler"],"correct":2,"answer":"<b>Testosteron sentez inhibitörleri</b> (örn. ketokonazol) testis düzeyinde üretimi bozar → kompansatuvar LH/FSH↑ = hiper<u>gonadotropik</u>. Diğer üçü santral baskı yapar → hipogonadotropik.","cat":"","id":"androloji_857","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Erkek infertilitesinde hangi durumda karyotip analizi gereklidir?","options":["Kriptorşizm","Vas deferensin bilateral yokluğu","Vas deferensin tek taraflı yokluğu","Oligozoospermi (<5 milyon/mL)"],"correct":3,"answer":"<b>Ağır oligozoospermi (&lt;5 M/mL)</b> ve azoospermide karyotip + Y-mikrodelesyon endike. Bilateral vas yokluğunda istenen <em>CFTR</em> mutasyon analizidir (karyotip değil).","cat":"","id":"androloji_858","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"63 yaşında, 26 saattir iskemik priapizm; aspirasyon ve intrakavernöz sempatomimetik başarısız, MR'da düz kas nekrozu YOK. En az invaziv uygun İLK cerrahi teknik?","options":["Safen ven – korpus kavernozum anastomozu","Glans – korpus kavernozum arası iletişim (distal şant)","Peno-skrotal dekompresyon","Korpus kavernozum – korpus spongiozum iletişimi"],"correct":1,"answer":"EAU: <b>önce distal şant</b> (korporo-glanüler, ör. T-shunt ± tünelleme) denenir; başarısızsa proksimal/venöz. Nekroz olmadığı için protez henüz endike değil.","cat":"","id":"androloji_859","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"Çocuklarda düşük akımlı (iskemik) priapizm vakalarının çoğunluğu hangi faktörle ilişkilidir?","options":["Lösemi","Lokal travma","Orak hücre hastalığı","Uyuşturucu"],"correct":2,"answer":"<b>Orak hücre hastalığı</b> çocukta low-flow priapizmin en sık nedeni. Lokal travma daha çok <u>non-iskemik (high-flow)</u> priapizm yapar.","cat":"","id":"androloji_860","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"mcq","q":"22 yaşında primer (lifelong) erken boşalma şikayetli erkekte EBU anahtarına göre ilk basamak farmakolojik tedavi?","options":["Sadece psikoterapi","Siproteron asetat","Selektif serotonin geri alım inhibitörü (SSRI)","Frenulotomi"],"correct":2,"answer":"EBU cevabı <b>SSRI</b>. <em>Dikkat (EAU 2025):</em> lifelong PE'de katı 1. basamak <b>dapoksetin</b> (kısa etkili SSRI) ya da <b>lidokain/prilokain sprey</b>; günlük off-label SSRI aslında 2. basamaktır. Mantık doğru, basamak nüansını sözlüde belirt.","cat":"","id":"androloji_861","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"MELİH HOCA — 'Erektil disfonksiyonda ilk basamak tedavi nedir, mekanizmasıyla anlat.'","answer":"","cat":"","id":"androloji_862","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"MELİH HOCA — 'Spermatogenezi sırasıyla say; FSH ve LH nereye etki eder?'","answer":"","cat":"","id":"androloji_863","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"MELİH HOCA — 'Peyronie hastalığında 3. basamak / ileri tedavi nedir?'","answer":"","cat":"","id":"androloji_864","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"VAKA — 'Aspermisi (ejakülat yok) olan hastaya nasıl yaklaşırsın?'","answer":"","cat":"","id":"androloji_865","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"CÜNEYT HOCA — 'Varikoselde ne zaman cerrahi yaparsın, hangi tarafta sık görülür?'","answer":"","cat":"","id":"androloji_866","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"VAKA — 'Azoospermik hastada FSH yüksek, testisler küçük. Tanı ve sperm elde etme yöntemin?'","answer":"","cat":"","id":"androloji_867","topic":"androloji","group":1,"topicTitle":"Androloji & Seksüel Disfonksiyon","src":"","flag":false},{"type":"open","q":"VUR toplumda insidansı?","answer":"~<b>%1</b>. Anatomik ve/veya fonksiyonel bozukluk; tehlike enfekte refü → pyelonefrit → skar → KBH zinciri.","cat":"VUR","id":"vur_868","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Antireflü mekanizmasının tipi ve sayısal anahtarı?","answer":"Pasif <b>flap-valf</b> (detrusor basıncı üreteri ezer). Anahtar: <b>submukozal tünel : üreter çapı ≈ 5:1</b>.","cat":"VUR","id":"vur_869","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Primer vs sekonder VUR?","answer":"<b>Primer:</b> konjenital UVJ yetersizliği (kısa tünel). <b>Sekonder:</b> artmış intravezikal basınç — PUV, nörojen mesane, BBD.","cat":"VUR","id":"vur_870","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Sekonder VUR'da altın yönetim kuralı?","answer":"<b>Önce nedeni düzelt</b> (valf ablasyonu, BBD tedavisi); refü çoğu kez kendiliğinden geriler.","cat":"VUR","id":"vur_871","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Renal hasarın iki ayrı kaynağı?","answer":"<b>1) Konjenital displazi</b> (reflü nefropatisi) — antibiyotikle önlenemez. <b>2) Akkiz post-enfeksiyöz skar</b> — önlenebilir; tedavinin hedefi.","cat":"VUR","id":"vur_872","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"IRSC Grade III nedir?","answer":"Hafif/orta dilatasyon; <b>forniksler hafif künt.</b> (II'de dilatasyon yok, forniks keskin.)","cat":"VUR","id":"vur_873","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Grade IV vs V ayrımı?","answer":"<b>IV:</b> orta dilatasyon + tortuoz üreter, <b>papiller izlenim korunmuş.</b> <b>V:</b> ileri dilatasyon-tortuozite, <b>papiller izlenim kaybı.</b>","cat":"VUR","id":"vur_874","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"\"Dilate refü\" hangi dereceleri kapsar?","answer":"<b>Grade III–V.</b> Klinik kararların çoğu bu eşikte döner.","cat":"VUR","id":"vur_875","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"VUR tanısının altın standardı?","answer":"<b>VCUG</b> — dereceleme + üretra değerlendirmesi (<b>erkekte PUV ekartasyonu</b>). Siklik VCUG duyarlılığı artırır.","cat":"VUR","id":"vur_876","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Kortikal hasarın kantitatif altın standardı?","answer":"<b>DMSA</b> — akut pyelonefrit (perfüzyon defekti), kalıcı skar, split fonksiyon.","cat":"VUR","id":"vur_877","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Top-down yaklaşım nedir?","answer":"Febril İYE sonrası <b>önce DMSA;</b> defekt varsa VCUG. Çok sayıda gereksiz VCUG'dan kaçınılır (klinik önemli VUR zaten iz bırakır).","cat":"VUR","id":"vur_878","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Kardeş ve çocukta (offspring) VUR prevalansı?","answer":"Kardeş ~<b>%27</b>, çocuk ~<b>%36.</b> Bu yüzden aile bilgilendirilir; kardeşte US ile tarama.","cat":"VUR","id":"vur_879","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Cinsiyet paradoksu?","answer":"İYE kızlarda daha sık; ancak İYE'li <b>erkeklerde VUR oranı daha yüksek</b> (~%29 vs %14), daha yüksek dereceli — yine de erkekte <b>daha hızlı geriler.</b>","cat":"VUR","id":"vur_880","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Spontan rezolüsyon lehine faktörler?","answer":"<b>&lt;1 yaş</b> prezentasyon, <b>düşük derece (I–III)</b>, <b>asemptomatik</b> prezentasyon (prenatal HN / kardeş).","cat":"VUR","id":"vur_881","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Spontan rezolüsyon aleyhine (negatif) faktörler?","answer":"<b>Renal kortikal anomali, mesane disfonksiyonu/BBD, breakthrough febril İYE.</b>","cat":"VUR","id":"vur_882","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"RIVUR trial ana sonucu?","answer":"CAP rekürren İYE'yi ~<b>%50 azalttı</b> ama <b>skarı azaltmadı</b> ve <b>direnci artırdı.</b> Fayda esas <b>LUTD'li/tuvalet eğitimli</b> grupta.","cat":"VUR","id":"vur_883","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"CAP rejimi (ilaç + doz)?","answer":"<b>Trimetoprim veya nitrofurantoin</b>, tedavi dozunun ~<b>1/3'ü</b>, günde <b>tek doz</b> (gece).","cat":"VUR","id":"vur_884","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Endoskopik teknikler ve ajan?","answer":"<b>STING</b> (orifis altı) ve <b>HIT</b> (intraüreterik, daha iyi koaptasyon). Ajan: <b>dekstranomer/hiyalüronik asit (Deflux).</b> Başarı dereceyle ters orantılı.","cat":"VUR","id":"vur_885","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Açık cerrahinin genel prensibi ve başarı oranı?","answer":"<b>İntramural üreteri submukozal gömerek uzatmak.</b> Başarı <b>%92–98.</b>","cat":"VUR","id":"vur_886","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"En popüler açık teknik ve dezavantajı?","answer":"<b>Cohen (cross-trigonal).</b> Dezavantaj: ileride üretere <b>retrograd endoskopik erişim zorlaşır.</b>","cat":"VUR","id":"vur_887","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Politano–Leadbetter'in tipik komplikasyonu?","answer":"Mesane dolunca <b>üreter kıvrılması → obstrüksiyon.</b>","cat":"VUR","id":"vur_888","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Lich–Gregoir bilateral eşzamanlı riski?","answer":"Geçici <b>idrar retansiyonu</b> (ekstravezikal). Bilateralde intravezikal teknik tercih edilebilir.","cat":"VUR","id":"vur_889","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Çocukta İYE en sık etkeni?","answer":"<b>E. coli (~%80)</b>, özellikle kızlarda. Erkekte Proteus/Enterococcus/Klebsiella görece artar.","cat":"İYE","id":"vur_890","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"İdrar örneği altın standardı?","answer":"<b>Suprapubik aspirasyon (SPA)</b> — herhangi sayıda koloni anlamlı; en az kontaminasyon.","cat":"İYE","id":"vur_891","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Sonda ve orta akım CFU eşikleri?","answer":"<b>Sonda: 10³–10⁵.</b> <b>Orta akım:</b> semptomluysa >10⁴, semptomsuzsa >10⁵.","cat":"İYE","id":"vur_892","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Tuvalet eğitimsiz çocukta kullanılmayan örnekleme?","answer":"<b>Torba (plastik bag)</b> — yüksek yanlış-pozitif. Steril piyüri → eksik tedavi, taş, <b>TB/Chlamydia.</b>","cat":"İYE","id":"vur_893","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"İlk febril İYE'de US ne zaman?","answer":"<b>İlk 24 saatte</b> (renal-mesane US ile obstrüksiyon ekartasyonu); PVR ölç.","cat":"İYE","id":"vur_894","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"DMSA zamanlaması?","answer":"<b>Akut pyelonefrit: 4–6 hafta</b> (perfüzyon defekti). <b>Kalıcı skar: 3–6 ay.</b>","cat":"İYE","id":"vur_895","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"&lt;2 ay İYE tedavi yolu ve nedeni?","answer":"<b>Parenteral.</b> Ürosepsis + <b>psödohipoaldosteronizm</b>e bağlı hayatı tehdit eden hiponatremi/hiperkalemi riski.","cat":"İYE","id":"vur_896","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"İYE tedavi süresi?","answer":"<b>7–14 gün</b> standart; <b>kısa kurs (1–3 gün) inferior.</b> SCOUT RCT: standart kurs > 5 gün.","cat":"İYE","id":"vur_897","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Tedavi gecikmesi neden önemli?","answer":"<b>&gt;48–72 saat</b> gecikme <b>renal skar riskini artırır.</b>","cat":"İYE","id":"vur_898","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Doğum öncesi tek taraflı hidronefroz tanısı konmuş bir çocuğun doğum sonrası böbrek ultrasonu <b>normal</b> çıkmıştır. Sonraki adım ne olmalıdır?","options":["İşeme sistoüretrografisi (VCUG)","Dört hafta sonra ultrason muayenesi tekrarı","Diüretik renografi","Sürekli antibiyotik profilaksisi"],"correct":1,"answer":"Postnatal US normalse hemen invaziv/ileri tetkike gerek yok; geç ortaya çıkan dilatasyon/refüyü yakalamak için <b>kontrol US</b> yapılır. VCUG ancak US'de patoloji (dupleks, üreterosel, üreter dilatasyonu, kortikal anomali) veya İYE öyküsünde gerekir.","cat":"ebu","id":"vur_899","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Tuvalet eğitimine başlamadan önce, <b>asemptomatik</b> bir çocukta <b>düşük dereceli</b> VUR için en uygun ilk yaklaşım nedir?","options":["Dolgu maddesinin endoskopik enjeksiyonu","Acil cerrahi reimplantasyon için sevk","Konservatif izlem (gözlem) ± profilaksi","İlk gün açık cerrahi"],"correct":2,"answer":"Düşük dereceli, asemptomatik, normal böbrekli VUR'da agresif girişimin (endoskopik/cerrahi) yeri yoktur. EAU yaklaşımı <b>konservatif izlem</b>; infantta uygunsa profilaksi <b>opsiyonel</b>dir (düşük derecede CAP faydası minimaldir). Tuzak şıklar aşırı tedavi.","cat":"ebu","id":"vur_900","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Vezikoüreteral reflü (VUR) için hangi ifade <b>doğrudur</b>?","options":["Skarlı yüksek dereceli VUR mutlaka 1 yaşından önce ameliyat edilmelidir","Yüksek dereceli VUR'un açık ve endoskopik düzeltme sonuçları aynıdır","Hafif, asemptomatik VUR'a her zaman profilaksi verilmelidir","Yüksek dereceli VUR, böbrek hasarı için bir risk faktörüdür"],"correct":3,"answer":"Doğru: <b>yüksek dereceli VUR böbrek hasarı (skar) için risk faktörüdür.</b> Diğerleri aşırı-genelleme/yanlış: yaş zorunluluğu yok; açık cerrahi başarısı endoskopikten yüksektir; hafif asemptomatik VUR'da rutin profilaksi gereksizdir.","cat":"ebu","id":"vur_901","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"<b>Vaka:</b> 5 yaşında kız; tekrarlayan febril İYE, gündüz ıslatma ve kabızlık öyküsü var. US normal, VCUG bilateral grade II VUR gösteriyor. En uygun <b>ilk</b> yaklaşım?","options":["Acil bilateral ureteroneosistostomi","Endoskopik dolgu enjeksiyonu","BBD tedavisi (işeme eğitimi + kabızlık) ± profilaksi","Hiçbir tedavi gerekmez"],"correct":2,"answer":"Tabloda baskın sorun <b>mesane-barsak disfonksiyonu (BBD).</b> LUTD düzeltildiğinde refü daha hızlı geriler ve febril İYE/skar riski düşer. Önce <b>işeme eğitimi + kabızlık tedavisi</b> (±profilaksi); cerrahi/endoskopi ilk basamak değildir.","cat":"oral","id":"vur_902","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Antireflü mekanizmasının yeterliliğini belirleyen sayısal anahtar (submukozal tünel uzunluğu : üreter çapı) yaklaşık kaçtır?","options":["2:1","3:1","5:1","10:1"],"correct":2,"answer":"Sağlıklı pasif flap-valf için <b>tünel:çap ≈ 5:1.</b> Tünel kısaldıkça (lateral/ektopik orifis) valf yetersizleşir → primer VUR.","cat":"oral","id":"vur_903","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"İnfantta idrar kültürü için <b>en az kontamine</b> (altın standart) örnekleme yöntemi hangisidir?","options":["Suprapubik mesane aspirasyonu","Plastik torba (bag)","Orta akım idrar","İlk akım idrar"],"correct":0,"answer":"<b>Suprapubik aspirasyon</b> altın standarttır (herhangi sayıda koloni anlamlı). Tuvalet eğitimsizde <b>torba kullanılmaz</b> (yüksek yanlış-pozitif); sonda alternatiftir.","cat":"oral","id":"vur_904","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"İlk febril İYE geçiren bir infantta önerilen <b>ilk görüntüleme</b> ve zamanlaması nedir?","options":["VCUG, hemen","DMSA, hemen","Renal-mesane ultrason, ilk 24 saatte","IVP, 1 hafta içinde"],"correct":2,"answer":"<b>Renal-mesane US ilk 24 saatte</b> — üst/alt sistem obstrüksiyonunu dışlamak için. DMSA (skar) ve VCUG (VUR) seçilmiş olgularda sonra gelir.","cat":"oral","id":"vur_905","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"<b>2 aylıktan küçük</b> bir bebekte febril İYE tedavisinde uygulama yolu ne olmalıdır?","options":["Oral sefiksim","Parenteral antibiyotik","Tek doz oral","3 günlük kısa oral kurs"],"correct":1,"answer":"<b>&lt;2 ay → parenteral.</b> Ürosepsis ve ciddi pyelonefrit insidansı yüksektir; ayrıca İYE'ye bağlı <b>psödohipoaldosteronizm</b> hayatı tehdit eden hiponatremi/hiperkalemi yapabilir.","cat":"ebu","id":"vur_906","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"RIVUR trial'in ana sonucu hangisidir?","options":["CAP febril İYE'yi azaltır ancak renal skarı önlemez","CAP renal skarı yarı yarıya azaltır","Profilaksi tümüyle gereksizdir","Profilaksi cerrahiden üstündür"],"correct":0,"answer":"RIVUR: sürekli profilaksi <b>rekürren İYE'yi ~%50 azalttı</b> ama <b>skarı azaltmadı</b> ve direnci artırdı. Fayda esas LUTD'li/tuvalet eğitimli grupta görüldü.","cat":"oral","id":"vur_907","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Erkek bebekte VCUG'un VUR derecelendirmesi dışında <b>zorunlu</b> olmasının başlıca nedeni nedir?","options":["Mesane kapasitesini ölçmek","Posterior üretral valv (PUV) ekartasyonu","Üreterosel saptamak","Divertikül ölçmek"],"correct":1,"answer":"Erkek bebekte VCUG işeme fazında üretrayı gösterir → <b>PUV ekartasyonu.</b> Sekonder VUR'un en önemli infravezikal nedeni PUV'dur.","cat":"oral","id":"vur_908","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Açık antireflü cerrahisinde <b>en popüler/güvenilir</b> intravezikal teknik hangisidir?","options":["Politano–Leadbetter","Cohen (cross-trigonal)","Lich–Gregoir","Glenn–Anderson"],"correct":1,"answer":"<b>Cohen (cross-trigonal)</b> en yaygın tekniktir. Tek dezavantajı ileride üretere retrograd endoskopik erişimin zorlaşmasıdır. Politano-Leadbetter'da obstrüksiyon (kıvrılma) riski yüksektir.","cat":"oral","id":"vur_909","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"\"Top-down\" yaklaşımda febril İYE sonrası yapılan <b>ilk</b> tetkik nedir?","options":["VCUG","DMSA","Ultrason","VUDS"],"correct":1,"answer":"Top-down'da önce <b>DMSA</b> (akut pyelonefriti/böbrek tutulumunu göster); defekt varsa VCUG. Böylece çok sayıda gereksiz VCUG'dan kaçınılır.","cat":"oral","id":"vur_910","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Çocukta basit febril İYE/pyelonefrit tedavisinde önerilen tedavi süresi nedir?","options":["Tek doz","1–3 gün","7–14 gün","21 gün"],"correct":2,"answer":"<b>7–14 gün</b> standarttır; kısa kurs (1–3 gün) inferiordur (SCOUT RCT da standart kursun üstünlüğünü doğruladı). Geç tedavi (>48–72 saat) skar riskini artırır.","cat":"ebu","id":"vur_911","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Sekiz yaşında erkek çocuk, 4 saat önce başlayan sol testis ağrısıyla geliyor; sol hemiskrotum hassas-şiş, deri kızarık. En uygun sonraki adım?","options":["Antibiyotik başla","Acil skrotal eksplorasyon","Önce idrar kültürü ve gözlem","24 saat analjezi ile izlem"],"correct":1,"answer":"Klinik <b>testis torsiyonu</b> ile uyumlu ve süre kritik (salvaj penceresi). Yüksek şüphede tetkikle zaman kaybetmeden <b>acil skrotal eksplorasyon</b> yapılır.","cat":"ebu","id":"vur_912","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Miyelomeningoselde üst üriner sistemi <b>en ciddi şekilde</b> tehdit eden veziko-üretral disfonksiyon tipi hangisidir?","options":["Az çalışan detrusor + inaktif sfinkter","Aşırı aktif detrusor + inaktif sfinkter","Az çalışan detrusor + aşırı çalışan sfinkter","Aşırı aktif detrusor + aşırı aktif sfinkter (DSD)"],"correct":3,"answer":"<b>Detrusor aşırı aktivitesi + sfinkter aşırı aktivitesi (detrusor-sfinkter dissinerjisi)</b> yüksek depolama/işeme basıncı yaratır → VUR, hidronefroz, böbrek hasarı. En tehlikeli ürodinamik patern budur.","cat":"ebu","id":"vur_913","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi <b>steril piyüri</b> nedeni <b>değildir</b>?","options":["Eksik/yetersiz antibiyotik tedavisi","Ürolitiyazis / yabancı cisim","Üriner tüberküloz","İzole grade I VUR"],"correct":3,"answer":"Steril piyüri nedenleri: eksik tedavi, taş/yabancı cisim, <b>TB</b>, Chlamydia. İzole düşük dereceli VUR tek başına steril piyüri nedeni değildir.","cat":"oral","id":"vur_914","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"mcq","q":"Konjenital inmemiş testiste orşiopeksinin önerilen zamanı nedir?","options":["6 aydan önce","6–18 ay arası (12 ayda ideal, en geç 18 ay)","3–5 yaş arası","Ergenlikten sonra"],"correct":1,"answer":"Fertilite potansiyelini korumak ve malignite riskini azaltmak için testis <b>12 ayda (en geç 18 ay)</b> skrotuma indirilmelidir.","cat":"ebu","id":"vur_915","topic":"vur","group":2,"topicTitle":"VUR & Çocukta İYE","src":"","flag":false},{"type":"open","q":"Erkek yenidoğanda en sık konjenital mesane çıkım obstrüksiyonu nedir; çocukta hangi işlemin en sık ürolojik nedenidir?","answer":"<b>PUV</b>. Çocukta <b>renal transplantasyonun en sık ürolojik nedeni</b>.","cat":"puv","id":"konjenital_916","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Young sınıflamasında en sık tip ve özellikleri?","answer":"<b>Tip 1 (~%95):</b> verumontanumdan başlayan leafletler. Tip 2 obstrüktif değil; Tip 3 (~%5–10) anüler delikli membran.","cat":"puv","id":"konjenital_917","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"COPUM nedir, kime aittir?","answer":"<b>Dewan (1993):</b> tüm PUV'lerin aslında orta hat delikli konjenital obstrüktif posterior üretral membran olduğu; tip 1 görünümü aletleme travmasıyla.","cat":"puv","id":"konjenital_918","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Antenatal USG'de patognomonik bulgu ve postnatal altın standart tetkik?","answer":"Antenatal: <b>keyhole (anahtar deliği) işareti</b> (bilateral HN + kalın distandü mesane + dilate post. üretra). Postnatal: <b>VCUG</b> (en önemli).","cat":"puv","id":"konjenital_919","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"PUV'de renal hasarın hangi komponenti geri dönüşsüz, hangisi reversibl?","answer":"<b>Renal displazi geri dönüşsüz</b> (nihai fonksiyonu belirler). <b>Tübüler hasar potansiyel reversibl</b> (erken des-obstrüksiyonla).","cat":"puv","id":"konjenital_920","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"\"Valve bladder syndrome\" kime ait, mekanizması?","answer":"<b>Mitchell (1982).</b> Detrusor hipertrofisi → yüksek basınç → kompliyans/kontraktilite kaybı + artan rezidü + latent poliüri kısır döngüsü.","cat":"puv","id":"konjenital_921","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"PUV mesane disfonksiyonu yaşla nasıl değişir?","answer":"Bebeklikte aşırı aktivite + kötü kompliyans → <b>puberte sonrası miyojenik yetmezlik baskın</b> (dinamik süreç).","cat":"puv","id":"konjenital_922","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"PUV'li yenidoğanda ilk basamak ve kateter seçimi?","answer":"<b>5–7 gün mesane drenajı</b>. <b>Foley YOK</b> (balon spazm/obstrüksiyon) → <b>Coudé</b> uçlu kateter.","cat":"puv","id":"konjenital_923","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Tercih edilen definitif ilk tedavi ve teknik?","answer":"<b>Endoskopik valv ablasyonu</b>: infant rezektoskopla <b>5–7–12 saat</b> pozisyonlarında insizyon. Amaç çıkarmak değil asılılığı bozmak.","cat":"puv","id":"konjenital_924","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"İlk yıl iyi prognoz için kreatinin eşiği?","answer":"<b>Kreatinin nadir <0.8 mg/dL</b> (1. yıl) = iyi prognoz; diversiyon kararında da kullanılır.","cat":"puv","id":"konjenital_925","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"VURD sendromu nedir; \"pop-off\" hipotezi geçerli mi?","answer":"Tek taraflı masif VUR + ipsilateral nonfonksiyone displastik böbrek. \"Pop-off\" (karşı böbreği koruma) <b>tartışmalı/kanıtlanmamış</b>.","cat":"puv","id":"konjenital_926","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"V-A şant neyi iyileştirir, neyi iyileştirmez (PLUTO)?","answer":"<b>Perinatal sağkalımı artırabilir</b>; <b>renal fonksiyon prognozunu iyileştirdiği kanıtlanmadı</b> (PLUTO/Morris 2013).","cat":"puv","id":"konjenital_927","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Üreterin en sık konjenital anomalisi, taraf ve cinsiyet?","answer":"<b>UPJ obstrüksiyonu</b>. <b>Sol</b> ağırlıklı, erkek > kız (2–3×).","cat":"upj","id":"konjenital_928","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"İntrinsik vs ekstrinsik UPJ; hangisi büyük çocuk/erişkinde en sık?","answer":"İntrinsik = adinamik segment (kollajen↑) — yenidoğanda en sık. <b>Ekstrinsik = çaprazlayan alt pol damarı</b> — büyük çocuk/erişkinde en sık.","cat":"upj","id":"konjenital_929","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Diüretik renografide kötü drenaj obstrüksiyon kanıtı mıdır?","answer":"<b>Hayır.</b> Kötü drenaj sadece geç boşalma olabilir. <b>İyi drenaj = obstrüksiyon yokluğunun</b> göstergesidir.","cat":"upj","id":"konjenital_930","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"UPJ obstrüksiyonunda cerrahi endikasyonları?","answer":"Semptom (ağrı/piyelonefrit/taş), progresif dilatasyon, <b>fonksiyon kaybı >%10</b> veya <b>ipsilateral fonksiyon <%40</b>. Yaş sınırı yok.","cat":"upj","id":"konjenital_931","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Altın standart cerrahi ve başarısı?","answer":"<b>Anderson-Hynes dismembered pyeloplasti, başarı >%96.</b> Lap/RALP >6–12 ayda eşdeğer.","cat":"upj","id":"konjenital_932","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Endopyelotomi hangi durumlarda yapılmaz?","answer":"<b>Ekstrinsik nedende</b> ve darlık <b>>1.5 cm</b> ise. Çocukta başarı düşük.","cat":"upj","id":"konjenital_933","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Duplike sistemde UPJ genelde hangi polü etkiler?","answer":"<b>Alt pol.</b> (Üst pol UPJ çok nadir.)","cat":"upj","id":"konjenital_934","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Megaüreter tanımı ve primer 4 kategori?","answer":"Çap <b>>7 mm</b> (normal <5). Primer: <b>refluxing, obstructing, refluxing-obstructing, non-refluxing non-obstructing</b>.","cat":"mega","id":"konjenital_935","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Sekonder megaüreter nedenleri?","answer":"İnfravezikal obstrüksiyon (<b>PUV</b>), <b>nörojen mesane</b>, poliüri (diabetes insipidus), enfeksiyon.","cat":"mega","id":"konjenital_936","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Primer megaüreterde ilk yaklaşım nedir; spontan rezolüsyon oranı?","answer":"İlk seçenek <b>cerrahi DEĞİL</b> — <b>~%85 spontan rezolüsyon</b>. İzlem + (non-obstrüktifte) ilk yıl CAP.","cat":"mega","id":"konjenital_937","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Cerrahi endikasyonları?","answer":"Fonksiyon <b><%40</b> veya kayıp <b>>%5</b>, HUN artışı, tekrarlayan İYE/taş/semptom, üreter <b>>10–15 mm</b>.","cat":"mega","id":"konjenital_938","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Tercih edilen tapering yöntemi ve hedef oran?","answer":"<b>Hendren eksizyonel tapering</b> (8–10F üzerinde), submukozal tünel:orifis <b>3–5:1</b>. Reimplant: Cohen. Plikasyon sadece orta dilatasyonda.","cat":"mega","id":"konjenital_939","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Üreterosel embriyolojisi, cinsiyet ve duplex ilişkisi?","answer":"İntravezikal submukozal üreterin kistik dilatasyonu (<b>Chwalla membranı</b>). <b>Kız>erkek 4–7×</b>; <b>%80 duplex üst pol</b>.","cat":"uret","id":"konjenital_940","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"En sık üreterosel tipi?","answer":"<b>Ektopik (ekstravezikal) — >%80</b>: mesane boynu/üretraya uzanır, prolabe olabilir. Ortotopik (intravezikal) ~%15.","cat":"uret","id":"konjenital_941","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Weigert–Meyer kuralı?","answer":"Üst pol üreteri → <b>medial+inferior</b>, obstrüksiyon/üreterosel. Alt pol üreteri → <b>lateral+superior</b>, VUR.","cat":"uret","id":"konjenital_942","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Febril/obstrükte üreteroselde ilk girişim ve olası komplikasyonu?","answer":"<b>Acil endoskopik insizyon/punktür</b>. Komplikasyon: üst pole <b>VUR</b> açabilir.","cat":"uret","id":"konjenital_943","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"VCUG'de duplex + üreterosele özgü klasik görünüm?","answer":"Alt pol reflüsü + dilate üst polün ittiği \"<b>drooping lily (düşen zambak)</b>\" görünümü.","cat":"uret","id":"konjenital_944","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Ektopik üreterde cinsiyet oranı ve duplex ilişkisi?","answer":"<b>Kız:erkek = 5:1</b>; %80 komplet duplikasyon; erkekte ~%50 tek sistem.","cat":"ekt","id":"konjenital_945","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Erkek ektopik üreterde inkontinans olur mu? Neden?","answer":"<b>Olmaz.</b> Orifis <b>asla eksternal sfinkterin distalinde değildir</b> (posterior üretra/utrikül/seminal vezikül/vas).","cat":"ekt","id":"konjenital_946","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Kızda klasik ektopik üreter tablosu?","answer":"<b>Sürekli (continuous) ıslaklık + normal işeme</b>. Orifis vestibül/vajen/üretrada (sfinkter distalinde olabilir).","cat":"ekt","id":"konjenital_947","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"Nonfonksiyone üst pol + tekrarlayan enfeksiyonda definitif tedavi?","answer":"<b>Heminefroüreterektomi.</b> Fonksiyon korunmaya değerse üreteroüreterostomi/üreteropyelostomi/reimplant.","cat":"ekt","id":"konjenital_948","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Doğum öncesi tek taraflı hidronefroz tanılı bir bebeğin doğum sonrası böbrek USG'si NORMAL çıkıyor. Sıradaki adım?","options":["İşeme sistoüretrografisi (VCUG)","4–6 hafta sonra USG tekrarı","Diüretik renografi","Sürekli antibiyotik profilaksisi"],"correct":1,"answer":"<b>4–6 haftada USG tekrarı.</b> Tek bir erken postnatal USG patolojiyi dışlamaz; ilk USG zaten >48 saat sonra yapılmalı (yenidoğan dehidratasyonu dilatasyonu maskeler). İzole, normal mesaneli tek taraflı HN'de rutin VCUG/renografi endike değil. <span class='trap'>Tuzak: banka 'VCUG' diyebilir — yanlış.</span>","cat":"ebu","id":"konjenital_949","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Kerem Hoca / resimden vaka) VCUG'de kalın trabeküle mesane, divertiküller ve işeme fazında dilate posterior üretrada ani daralma. Erkek yenidoğan. Tanı ve ilk basamak?","options":["UPJ obstrüksiyonu — pyeloplasti","PUV — 5–7 gün mesane drenajı, sonra valv ablasyonu","Üreterosel — endoskopik insizyon","Megaüreter — üreteral reimplant"],"correct":1,"answer":"<b>PUV.</b> İlk basamak transüretral kateterle 5–7 gün drenaj + stabilizasyon, sonra endoskopik valv ablasyonu. <span class='trap'>Foley değil, Coudé uçlu kateter.</span>","cat":"hoca","id":"konjenital_950","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"PUV'li yenidoğanda kötü prognozu en iyi öngören laboratuvar parametresi?","options":["Doğumdaki ilk 48 saat kreatinini","1. yıl nadir (en düşük) kreatinin değeri","Tek bir BUN ölçümü","İdrar dansitesi"],"correct":1,"answer":"<b>1. yıl nadir kreatinin.</b> <0.8–1 mg/dL = iyi prognoz. İlk 48 saat kreatinin anne fonksiyonunu yansıtır, yanıltır.","cat":"ebu","id":"konjenital_951","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Özdal Hoca: sınıflama ister) Young sınıflamasında EN SIK PUV tipi ve oranı?","options":["Tip 1, ~%95","Tip 2, ~%50","Tip 3, ~%30","Tip 3, ~%95"],"correct":0,"answer":"<b>Tip 1 (~%95):</b> verumontanumdan başlayan leafletler. Tip 2 obstrüktif değil (artık valv sayılmaz); Tip 3 ~%5–10 anüler membran.","cat":"hoca","id":"konjenital_952","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Üreterin en sık konjenital anomalisi olan UPJ obstrüksiyonunda büyük çocuk/erişkinde EN SIK etyolojik neden?","options":["İntrinsik adinamik segment","Çaprazlayan alt pol damarı (ekstrinsik)","Üreterosel","Taş"],"correct":1,"answer":"<b>Çaprazlayan alt pol damarı.</b> İntrinsik adinamik segment yenidoğanda en sık; ekstrinsik (damar) ise büyük çocuk/erişkinde en sık. Seçili olguda vascular hitch.","cat":"ebu","id":"konjenital_953","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Vaka) MAG-3 diüretik renografide sol böbrek washout eğrisi 'obstrüktif' ama split fonksiyon %44 ve stabil, semptom yok. En doğru yaklaşım?","options":["Hemen pyeloplasti","Konservatif izlem (seri USG + skintigrafi)","Nefrektomi","Endopyelotomi"],"correct":1,"answer":"<b>Konservatif izlem.</b> Kötü/obstrüktif drenaj tek başına obstrüksiyon kanıtı değildir. Fonksiyon >%40 ve stabil + semptomsuz → izlem. Cerrahi: fonksiyon <%40, kayıp >%10, semptom veya progresif dilatasyon.","cat":"hoca","id":"konjenital_954","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"UPJ obstrüksiyonunda altın standart cerrahi ve yaklaşık başarı oranı?","options":["Endopyelotomi, ~%70","Anderson-Hynes dismembered pyeloplasti, >%96","Nefrektomi, %100","Balon dilatasyon, ~%85"],"correct":1,"answer":"<b>Anderson-Hynes, >%96.</b> Endopyelotomi ekstrinsikte ve >1.5 cm darlıkta yapılmaz; çocukta gözden düştü. Lap/RALP >6–12 ayda eşdeğer.","cat":"ebu","id":"konjenital_955","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Cüneyt Hoca / anomali) Megaüreter tanımı (üreter çapı) ve primer megaüreterde spontan rezolüsyon oranı?","options":[">5 mm; ~%50","≥7 mm; ~%85","≥10 mm; ~%30","≥15 mm; ~%95"],"correct":1,"answer":"<b>>7 mm (normal <5); ~%85 spontan rezolüsyon.</b> Bu yüzden ilk seçenek cerrahi değil — izlem ± (non-obstrüktifte) ilk yıl CAP.","cat":"hoca","id":"konjenital_956","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Obstrüktif primer megaüreterde cerrahi endikasyonu OLMAYAN seçenek?","options":["Diferansiyel fonksiyon <%40","Seri takipte >%5 fonksiyon kaybı","Tekrarlayan febril İYE","Tek seferlik normal USG + asemptomatik"],"correct":3,"answer":"<b>Asemptomatik + normal seyir cerrahi gerektirmez.</b> Endikasyonlar: fonksiyon <%40, kayıp >%5, HUN artışı, tekrarlayan İYE/taş/semptom, üreter >10–15 mm.","cat":"ebu","id":"konjenital_957","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Vaka) 8 yaş kız, intermittan sağ kolik, retrovezikal üreter 30 mm, MAG-3 obstrüktif, distalde 2 cm adinamik segment. En uygun definitif cerrahi?","options":["Sadece nefrostomi","Hendren eksizyonel tapering + Cohen reimplant","Endopyelotomi","Üst pol heminefrektomi"],"correct":1,"answer":"<b>Hendren tapering + Cohen üreteroneosistostomi.</b> Adinamik segment eksize edilir, üreter devaskülarize edilmeden incelir (tünel:orifis 3–5:1). Masif dilatasyonda plikasyon önerilmez.","cat":"hoca","id":"konjenital_958","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Üreterosel hangi popülasyonda ve hangi sistemde daha sıktır?","options":["Erkek; tek sistem alt pol","Kız (4–7×); duplex üst pol (%80)","Erkek; duplex alt pol","Kız; tek sistem üst pol"],"correct":1,"answer":"<b>Kız > erkek 4–7×; %80 duplex üst pol üreteri.</b> Weigert-Meyer: üst pol → medial/inferior, obstrüksiyon/üreterosel; alt pol → lateral/superior, VUR.","cat":"ebu","id":"konjenital_959","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Kerem Hoca) Febril İYE + mesane boynu obstrüksiyonu yapan ektopik üreteroselde ilk girişim ve bilinmesi gereken komplikasyonu?","options":["Hemen total rekonstrüksiyon","Acil endoskopik insizyon/punktür — üst pole VUR açabilir","Sadece gözlem","Bilateral nefrektomi"],"correct":1,"answer":"<b>Acil endoskopik insizyon/punktür.</b> Dekompresyon sağlar, ileri rekonstrüksiyonu kolaylaştırır; ancak <span class='trap'>üst pole VUR açabilir</span> ve ektopik üreteroselde reoperasyon intravezikalden daha sık.","cat":"hoca","id":"konjenital_960","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi ektopik üreterli bir ERKEK hastada BEKLENMEZ?","options":["Epididimit","Sürekli (continuous) idrar inkontinansı","Posterior üretraya açılan orifis","Tekrarlayan İYE"],"correct":1,"answer":"<b>Sürekli inkontinans beklenmez.</b> Erkekte ektopik orifis asla eksternal sfinkterin distalinde değildir (post. üretra/utrikül/seminal vezikül/vas) → kontinans korunur. Sürekli ıslaklık klasik olarak kız hastada görülür.","cat":"ebu","id":"konjenital_961","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Vaka) Kız çocuk, doğumdan beri devamlı ıslaklık ama normal aralıklı işeme de var. USG'de duplex sol böbrek. En olası tanı?","options":["Stres inkontinansı","Vajinal/vestibüler açılan ektopik üreter","Nörojen mesane","PUV"],"correct":1,"answer":"<b>Ektopik üreter</b> (üst pol üreteri sfinkter distalinde — vestibül/vajen). Normal işeme + sürekli ıslaklık = klasik kız ektopik üreter tablosu. MRU orifisi göstermede en duyarlı.","cat":"hoca","id":"konjenital_962","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"PUV'li hastada üst sistem hasarında hangisi GERİ DÖNÜŞSÜZ kabul edilir?","options":["Tübüler hasar","Renal displazi","Hidronefroz","Geçici kreatinin yüksekliği"],"correct":1,"answer":"<b>Renal displazi geri dönüşsüz</b> ve nihai fonksiyonu belirler. Tübüler hasar potansiyel reversibldir; erken des-obstrüksiyonla iyileşebilir.","cat":"ebu","id":"konjenital_963","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"mcq","q":"(Sözlü) Bilateral hidronefroz + distandü kalın mesane saptanan ERKEK yenidoğanda ilk USG ne zaman yapılmalı? (genel kuralın istisnası)","options":["48 saatten sonra beklenir","Taburculuk öncesi, ilk 48 saatte (PUV/LUTO şüphesi)","1 ay sonra","Sadece ateş olursa"],"correct":1,"answer":"<b>İlk 48 saatte, taburculuk öncesi.</b> Genel kural >48 saattir (dehidratasyon maskeler) ama bilateral HN + erkek = PUV/LUTO şüphesi → acil dekompresyon gerekebilir, mesane+posterior üretra hemen değerlendirilir.","cat":"hoca","id":"konjenital_964","topic":"konjenital","group":2,"topicTitle":"Konjenital Obstrüksiyon","src":"","flag":false},{"type":"open","q":"İnişin üç fazı ve baskın sinyal nedir?","answer":"<b>① Transabdominal</b> (ringe kadar): <b>INSL3–RXFP2</b>, androjenden bağımsız. <b>② Processus vaginalis + inguinal kanal</b> gelişimi. <b>③ Transinguinal</b> (skrotuma): <b>androjen-bağımlı</b>, genitofemoral sinir/CGRP. ~35. haftada biter.","cat":"k","id":"disgenital_965","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Retraktil ile inmemiş testisi nasıl ayırırsın?","answer":"<b>Retraktil:</b> kremasterik refleksle çıkar, manipülasyonla skrotumda <b>kalır</b> → tedavi yok. Ancak <b>ascending</b> testise dönüşebileceği için <b>puberteye dek yıllık takip</b>.","cat":"k","id":"disgenital_966","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Bilateral nonpalpabl testisli yenidoğanda ilk düşünce?","answer":"<b>Acil endokrin workup.</b> Amaç: virilize 46,XX <b>KONJENİTAL ADRENAL HİPERPLAZİ (CAH)</b> dışlamak — tuz kaybı <b>fatal</b>. Karyotip, hCG stim. testi, AMH/inhibin B, 17-OHP, elektrolit.","cat":"k","id":"disgenital_967","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"İnmemiş testiste görüntülemenin yeri nedir?","answer":"<b>Rutin önerilmez</b> — US duyarlılık/özgüllüğü düşük, <b>cerrahi kararı değiştirmez</b>. AUA: yapma. EAU: yalnız seçili durum (DSD'de Müllerian yapı).","cat":"k","id":"disgenital_968","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Orşiopeksi zamanlaması ve gerekçesi?","answer":"<b>&lt;12 ay, en geç 18 ay</b> (gestasyona düzeltilmiş). <b>Neden?</b> 12–18 ayda germ &amp; Leydig hücre kaybı progresif; Ad spermatogonia dönüşümü bozulur. EAU: Strong.","cat":"k","id":"disgenital_969","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Fertilite: unilateral vs bilateral fark?","answer":"<b>Unilateral:</b> fertilite oranı ↓ ama <b>paternite korunur</b>. <b>Bilateral:</b> paternite de anlamlı ↓.","cat":"k","id":"disgenital_970","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Malignite riski: yaş ve en sık histoloji?","answer":"<b>Erken (prepubertal) orşiopeksi riski azaltır</b>; geç orşiopekside risk belirgin artar (Pettersson). En sık histoloji <b>seminom</b>. Cerrahi sonrası lenfatik drenaj iliak/inguinale kayar.","cat":"k","id":"disgenital_971","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Hormonal tedavi (hCG/GnRH) iniş için önerilir mi?","answer":"<b>Hayır — standart değil.</b> EAU unilateral UDT'de iniş amacıyla <b>önermez</b>; başarı düşük.","cat":"k","id":"disgenital_972","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Palpabl testiste orşiopeksinin kritik teknik adımları?","answer":"<ul><li>Kremasterik lifler bölünür, gubernaculum ayrılır</li><li><b>Patent PV mutlaka ligatlanır</b> (atlanması = başarısızlık)</li><li>Gerginlik → <b>Prentiss manevrası</b></li><li>Fiksasyon tunika vaginalis–dartos; <b>albuginea'ya dikiş yok</b></li></ul>","cat":"k","id":"disgenital_973","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Nonpalpabl testiste altın standart tanı yöntemi?","answer":"<b>Diagnostik laparoskopi.</b> Kör damar → vanishing (ek işlem yok); yüksek intraabdominal → <b>Fowler-Stephens</b> (iki aşama tercih).","cat":"k","id":"disgenital_974","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Fowler-Stephens işlemi hangi dolaşıma güvenir?","answer":"Testiküler damar bölünür; dolaşım <b>vas deferensin deferensiyal arteri + kremasterik/gubernakular kollaterallere</b> bırakılır. İki aşamada atrofi oranı tek aşamadan düşük.","cat":"k","id":"disgenital_975","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Vanishing testiste kontralateral hipertrofinin anlamı?","answer":"Kompansatuar hipertrofi <b>monorşiyi öngörür</b> (~%90) <b>ama cerrahi eksplorasyonu KALDIRMAZ</b>. Sebep: intrauterin torsiyon → kör damarlar.","cat":"k","id":"disgenital_976","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Hipospadias triadı?","answer":"<b>① Ektopik (proksimal) meatus ② ventral kurvatür (chordee) ③ dorsal kukuletalı prepuce.</b>","cat":"h","id":"disgenital_977","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Ağır hipospadias + impalpabl testis görünce ne yaparsın?","answer":"<b>Derhal genetik + endokrin DSD workup</b>; özellikle <b>CAH (fatal)</b> dışla. Ve <b>sünneti ERTELE</b> (prepuce greft kaynağı).","cat":"h","id":"disgenital_978","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Anatomik sınıflama ve en sık tip?","answer":"<b>Distal-anterior</b> (glanüler/koronal/subkoronal) — <b>en sık</b>; orta (penil); proksimal-posterior (penoskrotal/skrotal/perineal). <b>Degloving sonrası yeniden sınıfla.</b>","cat":"h","id":"disgenital_979","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Primer onarım yaşı?","answer":"<b>6–18 (max 24) ay.</b> Prepubertal TIP'te yaş komplikasyon riskini artırmaz; erişkinde komplikasyon belirgin yüksek.","cat":"h","id":"disgenital_980","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"En sık kullanılan distal teknik ve mantığı?","answer":"<b>TIP/TIPU (Snodgrass, 1994):</b> üretral plak orta hatta longitudinal insize edilip <b>tübülarize</b> edilir. Plak korunur; spongioplasti + dartos flep fistülü azaltır.","cat":"h","id":"disgenital_981","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Proksimal hipospadiasta iki aşamalı onarımın adı?","answer":"<b>Bracka</b> — prepusyal greft/fleple plak oluşturulur, <b>2. seansta tübülarize</b> edilir. Şiddetli kurvatür + plak transeksiyonu gerekiyorsa tercih.","cat":"h","id":"disgenital_982","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Kurvatür (chordee) yönetimi basamakları?","answer":"<ul><li>Skin chordee → <b>degloving</b></li><li>Gerçek chordee → ventral konnektif doku eksizyonu</li><li>Rezidüel hafif → <b>dorsal plikasyon (Nesbit)</b></li><li>&gt;45° + kısa plak → <b>ventral penil uzatma</b> (tunika vaginalis greft)</li></ul>","cat":"h","id":"disgenital_983","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Preop testosteron ne zaman, neden kesilir?","answer":"Küçük penis/glans, kısa plakta verilir. Yara iyileşmesini bozar + kanama artırır → <b>cerrahiden 1–2 ay önce kes</b>.","cat":"h","id":"disgenital_984","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"En sık komplikasyon ve bağımsız risk faktörleri?","answer":"<b>Üretrokutanöz fistül.</b> Risk: <b>glans &lt;14 mm, proksimal meatus, reoperasyon</b>, düşük cerrah hacmi. Komplikasyonların ~yarısı 1. yıldan sonra → uzun takip.","cat":"h","id":"disgenital_985","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Hipospadiasa eşlik eden başlıca anomaliler?","answer":"<b>Kriptorşidizm (~%10)</b>, patent processus vaginalis / inguinal herni (%9–15).","cat":"h","id":"disgenital_986","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"BEEC spektrumu (hafiften ağıra)?","answer":"İzole <b>epispadias</b> &lt; <b>klasik mesane ekstrofisi (CBE — en sık)</b> &lt; <b>kloakal ekstrofi (OEIS:</b> omfalosel, ekstrofi, imperfore anüs, spinal defekt).","cat":"e","id":"disgenital_987","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Ekstrofinin embriyolojik kökeni?","answer":"<b>Kloakal membranın anormal aşırı gelişimi</b> → mezenkimal migrasyon engellenir → alt karın duvarı + mesane ön duvarı kapanmaz.","cat":"e","id":"disgenital_988","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Mesane ekstrofisinde prenatal anahtar bulgu?","answer":"<b>Normalde dolu görülen mesanenin YOKLUĞU.</b> Kolayca kaçar. Destek: düşük umblikus, alt karın kitlesi, <b>pubik diastaz</b>.","cat":"e","id":"disgenital_989","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Modern staged repair (MSRE) aşamaları ve eponimi?","answer":"<ul><li>① Mesane + pelvis + karın duvarı kapatma</li><li>② Epispadias üretra onarımı (<b>6–18 ay</b>, erkek)</li><li>③ Mesane boynu rekonstrüksiyonu + reflülü üreter reimplantasyonu</li></ul>","cat":"e","id":"disgenital_990","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"CPRE ve RSTM nedir, ana riskleri?","answer":"<b>CPRE (Grady-Mitchell):</b> komplet penil disassembly; <b>penil kayıp riski ↑</b>. <b>RSTM (Kelly):</b> geniş yumuşak doku mobilizasyonu; <b>erektil iskemi</b> riski.","cat":"e","id":"disgenital_991","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Ekstrofide en güçlü prognostik faktör?","answer":"<b>Başarılı ilk kapatma</b> — mesane kapasitesi, kontinans, renal fonksiyonun belirleyicisi. Dehisens %10'a kadar.","cat":"e","id":"disgenital_992","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Pelvik osteotomi kontinansı artırır mı?","answer":"<b>Hayır — kontinansı kanıtlanmış şekilde artırmaz.</b> Amaç derin pelvik yerleşim + simfiz yaklaşımı. Endikasyon: dehisens/prolaps, geç kapatma, primer CE.","cat":"e","id":"disgenital_993","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Ekstrofi mesanesinde uzun dönem malignite tipi?","answer":"<b>Adenokarsinom</b> (kronik inflamasyon/metaplazi).","cat":"e","id":"disgenital_994","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"İzole epispadias: CBE'den temel farkı ve kızda patognomonik bulgu?","answer":"<b>Karın duvarı + mesane intakt.</b> Kızda <b>bifid klitoris + ayrık labia = patognomonik</b>. Onarım: modifiye Cantwell-Ransley veya Mitchell disassembly.","cat":"e","id":"disgenital_995","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Varikosel neden ağırlıklı sol taraflı?","answer":"Sol internal spermatik ven sol renal vene <b>dik açıyla</b> drene → yüksek hidrostatik basınç; sağ oblik olarak cavaya. <b>Nutcracker:</b> sol renal venin aorta–SMA arasında sıkışması.","cat":"v","id":"disgenital_996","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Sağ izole / supin'de kaybolmayan varikosel ne düşündürür?","answer":"<b>Sekonder varikosel</b> → retroperitoneal kitle / renal tümör (renal ven trombüsü) → görüntüleme şart.","cat":"v","id":"disgenital_997","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Derecelendirme (Dubin-Amelar)?","answer":"Hasta ayakta: <b>G1</b> sadece Valsalva ile palpe; <b>G2</b> Valsalva olmadan palpe; <b>G3</b> deriden görünür; <b>subklinik</b> sadece US ile. Tanı FM + Doppler US.","cat":"v","id":"disgenital_998","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Adolesanda varikoselektomi cerrahi endikasyonu?","answer":"İpsilateral hipotrofi <b>&gt;2 mL veya &gt;%20</b>, <b>6 ay arayla 2 vizitte doğrulanmış</b>; bilateral palpabl; soliter testis; ağrı; patolojik semen. Aksi halde 12 ayda bir takip (catch-up mümkün).","cat":"v","id":"disgenital_999","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"Varikoselektomide altın standart teknik?","answer":"<b>Mikrocerrahi subinguinal varikoselektomi</b> — en düşük rekürrens/hidrosel, en yüksek başarı (arter + lenfatik korunur).","cat":"v","id":"disgenital_1000","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"En sık komplikasyon ve nasıl önlenir?","answer":"<b>Hidrosel</b> → <b>lenfatik koruyucu</b> teknik + izosülfan mavisi ile önle. Palomo (yüksek ligasyon) lenfatik korumadığı için hidrosel riski yüksek.","cat":"v","id":"disgenital_1001","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"İnmemiş testis için cerrahi orşiopeksinin önerilen zaman dilimi nedir?","options":["Altı aylık olmadan önce","6 ila 18 ay arası","3 ile 5 yaş arası","Ergenlikten sonra"],"correct":1,"answer":"6 aydan sonra spontan iniş şansı düşer; 12–18 ayda germ ve Leydig hücre kaybı progresif olduğundan iniş <b>en geç 18 ay</b> içinde tamamlanmalı. EAU: Strong.","cat":"mcq","id":"disgenital_1002","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"\"Retraktil testis ile inmemiş testisi nasıl ayırırsın? Tedavisi farklı mı?\"","answer":"","cat":"oral","id":"disgenital_1003","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Yenidoğanda bilateral nonpalpabl testis var. En öncelikli adım?","options":["Skrotal ultrason","Acil endokrinolojik değerlendirme (karyotip + hCG stim. testi)","6 ay bekleyip kontrol","Bilateral diagnostik laparoskopi"],"correct":1,"answer":"Bilateral nonpalpabl testis <b>aksi ispatlanana kadar DSD</b>tir. Özellikle virilize 46,XX <b>CAH fataldir</b> → <b>acil endokrin workup</b> (karyotip, hCG stim., AMH/inhibin B, elektrolit). Görüntüleme öncelik değil.","cat":"mcq","id":"disgenital_1004","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"İnmemiş testiste rutin görüntüleme (US) için hangisi doğrudur?","options":["Tüm vakalarda nonpalpabl testisi lokalize eder","Cerrahi kararı değiştirmez, rutin önerilmez","Abdominal testis için MR zorunludur","Tanıyı kesinleştirir, FM gereksizdir"],"correct":1,"answer":"US nonpalpabl testiste duyarlılık/özgüllük düşüktür ve <b>cerrahi kararı değiştirmez</b>. AUA \"yapma\" der; EAU yalnız seçili durumda (DSD'de Müllerian yapı) kullanır.","cat":"mcq","id":"disgenital_1005","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Yüksek yerleşimli intraabdominal testiste damar kısa. En uygun yaklaşım?","options":["Tek aşamalı standart orşiopeksi","Fowler-Stephens (tercihen iki aşamalı)","Hemen orşiektomi","Hormonal tedavi ile bekleme"],"correct":1,"answer":"<b>Fowler-Stephens:</b> testiküler damar bölünür, dolaşım vas + kollaterallere bırakılır. <b>İki aşamalı</b> yaklaşımda atrofi oranı tek aşamadan daha düşüktür.","cat":"mcq","id":"disgenital_1006","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"\"İnmemiş testiste malignite riskini erken cerrahi nasıl etkiler? En sık tümör tipi nedir?\"","answer":"","cat":"oral","id":"disgenital_1007","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Orşiopekside gerginlik varsa kordu uzatmak için yapılan manevra?","options":["Prentiss manevrası","Fowler-Stephens ligasyonu","Bianchi yaklaşımı","Cohen reimplantasyonu"],"correct":0,"answer":"<b>Prentiss manevrası:</b> inferior epigastrik damarlar bölünüp spermatik kord <b>mediale transpoze</b> edilir → daha kısa, düz yol. (Bianchi = tek skrotal kesi; Cohen = VUR reimplantasyonu.)","cat":"mcq","id":"disgenital_1008","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Distal hipospadiasta en sık kullanılan üretroplasti tekniği?","options":["MAGPI","TIP / TIPU (Snodgrass)","Bracka iki aşamalı","Koyanagi"],"correct":1,"answer":"<b>TIP (Snodgrass, 1994):</b> üretral plak orta hatta insize edilip tübülarize edilir; distal/mid hipospadiasta <b>en sık</b>. Bracka ve Koyanagi proksimal vakalarda.","cat":"mcq","id":"disgenital_1009","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Penoskrotal hipospadias + bilateral impalpabl testis olan yenidoğanda öncelik?","options":["6. ayda TIP onarımı planla","Hemen sünnet et","DSD / CAH için acil genetik-endokrin workup","Yalnızca ultrason"],"correct":2,"answer":"Ağır hipospadias + impalpabl testis <b>DSD habercisidir</b>; <b>CAH fatal</b> olabilir → acil workup. <b>Sünnet ertelenir</b> (prepuce greft kaynağı).","cat":"mcq","id":"disgenital_1010","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Hipospadias onarımının en sık komplikasyonu?","options":["Üretrokutanöz fistül","Penil amputasyon","Priapizm","Hidrosel"],"correct":0,"answer":"<b>Üretrokutanöz fistül</b> en sık. Bağımsız risk faktörleri: glans &lt;14 mm, proksimal meatus, reoperasyon. Komplikasyonların ~yarısı 1. yıldan sonra → uzun takip.","cat":"mcq","id":"disgenital_1011","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"\"Hipospadiasta kurvatürü (chordee) nasıl basamaklı yönetirsin?\"","answer":"","cat":"oral","id":"disgenital_1012","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Hipospadiasta preoperatif testosteron için hangisi doğrudur?","options":["Cerrahiye kadar devam edilmelidir","Yara iyileşmesini bozduğu için 1–2 ay önce kesilir","Distal vakalarda zorunludur","Kanama riskini azaltır"],"correct":1,"answer":"Testosteron <b>yara iyileşmesini bozar ve kanamayı artırır</b> → cerrahiden <b>1–2 ay önce kesilir</b>. Sadece küçük penis/glans, kısa plak gibi seçili (genelde proksimal) vakalarda kullanılır.","cat":"mcq","id":"disgenital_1013","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Mesane ekstrofisinde prenatal ultrasonun anahtar bulgusu?","options":["Bilateral hidronefroz","Normalde dolu görülen mesanenin görülememesi","Polihidramnios","Renal agenezi"],"correct":1,"answer":"<b>Dolu mesanenin yokluğu</b> anahtar bulgudur (kolayca kaçar). Destekleyici: düşük umblikus, alt karın kitlesi, <b>pubik diastaz</b>.","cat":"mcq","id":"disgenital_1014","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"open","q":"\"Modern staged repair (MSRE) aşamalarını sırasıyla anlat.\"","answer":"","cat":"oral","id":"disgenital_1015","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Ekstrofide pelvik osteotomi için hangisi doğrudur?","options":["Kontinansı kanıtlanmış şekilde artırır","Kontinansı artırmaz; derin yerleşim/simfiz yaklaşımı sağlar","Tüm vakalarda zorunludur","Yenidoğanda hiç yapılamaz"],"correct":1,"answer":"Osteotomi <b>kontinansı kanıtlanmış şekilde artırmaz</b>; amacı mesanenin derin pelvik yerleşimi ve simfiz yaklaşımıdır. Endikasyon: dehisens/prolaps sonrası, geç kapatma, primer kloakal ekstrofi.","cat":"mcq","id":"disgenital_1016","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"İzole epispadiasta kız çocukta patognomonik bulgu?","options":["Bifid klitoris + ayrık labia","İmperfore himen","Vajinal atrezi","Klitoromegali"],"correct":0,"answer":"Kız izole epispadiasta <b>bifid klitoris ve ayrık labia</b> patognomoniktir; karın duvarı ve mesane <b>intaktır</b> (CBE'den fark). Onarım: modifiye Cantwell-Ransley / Mitchell.","cat":"mcq","id":"disgenital_1017","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Varikoselin ağırlıklı sol taraflı olmasının ana nedeni?","options":["Sol testisin daha büyük olması","Sol internal spermatik venin dik açıyla renal vene drenajı","Sağ venin daha uzun olması","Sol arterin yokluğu"],"correct":1,"answer":"Sol internal spermatik ven <b>dik açıyla</b> sol renal vene drene olur → yüksek hidrostatik basınç. <b>Nutcracker:</b> sol renal venin aorta–SMA arasında sıkışması.","cat":"mcq","id":"disgenital_1018","topic":"disgenital","group":2,"topicTitle":"Dış Genital & Rekonstrüksiyon","src":"","flag":false},{"type":"mcq","q":"Erişkin erkekte ye
