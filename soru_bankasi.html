<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Üroloji Soru Bankası · Doçentlik</title>
<style>
:root{
  --bg:#0c1116;--bg2:#10171e;--surface:#161f29;--surface2:#1d2935;--ink:#e9eef4;--muted:#8ea3b5;
  --line:#27333f;--teal:#4db6ac;--teal-d:#0c2f2c;--amber:#f0b15a;--rose:#e07a72;--ok:#5cc98e;--no:#e0635b;
  --onk:#5aa9e6;--fb:#4db6ac;--ped:#f0b15a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:radial-gradient(circle at 12% 0%,rgba(77,182,172,.07),transparent 42%),radial-gradient(circle at 92% 6%,rgba(240,177,90,.06),transparent 40%),var(--bg);
  color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
.serif{font-family:ui-serif,Georgia,"Times New Roman",serif}
#app{max-width:760px;margin:0 auto;padding:0 0 90px}
header.top{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(12,17,22,.97),rgba(12,17,22,.85));backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:13px 16px;display:flex;align-items:center;gap:12px}
header .back{background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:.82rem;font-weight:700;cursor:pointer}
header h1{font-size:1.02rem;font-weight:800;letter-spacing:.3px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .mini{font-size:.7rem;color:var(--muted);margin-top:2px}
main{padding:16px}
.hero .kick{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:700}
.hero h2{font-size:1.55rem;font-weight:800;margin:6px 0 3px}
.hero p{color:var(--muted);font-size:.85rem}

.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:16px 0}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center}
.stat .v{font-size:1.25rem;font-weight:800;color:var(--teal)}
.stat .l{font-size:.62rem;color:var(--muted);margin-top:2px;letter-spacing:.03em}
.stat.amber .v{color:var(--amber)} .stat.rose .v{color:var(--rose)}

.sechead{font-size:.72rem;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:700;margin:20px 2px 10px}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mode{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px;cursor:pointer;transition:.15s;text-align:left}
.mode:hover{border-color:var(--teal);transform:translateY(-1px)}
.mode .t{font-size:.98rem;font-weight:800;display:flex;align-items:center;gap:8px}
.mode .d{font-size:.74rem;color:var(--muted);margin-top:5px;line-height:1.4}
.mode .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--surface2)}
.mode.full{grid-column:1/-1}
.mode .badge{margin-left:auto;font-size:.66rem;background:var(--teal-d);color:var(--teal);padding:2px 8px;border-radius:7px;font-weight:800}

.scopebar{display:flex;gap:7px;flex-wrap:wrap;margin:8px 0 4px}
.chip{padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer}
.chip.on{background:var(--teal);color:#06201d;border-color:var(--teal)}
.scopesel{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin-top:10px;overflow:hidden}
.scopesel summary{list-style:none;cursor:pointer;padding:12px 15px;font-weight:700;font-size:.86rem;display:flex;align-items:center;gap:8px}
.scopesel summary::-webkit-details-marker{display:none}
.scopesel summary .chev{margin-left:auto;color:var(--muted)}
.scopesel[open] summary .chev{transform:rotate(90deg)}
.topiclist{padding:4px 12px 12px;border-top:1px solid var(--line)}
.tgrp{font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:10px 4px 4px;font-weight:700}
.titem{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:9px;cursor:pointer;font-size:.85rem}
.titem:active{background:var(--surface2)}
.titem .box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#06201d}
.titem.on .box{background:var(--teal);border-color:var(--teal)}
.titem .cnt{margin-left:auto;font-size:.7rem;color:var(--muted)}

.countbar{display:flex;gap:7px;margin:12px 0 2px;align-items:center}
.countbar .lbl{font-size:.78rem;color:var(--muted);font-weight:700;margin-right:2px}
.cbtn{padding:7px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer}
.cbtn.on{background:var(--surface2);color:var(--ink);border-color:var(--teal)}

.weak{margin-top:8px}
.weakitem{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--rose);border-radius:10px;padding:9px 12px;margin-bottom:7px;font-size:.84rem;cursor:pointer}
.weakitem .pct{margin-left:auto;font-weight:800;color:var(--rose)}

.tools{display:flex;gap:9px;margin-top:22px;flex-wrap:wrap}
.toolbtn{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:12px;font-size:.82rem;font-weight:700;cursor:pointer}
.toolbtn.danger{color:var(--no);border-color:rgba(224,99,91,.4)}

/* session */
.prog{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:4px 0 12px}
.prog>i{display:block;height:100%;background:var(--teal);width:0;transition:.3s}
.sessmeta{display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-bottom:4px}
.qtopic{display:inline-block;font-size:.66rem;font-weight:800;letter-spacing:.04em;color:var(--amber);text-transform:uppercase;margin-bottom:9px}
.flagwarn{display:inline-block;font-size:.66rem;font-weight:800;color:#06201d;background:var(--amber);padding:2px 8px;border-radius:6px;margin-left:7px}
.qtext{font-size:1.08rem;font-weight:600;line-height:1.45;margin-bottom:16px}
.qtext.serif{font-weight:600}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;font-size:.93rem;color:var(--ink);cursor:pointer;transition:.12s;display:flex;gap:10px}
.opt .k{font-weight:800;color:var(--muted);flex:0 0 auto}
.opt:active{transform:scale(.99)}
.opt.correct{background:rgba(92,201,142,.16);border-color:var(--ok)} .opt.correct .k{color:var(--ok)}
.opt.wrong{background:rgba(224,99,91,.16);border-color:var(--no)} .opt.wrong .k{color:var(--no)}
.opt.dim{opacity:.5}
.reveal{width:100%;background:var(--surface2);color:var(--teal);border:1px dashed var(--teal);border-radius:12px;padding:14px;font-size:.92rem;font-weight:700;cursor:pointer}
.ansbox{background:var(--surface2);border-left:3px solid var(--teal);border-radius:0 11px 11px 0;padding:13px 15px;margin-top:6px;font-size:.9rem;display:none}
.ansbox.show{display:block;animation:f .2s}
.ansbox b{color:#fff}
@keyframes f{from{opacity:0}to{opacity:1}}
.srcline{font-size:.72rem;color:var(--muted);margin-top:9px;padding-top:8px;border-top:1px solid var(--line)}
.gradebtns{display:flex;gap:10px;margin-top:12px}
.gradebtns button{flex:1;border-radius:12px;padding:14px;font-size:.92rem;font-weight:800;cursor:pointer;border:1px solid var(--line)}
.gradebtns .know{background:rgba(92,201,142,.16);color:var(--ok);border-color:var(--ok)}
.gradebtns .no{background:rgba(224,99,91,.14);color:var(--no);border-color:rgba(224,99,91,.5)}
.next{width:100%;background:var(--teal);color:#06201d;border:none;border-radius:12px;padding:14px;font-size:.95rem;font-weight:800;cursor:pointer;margin-top:13px;display:none}
.next.show{display:block}
.rowbtns{display:flex;gap:9px;margin-top:11px}
.star{background:var(--surface);border:1px solid var(--line);color:var(--amber);border-radius:11px;padding:11px 14px;font-weight:700;cursor:pointer;font-size:.82rem}
.star.on{background:rgba(240,177,90,.16);border-color:var(--amber)}
.jump{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:11px;font-weight:700;cursor:pointer;font-size:.8rem}

/* results */
.result{text-align:center;padding:24px 6px}
.result .big{font-size:3rem;font-weight:800;color:var(--teal)}
.result .pct{font-size:1.1rem;color:var(--muted);margin:4px 0 18px}
.rtopics{text-align:left;margin:18px 0}
.rtopic{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px;font-size:.83rem}
.rtopic .b{margin-left:auto;font-weight:800}
.empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:.9rem}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--teal);color:var(--ink);padding:11px 18px;border-radius:12px;font-size:.85rem;font-weight:700;z-index:99;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.hidden{display:none!important}
footer{text-align:center;color:var(--muted);font-size:.68rem;padding:20px 16px 30px;border-top:1px solid var(--line);margin-top:20px}
</style>
</head>

e geri döner.","cat":"","id":"rcc_8","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Paraneoplastik sendromlar?","answer":"EPO · PTHrP · renin · <b>Stauffer</b> · prolaktin · ACTH · insülin · gonadotropin.","cat":"","id":"rcc_9","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Tanı/evreleme standardı?","answer":"<b>Çok fazlı kontrastlı BT</b> (batın+toraks). Enhancement ≥15-20 HU.","cat":"","id":"rcc_10","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Negatif renal biyopsi kanseri dışlar mı?","answer":"<span class=\"art\">Hayır</span> — NPV ~%63; non-diagnostik %14 (tekrarla).","cat":"","id":"rcc_11","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Biyopsinin ayıramadığı ikili?","answer":"<b>Onkositom vs kromofob</b> (hibrid örtüşme).","cat":"","id":"rcc_12","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Bosniak III ve IV yönetimi?","answer":"<b>III:</b> cerrahi veya AS. <b>IV:</b> cerrahi.","cat":"","id":"rcc_13","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Bosniak klasik kanserleşme oranları?","answer":"I ~%1 · II ~%5 · IIF %5-10 · III %50-60 · IV %80-100.","cat":"","id":"rcc_14","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Bosniak 2019 ana yenilik?","answer":"<b>MR dahil</b>; tüm enhancement eşit; sayısal eşikler.","cat":"","id":"rcc_15","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Adrenal: T4 mü M1 mi?","answer":"Komşu invazyon <b>T4</b>; hematojen <b>M1</b>.","cat":"","id":"rcc_16","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"T3a üç durum?","answer":"Renal ven · pelvikalisiyel · perirenal/sinüs yağı (Gerota içinde).","cat":"","id":"rcc_17","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"T3b vs T3c?","answer":"Diyafram <b>altı</b> kava vs diyafram <b>üstü</b>/duvar invazyonu.","cat":"","id":"rcc_18","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Mayo III ve IV?","answer":"<b>III:</b> hepatik ven üstü, diyafram altı. <b>IV:</b> diyafram üstü/atrium.","cat":"","id":"rcc_19","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Hangi Mayo seviyesinde CPB?","answer":"Seviye <b>III-IV</b> (suprahepatik/supradiafragmatik).","cat":"","id":"rcc_20","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Seviye IV trombüs küratif mi?","answer":"Non-metastatikte <b>evet</b> — komplet trombektomi küratif olabilir.","cat":"","id":"rcc_21","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"IMDC 6 kriter + poor eşik?","answer":"KPS<80·<1yıl·hiperkalsemi·anemi·nötrofili·trombositoz. <b>≥3 poor</b>.","cat":"","id":"rcc_22","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Lokalize ccRCC ve metastatik modeli?","answer":"Lokalize → <b>Leibovich</b>. Metastatik → <b>IMDC</b>.","cat":"","id":"rcc_23","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"2026 yaşlı hasta değerlendirme?","answer":"<b>G8</b> (≤14/17 riskli) → CGA. eGFR<45 → nefroloji.","cat":"","id":"rcc_24","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"T1 standart cerrahi?","answer":"<b>Parsiyel nefrektomi > radikal</b>.","cat":"","id":"rcc_25","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"RFA/kriyo boyut sınırı?","answer":"RFA <b>>3 cm</b>, kriyo <b>>4 cm</b> rutin önerme.","cat":"","id":"rcc_26","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Tek STRONG adjuvan + çalışma?","answer":"<b>Pembrolizumab</b> — KEYNOTE-564 (OS HR 0.62).","cat":"","id":"rcc_27","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Negatif adjuvan çalışmalar?","answer":"IMmotion010, CheckMate 914, PROSPER + adjuvan TKI'lar.","cat":"","id":"rcc_28","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Poor riskte sitoredüktif nefrektomi?","answer":"<span class=\"art\">Yapma.</span> (CARMENA: 18.4 vs 13.9 ay.)","cat":"","id":"rcc_29","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Metastatikte atlanırsa jüri \"unuttun\" der?","answer":"<b>Sitoredüktif nefrektomi.</b>","cat":"","id":"rcc_30","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Metastatik RCC kullanılmayan ilaç?","answer":"<b>Kemoterapi</b> (istisna: sarkomatoid doks+gem).","cat":"","id":"rcc_31","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"İlaç sınıfları + 2 isim?","answer":"<b>TKI:</b> sunitinib/pazopanib · <b>mTOR:</b> everolimus/temsirolimus · <b>ICI:</b> nivolumab/ipilimumab.","cat":"","id":"rcc_32","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Dayanıklı tedavisiz yanıt (int/poor)?","answer":"<b>Nivo+ipi</b> (CheckMate 214); favourable'da OS zayıf.","cat":"","id":"rcc_33","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Metastazektomi kriterleri?","answer":"Primer kontrol · met yok · iyi PS · <b>R0</b>. En sık pulmoner.","cat":"","id":"rcc_34","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"VHL izlem eşiği + ilaç?","answer":"<b>3 cm</b>'ye kadar izle; <b>belzutifan</b> (HIF-2α).","cat":"","id":"rcc_35","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"HLRCC neden istisna?","answer":"FH-deficient <b>agresif</b> — \"3 cm izle\" geçmez, erken eksizyon.","cat":"","id":"rcc_36","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"AML'de everolimus ne zaman?","answer":"Unrezektabl/embolize edilemeyen TSC-AML (EXIST-2).","cat":"","id":"rcc_37","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Diyafram altı kavaya uzanan RCC — T?","answer":"<b>T3b.</b>","cat":"","id":"rcc_38","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"VHL ile en ilişkili neoplazi?","answer":"<b>Berrak hücreli RCC.</b>","cat":"","id":"rcc_39","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"6 cm ekzofitik solid lezyon — cerrahi?","answer":"<b>Mümkün olan her yöntemle parsiyel nefrektomi.</b>","cat":"","id":"rcc_40","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"Kist malignite riskini sınıflayan sistem?","answer":"<b>Bosniak.</b> (R.E.N.A.L./PADUA = PN zorluğu.)","cat":"","id":"rcc_41","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"NSS sonrası takibi yoğunlaştıran iki faktör?","answer":"<b>>7 cm</b> tümör veya <b>pozitif cerrahi sınır</b>.","cat":"","id":"rcc_42","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Böbrek kistlerinin malignite riskini kategorize eden sınıflama sistemi hangisidir?","options":["PADUA","R.E.N.A.L. Nefrometri","Bosniak","NePhRO"],"correct":2,"answer":"<b>Bosniak</b> kistik kitlelerin malignite riskini sınıflar. PADUA/R.E.N.A.L./NePhRO ise parsiyel nefrektomi anatomik zorluğunu ölçer.","cat":"mcq","id":"rcc_43","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"55 yaşında, sağ böbrek alt pol lateral kenarında 6 cm ekzofitik solid, kontrast tutan lezyon; karşı böbrek normal, met/LN yok. Önerilen cerrahi?","options":["Laparoskopik radikal nefrektomi","LND ile radikal nefrektomi","Mümkün olan her yöntemle parsiyel nefrektomi","Lezyonun kriyoablasyonu"],"correct":2,"answer":"Lokalize, soliter, rezeke edilebilir kitlede <b>nefron koruyucu cerrahi (parsiyel) önceliklidir</b> — onkolojik eşdeğer, fonksiyon korur. (ebu sorusu.)","cat":"vak","id":"rcc_44","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Fuhrman nükleer derecelendirmesinin yerini alan güncel sistem?","options":["Gleason","WHO/ISUP grade","TNM grade","Mostofi"],"correct":1,"answer":"<b>WHO/ISUP grade</b> (4 kademeli, nükleol esaslı) Fuhrman'ın yerine geçti. chRCC'de uygulanmaz.","cat":"mcq","id":"rcc_45","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Jüri: \"VHL geninin RCC gelişimindeki rolü ve etki mekanizması nedir?\" Doğru çekirdek cevap?","options":["VHL kaybı → HIF birikimi → VEGF/PDGF/EPO artışı","VHL kaybı → p53 aktivasyonu","VHL kaybı → apoptoz artışı","VHL kaybı → DNA tamiri bozulması"],"correct":0,"answer":"VHL kaybı → <b>HIF yıkılamaz, birikir</b> → VEGF/PDGF/TGF-α/EPO/CAIX↑ → anjiyogenez + proliferasyon. TKI ve belzutifan hedefi buradan.","cat":"vak","id":"rcc_46","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"İpsilateral adrenal beze tümörün DİREKT komşu invazyonu hangi T evresidir?","options":["T3a","T3c","T4","M1"],"correct":2,"answer":"Komşu invazyon <b>T4</b> (Gerota dışı). Adrenale <b>hematojen metastaz ise M1</b> — jürinin sevdiği ayrım.","cat":"mcq","id":"rcc_47","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Diyafram ALTINDA vena kavaya uzanan tümör trombüsü hangi T?","options":["T3a","T3b","T3c","T4"],"correct":1,"answer":"<b>T3b</b> = diyafram altı kava. Diyafram üstü veya kava duvarı invazyonu = T3c. (Uzmanlık tutanağı sorusu.)","cat":"mcq","id":"rcc_48","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"IVC tümör trombüsü sağ atriuma uzanıyor (Mayo seviye IV). Cerrahi için tipik gereklilik?","options":["Sadece basit kavotomi","Karaciğer mobilizasyonu yeterli","Kardiyopulmoner bypass","Cerrahi kontrendike"],"correct":2,"answer":"Mayo <b>III-IV</b>'te suprahepatik kontrol gerekir; seviye IV'te sıklıkla <b>kardiyopulmoner bypass</b>. Non-metastatikte komplet trombektomi küratif olabilir.","cat":"vak","id":"rcc_49","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"IMDC (Heng) modelinde poor risk eşiği kaç risk faktörüdür?","options":["≥1","≥2","≥3","≥4"],"correct":2,"answer":"6 kriter (KPS<80, <1 yıl, hiperkalsemi, anemi, nötrofili, trombositoz): <b>0 favourable, 1-2 intermediate, ≥3 poor</b>.","cat":"mcq","id":"rcc_50","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Metastatik ccRCC, IMDC poor risk, asemptomatik primer. Sitoredüktif nefrektomi kararı?","options":["Hemen CN yap","CN yapma","Önce CN sonra sistemik","Sadece CN, sistemik gerekmez"],"correct":1,"answer":"<b>Poor riskte CN yapılmaz.</b> CARMENA: sunitinib tek başına (18.4 ay) CN→sunitinib'e (13.9 ay) non-inferior. Jüri: metastatik tedavide CN'yi atlamazsan \"unuttun\" demez.","cat":"vak","id":"rcc_51","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Metastatik RCC'de aşağıdakilerden hangisi etkisizdir / kullanılmaz?","options":["Tirozin kinaz inhibitörü","İmmün kontrol noktası inhibitörü","Klasik sitotoksik kemoterapi","mTOR inhibitörü"],"correct":2,"answer":"<b>Klasik kemoterapi etkisizdir</b> (P-glikoprotein/topo-II direnci). Tek zayıf istisna sarkomatoidde doksorubisin+gemsitabin. (Jüri \"kullanılmayan ilaç\" sorusu.)","cat":"mcq","id":"rcc_52","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"RCC'de adjuvan tedavide genel sağkalım yararı gösteren TEK çalışma/ajan?","options":["S-TRAC / sunitinib","KEYNOTE-564 / pembrolizumab","IMmotion010 / atezolizumab","CheckMate 914 / nivo+ipi"],"correct":1,"answer":"<b>KEYNOTE-564 (pembrolizumab):</b> DFS HR 0.72 ve OS HR 0.62 (48-ay %91.2 vs %86). Diğer adjuvan ICI ve TKI çalışmaları negatif.","cat":"mcq","id":"rcc_53","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Jüri: \"Metastatik RCC ilaçlarını gruplarıyla ve isim vererek say.\" TKI sınıfından iki örnek?","options":["Everolimus, temsirolimus","Sunitinib, pazopanib","Nivolumab, ipilimumab","Belzutifan, bevacizumab"],"correct":1,"answer":"<b>TKI:</b> sunitinib, pazopanib, kabozantinib, aksitinib, lenvatinib. (mTOR: everolimus/temsirolimus; ICI: nivolumab/pembrolizumab/ipilimumab.)","cat":"vak","id":"rcc_54","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Renal kitle biyopsisi için en doğru ifade?","options":["Negatif biyopsi maligniteyi güvenle dışlar","Onkositom-kromofob ayrımını güvenilir yapar","Non-diagnostik sonuç tekrarlanmalı, NPV düşük","FNA core biyopsiye üstündür"],"correct":2,"answer":"Non-diagnostik ~%14 → tekrarla (→%80 tanı). <b>NPV ~%63: negatif biyopsi kanseri dışlamaz.</b> Onkositom-kromofob ayrımı güvenilir değil; core > FNA.","cat":"mcq","id":"rcc_55","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"VHL hastasında soliter berrak hücreli renal kitle; cerrahi-dışı izlem için kabul gören boyut eşiği?","options":["1 cm","2 cm","3 cm","5 cm"],"correct":2,"answer":"VHL'de en büyük tümör <b>3 cm'ye</b> ulaşana dek izlenir, sonra nefron koruyucu cerrahi. Cerrahi aday olmayanda <b>belzutifan</b>.","cat":"vak","id":"rcc_56","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Aşağıdaki paraneoplastik sendrom-aracı eşleşmelerinden hangisi YANLIŞ?","options":["Eritrositoz — EPO","Hiperkalsemi — PTHrP","Stauffer — karaciğer metastazı","Hipertansiyon — renin"],"correct":2,"answer":"<b>Stauffer = metastaz OLMADAN paraneoplastik hepatik disfonksiyon</b> (nefrektomiyle geri döner). Diğerleri doğru.","cat":"mcq","id":"rcc_57","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"85 yaşında, çok komorbiditeli, 3.5 cm böbrek kitlesi, eGFR 40. EAU 2026 ilk adımı?","options":["Hemen radikal nefrektomi","G8 ile kırılganlık taraması + nefroloji + paylaşılan karar","Doğrudan sistemik tedavi","Acil ablasyon"],"correct":1,"answer":"2026 yeni: yaşlıda <b>G8 taraması → riskliyse CGA</b>, eGFR<45'te nefroloji konsültasyonu, paylaşılan karar. Muhtemelen aktif izlem/ablasyon ekseni.","cat":"vak","id":"rcc_58","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"En iyi prognoza sahip RCC alt tipi ve ilişkili herediter sendrom?","options":["Berrak hücreli — VHL","Papiller — HPRC","Kromofob — Birt-Hogg-Dubé","Toplayıcı kanal — yok"],"correct":2,"answer":"<b>Kromofob RCC en iyi prognozlu</b>; Birt-Hogg-Dubé (FLCN) ile ilişkili (onkositom/hibrid de görülür).","cat":"mcq","id":"rcc_59","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"mcq","q":"Jüri: \"Yeni sınıflamada papiller tip 2 nereye gitti?\" Doğru cevap?","options":["Aynen korundu","Kromofobla birleşti","FH-deficient ve TFE3 gibi moleküler antitelere ayrıldı","Benign kabul edildi"],"correct":2,"answer":"WHO 2022 tip 1/2 ayrımını kaldırdı; eski agresif \"tip 2\"nin bir kısmı <b>FH-deficient</b> ve <b>TFE3-rearranged</b> moleküler antitelere ayrıştı. (10.05.2025 tutanağı.)","cat":"vak","id":"rcc_60","topic":"rcc","group":0,"topicTitle":"Böbrek Tümörü (RCC)","src":"","flag":false},{"type":"open","q":"TGCT içinde seminom oranı? \"Saf seminom\" tanımı?","answer":"Seminom = TGCT'lerin <b>%60'ı</b>. Saf seminom: histoloji yalnız seminom <b>ve</b> AFP normal.","cat":"","id":"testis_61","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"En sık NSGCT? Tek-histolojili NSGCT'de en sık?","answer":"En sık NSGCT = <b>mikst</b>. Tek-histolojide en sık <b>embriyonel ca (~%11)</b>.","cat":"","id":"testis_62","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Epidermoid kist nedir, neden tuzak?","answer":"Teratomun <b>benign fenotipi</b>; USG'de soğan-zarı katmanlı, malign sanılır.","cat":"","id":"testis_63","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Prepubertal vs postpubertal teratom?","answer":"Prepubertal benign; postpubertal <b>malign + kemo-dirençli → cerrahi</b>.","cat":"","id":"testis_64","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Seks kord-stromal tümör tedavi mantığı?","answer":"Kemoterapiye <b>duyarsız</b>; malign/metastatikse cerrahi. Marker kullanılmaz.","cat":"","id":"testis_65","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"En güçlü risk faktörü ve okült met oranları?","answer":"<b>Kriptorşidizm.</b> Okült met: CS1 seminom ~%15, NSGCT ~%30.","cat":"","id":"testis_66","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Tanı zinciri ve yasak işlem?","answer":"USG → marker → radikal <b>inguinal</b> orşiektomi → toraks-abdomen-pelvis BT. Trans-skrotal YASAK.","cat":"","id":"testis_67","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"AFP/β-hCG'nin duyarlılığı?","answer":"Özgül ama <b>duyarlılık düşük</b> (~yarısında yükselir). Negatiflik tümörü dışlamaz.","cat":"","id":"testis_68","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"AFP'yi yükselten/yükseltmeyen?","answer":"Yükseltir: yolk sac, embriyonel. <b>Yükseltmez: saf seminom + saf koryokarsinom.</b>","cat":"","id":"testis_69","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"miR-371a-3p neden önemli?","answer":"~%90 TGCT yakalar, marker-negatif boşluğu doldurur. Sınır: &lt;1 cm, saf teratom, GCNIS.","cat":"","id":"testis_70","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Prognostik marker ne zaman alınır?","answer":"<b>1. KT kürünün 1. günü.</b> Eski değer kullanmak = en sık yanlış sınıflama.","cat":"","id":"testis_71","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"AFP ve β-hCG yarı ömrü?","answer":"AFP 5-7 gün, β-hCG 24-36 saat. Yavaş düşüş → rezidüel hastalık.","cat":"","id":"testis_72","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"S3 sınırları?","answer":"LDH&gt;10×ÜLN <b>veya</b> hCG&gt;50.000 <b>veya</b> AFP&gt;10.000. En yüksek kategori belirler.","cat":"","id":"testis_73","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"hCG 60.000, AFP 200, LDH normal → S?","answer":"<b>S3</b> (hCG&gt;50.000).","cat":"","id":"testis_74","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Seminomda kötü prognoz grubu? Orta?","answer":"Kötü grup <b>YOK</b>. Orta = non-pulmoner visseral met.","cat":"","id":"testis_75","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"NSGCT kötü prognoz kriterleri?","answer":"Mediastinal primer <b>veya</b> non-pulmoner visseral met <b>veya</b> S3.","cat":"","id":"testis_76","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"IGCCCG 2021'in eklediği faktörler?","answer":"NSGCT: ileri yaş + akciğer met. Seminom: LDH &gt;2.5×ÜLN.","cat":"","id":"testis_77","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Sperm bankalaması kime?","answer":"Tedavi öncesi <b>tüm erkeklere</b>; reddederse onamla belgele.","cat":"","id":"testis_78","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Organ-koruyucu cerrahi sınırı?","answer":"Küçük kitlede tercih; malign GCT'de seçilmiş olgu; <b>&gt;%30 parankim → orşiektomi</b>.","cat":"","id":"testis_79","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"CS1 seminom standart tedavi?","answer":"<b>Aktif izlem.</b> Alternatif tek doz karboplatin AUC 7.","cat":"","id":"testis_80","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"NSGCT tek kanıtlanmış nüks faktörü + oran?","answer":"<b>LVI.</b> LV+ %27-50; LV− %12-19. LV+ → 1 kür BEP nüksü &lt;%5 (SWENOTECA).","cat":"","id":"testis_81","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"İyi prognoz rejimi? Bleomisin kontrendikeyse?","answer":"<b>3×BEP</b>; kontrendikeyse <b>4×EP</b>.","cat":"","id":"testis_82","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Orta/kötü prognoz rejimi? Bleomisin yoksa?","answer":"<b>4×BEP</b>; yoksa <b>4×VIP</b> (G-CSF ile).","cat":"","id":"testis_83","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Marker-kılavuzlu yoğunlaştırma çalışması?","answer":"<b>GETUG-13 (Fizazi).</b> Yetersiz düşüş → doz yoğunlaştırma.","cat":"","id":"testis_84","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Seminom postkemo rezidü?","answer":"Rezeksiyon standart değil. &gt;3 cm → FDG-PET (&gt;2 ay sonra). PET− → izlem.","cat":"","id":"testis_85","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"NSGCT postkemo rezidü &gt;1cm patolojisi?","answer":"~%40 nekroz/fibroz, %40 teratom, %20 canlı tümör → rezeke et.","cat":"","id":"testis_86","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Primer profilaktik RPLND endikasyonu?","answer":"Postpubertal teratom + <b>somatik malign komponent</b>.","cat":"","id":"testis_87","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"RPLND kritik komplikasyon + landing zone?","answer":"Antegrad ejakülasyon kaybı. Sağ→interaortokaval, sol→sol para-aortik.","cat":"","id":"testis_88","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Growing teratoma sendromu?","answer":"Markerlar normalken büyüyen kitle = teratom; kemo-dirençli → cerrahi.","cat":"","id":"testis_89","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"İlk salvage tedavi tercihi?","answer":"Çoğu IPFSG kategorisinde <b>HDCT</b>; CDCT=TIP/VIP. Çalışma: TIGER.","cat":"","id":"testis_90","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Postpubertal GCT moleküler imzası?","answer":"<b>i(12p)</b> (~%80). Bilinmeyen orta hat primerde GCT tanısına yardımcı.","cat":"","id":"testis_91","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Spermatositik tümör özellikleri?","answer":"Yaşlı (&gt;50), benign, GCNIS yok, i(12p) yok, kriptorşidizm ilişkisiz.","cat":"","id":"testis_92","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Bleomisin en korkulan yan etki + kontrendike?","answer":"<b>Pulmoner fibrozis.</b> &gt;40 yaş, akciğer hast., ağır sigara, sporcu, mediastinal/akciğer met.","cat":"","id":"testis_93","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"CS1'de \"kötü faktör varsa adjuvan ver\" doğru mu?","answer":"Hayır. Güncel standart <b>aktif izlem</b> (her iki histoloji). Kür ~%99, nüks kurtarılabilir.","cat":"","id":"testis_94","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"CS1 seminom risk modeli nasıl güncellendi?","answer":"Eski \"4cm+rete testis\" → güncel: boyut+rete+LVI <b>kombinasyonu</b>; EAU rutin adjuvan önermiyor.","cat":"","id":"testis_95","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"En sık görülen non-seminom germ hücreli tümör tipi hangisidir?","options":["Saf embriyonel karsinom","Mikst germ hücreli tümör","Saf koryokarsinom","Saf yolk sac tümörü"],"correct":1,"answer":"Mikst tip en sıktır (tipik olarak embriyonel + teratom). Tek-histolojili NSGCT'de ise en sık saf embriyonel karsinomdur (~%11).","cat":"mcq","id":"testis_96","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"28 yaşında erkek, ağrısız testis kitlesi. Orşiektomi sonrası histoloji saf seminom, AFP normal, hCG hafif yüksek, evreleme testise sınırlı (CS1). En uygun yönetim?","options":["Adjuvan radyoterapi","Tek doz karboplatin (rete testis varsa zorunlu)","Aktif izlem","2 kür BEP"],"correct":2,"answer":"CS1 seminomda <b>standart aktif izlemdir</b>. Kür ~%99, nüks kurtarılabilir. Adjuvan (tek doz karboplatin AUC 7) yalnız seçenektir, zorunlu değil; EAU risk faktörlerini rutin adjuvan tetikleyicisi olarak önermez.","cat":"vig","id":"testis_97","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi AFP yükseltMEZ?","options":["Yolk sac tümörü","Embriyonel karsinom","Saf seminom","Mikst tümör (yolk sac içeren)"],"correct":2,"answer":"Saf seminom ve saf koryokarsinom AFP yükseltmez. AFP yüksek bir \"seminom\" → non-seminom gibi yönetilir.","cat":"mcq","id":"testis_98","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Tümör markerı hCG 60.000 IU/L, AFP 200 ng/mL, LDH normal. S evresi?","options":["S1","S2","S3","S0"],"correct":2,"answer":"En yüksek marker kategorisi belirler. hCG &gt;50.000 → S3 (diğerleri düşük olsa bile).","cat":"mcq","id":"testis_99","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Metastatik non-seminom, 4 kür BEP sonrası markerlar normalleşti; retroperitoneumda 1.8 cm rezidü kitle kaldı. Ne yaparsın?","options":["İzlem","FDG-PET çek, negatifse izle","Rezeke et (postkemo RPLND)","2 kür daha BEP"],"correct":2,"answer":"Non-seminomda &gt;1 cm rezidü <b>PET'e bakılmaksızın rezeke edilir</b>. Patoloji: ~%40 nekroz/fibroz, %40 teratom, %20 canlı tümör. Teratom kemo-dirençli, PET güvenilmez.","cat":"vig","id":"testis_100","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Metastatik seminom, kemoterapi sonrası 4 cm rezidü kitle, markerlar normal. İlk adım?","options":["Hemen rezeke et","FDG-PET (kemoterapiden >2 ay sonra)","Hemen RT ver","Biyopsi yapmadan 2 kür daha"],"correct":1,"answer":"Seminomda rezeksiyon standart değil. &gt;3 cm rezidüde kemoterapiden &gt;2 ay sonra FDG-PET (NPV &gt;%95). PET− → izlem; PET+ → histolojik doğrulama.","cat":"vig","id":"testis_101","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"IGCCCG sınıflamasında seminom için \"kötü prognoz\" grubu hakkında doğru olan?","options":["Mediastinal primer varsa kötüdür","Non-pulmoner visseral met varsa kötüdür","Seminomda kötü prognoz grubu yoktur","S3 marker varsa kötüdür"],"correct":2,"answer":"Seminomda kötü prognoz grubu YOKTUR — yalnız iyi (non-pulmoner visseral met yok) ve orta (var). Mediastinal primer ve S3 non-seminom kriterleridir.","cat":"mcq","id":"testis_102","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"25 yaşında testis tümörü hastası, \"çocuk istemiyorum\" diyor. Radikal orşiektomi öncesi ne yaparsın?","options":["Direkt ameliyat, fertilite gündemine girme","Yine de sperm bankalaması teklif et, reddederse onamla belgele","Sadece evliyse sor","Kemoterapi planlanırsa düşün"],"correct":1,"answer":"EAU: tedavi öncesi <b>tüm erkeklere</b> sperm bankalaması teklif edilir (fikir değişebilir, tedavi fertiliteyi kalıcı bozabilir). Reddederse onamla belgelenir.","cat":"vig","id":"testis_103","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Klinik evre I non-seminomda tek kanıtlanmış nüks risk faktörü?","options":["Tümör boyutu >4 cm","Rete testis invazyonu","Lenfovasküler invazyon (LVI)","Yüksek AFP"],"correct":2,"answer":"NSGCT CS1'de LVI tek kanıtlanmış faktördür. LV+ nüks %27-50; 1 kür BEP <%5'e indirir (SWENOTECA). Standart yine aktif izlem.","cat":"mcq","id":"testis_104","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"IGCCCG prognostik marker değeri ne zaman alınmalıdır?","options":["Orşiektomi öncesi","Orşiektomi sonrası ilk gün","1. kemoterapi kürünün 1. günü","Tanı anında, USG ile birlikte"],"correct":2,"answer":"Prognostik (IGCCCG) marker = 1. KT kürünün 1. günü. Pre-orşiektomi/eski pre-kemo değer kullanmak en sık yanlış sınıflama nedenidir.","cat":"mcq","id":"testis_105","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Mediastende kitle olan genç erkek; biyopside germ hücreli tümör şüphesi, i(12p) pozitif. En olası tanı?","options":["Lenfoma","Ekstragonadal germ hücreli tümör","Timoma","Metastatik akciğer ca"],"correct":1,"answer":"i(12p) postpubertal GCT'lerin ~%80'inde bulunur ve orta hat bilinmeyen primer kitlede GCT tanısını destekler → ekstragonadal GCT.","cat":"vig","id":"testis_106","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Bleomisinin en korkulan yan etkisi ve kontrendike olduğu durum?","options":["Nefrotoksisite — yaşlılarda","Pulmoner fibrozis — >40 yaş, akciğer hastalığı, sporcu","Kardiyotoksisite — diyabette","Nörotoksisite — alkolikte"],"correct":1,"answer":"Bleomisin → pulmoner fibrozis. Kontrendike: >40 yaş, akciğer hastalığı, ağır sigara, yüksek akciğer kapasitesi gereken sporcu, mediastinal tm/akciğer met. Alternatif EP/VIP.","cat":"mcq","id":"testis_107","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Metastatik seminom prognoz gruplarına göre kemoterapi rejimi? (EBU bankasındaki \"orta=3×BEP\" cevabını EAU ile teyit et)","options":["İyi 3×BEP, orta 4×BEP","İyi 4×BEP, orta 3×BEP","Hepsi 3×BEP","Hepsi 4×EP"],"correct":0,"answer":"EAU: iyi prognoz 3×BEP, orta prognoz 4×BEP. EBU bankasındaki \"orta = 3×BEP\" şıkkı yanlıştır; güncel doğru cevap 4×BEP.","cat":"mcq","id":"testis_108","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"Postpubertal teratomun davranışı ve tedavi mantığı?","options":["Benign, izlem yeter","Malign, kemoterapiye çok duyarlı","Malign, kemo-dirençli → cerrahi","Premalign, RT ile tedavi"],"correct":2,"answer":"Postpubertal teratom maligndir ve kemo-dirençlidir; bu yüzden rezidü/metastazda cerrahi (rezeksiyon) esastır. Prepubertal teratom ise benigndir.","cat":"mcq","id":"testis_109","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"mcq","q":"CS1 patolojik \"kötü prognozlu\" seminom hastasında (rete testis invazyonu +) bir uzmanlık tutanağı \"1 kür karboplatin verilir\" diyor. Doçentlik düzeyinde en doğru yaklaşım?","options":["Tutanak doğru: rete testis varsa karboplatin zorunlu","Standart aktif izlem; risk faktörleri tedaviyi tek başına belirlemez","Hemen 3×BEP","Radyoterapi"],"correct":1,"answer":"Güncel EAU: CS1'de standart aktif izlem. Seminom risk modeli artık boyut+rete+LVI kombinasyonu, EAU rutin adjuvan önermiyor. Adjuvan tercih edilirse tek doz karboplatin AUC 7 — ama \"rete testis → zorunlu karboplatin\" eski/yanlış çerçevedir.","cat":"vig","id":"testis_110","topic":"testis","group":0,"topicTitle":"Testis Tümörü","src":"","flag":false},{"type":"open","q":"Ailesel prostat kanseri tanımı?","answer":"<b>2 birinci derece</b> akraba <i>veya</i> <b>1 birinci + ≥2 ikinci derece</b> akraba (herhangi yaşta). Popülasyonun ~%10–20'si.","cat":"","id":"prostat_111","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Herediter prostat kanseri tanımı?","answer":"≥3 birinci derece akraba; <i>veya</i> 3 ardışık kuşakta PCa; <i>veya</i> 2 kardeşte <b>&lt;55 yaş</b> tanı.","cat":"","id":"prostat_112","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"En güçlü germline ilişkisi olan gen ve klinik karşılığı?","answer":"<b>BRCA2</b> — en güçlü, agresif, kötü prognoz. mCRPC'de <b>PARP inhibitörü</b> adayı. Diğerleri: BRCA1, ATM, HOXB13, MMR (Lynch → pembrolizumab).","cat":"","id":"prostat_113","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"ERSPC vs PLCO neden zıt sonuç verdi?","answer":"<b>ERSPC:</b> mortalite ↓ (16 yılda NNS 570 / NNT 18). <b>PLCO:</b> fark yok — kontrol kolu ad hoc PSA ile <b>kontamine</b> → aslında organize vs fırsatçı tarama.","cat":"","id":"prostat_114","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"EAU tarama duruşu özetle?","answer":"Organize popülasyon taraması yok. Bireysel, <b>risk-adapte</b>, paylaşılan karar. Yaşam beklentisi <b>≥10–15 yıl</b>. Danışmadan PSA yapma.","cat":"","id":"prostat_115","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"PSA'yı yanlış yükselten kaynaklar?","answer":"<b>Febril ÜSE / prostatit</b>, üriner retansiyon, prostat biyopsisi, ürolojik girişim. <b>DRE klinik anlamlı yükseltmez.</b> 5-ARI'de ölçülen değeri ×2 al.","cat":"","id":"prostat_116","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"mpMRI sekansları ve en kritik olanı?","answer":"<b>T2 + DWI + DCE.</b> <b>DWI</b> en kritik (periferik zonda birincil). DCE düşük katkı → biparametrik MR tartışması. <b>PI-RADS v2.1</b> ile raporlanır.","cat":"","id":"prostat_117","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Hangi PI-RADS'ta biyopsi ve hangi teknik?","answer":"<b>PI-RADS ≥3</b> → hedefli + sistematik biyopsi <b>birlikte</b>. EAU: <b>transperineal</b> yaklaşım (sepsis riski ↓).","cat":"","id":"prostat_118","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Biyopsi öncesi MR'ın yeri?","answer":"Biyopsi öncesi <b>zorunlu/altın standart</b>. MR-yolu csPCa'yı daha iyi yakalar, gereksiz biyopsi & anlamsız kanseri azaltır; önceki biyopsi negatifse üstünlük en yüksek (~%44).","cat":"","id":"prostat_119","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"ISUP Grade Group 4 = hangi Gleason?","answer":"<b>Gleason 8.</b> (GG1≤6, GG2=3+4, GG3=4+3, GG4=8, GG5=9–10)","cat":"","id":"prostat_120","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"GG2 ile GG3 farkı neden önemli?","answer":"İkisi de Gleason 7; <b>GG2 = 3+4</b> (primer 3 → favourable), <b>GG3 = 4+3</b> (primer 4 → daha kötü). Intermediate alt-sınıflamayı belirler.","cat":"","id":"prostat_121","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"cT3a / cT3b / cT4 ayrımı?","answer":"<b>T3a</b> ekstrakapsüler ekstansiyon · <b>T3b</b> seminal vezikül invazyonu · <b>T4</b> komşu organ (mesane boynu/rektum/pelvik duvar).","cat":"","id":"prostat_122","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"M1 alt grupları?","answer":"<b>M1a</b> uzak (bölgesel olmayan) lenf nodu · <b>M1b</b> kemik · <b>M1c</b> viseral.","cat":"","id":"prostat_123","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Hangi risk grubuna evreleme görüntülemesi?","answer":"Düşük risk: <b>yok</b>. Intermediate/yüksek: kesitsel görüntüleme + <b>kemik sintigrafisi</b>. <b>PSMA-PET</b> daha duyarlı; EAU 2025/26 → <b>intermediate evrelemede de</b>.","cat":"","id":"prostat_124","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"EAU düşük / intermediate / yüksek risk eşikleri?","answer":"<b>Düşük:</b> PSA&lt;10 <i>ve</i> GG1 <i>ve</i> cT1–2a. <b>Intermediate:</b> PSA 10–20 <i>veya</i> GG2–3 <i>veya</i> cT2b. <b>Yüksek:</b> PSA&gt;20 <i>veya</i> GG4–5 <i>veya</i> cT2c.","cat":"","id":"prostat_125","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"EAU 2025'in en önemli risk değişikliği?","answer":"<b>Intermediate-risk favourable / unfavourable</b> olarak ikiye bölündü. (NCCN ayrıca very-high-risk ekler.)","cat":"","id":"prostat_126","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Yüksek risk tanımında EAU/D'Amico ile AUA farkı?","answer":"EAU/D'Amico → <b>cT2c</b>; AUA → <b>≥cT3</b>. PSA&gt;20 ve GG4–5 ortak.","cat":"","id":"prostat_127","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Lokalize PCa tedavi kategorileri?","answer":"<b>Hemen küratif:</b> RP, RT (±brakiterapi). <b>Ertelenmiş küratif:</b> aktif izlem. <b>Küratif olmayan:</b> watchful waiting.","cat":"","id":"prostat_128","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Aktif izlemden aktif tedaviye geçiş tetiği?","answer":"<b>Biyopside progresyon</b> (ISUP grade / pozitif kor / kor tutulumu) veya T-evre progresyonu. <b>PSA tek başına zayıf kriter.</b>","cat":"","id":"prostat_129","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Fokal tedavi (HIFU/kriyo) EAU yaklaşımı?","answer":"<b>Deneysel / klinik çalışma kapsamında</b>, rutin standart değil. Hasta sıklıkla AS'ye de eşit uygun.","cat":"","id":"prostat_130","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Prostat ile rektum arasındaki fasya?","answer":"<b>Denonvilliers fasyası.</b>","cat":"","id":"prostat_131","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Robotik RP sonrası tromboprofilaksi (düşük risk)?","answer":"PLND <b>yoksa → yalnız mekanik</b> profilaksi. PLND varsa → <b>4 hafta</b> mekanik + farmakolojik.","cat":"","id":"prostat_132","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Yüksek risk/lokal ileri multimodal tedavi?","answer":"<b>RT + uzun süreli ADT</b> (~24–36 ay; ADT <b>radyosensitize</b> de eder) <i>veya</i> <b>RP + genişletilmiş PLND</b> ± adjuvan/erken-kurtarma RT.","cat":"","id":"prostat_133","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Yüksek riskli biyokimyasal nüks tanımı ve tedavisi?","answer":"PSA ikiye katlanma süresi <b>≤9 ay</b>. → <span style='color:#ffd9a8'>EMBARK</span>: <b>enzalutamid ± ADT</b> (M0).","cat":"","id":"prostat_134","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"En hızlı kastrasyon yöntemi?","answer":"<b>Bilateral orşiektomi</b> (saatler içinde). GnRH antagonisti (degareliks) agonistten hızlı ve <b>flare yapmaz</b>; agonist flare yapar.","cat":"","id":"prostat_135","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"CHAARTED 'yüksek hacim' tanımı?","answer":"<b>Viseral metastaz</b> <i>veya</i> <b>≥4 kemik metastazı</b> (en az biri vertebral kolon/pelvis dışında).","cat":"","id":"prostat_136","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"mHSPC doublet seçenekleri ve trial'ları?","answer":"ADT + <b>docetaxel</b> (CHAARTED, STAMPEDE) <i>veya</i> ADT + <b>ARPI</b>: abirateron (LATITUDE), enzalutamid (ENZAMET/ARCHES), apalutamid (TITAN).","cat":"","id":"prostat_137","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"mHSPC triplet rejimleri ve trial'ları?","answer":"ADT + docetaxel + <b>darolutamid</b> (ARASENS) <i>veya</i> + <b>abirateron</b> (PEACE-1). Fit, yüksek hacim/de novo. İlke: <b>erken yoğunlaştırma</b>.","cat":"","id":"prostat_138","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"NSAA monoterapisi neden önerilmez?","answer":"Bikalutamid/flutamid/nilutamid monoterapisi → <b>kötü onkolojik sonuç</b> + yüksek bırakma oranı.","cat":"","id":"prostat_139","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"CRPC tanımı (EAU)?","answer":"Kastrasyon testosteronu <b>&lt;50 ng/dL</b> altında + <b>biyokimyasal</b> (1 hafta arayla 2 ardışık PSA artışı, nadir +%50, PSA&gt;2) <i>veya</i> <b>radyolojik</b> progresyon (≥2 yeni kemik lezyonu / RECIST 1.1).","cat":"","id":"prostat_140","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Daima prednizon ile verilen ajan?","answer":"<b>Abirateron</b> (CYP17A1 inhibitörü; mineralokortikoid fazlalığını dengeler). Enzalutamid/olaparib/Lu-PSMA gerektirmez.","cat":"","id":"prostat_141","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"177Lu-PSMA ile ilgili 3 trial?","answer":"<b>VISION</b> (ARSI+taksan sonrası OS+), <b>TheraP</b> (cabazitaxel'e üstün PSA yanıtı), <b>PSMAfore</b> (kemo-naif: rPFS+ ama OS farkı yok = 'paradoks').","cat":"","id":"prostat_142","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"PARP inhibitör kombinasyonları ve trial'ları?","answer":"<b>olaparib/abirateron</b> (PROpel), <b>niraparib/abirateron</b> (MAGNITUDE), <b>talazoparib/enzalutamid</b> (TALAPRO-2). Tekli: olaparib, rucaparib. HRR/BRCA mutasyonunda.","cat":"","id":"prostat_143","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"mCRPC'de altın sıralama kuralı?","answer":"<b>ARPI → ARPI ardışık kullanımından kaçın</b> (çapraz direnç). Tüm hastaya moleküler test + MMR/MSI. Seçim genomik profil + önceki tedaviye göre.","cat":"","id":"prostat_144","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"Radium-223 endikasyon sınırı?","answer":"<b>Yalnız kemik</b> metastazı, viseral metastaz <b>yok</b>; semptomatik. Abirateron+prednizon ile kombinasyonu kontrendike (kırık riski).","cat":"","id":"prostat_145","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"PSA velositesi biyopsi kararında nasıl kullanılır?","answer":"<b>Tek başına</b> sekonder test/biyopsi endikasyonu olarak <b>kullanılmaz</b> (EAU kuvvetli öneri).","cat":"","id":"prostat_146","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"ISUP (International Society of Urological Pathology) grade group 4, hangi Gleason skoruna karşılık gelir?","options":["Gleason 6","Gleason 7","Gleason 8","Gleason 9"],"correct":2,"answer":"GG1≤6, GG2=3+4, GG3=4+3, <b>GG4=8</b>, GG5=9–10.","cat":"EBU · Patoloji","id":"prostat_147","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi ailesel (familial) prostat kanserini en iyi tanımlar?","options":["Herhangi yaşta 3 birinci derece akraba","Herhangi yaşta 2 birinci derece akraba VEYA 1 birinci + ≥2 ikinci derece akraba","1 birinci derece akrabada <50 yaş tanı","3 ardışık kuşakta tanı"],"correct":1,"answer":"Ailesel = 2 birinci derece <i>veya</i> 1 birinci + ≥2 ikinci derece. (C ve D <b>herediter</b> tanıma daha yakın.)","cat":"EBU · Genetik","id":"prostat_148","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi PSA değerinde yanlış yükselmenin tanınmış bir kaynağıdır?","options":["Dijital rektal muayene (DRE)","Febril üriner sistem enfeksiyonu","3 ay önce yapılmış prostat biyopsisi","Kronik üriner retansiyon"],"correct":1,"answer":"<b>Febril ÜSE / prostatit</b> klasik yanlış yükselme kaynağı. <b>DRE klinik anlamlı PSA artışı yapmaz</b> — sık tuzak.","cat":"EBU · Tanı","id":"prostat_149","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Aktif izlemdeki bir hastada hangisi definitif tedaviye geçişi gerektirir?","options":["PSA yükselmesi","DRE'de progresyon","MR'da progresyon","Biyopside progresyon"],"correct":3,"answer":"En güçlü tetik = <b>biyopside progresyon</b> (ISUP grade / pozitif kor / kor tutulumu). PSA tek başına zayıf kriter.","cat":"EBU · Lokalize","id":"prostat_150","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Prostat kanserli hastalarda testosteron kastrasyon seviyesine en hızlı hangi yöntem ulaşır?","options":["LH-RH agonistleri","LH-RH antagonistleri","Bilateral orşiektomi","Antiandrojenler"],"correct":2,"answer":"<b>Bilateral orşiektomi</b> (saatler). Antagonist (degareliks) agonistten hızlı ve flare yapmaz; agonist başlangıç flare yapar.","cat":"EBU · mHSPC","id":"prostat_151","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Aşağıdaki ilaçlardan hangisi daima prednizon/prednizolon ile birlikte uygulanmalıdır?","options":["Enzalutamid","Abirateron","177Lu-vipivotid tetraksetan","Olaparib"],"correct":1,"answer":"<b>Abirateron</b> (CYP17A1 inhibitörü) → mineralokortikoid fazlalığını dengelemek için daima prednizonla.","cat":"EBU · mCRPC","id":"prostat_152","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Prostat ile rektum arasında bulunan fasyanın adı nedir?","options":["Endopelvik fasya","Puboprostatik bağ","Denonvilliers fasyası","Prostatik fasya"],"correct":2,"answer":"<b>Denonvilliers fasyası</b> — prostat ile rektum arası.","cat":"EBU · Anatomi","id":"prostat_153","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Tromboz riski düşük hastada, PLND yapılmadan robotik prostatektomi sonrası önerilen tromboprofilaksi?","options":["Yalnızca mekanik profilaksi","2 hafta mekanik + farmakolojik","4 hafta mekanik + farmakolojik","Profilaksiye gerek yok, erken mobilizasyon"],"correct":0,"answer":"Düşük risk + PLND yok → <b>yalnız mekanik</b>. PLND eklenirse 4 hafta mekanik + farmakolojik.","cat":"EBU · Cerrahi","id":"prostat_154","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Multiparametrik prostat MR'ında periferik zon için birincil ve en kritik sekans hangisidir?","options":["T2-ağırlıklı","Difüzyon-ağırlıklı (DWI)","Dinamik kontrastlı (DCE)","T1-ağırlıklı"],"correct":1,"answer":"<b>DWI</b> periferik zonda birincil sekans. DCE düşük katkı → biparametrik MR tartışması.","cat":"Bilgi · Tanı","id":"prostat_155","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Biyopsi öncesi mpMRI'da hangi PI-RADS eşiğinden itibaren hedefli + sistematik biyopsi önerilir?","options":["PI-RADS ≥2","PI-RADS ≥3","PI-RADS ≥4","PI-RADS 5"],"correct":1,"answer":"<b>PI-RADS ≥3</b> → hedefli + sistematik biyopsi birlikte (EAU kuvvetli öneri).","cat":"Bilgi · Tanı","id":"prostat_156","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"EAU 2025 kılavuzunda lokalize PCa risk gruplarındaki en önemli yapısal değişiklik nedir?","options":["Yüksek riskin kaldırılması","Intermediate-riskin favourable/unfavourable olarak ikiye bölünmesi","Düşük riskin çok-düşük riske ayrılması","CAPRA skorunun zorunlu kılınması"],"correct":1,"answer":"EAU 2025: <b>intermediate-risk favourable / unfavourable</b> ayrımı — tedavi yoğunluğunu belirler.","cat":"Bilgi · Risk","id":"prostat_157","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"İki lobu da tutan, organa sınırlı klinik T evresi hangisidir?","options":["cT2a","cT2b","cT2c","cT3a"],"correct":2,"answer":"<b>cT2c</b> = iki lob, organa sınırlı. T3a ekstrakapsüler, T3b seminal vezikül.","cat":"Bilgi · Evreleme","id":"prostat_158","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"CHAARTED'e göre 'yüksek hacim' metastatik hastalık tanımı?","options":["≥2 kemik metastazı","Viseral metastaz veya ≥4 kemik metastazı (≥1'i kolon/pelvis dışı)","Yalnız vertebral metastaz","PSA >100 ng/mL"],"correct":1,"answer":"<b>Viseral metastaz</b> <i>veya</i> <b>≥4 kemik metastazı</b> (en az biri vertebral kolon/pelvis dışında).","cat":"Bilgi · mHSPC","id":"prostat_159","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"ADT + docetaxel + darolutamid triplet rejimini değerlendiren faz-3 çalışma?","options":["LATITUDE","ARASENS","PEACE-1","ENZAMET"],"correct":1,"answer":"<b>ARASENS</b> = darolutamid triplet. PEACE-1 = abirateron triplet.","cat":"Bilgi · mHSPC","id":"prostat_160","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Yalnızca kemik metastazı olan (viseral yok) semptomatik mCRPC'de kullanılan radyofarmasötik?","options":["177Lu-PSMA-617","Radium-223","68Ga-PSMA","Sipuleucel-T"],"correct":1,"answer":"<b>Radium-223</b> (alfa-emitör) — yalnız kemik, viseral met yok. Abirateron+prednizonla kombinasyonu kontrendike.","cat":"Bilgi · mCRPC","id":"prostat_161","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"CRPC tanımı için gereken serum testosteron eşiği?","options":["<100 ng/dL","<50 ng/dL","<20 ng/dL","<10 ng/dL"],"correct":1,"answer":"Kastrasyon düzeyi <b>&lt;50 ng/dL (1.7 nmol/L)</b> + biyokimyasal/radyolojik progresyon.","cat":"Bilgi · mCRPC","id":"prostat_162","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"68 yaş, fit; PSA 30, biyopsi Gleason 4+5 (GG5), cT3b. Kemik sintigrafisinde multipl kemik metastazı, viseral yok. En uygun ilk basamak sistemik tedavi?","options":["Tek başına ADT","ADT + bikalutamid monoterapi","ADT + docetaxel + ARPI (triplet)","Yalnız radyoterapi"],"correct":2,"answer":"Fit, yüksek hacim de novo metastatik → <b>triplet</b> (ADT + docetaxel + darolutamid/abirateron). ADT tek başına standart değil; NSAA monoterapi önerilmez.","cat":"Hoca · Özdal (vaka)","id":"prostat_163","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"Yüksek riskli lokalize prostat kanserinde radyoterapi seçildi. Onkolojik faydayı artırmak için RT'ye ne eklenir?","options":["Kısa süreli (4 ay) ADT","Uzun süreli (24–36 ay) ADT","Adjuvan docetaxel","PARP inhibitörü"],"correct":1,"answer":"Yüksek riskte RT + <b>uzun süreli ADT (~24–36 ay)</b>. ADT ayrıca hücreleri <b>radyosensitize</b> eder.","cat":"Hoca · Cüneyt (RT)","id":"prostat_164","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"mCRPC hastası abirateron+prednizon altında progrese oldu. Aşağıdakilerden hangisinden kaçınılmalıdır?","options":["Docetaksel kemoterapisi","Enzalutamide geçiş","Cabazitaxel (sonraki basamakta)","Lu-PSMA (PSMA-pozitifse)"],"correct":1,"answer":"<b>ARPI → ARPI ardışık kullanımından kaçın</b> (çapraz direnç). Abirateron sonrası enzalutamide geçiş düşük yararlı.","cat":"Hoca · Özdal (vaka)","id":"prostat_165","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"BRCA2 germline mutasyonu saptanan mCRPC hastasında en uygun hedefe yönelik tedavi sınıfı?","options":["mTOR inhibitörü","PARP inhibitörü","VEGF inhibitörü","Antikor-ilaç konjugatı"],"correct":1,"answer":"BRCA/HRR mutasyonu → <b>PARP inhibitörü</b> (olaparib, rucaparib veya kombinasyonlar: PROpel/MAGNITUDE/TALAPRO-2).","cat":"Hoca · Özdal (ilaç)","id":"prostat_166","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"58 yaş, sağlıklı; PSA 6, biyopsi Gleason 3+3 (GG1), cT1c, tek korda minimal tutulum. EAU'ya göre önerilen yaklaşım?","options":["Hemen radikal prostatektomi","Aktif izlem","Watchful waiting","Hemen radyoterapi + ADT"],"correct":1,"answer":"Düşük risk lokalize + iyi yaşam beklentisi → <b>aktif izlem</b> standart (PSA/DRE/mpMRI/tekrar biyopsi).","cat":"Hoca · klinik","id":"prostat_167","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"mcq","q":"M0 yüksek riskli biyokimyasal nükste (PSA ikiye katlanma süresi ≤9 ay) EMBARK temelli EAU önerisi?","options":["Hemen kemoterapi","Enzalutamid ± ADT","Yalnız izlem","Radium-223"],"correct":1,"answer":"<b>EMBARK</b> → M0 yüksek riskli BCR'de <b>enzalutamid ± ADT</b>.","cat":"Bilgi · BCR","id":"prostat_168","topic":"prostat","group":0,"topicTitle":"Prostat Kanseri","src":"","flag":false},{"type":"open","q":"NMIBC hangi üç patolojik antiteyi kapsar?","answer":"<b>Ta</b> (non-invaziv papiller), <b>T1</b> (lamina propria invazyonu), <b>Tis/CIS</b> (düz yüksek dereceli, mukozaya sınırlı). Mesane kanserinin ~%75'i NMIBC.","cat":"","id":"nmibc_169","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"NMIBC'de tedaviyi belirleyen temel ilke nedir?","answer":"Hastanın <b>rekürrens ve progresyon riskine</b> göre risk grubuna ayırmak. Tedaviyi risk grubu belirler — NMIBC tek hastalık değil, iki ayrı riskli heterojen spektrumdur.","cat":"","id":"nmibc_170","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Mesane kanserinde en sık risk faktörü ve oranı?","answer":"<b>Sigara</b> — olguların <b>~%50'sinden</b> sorumlu. Etki kümülatif, maruziyet–tanı arası >20 yıl. Mesleki maruziyet ~%10.","cat":"","id":"nmibc_171","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Schistosoma haematobium hangi mesane kanseri tipine yol açar?","answer":"<b>Skuamöz hücreli karsinom</b> — kronik granülomatöz inflamasyon yoluyla.","cat":"","id":"nmibc_172","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Hangi genetik genotipler mesane kanseri yatkınlığını artırır?","answer":"<b>NAT1/NAT2 yavaş asetilatör</b> ve <b>GSTM-1 null</b> — özellikle tütüne maruz kalındığında.","cat":"","id":"nmibc_173","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"En kritik kötü prognozlu varyant histoloji ve yaklaşımı?","answer":"<b>Mikropapiller</b> ürotelyal karsinom. NMIBC'de bile BCG etkisiz → <span class='w'>erken radikal sistektomi</span> öner.","cat":"","id":"nmibc_174","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"İki derecelendirme sistemi nedir, EAU hangisini önerir?","answer":"<b>WHO 1973</b> (G1/G2/G3) ve <b>WHO 2004/2016</b> (PUNLMP/düşük/yüksek dereceli). EAU <b>her ikisini birlikte</b> raporlamayı önerir.","cat":"","id":"nmibc_175","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"CIS'in tanımı ve standart tedavisi?","answer":"Düz, <b>yüksek dereceli</b>, mukozaya sınırlı lezyon; biyolojik olarak MIBC'ye benzer. İnflamasyonla karışır → biyopsi şart. Standart tedavi: <b>BCG</b>.","cat":"","id":"nmibc_176","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"İdrar sitolojisi hangi tümörlerde duyarlı, hangisinde zayıf?","answer":"<b>CIS ve yüksek dereceli</b> tümörde duyarlı; <span class='w'>düşük dereceli</span> tümörde zayıf. Pozitif sitoloji + negatif sistoskopi → CIS/üst sistem/prostatik üretra araştır.","cat":"","id":"nmibc_177","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"PDD (mavi ışık) ve NBI ne sağlar?","answer":"<b>PDD</b> (heksaminolevulinat): CIS ve küçük tümör saptamasını artırır. <b>NBI</b>: beyaz ışığı 415/540 nm'ye filtreleyerek hipervasküler dokuyla kontrast sağlar.","cat":"","id":"nmibc_178","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Özkürkçügil vaka sorusunda nasıl başlanmalı?","answer":"Herhangi bir tetkik söylemeden önce <b>'önce ayrıntılı anamnez ve fizik muayene'</b> ile başla.","cat":"","id":"nmibc_179","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"TURBT spesimeninde mutlaka ne bulunmalı, neden?","answer":"<b>Detrüsör kası</b> (Ta düşük dereceli küçük tümör hariç). Kas yokluğu evreleme hatasına (understaging) yol açar.","cat":"","id":"nmibc_180","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"En-blok rezeksiyon hangi tümörlerde uygundur?","answer":"Genellikle <b>&lt;3 cm</b> tümörlerde. Koter artefaktı az → daha doğru patolojik değerlendirme. <span class='w'>Tuzak: '>3 cm için' demek yanlıştır.</span>","cat":"","id":"nmibc_181","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Re-TURBT endikasyonları nelerdir?","answer":"İnkomplet ilk rezeksiyon; ilk örnekte <b>kas yokluğu</b>; tüm <b>T1</b>; tüm <b>yüksek dereceli</b> (primer izole CIS hariç).","cat":"","id":"nmibc_182","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Re-TURBT ne zaman yapılmalı?","answer":"İlk operasyondan <b>2–6 hafta</b> sonra. Erken (14–42 gün) yapılan daha iyi rekürrenssiz/progresyonsuz sağkalım (Baltacı 2015).","cat":"","id":"nmibc_183","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"İlk örnekte kas yoksa T1 understaging oranı ne olur?","answer":"Genel T1 understaging ~%30; <b>ilk örnekte kas yoksa %45'e</b> çıkar.","cat":"","id":"nmibc_184","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"EORTC risk tablolarındaki 6 faktör nedir?","answer":"<b>Tümör sayısı, boyut, önceki rekürrens hızı, T evresi, derece, eşlik eden CIS</b> (Sylvester 2006, 2596 hasta).","cat":"","id":"nmibc_185","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Güncel EAU risk grubu kaç katmanlıdır?","answer":"<b>Dört katman:</b> düşük / orta / yüksek / <span class='w'>çok yüksek</span>. Primer'in bazı bölümlerindeki 3 katman eskidir.","cat":"","id":"nmibc_186","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"CUETO skorlaması özellikle hangi hastalarda kullanılır?","answer":"Özellikle <b>BCG alan</b> hastalarda (5–6 ay BCG sonrası) rekürrens ve progresyon öngörür.","cat":"","id":"nmibc_187","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Tek erken instilasyon (SI) ne zaman ve kimde faydalı?","answer":"İdeali <b>aynı gün</b> (en geç 24 saat). Sadece <b>düşük/orta riskte</b> (EORTC rekürrens skoru &lt;5, ≤1 rekürrens/yıl). Çoklu/yüksek riskte tek başına yetersiz.","cat":"","id":"nmibc_188","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Orta riskte BCG mi MMC mi? Neye göre?","answer":"BCG idame rekürrenste MMC'ye üstün (Malmström: %32 RR azalması) ama progresyon/sağkalımda fark yok ve daha toksik. → Kararı görece <b>toksisite</b> belirler; MMC ilk tercih olabilir.","cat":"","id":"nmibc_189","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Yüksek riskte BCG idame şeması nedir?","answer":"İndüksiyon 6 hafta + idame <b>SWOG 8507</b>: 3-6-12-18-24-30-36. aylarda 3'er hafta. İdeal süre <b>3 yıl</b> (EORTC 30962).","cat":"","id":"nmibc_190","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Hangi intravezikal ajan progresyonu azaltır?","answer":"<b>BCG</b> — MIBC'ye progresyonu azaltan tek intravezikal ajandır.","cat":"","id":"nmibc_191","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Çok yüksek riskte güncel iki seçenek?","answer":"<b>Erken radikal sistektomi</b> veya <b>BCG</b>. EAU 2025/26'da BCG lehine yeni kanıtlar var; karar paylaşımlı.","cat":"","id":"nmibc_192","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG'nin etki mekanizması nedir?","answer":"Canlı atenüe <i>M. bovis</i> → <b>fibronektin</b> aracılı bağlanma → lokal <b>Th1 immün yanıt</b> (IL-2, IFN-γ, TNF; NK/T-hücre infiltrasyonu).","cat":"","id":"nmibc_193","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG instilasyonu hangi durumlarda yapılmaz?","answer":"<span class='w'>Travmatik kateterizasyon, makroskopik hematüri, aktif sistit, semptomatik İYE.</span> TURBT sonrası 2–3 hafta beklenir (sistemik emilim/sepsis riski).","cat":"","id":"nmibc_194","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG minimum etkili doz ve suşlar?","answer":"Suşlar: Connaught, TICE, RIVM, Tokyo-172, Moreau. Tam doz Connaught ~81 mg; <b>1/3 doz (27 mg)</b> orta riskte aynı etki, az toksisite (CUETO).","cat":"","id":"nmibc_195","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG sepsisi nasıl tedavi edilir?","answer":"BCG kesilir + <b>anti-tüberküloz tedavi (izoniazid + rifampin ± etambutol)</b>; ağır olguda <b>steroid</b> eklenir.","cat":"","id":"nmibc_196","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG-refrakter tanımı?","answer":"Yeterli BCG'ye rağmen <b>3. ayda</b> yüksek dereceli hastalık persistansı veya idame sırasında progresyon.","cat":"","id":"nmibc_197","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG-yanıtsız (unresponsive) tanımı?","answer":"Küme tanım: <b>refrakter + yeterli BCG sonrası 6–12 ayda yüksek dereceli rekürren.</b> Bu grupta tekrar BCG faydasızdır.","cat":"","id":"nmibc_198","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG-yanıtsız hastalıkta altın standart tedavi?","answer":"<b>Radikal sistektomi</b> (Strong öneri).","cat":"","id":"nmibc_199","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"KEYNOTE-057'de pembrolizumab sonucu?","answer":"BCG-yanıtsız CIS'te 3. ay <b>tam yanıt oranı %40.2</b>; yanıt verenlerin %58.5'i 16.7 ay izlemde yanıtı korudu, hiçbiri MIBC/metastaza progrese olmadı. FDA 2020.","cat":"","id":"nmibc_200","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"En yeni FDA onaylı (2025) BCG-yanıtsız ajanı?","answer":"<b>TAR-200 / gemsitabin intravezikal sistem (INLEXZO).</b> SunRISe-1 kohort 2: CR <b>%82</b>, ~%51 1 yılda korundu. <span class='w'>Primer'de yok.</span>","cat":"","id":"nmibc_201","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"BCG-yanıtsız için diğer onaylı mesane koruyucu ajanlar?","answer":"<b>Nadofaragene firadenovec</b> (ADSTILADRIN, gen tedavisi, 2022), <b>N-803/Anktiva + BCG</b> (IL-15 süperagonist, QUILT-3.032, 2024), Gem/Doce ardışık (off-label).","cat":"","id":"nmibc_202","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"EAU 2026: BCG-naïf hastalarda yeni kombinasyon önerisi?","answer":"Seçilmiş yüksek/çok yüksek riskli BCG-naïf hastalarda <b>sasanlimab (CREST)</b> veya <b>durvalumab (POTOMAC) + BCG idame.</b>","cat":"","id":"nmibc_203","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"Prostatik üretra CIS'te mesane koruyucu yaklaşım?","answer":"<b>TUR-P + ardından intravezikal BCG.</b>","cat":"","id":"nmibc_204","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"open","q":"İlk kontrol sistoskopisi ne zaman, neden önemli?","answer":"<b>3. ayda</b> — rekürrensin en önemli prognostik göstergesi (MRC verisi).","cat":"","id":"nmibc_205","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Mesane kanseri epidemiyolojisi için aşağıdakilerden hangisi YANLIŞTIR?","options":["İnsidans erkekte kadına göre yaklaşık 3 kat fazladır","Schistosoma haematobium ile ilişki vardır","Sigara olguların yaklaşık %50'sinden sorumludur","Mesleki risk faktörleri riskin yaklaşık %50'sinden sorumludur"],"correct":3,"answer":"<b>Mesleki maruziyet riskin ~%10'undan sorumludur</b>, %50 değil. Sigara ~%50 ile en sık nedendir. (Primer soru bankası klasik tuzağı.)","cat":"MCQ","id":"nmibc_206","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"En-blok TURBT için aşağıdakilerden hangisi doğrudur?","options":["Genellikle >3 cm büyük tümörler için kullanılır","Koter artefaktını artırarak patolojiyi zorlaştırır","Genellikle <3 cm tümörlerde uygundur ve daha doğru patolojik değerlendirme sağlar","Detrüsör kasının örneklenmesini engeller"],"correct":2,"answer":"<b>En-blok rezeksiyon genelde <3 cm tümörlerde uygundur</b>; koter artefaktı az olduğu için kas tabakası ve invazyon daha net değerlendirilir. <span class='w'>'>3 cm için' demek klasik yanlış.</span>","cat":"MCQ","id":"nmibc_207","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Özkürkçügil Hoca: '65 yaşında erkek, ağrısız makroskopik hematüri ile başvuruyor. İlk yaklaşımınız nedir?'","options":["Hemen sistoskopi planlarım","Önce ayrıntılı anamnez ve fizik muayene, ardından idrar tetkiki ve sistoskopiye yönelirim","Direkt BT-ürografi isterim","İdrar sitolojisi ile başlar, normalse takip ederim"],"correct":1,"answer":"<b>Önce anamnez + fizik muayene.</b> Özkürkçügil profilinde her vaka cevabı anamnez/FM ile başlamalı; doğrudan tetkik söylemek puan kaybettirir. Sonra sistoskopi (altın standart) + sitoloji + üst sistem görüntüleme.","cat":"VAKA","id":"nmibc_208","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"T1 yüksek dereceli tümörde ilk TURBT örneğinde kas yoksa understaging oranı yaklaşık kaçtır?","options":["%10","%30","%45","%70"],"correct":2,"answer":"Genel T1 understaging ~%30; <b>ilk örnekte kas yoksa ~%45'e</b> çıkar. Bu, re-TURBT'nin en güçlü gerekçelerindendir.","cat":"MCQ","id":"nmibc_209","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Re-TURBT için en uygun zamanlama hangisidir?","options":["İlk operasyondan 24 saat sonra","İlk operasyondan 2–6 hafta sonra","İlk operasyondan 3 ay sonra","BCG indüksiyonu tamamlandıktan sonra"],"correct":1,"answer":"<b>2–6 hafta.</b> Erken aralık (14–42 gün) daha iyi rekürrenssiz/progresyonsuz sağkalımla ilişkili (Baltacı 2015, Türk verisi).","cat":"MCQ","id":"nmibc_210","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Tek erken instilasyon (SI) hangi hasta grubunda faydalıdır?","options":["Tüm NMIBC hastalarında eşit fayda sağlar","Sadece yüksek riskli T1 tümörlerde","Düşük/orta riskte (EORTC rekürrens skoru <5, ≤1 rekürrens/yıl)","Sadece CIS varlığında"],"correct":2,"answer":"SI 5 yıllık rekürrensi %59→%45'e indirir ama <b>sadece düşük/orta riskte</b> (rekürrens hızı ≤1/yıl, EORTC rekürrens skoru <5) faydalıdır. Çoklu/yüksek riskte tek başına yetersiz.","cat":"MCQ","id":"nmibc_211","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"Özdal Hoca: 'Yüksek riskli NMIBC'de BCG idame şemasını ve süresini ticari/sayısal ayrıntısıyla söyleyin.'","options":["6 hafta indüksiyon, idame yok","İndüksiyon 6 hafta + SWOG 8507 idame (3-6-12-18-24-30-36. ay, 3'er hafta), ideal 3 yıl","Sadece aylık tek instilasyon 1 yıl","Haftalık 12 hafta kesintisiz"],"correct":1,"answer":"<b>İndüksiyon 6 hafta + SWOG 8507 idame</b> (3,6,12,18,24,30,36. aylarda 3'er haftalık kürler), yüksek riskte ideal süre <b>3 yıl</b> (EORTC 30962). Özdal/Mutlu profilinde sayısal/şema ayrıntısı beklenir.","cat":"VAKA","id":"nmibc_212","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)","src":"","flag":false},{"type":"mcq","q":"BCG instilasyonu için aşağıdaki durumların hangisinde KESİNLİKLE beklenmeli/yapılmamalıdır?","options":["Asemptomatik bakteriüri","Travmatik kateterizasyon / makroskopik hematüri","Hafif dizüri öyküsü","Daha önce MMC almış olmak"],"correct":1,"answer":"<span class='w'>Travmatik kateterizasyon, makroskopik hematüri, aktif sistit, semptomatik İYE</span> → sistemik emilim ve <b>BCG sepsisi</b> riski. İnstilasyon ertelenir. TURBT sonrası rutin 2–3 hafta beklenir.","cat":"MCQ","id":"nmibc_213","topic":"nmibc","group":0,"topicTitle":"Mesane Ca — KMİOMK (NMIBC)
