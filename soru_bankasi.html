topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","type":"open","q":"Aşırı aktif — özellikleri?","answer":"Sfinkter: İnaktif · Risk: İnkontinans baskın, üst sistem riski daha az","cat":"3. Fenotipler ve \"Hostile Bladder\"","src":"İşeme Boz. & Nöropatik Mesane tam notu · 3. Fenotipler ve \"Hostile Bladder\" (Aşama 2 — nottan türetildi)","flag":true},{"id":"iseme_x10427","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","type":"open","q":"Az aktif — özellikleri?","answer":"Sfinkter: Aşırı aktif · Risk: Retansiyon + bir miktar risk","cat":"3. Fenotipler ve \"Hostile Bladder\"","src":"İşeme Boz. & Nöropatik Mesane tam notu · 3. Fenotipler ve \"Hostile Bladder\" (Aşama 2 — nottan türetildi)","flag":true},{"id":"iseme_x10428","topic":"iseme","group":2,"topicTitle":"İşeme Boz. & Nöropatik Mesane","type":"open","q":"Mesane ogmentasyonu (entero/ileosistoplasti): SON SEÇENEK — açıkla","answer":"dirençli NDO ve/veya düşük kompliyansta; yüksek komplikasyon.","cat":"7. İkinci Basamak & Cerrahi (basamaklı)","src":"İşeme Boz. & Nöropatik Mesane tam notu · 7. İkinci Basamak & Cerrahi (basamaklı) (Aşama 2 — nottan türetildi)","flag":true}];
const TOPICS=[{"id":"rcc","title":"Böbrek Tümörü (RCC)","g":0},{"id":"testis","title":"Testis Tümörü","g":0},{"id":"prostat","title":"Prostat Kanseri","g":0},{"id":"nmibc","title":"Mesane Ca — KMİOMK (NMIBC)","g":0},{"id":"mibc","title":"Mesane Ca — KİMK & Metastatik","g":0},{"id":"penisuretraca","title":"Penis & Üretra Kanseri","g":0},{"id":"utuc","title":"UTUC","g":0},{"id":"bph","title":"BPH & Erkek LUTS","g":1},{"id":"tas","title":"Üriner Sistem Taşları","g":1},{"id":"enfeksiyon","title":"Ürolojik Enfeksiyonlar","g":1},{"id":"travma","title":"Ürogenital Travma","g":1},{"id":"uretra","title":"Üretra Hastalıkları & Darlık","g":1},{"id":"nakil","title":"Böbrek Nakli & Adrenal","g":1},{"id":"norouroloji","title":"Nöroüroloji & Ürodinami","g":1},{"id":"kadinuroloji","title":"Fonksiyonel & Kadın Ürolojisi","g":1},{"id":"androloji","title":"Androloji & Seksüel Disfonksiyon","g":1},{"id":"vur","title":"VUR & Çocukta İYE","g":2},{"id":"konjenital","title":"Konjenital Obstrüksiyon","g":2},{"id":"disgenital","title":"Dış Genital & Rekonstrüksiyon","g":2},{"id":"iseme","title":"İşeme Boz. & Nöropatik Mesane","g":2}];
const GROUPS=["Onkoloji","Fonksiyonel & Benign","Pediatri"];
const GCOL=["var(--onk)","var(--fb)","var(--ped)"];
const byTopic={}; TOPICS.forEach(t=>byTopic[t.id]=t);
const qById={}; QUESTIONS.forEach(q=>qById[q.id]=q);
document.getElementById('ver').textContent=QUESTIONS.length+" soru";

/* ---------- persistence ---------- */
const LSKEY="urobank_v1";
function defaultDB(){return{stats:{},srs:{},wrong:[],starred:[],streak:{c:0,last:0},tot:0,cor:0};}
let DB=defaultDB();
function load(){try{const r=localStorage.getItem(LSKEY);if(r)DB=Object.assign(defaultDB(),JSON.parse(r));}catch(e){}}
function save(){try{localStorage.setItem(LSKEY,JSON.stringify(DB));}catch(e){}}
load();
function today(){return Math.floor(Date.now()/86400000);}
const IV=[0,1,3,7,16,35];

/* ---------- scope ---------- */
let scope=new Set(TOPICS.map(t=>t.id)); // default all
let limit=20;

function inScope(q){return scope.has(q.topic);}

/* ---------- grading / SRS ---------- */
function recordAnswer(q,ok){
  // stats
  const s=DB.stats[q.topic]||(DB.stats[q.topic]={seen:0,cor:0});
  s.seen++; if(ok)s.cor++;
  DB.tot++; if(ok)DB.cor++;
  // wrong pool
  const wi=DB.wrong.indexOf(q.id);
  if(ok){ if(wi>=0)DB.wrong.splice(wi,1); } else { if(wi<0)DB.wrong.push(q.id); }
  // srs
  let e=DB.srs[q.id]||{box:0};
  e.box= ok? Math.min(5,(e.box||0)+1) : 0;
  e.due= today()+IV[e.box];
  DB.srs[q.id]=e;
  // streak
  const td=today();
  if(DB.streak.last!==td){ DB.streak.c = (DB.streak.last===td-1)? DB.streak.c+1 : 1; DB.streak.last=td; }
  save();
}

/* ---------- build queue ---------- */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQueue(mode){
  let pool=QUESTIONS.filter(inScope);
  if(mode==='test'||mode==='exam') pool=pool.filter(q=>q.type==='mcq');
  if(mode==='wrong') pool=DB.wrong.map(id=>qById[id]).filter(q=>q&&inScope(q));
  if(mode==='srs'){
    const t=today();
    const due=pool.filter(q=>DB.srs[q.id]&&DB.srs[q.id].due<=t);
    const fresh=pool.filter(q=>!DB.srs[q.id]);
    shuffle(due);shuffle(fresh);
    pool=due.concat(fresh);
    return pool.slice(0,limit).map(q=>q.id);
  }
  shuffle(pool);
  const lim = mode==='exam'?50:limit;
  return pool.slice(0,lim).map(q=>q.id);
}

/* ---------- session ---------- */
let S=null;
function startSession(mode){
  const q=buildQueue(mode);
  if(!q.length){ toast(mode==='wrong'?'Yanlış havuzun boş 👏':'Bu kapsamda soru yok'); return; }
  S={mode,queue:q,pos:0,results:[],answered:false};
  document.getElementById('back').classList.remove('hidden');
  renderQ();
}
function curQ(){return qById[S.queue[S.pos]];}
function renderQ(){
  const q=curQ(); S.answered=false;
  const isExam=S.mode==='exam';
  const asMCQ = q.type==='mcq';
  const titles={test:'Test',exam:'Sınav Simülasyonu',sozlu:'Sözlü Modu',wrong:'Yanlışlarım',srs:'Aralıklı Tekrar'};
  document.getElementById('title').textContent=titles[S.mode];
  document.getElementById('mini').textContent=byTopic[q.topic].title;
  const starred=DB.starred.includes(q.id);
  let h=`<div class="sessmeta"><span>${S.pos+1} / ${S.queue.length}</span><span>${S.mode==='exam'?'Süre yok · sonda puan':'Doğru: '+S.results.filter(r=>r.ok).length}</span></div>
    <div class="prog"><i style="width:${(S.pos)/S.queue.length*100}%"></i></div>
    <div class="qtopic">${esc(byTopic[q.topic].title)}${q.flag?'<span class="flagwarn">⚠ gözden geçir</span>':''}</div>
    <div class="qtext serif">${q.q}</div>`;
  if(asMCQ){
    h+=`<div id="opts">`;
    q.options.forEach((o,i)=>{h+=`<button class="opt" data-i="${i}"><span class="k">${String.fromCharCode(65+i)}</span><span>${o}</span></button>`;});
    h+=`</div>`;
    if(!isExam) h+=`<div class="ansbox" id="ans"></div>`;
  } else {
    h+=`<button class="reveal" id="rev">Cevabı göster</button><div class="ansbox" id="ans">${q.answer||'<i>(açıklama yok)</i>'}${srcLine(q)}</div>
        <div class="gradebtns hidden" id="grades"><button class="no" onclick="gradeOpen(false)">Bilemedim</button><button class="know" onclick="gradeOpen(true)">Bildim</button></div>`;
  }
  h+=`<div class="rowbtns"><button class="jump" onclick="jumpTopic('${q.topic}')">📖 Bu konunun notu</button><button class="star ${starred?'on':''}" id="star" onclick="toggleStar('${q.id}')">${starred?'★ Yıldızlı':'☆ Yıldızla'}</button></div>
      <button class="next" id="next" onclick="nextQ()">${S.pos===S.queue.length-1?'Bitir →':'Sonraki →'}</button>`;
  document.getElementById('main').innerHTML=h;
  if(asMCQ){
    document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>pickMCQ(+b.dataset.i));
  } else {
    document.getElementById('rev').onclick=()=>{
      document.getElementById('ans').classList.add('show');
      document.getElementById('grades').classList.remove('hidden');
      document.getElementById('rev').style.display='none';
    };
  }
  window.scrollTo(0,0);
}
function srcLine(q){
  let s='';
  if(q.src) s=q.src;
  return `<div class="srcline">Kaynak: ${q.src?esc(q.src):'onaylı çalışma materyali (Aşama 1)'} · Konu: ${esc(byTopic[q.topic].title)}</div>`;
}
function pickMCQ(idx){
  if(S.answered)return; S.answered=true;
  const q=curQ(); const ok=idx===q.correct; const isExam=S.mode==='exam';
  document.querySelectorAll('.opt').forEach(b=>{
    const i=+b.dataset.i; b.style.pointerEvents='none';
    if(i===q.correct)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  S.results.push({id:q.id,ok}); recordAnswer(q,ok);
  if(!isExam){
    const a=document.getElementById('ans');
    a.innerHTML=(ok?'✅ <b>Doğru.</b> ':'❌ <b>Yanlış.</b> ')+(q.answer||'')+srcLine(q);
    a.classList.add('show');
    document.getElementById('next').classList.add('show');
  } else {
    setTimeout(nextQ,260);
  }
}
function gradeOpen(ok){
  if(S.answered)return; S.answered=true;
  const q=curQ();
  S.results.push({id:q.id,ok}); recordAnswer(q,ok);
  document.getElementById('grades').classList.add('hidden');
  document.getElementById('next').classList.add('show');
  toast(ok?'Bildin ✓':'Tekrar havuzuna eklendi');
}
function nextQ(){ if(S.pos<S.queue.length-1){S.pos++;renderQ();} else finish(); }
function finish(){
  const tot=S.results.length, cor=S.results.filter(r=>r.ok).length;
  const pct=tot?Math.round(cor/tot*100):0;
  // per-topic breakdown this session
  const bt={};
  S.results.forEach(r=>{const t=qById[r.id].topic;(bt[t]=bt[t]||{s:0,c:0}).s++;if(r.ok)bt[t].c++;});
  let rows='';
  Object.keys(bt).sort((a,b)=>(bt[a].c/bt[a].s)-(bt[b].c/bt[b].s)).forEach(t=>{
    const o=bt[t],p=Math.round(o.c/o.s*100);
    rows+=`<div class="rtopic"><span>${esc(byTopic[t].title)}</span><span class="b" style="color:${p>=70?'var(--ok)':p>=50?'var(--amber)':'var(--no)'}">${o.c}/${o.s}</span></div>`;
  });
  const msg=pct>=85?'Sözlü düzeyi — sağlam.':pct>=70?'İyi, birkaç noktayı tekrar et.':pct>=50?'Orta — yanlışlarını tekrar çöz.':'Bu kapsamı bir tur daha çalış.';
  document.getElementById('title').textContent='Sonuç';
  document.getElementById('main').innerHTML=`<div class="result"><div class="big">${cor}/${tot}</div><div class="pct">%${pct} · ${msg}</div></div>
    <div class="rtopics">${rows}</div>
    <div class="tools"><button class="toolbtn" onclick="startSession('${S.mode}')">↻ Aynı modda tekrar</button>
    ${S.results.some(r=>!r.ok)?`<button class="toolbtn" onclick="startSession('wrong')">Yanlışları çöz</button>`:''}
    <button class="toolbtn" onclick="goHome()">Ana sayfa</button></div>`;
  window.scrollTo(0,0);
}
function toggleStar(id){
  const i=DB.starred.indexOf(id);
  if(i>=0)DB.starred.splice(i,1);else DB.starred.push(id);
  save();
  const b=document.getElementById('star'); if(b){const on=DB.starred.includes(id);b.classList.toggle('on',on);b.textContent=on?'★ Yıldızlı':'☆ Yıldızla';}
}
function jumpTopic(t){ toast('Atlas ayrı dosyada — not için atlası aç'); }

/* ---------- home ---------- */
function goHome(){
  S=null; document.getElementById('back').classList.add('hidden');
  document.getElementById('title').textContent='Üroloji Soru Bankası';
  document.getElementById('mini').textContent='Doçentlik · test · sözlü · aralıklı tekrar';
  const acc=DB.tot?Math.round(DB.cor/DB.tot*100):0;
  const t=today(); const due=QUESTIONS.filter(q=>DB.srs[q.id]&&DB.srs[q.id].due<=t).length;
  const streak=(DB.streak.last>=t-1)?DB.streak.c:0;
  // weak topics
  const weak=TOPICS.map(tp=>{const s=DB.stats[tp.id];return s&&s.seen>=5?{id:tp.id,title:tp.title,p:Math.round(s.cor/s.seen*100),seen:s.seen}:null;})
    .filter(x=>x&&x.p<70).sort((a,b)=>a.p-b.p).slice(0,5);
  let h=`<div class="hero"><div class="kick">Kocaeli · sözlü hazırlık</div><h2 class="serif">Soru Bankası</h2>
    <p>Kapsamı seç, modu seç. İlerlemen ve yanlışların bu cihazda saklanır.</p></div>
    <div class="statgrid">
      <div class="stat"><div class="v">${DB.tot}</div><div class="l">çözülen</div></div>
      <div class="stat"><div class="v">%${acc}</div><div class="l">doğruluk</div></div>
      <div class="stat amber"><div class="v">${due}</div><div class="l">tekrar zamanı</div></div>
      <div class="stat rose"><div class="v">${DB.wrong.length}</div><div class="l">yanlış havuzu</div></div>
    </div>`;
  // scope
  h+=`<div class="sechead">1 · Kapsam</div>
    <div class="scopebar">
      <span class="chip" data-sc="all" onclick="setScopeQuick('all',this)">Tümü</span>
      <span class="chip" data-sc="0" onclick="setScopeQuick(0,this)">Onkoloji</span>
      <span class="chip" data-sc="1" onclick="setScopeQuick(1,this)">Fonksiyonel</span>
      <span class="chip" data-sc="2" onclick="setScopeQuick(2,this)">Pediatri</span>
    </div>
    <details class="scopesel"><summary>Konu seç (${scope.size}/${TOPICS.length})<span class="chev">›</span></summary><div class="topiclist" id="tlist"></div></details>`;
  // count
  h+=`<div class="sechead">2 · Soru sayısı</div><div class="countbar"><span class="lbl">Oturum:</span>
      ${[10,20,40].map(n=>`<button class="cbtn ${limit===n?'on':''}" onclick="setLimit(${n},this)">${n}</button>`).join('')}
      <button class="cbtn ${limit===999?'on':''}" onclick="setLimit(999,this)">Tümü</button></div>`;
  // modes
  h+=`<div class="sechead">3 · Mod</div><div class="modes">
    <button class="mode" onclick="startSession('test')"><div class="t"><span class="ic">📝</span>Test</div><div class="d">Çoktan seçmeli, anında doğru-yanlış + açıklama.</div></button>
    <button class="mode" onclick="startSession('sozlu')"><div class="t"><span class="ic">🎙️</span>Sözlü</div><div class="d">Soru gelir, cevabı düşün, göster, bildim/bilemedim.</div></button>
    <button class="mode" onclick="startSession('srs')"><div class="t"><span class="ic">🔁</span>Aralıklı Tekrar<span class="badge">${due}</span></div><div class="d">Bildiklerin seyrelir, bilemediklerin sık gelir.</div></button>
    <button class="mode" onclick="startSession('wrong')"><div class="t"><span class="ic">⚠️</span>Yanlışlarım<span class="badge">${DB.wrong.length}</span></div><div class="d">Yalnızca yanlış yaptığın soruları tekrar çöz.</div></button>
    <button class="mode full" onclick="startSession('exam')"><div class="t"><span class="ic">⏱️</span>Sınav Simülasyonu</div><div class="d">50 karışık çoktan seçmeli, açıklama olmadan; sonda detaylı puan dökümü.</div></button>
  </div>`;
  if(weak.length){
    h+=`<div class="sechead">Zayıf konuların</div><div class="weak">`;
    weak.forEach(w=>{h+=`<div class="weakitem" onclick="setScopeOne('${w.id}')"><span>${esc(w.title)}</span><span class="pct">%${w.p}</span></div>`;});
    h+=`</div>`;
  }
  // tools
  h+=`<div class="sechead">Yedekleme</div><div class="tools">
    <button class="toolbtn" onclick="exportDB()">⬇︎ İlerlememi yedekle</button>
    <button class="toolbtn" onclick="document.getElementById('imp').click()">⬆︎ Yedeği geri yükle</button>
    <button class="toolbtn danger" onclick="resetDB()">İlerlemeyi sıfırla</button>
    <input type="file" id="imp" accept="application/json" class="hidden" onchange="importDB(event)">
  </div>`;
  document.getElementById('main').innerHTML=h;
  buildTopicList();
  window.scrollTo(0,0);
}
function buildTopicList(){
  const el=document.getElementById('tlist'); if(!el)return; let h='';
  GROUPS.forEach((g,gi)=>{
    h+=`<div class="tgrp">${g}</div>`;
    TOPICS.filter(t=>t.g===gi).forEach(t=>{
      const n=QUESTIONS.filter(q=>q.topic===t.id).length;
      const on=scope.has(t.id);
      h+=`<div class="titem ${on?'on':''}" onclick="toggleTopic('${t.id}',this)"><span class="box">${on?'✓':''}</span><span>${esc(t.title)}</span><span class="cnt">${n}</span></div>`;
    });
  });
  el.innerHTML=h;
}
function setScopeQuick(v,elm){
  if(v==='all') scope=new Set(TOPICS.map(t=>t.id));
  else scope=new Set(TOPICS.filter(t=>t.g===v).map(t=>t.id));
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); if(elm)elm.classList.add('on');
  buildTopicList(); const sum=document.querySelector('.scopesel summary'); if(sum)sum.firstChild.textContent=`Konu seç (${scope.size}/${TOPICS.length})`;
}
function setScopeOne(id){ scope=new Set([id]); toast(byTopic[id].title+' seçildi'); document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); buildTopicList(); const sum=document.querySelector('.scopesel summary'); if(sum)sum.firstChild.textContent=`Konu seç (${scope.size}/${TOPICS.length})`; window.scrollTo(0,0); }
function toggleTopic(id,elm){
  if(scope.has(id))scope.delete(id);else scope.add(id);
  if(scope.size===0)scope.add(id); // en az 1
  elm.classList.toggle('on',scope.has(id)); elm.querySelector('.box').textContent=scope.has(id)?'✓':'';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  const sum=document.querySelector('.scopesel summary'); if(sum)sum.firstChild.textContent=`Konu seç (${scope.size}/${TOPICS.length})`;
}
function setLimit(n,elm){limit=n;document.querySelectorAll('.cbtn').forEach(c=>c.classList.remove('on'));elm.classList.add('on');}

/* ---------- backup ---------- */
function exportDB(){
  try{
    const blob=new Blob([JSON.stringify(DB)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='uroloji_ilerleme_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
    toast('Yedek indirildi');
  }catch(e){toast('Yedek alınamadı');}
}
function importDB(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{DB=Object.assign(defaultDB(),JSON.parse(r.result));save();toast('Yedek geri yüklendi');goHome();}catch(e){toast('Dosya okunamadı');}};
  r.readAsText(f);
}
function resetDB(){ if(confirm('Tüm ilerleme, yanlışlar ve tekrar verisi silinecek. Emin misin?')){DB=defaultDB();save();toast('Sıfırlandı');goHome();} }

/* ---------- util ---------- */
function esc(s){return(s+'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);}

goHome();
</script>
</body>
</html>
