rsın?","options":["Distal segment kollateralsizdir ama hızlı iyileşir","Korpus spongiozum çift (antegrad + retrograd) beslenir; dorsal penil arter glanstan retrograd akış sağlar","İskemi olur ama klinik önemi yoktur","Transeksiyon sonrası spongiozum venöz beslenir"],"correct":1,"answer":"Korpus spongiozum <b>antegrad (bulbar/sirkumfleks kavernozal)</b> + <b>retrograd (dorsal penil arter → glanstan geri)</b> beslenir. Bu çift dolaşım sayesinde transeksiyon sonrası distal segment beslenir. <span class='hi'>Ancak önceden transekte edilmiş üretrada retrograd akış bozulmuştur</span> — redo cerrahide dikkat.","cat":"oral","id":"uretra_627","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Üretral darlıkta üroflowmetri bulgusu ile ilgili hangisi doğrudur?","options":["Pik (peaked) patern, yüksek Qmax tipiktir","Uzamış plato paterni görülür ama DU/BOO ile de görülebildiği için tanısal değildir","Tanı için tek başına yeterlidir","Qmax >15 mL/s beklenir"],"correct":1,"answer":"Klasik bulgu <b>uzamış plato paterni + düşük Qmax</b>'tır, ancak <span class='hi'>detrüsör hipoaktivitesi (DU) ve mesane çıkım tıkanıklığı (BOO)</span> ile de görülür → tanısal değildir. Akım bozulması için lümen ~11 Fr altına inmelidir.","cat":"mcq","id":"uretra_628","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Vaka.</b> 55 yaş erkek, bulbar darlık için üretrotomi sonrası kanama ile lümen kaybı; suprapubik kateterli geliyor. Darlık uzunluğunu nasıl değerlendirirsin? <i>(Primer Case 2)</i>","options":["Sadece esnek sistoskopi","Kombine asendan + desendan üretrografi","Sadece üroflowmetri","Pelvik BT"],"correct":1,"answer":"Tam obliterasyonda <b>kombine asendan (retrograd) + desendan (suprapubik kateterden işeme) üretrografi</b> ile obliterasyon uzunluğu değerlendirilir. Tedavi: anatomi/peroperatif bulguya göre <span class='hi'>anastomotik veya augmented anastomotik üretroplasti (oral mukoza)</span>; kür ~%85–90.","cat":"oral","id":"uretra_629","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"OPEN trial (rekürren bulbar darlık) ne gösterdi?","options":["Üretrotomi ve üretroplasti eşit reintervansiyon oranlıdır","Reintervansiyon üretrotomide daha yüksektir; kalıcı kür için üretroplasti üstündür","Üretrotomi 2 yılda %90 kür sağlar","Dilatasyon üretroplastiden üstündür"],"correct":1,"answer":"OPEN trial'de <b>reintervansiyon üretrotomide üretroplastiden anlamlı yüksekti</b> → rekürren bulbar darlıkta kalıcı kür için <span class='hi'>üretroplasti üstün</span>. EAU 2026: başarısız ilk endoskopiden sonra rekürren anterior darlıkta tekrar endoskopi yerine üretroplasti öner.","cat":"mcq","id":"uretra_630","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Optilume ilaç-kaplı balon (paklitaksel) ile ilgili en kritik üreme sağlığı uyarısı nedir?","options":["Tedaviden sonra 1 ay cinsel perhiz","Paklitaksel semende 6 aya kadar saptanır → eşi gebe kalabilecekse kontrasepsiyon önerilir","Kalıcı infertiliteye yol açar","Spermiyogram zorunludur"],"correct":1,"answer":"<b>Paklitaksel semende 6 aya kadar saptanır</b>; eşi gebe kalabilecekse <span class='hi'>kontrasepsiyon önerilir</span>. ROBUST kriterleri: tek bulbar, <2–3 cm, lümen <12 Fr, 1–4 önceki endoskopik girişim; LS/radyasyon/önceki üretroplasti dışlanır.","cat":"mcq","id":"uretra_631","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Vaka.</b> 44 yaş, çocuklukta çoklu hipospadias cerrahisi, zayıf akım ve idrar saçılması. Penil deri ince, glans iyi gelişmiş. Erişkin hipospadias + penil darlığında bulbar darlık riski nedir? <i>(Primer Case 3)</i>","options":["%2","%10","%30","%50"],"correct":1,"answer":"Erişkin hipospadias + penil darlığında <b>bulbar darlık riski ~%10</b>; ayrıca rekürren hipospadias darlığında <span class='hi'>~%10 liken skleroz</span> insidansı vardır. Önceki hipospadias cerrahisi komplikasyon riskini artırır, çok-aşamalı cerrahi gerektirebilir, başarıyı düşürür.","cat":"oral","id":"uretra_632","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Cüneyt Hoca tarzı.</b> Penil üretra darlığında neden eksizyon + primer anastomoz (EPA) yapmazsın?","options":["Penil üretrada kan akımı yetersizdir","EPA üretrayı kısaltıp postop kordi (eğrilik) yapar → penilde augmentasyon gerekir","EPA penilde teknik olarak imkansızdır","Penil üretra greft tutmaz"],"correct":1,"answer":"Penilde EPA üretrayı kısaltarak <b>postop kordi</b> oluşturur; bu yüzden penil darlıkta <span class='hi'>augmentasyon üretroplasti</span> (Barbagli/Asopa/Bracka) tercih edilir. EPA bulbar üretranın kısa darlıklarına özgüdür.","cat":"oral","id":"uretra_633","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Barbagli ile Asopa tekniği arasındaki temel fark nedir?","options":["Barbagli greft kullanmaz, Asopa kullanır","Barbagli tek dorsal insizyon; Asopa ventral+dorsal insizyonla dorsal inlay — daha kolay/hızlı, başarı eşit","Asopa iki-aşamalıdır","Barbagli yalnızca bulbar darlıkta kullanılır"],"correct":1,"answer":"<b>Barbagli:</b> tek dorsal insizyon, dorsal onlay greft. <b>Asopa:</b> ventral+dorsal insizyonla dorsal inlay — <span class='hi'>daha kolay ve hızlı</span>; randomize çalışmada başarı eşittir.","cat":"mcq","id":"uretra_634","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Kısa (<2 cm) bulbar darlıkta en güvenilir başarı oranına sahip cerrahi hangisidir?","options":["Dorsal onlay bukkal mukoza greft","Eksizyon + primer anastomoz (EPA)","Perineal üretrostomi","Üretral stent"],"correct":1,"answer":"Kısa bulbar darlıkta <b>EPA</b> en güvenilir, yüksek başarılı tekniktir. Uzun (>2 cm) bulbar darlıkta ise <span class='hi'>oral mukoza onlay greft</span> standarttır. Cinsel fonksiyon kaygısıyla non-transekte teknikler (Heineke-Mikulicz) alternatiftir.","cat":"mcq","id":"uretra_635","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Savunma.</b> 'Üretroplasti yaptın, hasta 6 ay sonra akımı iyi diyor — başarılı mı?' Nasıl takip edersin?","options":["Akım iyiyse takip gereksizdir","Sadece üroflow yeterli değil; restenoz akım iyi olsa da olabilir → anatomik değerlendirme (üretroskopi/üretrografi) gerekir","Yalnızca PSA bakılır","6 ay sonra hasta taburcu edilir"],"correct":1,"answer":"<b>Restenoz, akım iyi olsa da %35'e kadar görülebilir</b> → sadece üroflow yetmez, <span class='hi'>anatomik değerlendirme</span> şart. Diafram tipi rekürrens (kısa, yumuşak) kısa ISD ile düzelir; re-stenoz uzun-dönem ISD/redo gerektirir.","cat":"oral","id":"uretra_636","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Anterior üretroplasti sonrası de novo erektil disfonksiyon riski uzun dönemde (9. ay) yaklaşık kaçtır?","options":["%3","%15","%25","%40"],"correct":0,"answer":"De novo ED kısa dönemde görülür ama <b>9. ayda ~%3'e</b> döner. Transeksiyonun ED'yi artırdığına dair kanıt <span class='hi'>zayıftır ve RKÇ yoktur</span> (meta-analizler çelişkili).","cat":"mcq","id":"uretra_637","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Vaka — Travma.</b> Bisiklet kazası sonrası pelvik kırık, kanlı meatus, idrar yapamıyor, mesane dolu. Tam rüptür şüphesi. İlk girişimin nedir?","options":["Acil açık üretroplasti","Kör transüretral kateterizasyonda ısrar et","Ekografi eşliğinde suprapubik diversiyon","Hemen sistostomi + immediate üretral anastomoz"],"correct":2,"answer":"'<b>Treat first what kills first</b>' — üretra yaralanması hayatı tehdit etmez. Tam rüptürde transüretral kateter genellikle geçmez → <b>ekografi eşliğinde suprapubik diversiyon</b>. <span class='hi'>İmmediate üretroplasti (<48 sa) KONTRENDİKE</span> (hematom dekompresyonuyla ağır kanama).","cat":"oral","id":"uretra_638","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"PFUI'da tercih edilen tedavi yolu ve geç üretroplasti başarısı nedir?","options":["İmmediate üretroplasti; başarı ~%50","SP diversiyon + geç üretroplasti (>3 ay), perineal anastomotik; başarı ~%86","Kalıcı SP kateter; cerrahi yok","Erken realignment her zaman küratiftir"],"correct":1,"answer":"Membranöz yaralanmada <b>SP diversiyon + geç üretroplasti (>3 ay)</b> her zaman iyi çözümdür; perineal anastomotik onarımla başarı <span class='hi'>~%86</span>, erektil fonksiyon değişmez, inkontinans nadir (~%5).","cat":"mcq","id":"uretra_639","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"Geç posterior üretroplastide anastomoz gerginliğini azaltmak için kullanılan 4 manevranın doğru sırası nedir?","options":["İnferior pubektomi → korporal separasyon → bulbar mobilizasyon → rerouting","Bulbar mobilizasyon → korporal separasyon → inferior pubektomi → suprakrural rerouting","Rerouting → pubektomi → mobilizasyon → separasyon","Korporal separasyon → bulbar mobilizasyon → rerouting → pubektomi"],"correct":1,"answer":"Sıra: <b>bulbar üretral mobilizasyon → korporal separasyon → inferior pubektomi → suprakrural rerouting</b>. Gerginlik kalmazsa sonraki manevraya gerek yoktur.","cat":"mcq","id":"uretra_640","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"mcq","q":"<b>Vaka.</b> Postmenopozal kadın, dizüri + dispareuni + işeme sonrası damlatma. Muayenede ön vajen duvarında hassas kitle. En olası tanı ve en iyi görüntüleme?","options":["Üretral karünkül; sistoskopi","Üretral divertikül; MR","Mesane taşı; DÜSG","Skene kisti; BT"],"correct":1,"answer":"Klasik <b>3 D triadı (dizüri, dispareuni, postmiksiyon damlatma)</b> + ön vajen duvarında hassas kitle = <b>üretral divertikül</b>. Tanıda <span class='hi'>MR</span> üstündür. Tedavi: transvajinal eksizyon ± Martius flep.","cat":"oral","id":"uretra_641","topic":"uretra","group":1,"topicTitle":"Üretra Hastalıkları & Darlık","src":"","flag":false},{"type":"open","q":"SDBY'de neden nakil tercih edilir, ne zaman önerilir?","answer":"En düşük komorbidite, en iyi yaşam kalitesi, <b>en uzun sağkalım</b>. <span class='g'>En erken / ideali preemptif</span> (diyalize girmeden). >10 yıl HD → daha kötü greft sonucu.","cat":"Endikasyon","id":"nakil_642","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Renal transplant mutlak kontrendikasyonları?","answer":"<span class='r'>Aktif malignite · tedavi edilemeyen enfeksiyon · sınırlı yaşam beklentisi/ileri biyolojik yaş · geri dönüşsüz ek organ yetmezliği.</span>","cat":"","id":"nakil_643","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"İki böbrek de uygunsa donörden hangisi alınır ve neden?","answer":"<b>SOL böbrek</b> — sol renal ven sağdan daha uzun olduğu için anastomoz kolaylığı. İlke: 'iyi böbreği donöre bırak.'","cat":"Donör","id":"nakil_644","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Böbrek bağışçıları uzun dönemde yaşam kalitelerini nasıl değerlendirir? (EBU)","answer":"Genel nüfusla <b>aynı</b> sağlıkla ilişkili yaşam kalitesi.","cat":"","id":"nakil_645","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"HLA eşleştirmede hangi lokuslar hedeflenir? Crossmatch'in rolü?","answer":"<b>A, B, C, DR</b> (duyarlanmış hastada + DP, DQ). Mismatch ↔ greft sağkalımı. <b>Crossmatch negatif</b> olmalı → hiperakut rejeksiyonu önler.","cat":"Eşleştirme","id":"nakil_646","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Bekleme listesinde anti-HLA antikor taraması ne sıklıkla?","answer":"Her <b>3 ayda bir</b> + her immünize edici olaydan (transfüzyon, gebelik, nakil, eksplantasyon) <b>2-4 hafta sonra</b>.","cat":"Duyarlanma","id":"nakil_647","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"SCS vs HMP; koruma solüsyonu tipleri?","answer":"<b>HMP</b> (hipotermik makine perfüzyonu) soğuk koruma hasarını azaltır. Solüsyon: intrasellüler (↑K↓Na) / ekstrasellüler (↓K↑Na).","cat":"Koruma","id":"nakil_648","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Greft nereye, hangi insizyonla; anastomoz sırası?","answer":"<b>İliak fossa, heterotopik ekstraperitoneal</b>; <b>Gibson insizyonu</b>; <span class='g'>önce ven (Satinsky) → sonra arter</span> (uç-yan eksternal iliak).","cat":"Cerrahi","id":"nakil_649","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Transplantta önerilen üreter implant tekniği (EAU)?","answer":"<b>Lich-Gregoire ekstravezikal submukozal tünel + rutin JJ stent</b>. Kısa üreterde avantaj, az iskemi; stent idrar kaçağını azaltır (Cochrane).","cat":"Üreter","id":"nakil_650","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"İliak diseksiyonda lenfatikle karıştırılan sinir ve sonucu?","answer":"<b>Genitofemoral sinir</b> — bağlanırsa <span class='r'>ipsilateral medial uyluk + skrotum/labium majus uyuşması</span>.","cat":"","id":"nakil_651","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"T-hücre aktivasyonunun 3 sinyali?","answer":"① Antijen–TCR/CD3 → kalsinörin·NFAT<br>② CD80/86–CD28 kostimülasyon<br>③ IL-2 → mTOR (proliferasyon)","cat":"","id":"nakil_652","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"EAU 2025 standart idame immünsupresyon (kuadrupl)?","answer":"<span class='g'>Takrolimus + Mikofenolat + Steroid + indüksiyon ajanı</span> (basiliksimab/ATG). Tac > siklosporin; MMF azatioprinin yerini aldı. <span class='r'>CNI tamamen kesilmez.</span>","cat":"Rejim","id":"nakil_653","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Basiliksimab vs ATG ne zaman?","answer":"<b>Basiliksimab</b> (anti-CD25): düşük-orta risk. <b>ATG</b> (T-hücre deplesyonu): yüksek risk/dirençli rejeksiyon. ATG'yi düşük riskte kullanmak yan etkiyi artırır.","cat":"İndüksiyon","id":"nakil_654","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Hiperakut rejeksiyon mekanizması ve önlemi?","answer":"Dk-saat içinde <b>preformed komplemen-fikse IgG</b> (ABO / anti-HLA) → vasküler endotel. <b>Crossmatch</b> ile neredeyse yok edildi.","cat":"Rejeksiyon","id":"nakil_655","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"TCMR vs AMR histoloji ve tedavi?","answer":"<b>TCMR:</b> tübülit+arterit → metilprednizolon pulse → dirençli ATG.<br><b>AMR:</b> <span class='g'>C4d(+)</span> + DSA → plazmaferez+IVIG±rituksimab.","cat":"Rejeksiyon","id":"nakil_656","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Rejeksiyon tanısında altın standart?","answer":"<b>Banff kriterli transplant biyopsisi</b> (USG + 16-18G otomatik iğne). Klinikle ayırt edilemez.","cat":"Tanı","id":"nakil_657","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Gecikmiş greft fonksiyonunun önemi?","answer":"Öngörücü: iskemi süresi, DCD, donör hemodinamiği, HLA-mismatch. <b>Uzun dönem greft kaybını >2 kat artırır.</b>","cat":"DGF","id":"nakil_658","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Nakil alıcılarında 1 numaralı ölüm nedeni?","answer":"<span class='r'>Kardiyovasküler hastalık</span> (rejeksiyon değil).","cat":"","id":"nakil_659","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Stent çıkarımından sonra anüri + üreterohidronefroz → tedavi?","answer":"<span class='g'>Nefrostomi tüpü</span> (akut dekompresyon).","cat":"","id":"nakil_660","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Tübüler sekresyonu bloke ederek serum kreatininini yükselten ilaç?","answer":"<span class='g'>Trimetoprim</span> (gerçek GFR düşüşü değil).","cat":"EBU","id":"nakil_661","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Erken vs geç allogreft nefrektomi tekniği?","answer":"Erken (<90 gün) → <b>ekstrakapsüler</b>. Geç (>90 gün) → <b>intrakapsüler</b> (rejeksiyon yapışıklığı).","cat":"","id":"nakil_662","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Sağ ve sol adrenal venin drenajı? (klasik soru)","answer":"<span class='g'>SAĞ adrenal ven → doğrudan VCİ (kısa)</span><br><span class='g'>SOL adrenal ven → sol renal ven.</span> Arterler her iki tarafta benzer (3 arter).","cat":"Anatomi","id":"nakil_663","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Adrenali besleyen 3 arter kaynağı?","answer":"<b>Süperior</b> suprarenal (inferior frenik arterden) · <b>Middle</b> (doğrudan aortadan) · <b>İnferior</b> (renal arterden).","cat":"Anatomi","id":"nakil_664","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Korteks ve medulla embryolojik kökeni?","answer":"<b>Korteks → intermediate mezoderm</b> (steroid) · <b>Medulla → nöral krest</b> (katekolamin).","cat":"Embryoloji","id":"nakil_665","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Korteks 3 zonu ve ürünleri?","answer":"<b>Glomeruloza</b> → aldosteron (sentaz yalnız burada; AngII+K⁺)<br><b>Fasikulata</b> → kortizol (ACTH)<br><b>Retikularis</b> → androjen/DHEAS","cat":"Fizyoloji","id":"nakil_666","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Tüm steroid sentezinin hız kısıtlayıcı enzimi?","answer":"<b>P450scc</b> (yan zincir kırılması): kolesterol → pregnenolon.","cat":"Fizyoloji","id":"nakil_667","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Adrenal medullaya özgü, NA→A dönüşümünü yapan enzim?","answer":"<b>PNMT</b> (feniletanolamin-N-metiltransferaz). Yüksek kortizol gerektirir → korteks-medulla fonksiyonel bağı. Tirozin hidroksilaz = hız belirleyici.","cat":"Fizyoloji","id":"nakil_668","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"PPGL'de herediter sendrom genleri?","answer":"En az 1/3 herediter: <b>SDHA/B/C/D · VHL · RET (MEN2) · NF1</b>. <span class='r'>SDHB → malignite riski.</span>","cat":"Feo","id":"nakil_669","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Feokromasitoma biyokimyasal tanısı?","answer":"<b>Plazma serbest veya 24-saat idrar fraksiyone metanefrinler</b> (sens %96-99). VMA <span class='r'>obsolet</span>. Lokalizasyon biyokimya (+) ise BT/MR (>10 HU), ¹²³I-MIBG.","cat":"","id":"nakil_670","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Feokromasitoma preoperatif hazırlık sırası?","answer":"2-3 hafta <span class='g'>ÖNCE alfa-bloker</span> (fenoksibenzamin/doksazosin) → KB kontrol → <span class='g'>SONRA beta</span> (taşikardi). Tuz/sıvı yükle. <span class='r'>Beta-önce → hipertansif kriz.</span>","cat":"","id":"nakil_671","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Feo cerrahisinde kritik adım?","answer":"<b>Adrenal veni manipülasyondan ÖNCE bağla</b> → katekolamin fırtınasını önle.","cat":"","id":"nakil_672","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Feokromasitomada malignite nasıl tanımlanır?","answer":"<span class='r'>Yalnızca metastazla</span> (kemik/akciğer/KC/LN) — histoloji ayırt etmez. Öngörücü: ekstra-adrenal, >5 cm, SDHB. ≥10 yıl takip.","cat":"","id":"nakil_673","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Primer hiperaldosteronizm tarama ve doğrulama?","answer":"Tarama: <b>Aldosteron/Renin Oranı (ARR)</b> (ilaçları verapamil-SR/doksazosin/hidralazine çevir, K⁺ düzelt). Doğrulama: tuz yükleme / fludrokortizon / kaptopril.","cat":"Conn","id":"nakil_674","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Conn'da lateralizasyon altın standardı?","answer":"<b>Adrenal Ven Örneklemesi (AVS).</b> BT tek başına ~%38 yanlış sınıflar. İstisna: <35 yaş + spontan hipokalemi + net adenom → BT yeter.","cat":"Conn","id":"nakil_675","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Conn — tek taraflı vs bilateral tedavi?","answer":"Tek taraflı → <b>laparoskopik adrenalektomi</b>. Bilateral/cerrahi-dışı → <b>MRA spironolakton</b> (jinekomasti → eplerenon). <span class='r'>Parsiyel önerilmez.</span>","cat":"","id":"nakil_676","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Cushing 3 tarama testi?","answer":"① 1-mg gece <b>deksametazon supresyon (DST)</b> ② geç-gece tükürük kortizol ③ 24-saat idrar serbest kortizol.","cat":"Cushing","id":"nakil_677","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ACTH baskılı vs normal/yüksek → kaynak ve sonraki adım?","answer":"<b>Baskılı → adrenal</b> (adenom/Ca/hiperplazi) → adrenal görüntüleme.<br><b>Normal/↑ → hipofiz/ektopik</b> → hipofiz MR → gerekirse IPSS.","cat":"Cushing","id":"nakil_678","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Unilateral adrenalektomi sonrası beklenen tehlike?","answer":"Kontralateral fonksiyonel atrofi → <span class='r'>akut adrenal yetmezlik</span>. Perioperatif glukokortikoid stres dozu şart.","cat":"","id":"nakil_679","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ESE 2023 — ≤10 HU homojen kitle yönetimi?","answer":"<span class='g'>Boyuttan bağımsız benign → takip YOK.</span> Pheo olası değil → <b>metanefrin gerekmez.</b> (Primer'in eski çerçevesinden ileri.)","cat":"","id":"nakil_680","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ESE 2023 — MACS tanımı?","answer":"Post-DST kortizol <span class='g'>>1.8 µg/dL (>50 nmol/L)</span> = MACS (mild autonomous cortisol secretion). 'Subklinik Cushing' terimi terk edildi.","cat":"","id":"nakil_681","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ACC'de tek küratif tedavi ve cerrahi yaklaşım?","answer":"<b>Tam (R0) rezeksiyon</b> (tam %55 vs inkomplet %5 / 5-yıl). >6 cm / şüphe → <span class='g'>AÇIK cerrahi</span>. Renal hilus LND.","cat":"ACC","id":"nakil_682","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ENSAT T evreleri?","answer":"<b>T1</b> ≤5 cm · <b>T2</b> >5 cm · <b>T3</b> çevre doku infiltrasyonu · <b>T4</b> komşu organ / <b>VCİ-renal ven tümör trombüsü</b>.","cat":"","id":"nakil_683","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"ACC adjuvan/metastatik medikal tedavi?","answer":"<b>Mitotan</b> (steroidogenez inh., adrenal yetmezlik yapar → replasman; ≤6 hafta içinde başla, 2-5 yıl). İleri → mitotan + <b>EDP</b> (etoposid-doksorubisin-sisplatin).","cat":"","id":"nakil_684","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Adrenalektomi standart ve alternatif yaklaşımlar?","answer":"Standart: <b>laparoskopik transperitoneal</b>. Alt: retroperitoneoskopik (lateral / <b>posterior jack-knife</b> — kolon mobilizasyonu yok), robotik. Parsiyel: herediter/bilateral pheo, soliter adrenal.","cat":"Cerrahi","id":"nakil_685","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"2 ay önce böbrek nakli olan (preop idrar çıkışı artmamış) hasta, JJ üreter kateteri çıkarıldıktan sonra anüri ile başvuruyor. Böbrek fonksiyonları bozuk, USG'de şiddetli üreterohidronefroz var. En uygun tedavi?","options":["Mesane kateterizasyonu","Böbrek biyopsisi","Nefrostomi tüpü","Yeniden JJ üreter kateteri"],"correct":2,"answer":"<b>Nefrostomi tüpü.</b> Obstrüktif üreterohidronefroz + bozulan fonksiyon → acil <span class='g'>perkütan dekompresyon</span>. Anüri + tıkanmış sistemde retrograd JJ genelde geçmez; nefrostomi hem dekompresyon hem antegrad değerlendirme sağlar.","cat":"mcq","id":"nakil_686","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Böbrek bağışçıları bağıştan sonra uzun dönemde sağlıkla ilişkili yaşam kalitelerini nasıl değerlendirir?","options":["Genel nüfusla aynı","Genel nüfustan daha iyi","Genel nüfustan daha kötü","Belirgin şekilde daha kötü"],"correct":0,"answer":"<b>Genel nüfusla aynı.</b> Canlı donörlerde uzun dönem yaşam kalitesi genel popülasyonla benzerdir — donör güvenliği savunması.","cat":"mcq","id":"nakil_687","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Aşağıdakilerden hangisi kreatininin tübüler salgılanmasını engelleyerek serum kreatinin seviyelerini artırabilir?","options":["Trimetoprim","Prednizon","Takrolimus","Azatiyoprin"],"correct":0,"answer":"<b>Trimetoprim.</b> Tübüler kreatinin sekresyonunu bloke eder → serum kreatinin <span class='r'>yalancı yükselir</span>, gerçek GFR düşüşü değildir (simetidin de benzer). Takrolimus gerçek nefrotoksisite yapar ama mekanizma farklı.","cat":"mcq","id":"nakil_688","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Renal kanser cerrahisi sırasında ipsilateral adrenalektomi ne zaman yapılmalıdır?","options":["Tümör üst polde ise","Tümör >4 cm ise","Preoperatif radyolojik incelemeler adrenal tutulumu düşündürüyorsa","Hasta 40 yaş altıysa"],"correct":2,"answer":"<b>Sadece radyolojik adrenal tutulum şüphesinde.</b> Rutin ipsilateral adrenalektomi artık önerilmez; üst pol yerleşimi tek başına endikasyon değildir.","cat":"mcq","id":"nakil_689","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"EAU 2025 — standart başlangıç rejeksiyon profilaksisi kombinasyonu hangisidir?","options":["Sadece siklosporin + steroid","Takrolimus + mikofenolat + steroid + indüksiyon ajanı","Sirolimus monoterapi","Azatiyoprin + steroid"],"correct":1,"answer":"<b>Kuadrupl rejim.</b> <span class='g'>CNI (tercihen takrolimus) + mikofenolat + steroid + indüksiyon (basiliksimab veya ATG).</span> EAU güçlü öneri.","cat":"mcq","id":"nakil_690","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: 'Naklen sonra dakikalar-saatler içinde greft sertleşip koyulaştı, idrar çıkışı durdu.' Bu tablo nedir, mekanizması ve nasıl önlenirdi?","options":["Akut tübüler nekroz — hidrasyon","Hiperakut rejeksiyon — preformed antikor; crossmatch ile önlenir","TCMR — steroid pulse","Renal arter trombozu — antikoagülasyon"],"correct":1,"answer":"<b>Hiperakut rejeksiyon.</b> <span class='r'>Preformed komplemen-fikse IgG</span> (ABO/anti-HLA) → vasküler endotel tahribi. Önlem: <span class='g'>ABO eşleştirme + crossmatch.</span> Tedavisi yok → greft kaybı.","cat":"case","id":"nakil_691","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: Transplant biyopsisinde peritübüler kapillerde C4d pozitifliği ve dolaşan donör-spesifik antikor saptandı. Tanı ve tedavi?","options":["TCMR — metilprednizolon","AMR — plazmaferez + IVIG ± rituksimab","Kronik rejeksiyon — konversiyon","BK nefropati — immünsupresyon azalt"],"correct":1,"answer":"<b>Antikor aracılı rejeksiyon (AMR).</b> İşaret: <span class='g'>C4d(+) + DSA</span>. Tedavi: steroid bolus + <span class='g'>plazmaferez + IVIG ± rituksimab</span>.","cat":"case","id":"nakil_692","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Transplantta önerilen üreteroneosistostomi tekniği ve eşlik eden öneri (EAU)?","options":["Politano-Leadbetter, stent yok","Lich-Gregoire ekstravezikal + rutin JJ stent","Boari flebi","Psoas hitch"],"correct":1,"answer":"<b>Lich-Gregoire + rutin JJ stent.</b> Kısa üreterde avantaj, az iskemi; Cochrane: stent major ürolojik komplikasyonu (özellikle idrar kaçağı) azaltır.","cat":"mcq","id":"nakil_693","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: 'CNI nefrotoksisitesinden şüpheleniyorsun ama immünsupresyonu nasıl yönetirsin — CNI'yi tamamen kesebilir misin?' Doğru yaklaşım?","options":["Evet, CNI'yi tamamen kes","Hayır; tamamen kesmek rejeksiyonu artırır, doz azalt/mTOR-MMF'ye konversiyon","Steroidi kes yeter","ATG ekle"],"correct":1,"answer":"<b>CNI tamamen kesilmez.</b> <span class='r'>Prospektif RKÇ'ler rejeksiyon riskini artırır.</span> Bunun yerine doz azaltma + mikofenolat/mTOR'a konversiyon (proteinüri <800mg ise mTOR).","cat":"case","id":"nakil_694","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Von Hippel-Lindau hastalığı ile en sık ilişkili neoplazm?","options":["Epididim karsinomu","Berrak hücreli renal karsinom","Papiller RCC","Adrenokortikal karsinom"],"correct":1,"answer":"<b>Berrak hücreli RCC</b> (ayrıca feokromasitoma, hemanjioblastom). Transplant–onkoloji kesişimi: tedavi edilmiş düşük evre RCC öyküsü listeye almayı geciktirmemeli (EAU).","cat":"mcq","id":"nakil_695","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Sağ adrenal venin drenajı nereyedir?","options":["Sağ renal ven","Doğrudan inferior vena kava","İnferior frenik ven","Süperior mezenterik ven"],"correct":1,"answer":"<b>Doğrudan VCİ'ye (kısa).</b> Sol adrenal ven ise sol renal vene dökülür — cerrahide en kritik anatomik fark.","cat":"mcq","id":"nakil_696","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Tüm steroid hormon biyosentezinin hız kısıtlayıcı enzimi?","options":["Aldosteron sentaz","P450scc (yan zincir kırılması)","21-hidroksilaz","PNMT"],"correct":1,"answer":"<b>P450scc.</b> Kolesterol → pregnenolon, hız belirleyici basamak. PNMT ise medullada NA→A (katekolamin).","cat":"mcq","id":"nakil_697","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HASAN HOCA TARZI: 55 yaşında, başka nedenle çekilen BT'de 2.5 cm sol adrenal kitle (homojen, unenhanced 8 HU), semptom yok. ESE 2023'e göre yönetim?","options":["Hormonal tarama + 6 ayda bir BT takip","Boyuttan bağımsız benign → takip yok, metanefrin gerekmez","Hemen adrenalektomi","MIBG + AVS"],"correct":1,"answer":"<b>ESE 2023:</b> homojen <span class='g'>≤10 HU → boyuttan bağımsız benign, takip yok</span>; bu lezyonda pheo olası değil → <span class='g'>metanefrin gerekmez</span>. (Primer'in eski çerçevesinden ileri — jüri savunması.)","cat":"case","id":"nakil_698","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: Feokromasitoma tanısı kesin. Ameliyat hazırlığında ilk hangi ilaç, ne kadar süre, neden 'önce o'?","options":["Beta-bloker, çünkü taşikardi var","Alfa-bloker (fenoksibenzamin) 2-3 hafta; beta-önce verilirse karşılıksız alfa → hipertansif kriz","ACE inhibitörü","Doğrudan ameliyat"],"correct":1,"answer":"<b>Önce alfa-bloker (2-3 hafta).</b> <span class='r'>Beta-önce verilirse karşılıksız alfa vazokonstriksiyon → hipertansif kriz.</span> Sonra gerekirse beta + tuz/sıvı yükleme. Cerrahide adrenal veni önce bağla.","cat":"case","id":"nakil_699","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Primer hiperaldosteronizmde tek/çift taraf ayrımı (lateralizasyon) için altın standart?","options":["Adrenal BT","MR","Adrenal ven örneklemesi (AVS)","MIBG sintigrafi"],"correct":2,"answer":"<b>AVS.</b> BT/MR tek başına ~%38 yanlış sınıflar. İstisna: <35 yaş + spontan hipokalemi + net tek taraflı adenom → BT yeterli olabilir.","cat":"mcq","id":"nakil_700","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: Conn tanılı hastada AVS tek taraflı adenom gösterdi. Cerrah 'bezi koruyup sadece adenomu çıkarayım' diyor. Doğru mu?","options":["Evet, parsiyel adrenalektomi ideal","Hayır; Conn'da parsiyel önerilmez — AVS bezi gösterir, bezin hangi kısmını değil","Önce MRA dene","Bilateral adrenalektomi yap"],"correct":1,"answer":"<b>Conn'da parsiyel adrenalektomi önerilmez.</b> AVS lateralize eder ama intraglandüler kaynağı göstermez; >%50 multinodüler hiperplazi içerir → tek taraflı total adrenalektomi.","cat":"case","id":"nakil_701","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"HOCA TARZI: Cushing kliniği + biyokimyasal hiperkortizolizm doğrulandı. ACTH baskılı. Sonraki adım ve olası kaynak?","options":["Hipofiz MR — hipofizer kaynak","Adrenal görüntüleme — adrenal kaynak (adenom/Ca/hiperplazi)","IPSS","Akciğer BT — ektopik"],"correct":1,"answer":"<b>ACTH baskılı → ACTH-bağımsız → adrenal kaynak</b> → adrenal görüntüleme. (ACTH normal/yüksek olsaydı hipofiz/ektopik → hipofiz MR → IPSS.)","cat":"case","id":"nakil_702","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"Adrenokortikal karsinomda küratif tek tedavi ve >6 cm/şüpheli kitlede tercih edilen yaklaşım?","options":["Mitotan; laparoskopik","Tam (R0) cerrahi rezeksiyon; açık cerrahi","Radyoterapi; robotik","Kemoterapi; ablasyon"],"correct":1,"answer":"<b>Tam (R0) rezeksiyon</b> (tam %55 vs inkomplet %5 / 5-yıl). >6 cm veya malignite şüphesi → <span class='g'>açık cerrahi</span> (spill = rekürrens). Renal hilus LND eklenir.","cat":"mcq","id":"nakil_703","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"mcq","q":"ÖZDAL HOCA TARZI (ilaç ismi ister): İleri evre ACC'de kötü prognostik faktörler (yüksek Ki67, hızlı büyüme) varsa medikal tedavi kombinasyonu nedir?","options":["Sadece mitotan","Mitotan + EDP (etoposid-doksorubisin-sisplatin)","BEP","Pembrolizumab"],"correct":1,"answer":"<b>Mitotan + EDP.</b> Etoposid + Doksorubisin + Sisplatin. Mitotan tek başına 1. basamak; kötü prognozda EDP eklenir. Mitotan steroidogenezi bloke eder → glukokortikoid replasmanı şart.","cat":"case","id":"nakil_704","topic":"nakil","group":1,"topicTitle":"Böbrek Nakli & Adrenal","src":"","flag":false},{"type":"open","q":"Detrusor kasılmasını sağlayan yol, segment ve reseptör?","answer":"<p class='a'><b>Parasempatik (pelvik sinir)</b>, segment <b>S2–S4</b>, asetilkolin → <b>M3</b> muskarinik reseptör. Boşaltma fazı.</p>","cat":"","id":"norouroloji_705","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Depolama fazını sağlayan sempatik yolun segmenti ve reseptörleri?","answer":"<p class='a'><b>Hipogastrik sinir, T10–L2.</b></p><ul><li><b>β3</b> → detrusor gevşemesi</li><li><b>α1</b> → mesane boynu/proksimal üretra kapanması</li></ul>","cat":"","id":"norouroloji_706","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Dış üretral sfinkterin motor nöronları nerede? Hangi hastalıkta selektif korunur?","answer":"<p class='a'><b>Onuf çekirdeği</b> (S2–S4 ön boynuz), pudendal sinir.</p><p class='a'><b>ALS</b>'de selektif korunur → kontinans korunur. (MSA'da ise tutulur.)</p>","cat":"","id":"norouroloji_707","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Suprapontin lezyonda neden DSD yok, suprasakral spinal lezyonda neden var?","answer":"<p class='a'><b>PMC (pontin miksiyon merkezi)</b> detrusor–sfinkter koordinasyonunun merkezidir.</p><ul><li>PMC üstü lezyon → PMC korunur → koordinasyon sağlam → <b>DSD yok</b></li><li>PMC–sakral arası lezyon → yol kesilir → <b>DSD var</b></li></ul>","cat":"","id":"norouroloji_708","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Suprapontin DO'nun mekanizması nedir?","answer":"<p class='a'>Korteks ve bazal gangliyonların miksiyon üzerindeki <b>tonik inhibisyonu kalkar</b> → detrusor aşırı aktivitesi. İnme, demans, Parkinson, frontal tümör.</p>","cat":"","id":"norouroloji_709","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"C-liflerinin nöroürolojik rolü ve klinik karşılığı?","answer":"<p class='a'>Normalde sessiz, soğuk/mekanik uyarana duyarlı afferentler. <b>Suprasakral SCI sonrası</b> öne geçip spinal segmental NDO'yu tetikler.</p><p class='a'>→ <b>Buz suyu testi</b> ve <b>botoksun duyusal etkisinin</b> temeli.</p>","cat":"","id":"norouroloji_710","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Suprasakral spinal lezyonun ürodinamik paterni ve risk düzeyi?","answer":"<p class='a'><b>NDO + DSD</b> → yüksek basınçlı depolama → <b>en yüksek üst üriner sistem riski.</b> Hem depolama hem boşaltma semptomları, yüksek PVR.</p>","cat":"","id":"norouroloji_711","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Sakral/infrasakral lezyonun ürodinamik paterni?","answer":"<p class='a'><b>Hipo/akontraktil detrusor (arefleksi)</b>, sfinkter yetmezliği olabilir. Ağırlıklı boşaltma semptomları, retansiyon/taşma, yüksek PVR.</p>","cat":"","id":"norouroloji_712","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Akut SCI sonrası ürodinami ne zaman yapılmalı ve neden?","answer":"<p class='a'><b>Spinal şok</b> döneminde detrusor arefleksiktir (retansiyon); NDO/DSD sonradan (≈6–12 hafta) gelişir.</p><p class='a'>→ Ürodinamiyi <b>spinal şok geçince (≈3. ay)</b> yap, <b>ilk yıl içinde tekrarla.</b></p>","cat":"","id":"norouroloji_713","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"MS'te en sık ürodinamik bulgu nedir?","answer":"<p class='a'><b>Detrusor aşırı aktivitesi (DO).</b> İkinci sıklıkta DSD. Patern seyirde değişir → periyodik izlem.</p>","cat":"","id":"norouroloji_714","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Parkinson ile MSA'yı ayıran ürodinamik bulgu?","answer":"<p class='a'><b>MSA</b>: bozulmuş detrusor kontraktilitesi + <b>PVR &gt;150 mL</b>, açık mesane boynu, sfinkter EMG'de denervasyon.</p><p class='a'><b>PH</b>: DO baskın, PVR düşük.</p>","cat":"","id":"norouroloji_715","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Parkinson/MSA hastasında hangi prostat cerrahisinden kaçınılır, neden?","answer":"<p class='a'><b>TURP'tan kaçın</b> — sfinkter yetmezliği zemininde <b>postoperatif inkontinans</b> riski yüksek. Tanı net değilse önce ürodinami.</p>","cat":"","id":"norouroloji_716","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Miyelomeningoselde üst üriner sistemi en ciddi tehdit eden patern?","answer":"<p class='a'><b>Aşırı aktif detrusor + aşırı aktif (dissinerjik) sfinkter</b> = yüksek basınç. Düşük kompliyans + yüksek DLPP → renal hasar.</p>","cat":"","id":"norouroloji_717","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Diyabetik sistopatinin klasik gidişi?","answer":"<p class='a'>Azalmış mesane duyusu → artmış kapasite → <b>bozulmuş detrusor kontraktilitesi (underaktivite) → yüksek PVR.</b> Sinsi: 'büyük, sessiz, az boşalan mesane'.</p>","cat":"","id":"norouroloji_718","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Otonomik disrefleksi hangi lezyon seviyesinde görülür ve en sık tetikleyicisi?","answer":"<p class='a'><b>T6 ve üzeri</b> SCI. En sık tetik: <b>mesane distansiyonu</b> (dolu/tıkalı kateter), sonra rektum. Ürodinami ve botoks da tetikler.</p>","cat":"","id":"norouroloji_719","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Otonomik disrefleksinin klinik bulguları?","answer":"<p class='a'>Ani zonklayıcı <b>baş ağrısı</b>, <b>paroksismal hipertansiyon</b> (bazalin &gt;20–40 mmHg üstü), <b>bradikardi</b>, lezyon üstü terleme/flushing, nazal konjesyon.</p>","cat":"","id":"norouroloji_720","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Otonomik disrefleksi acil yönetimi (sırayla)?","answer":"<ul><li>① <b>Hastayı otur / başı yükselt</b></li><li>② Sıkı giysiyi gevşet</li><li>③ <b>Tetikleyiciyi gider</b>: mesaneyi boşalt/kateteri kontrol et → rektum</li><li>④ HT sürerse: <b>nifedipin, GTN, kaptopril</b></li></ul>","cat":"","id":"norouroloji_721","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Fizyolojik mesane dolum hızı nasıl hesaplanır?","answer":"<p class='a'><b>Vücut ağırlığı (kg) / 4</b> mL/dk'yı aşmamalı. Hızlı dolum DO'yu yapay tetikleyebilir.</p>","cat":"","id":"norouroloji_722","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Buz suyu testi neyi test eder, ne zaman yapılır?","answer":"<p class='a'><b>C-lifi aracılı</b> ısı duyarlı refleks kontraksiyonu; akontraktil görünen detrusorda <b>gizli DO'yu</b> açar.</p><p class='a'>Non-fizyolojik olduğu için <b>en sona</b> bırakılır.</p>","cat":"","id":"norouroloji_723","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Basınç-akım çalışmasında BOO ile detrusor underaktivite ayrımı?","answer":"<p class='a'><b>BOO</b>: yüksek Pdet + düşük akım.</p><p class='a'><b>Underaktivite</b>: düşük Pdet + düşük akım. Üroflow tek başına bunları ayıramaz.</p>","cat":"","id":"norouroloji_724","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"DSD tanısında altın standart yöntem(ler)?","answer":"<p class='a'><b>Video-ürodinami (VUDS) ve/veya pelvik taban (sfinkter) EMG.</b> Dış üretral sfinkter basınç ölçümünden üstün.</p>","cat":"","id":"norouroloji_725","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Üst üriner sistemi tehdit eden başlıca ürodinamik parametreler?","answer":"<ul><li><b>DLPP &gt; 40 cmH₂O</b> (yüksek renal hasar riski)</li><li><b>Düşük kompliyans</b> (dolumda kademeli Pdet artışı)</li><li><b>NDO + DSD</b> birlikteliği</li></ul>","cat":"","id":"norouroloji_726","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"ALPP değerlerinin SUI'deki yorumu?","answer":"<p class='a'><b>&lt;60 cmH₂O</b> → intrinsik sfinkter yetmezliği (ISD). <b>&gt;90</b> → üretral hipermobilite. <b>60–90</b> → belirsiz.</p>","cat":"","id":"norouroloji_727","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Nöroürolojik tedavinin EAU hedefleri (öncelik sırası)?","answer":"<ul><li>① <b>Üst üriner sistemi koru</b> (en öncelikli)</li><li>② Düşük basınçlı, kontinan, tam boşalan mesane</li><li>③ ÜSİ kontrolü</li><li>④ Yaşam kalitesi, kalıcı kateterden kaçın</li></ul>","cat":"","id":"norouroloji_728","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Nörojenik mesanede ana boşaltma yöntemi ve son çare?","answer":"<p class='a'>Ana yöntem: <b>Temiz aralıklı kateterizasyon (TAK)</b> — böbreği koruyan tek başına en etkili müdahale.</p><p class='a'>Son çare: <b>kalıcı kateter</b>; erozyon olursa suprapubiğe çevir.</p>","cat":"","id":"norouroloji_729","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"NDO'da birinci basamak ilaç ve etki yeri?","answer":"<p class='a'><b>Antimuskarinikler</b> (M3 antagonisti: oksibutinin, solifenasin...). Detrusor basıncını düşürür, kompliyans/kapasiteyi artırır. Nöroda yüksek doz sık gerekir.</p>","cat":"","id":"norouroloji_730","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Mirabegronun NDO'daki yeri ve kontrendikasyonları?","answer":"<p class='a'>β3 agonisti; retansiyon/bilişsel yan etki yok ama <b>NDO'da ürodinamik parametreyi düzeltmez.</b></p><p class='a'>KE: <b>şiddetli kontrolsüz HT</b> (≥180/110) ve <b>otonomik disrefleksi.</b></p>","cat":"","id":"norouroloji_731","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Botulinum toksin A — endikasyon, doz, etki mekanizması?","answer":"<p class='a'>NDO'da <b>2. basamak</b> (antimuskariniğe yanıtsız/intoleran). <b>OnabotulinumtoxinA 200 U</b> (MS/SCI).</p><p class='a'>SNAP-25'i keser → ACh salınımı bloke + <b>afferent baskılama.</b> Etki 9–12 ayda söner.</p>","cat":"","id":"norouroloji_732","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Botoks kontrendikasyonları ve T6 üstü hastada özel risk?","answer":"<p class='a'>KE: <b>myasthenia gravis, gebelik, son 3 ayda BoNT-A.</b></p><p class='a'>T6 üstü SCI'da işlem sırasında/sonrası <b>otonomik disrefleksi</b> riski.</p>","cat":"","id":"norouroloji_733","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Refrakter NDO / düşük kompliyansta seçim cerrahisi ve sonrası?","answer":"<p class='a'><b>Augmentasyon sistoplasti</b> — tüm daha az invaziv seçenekler başarısızsa. Sonra <b>ömür boyu TAK</b> gerekir. Metabolik (hiperkloremik asidoz, B12), taş, mukus, uzun dönem <b>malignite</b> izlemi.</p>","cat":"","id":"norouroloji_734","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"Sakral nöromodülasyonda kalıcı implant kararı nasıl verilir?","answer":"<p class='a'>İki aşamalı: test fazında <b>≥%50 iyileşme</b> olursa kalıcı jeneratör. İnkomplet SCI'da başarı öngörücüsü: <b>korunmuş mesane duyusu.</b> Komplet suprasakralde etkisi sınırlı.</p>","cat":"","id":"norouroloji_735","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"MS'te en sık görülen ürodinamik anomali hangisidir?","options":["Detrusor arefleksisi","Detrusor aşırı aktivitesi","Bozulmuş detrusor kontraktilitesi","Ürodinamik stres inkontinans"],"correct":1,"answer":"MS'te spinal plak tutulumu nedeniyle <b>detrusor aşırı aktivitesi (DO)</b> en sık bulgudur. İkinci sıklıkta DSD eşlik eder; ileri evrede underaktivite eklenebilir. (EBU 26)","cat":"mcq","id":"norouroloji_736","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"63 yaş erkek, idrar akımında azalma ve nokturi. Rektal muayenede prostat büyümemiş. Mesane çıkış tıkanıklığını en ikna edici destekleyen ürodinamik bulgu?","options":["Düşük kompliyanslı aşırı duyarlı mesane","En yüksek üretral kapanma basıncı","Düşük boşaltma basıncıyla tepe akımda azalma","Yüksek boşaltma basıncıyla tepe akımda azalma"],"correct":3,"answer":"BOO = <b>yüksek detrusor (boşaltma) basıncı + düşük akım.</b> 'Düşük basınç + düşük akım' detrusor underaktivitesini düşündürür. Prostat büyük olmasa da fonksiyonel/anatomik çıkış direnci olabilir. (EBU 26)","cat":"mcq","id":"norouroloji_737","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"T4 seviyesinde komplet SCI'lı hastaya ürodinami yapılırken hasta aniden şiddetli baş ağrısı, yüzde kızarma ve terleme tarifliyor; tansiyon 210/120, nabız 52. İlk yapman gereken nedir?","options":["Hastayı hemen sırtüstü yatır","Hastayı oturt/başını yükselt ve mesaneyi boşalt","IV beta-bloker başla","Ürodinamiye devam edip kaydı tamamla"],"correct":1,"answer":"Tablo <b>otonomik disrefleksi</b> (T6 üstü). İlk adımlar: <b>hastayı oturt/başını yükselt</b>, sıkı giysiyi gevşet, <b>tetikleyiciyi gider</b> (dolan mesaneyi boşalt/kateteri kontrol et). HT sürerse nifedipin/GTN/kaptopril. Sırtüstü yatırmak basıncı artırır — yanlış.","cat":"vaka","id":"norouroloji_738","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"İdiyopatik Parkinson ön tanılı bir hastada belirgin ortostatik hipotansiyon, erektil disfonksiyon ve ürodinamide bozulmuş detrusor kontraktilitesi + PVR 220 mL saptanıyor. Bu ürodinamik tablo en çok hangisini düşündürür?","options":["Klasik idiyopatik Parkinson","Multipl sistem atrofisi (MSA)","Suprapontin inme sekeli","Diyabetik sistopati"],"correct":1,"answer":"<b>Bozulmuş detrusor kontraktilitesi + PVR &gt;150 mL</b> (ek otonom bulgular, açık mesane boynu, sfinkter EMG denervasyonu) <b>MSA</b>'yı idiyopatik Parkinson'dan ayırır. PH'de tipik bulgu DO ve düşük PVR'dir.","cat":"vaka","id":"norouroloji_739","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Miyelomeningoselli hastada üst üriner sistemi en ciddi tehdit eden veziko-üretral disfonksiyon paterni?","options":["Az çalışan detrusor + inaktif sfinkter","Aşırı aktif detrusor + inaktif sfinkter","Az çalışan detrusor + aşırı aktif sfinkter","Aşırı aktif detrusor + aşırı aktif (dissinerjik) sfinkter"],"correct":3,"answer":"<b>Aşırı aktif detrusor + aşırı aktif sfinkter</b> = yüksek depolama basıncı + DSD → düşük kompliyans, yüksek DLPP → reflü ve renal hasar. En tehlikeli kombinasyon. (EBU 26)","cat":"mcq","id":"norouroloji_740","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Mirabegron için kontrendikasyon hangisidir?","options":["PVR &gt;150 mL olması","Solifenasin ile birlikte kullanım","Child-Pugh A karaciğer yetmezliği","Şiddetli, kontrol altına alınamayan hipertansiyon"],"correct":3,"answer":"Mirabegron (β3 agonisti) <b>şiddetli kontrolsüz HT</b> (sistolik ≥180/diyastolik ≥110) ve <b>otonomik disrefleksi</b>de kontrendikedir; KV/serebrovasküler olay riski. (EBU 26)","cat":"mcq","id":"norouroloji_741","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Suprasakral komplet SCI'lı hasta. Video-ürodinamide depolama fazında maksimum detrusor basıncı 95 cmH₂O, DLPP 55 cmH₂O, kompliyans düşük. Yüksek doz antimuskariniğe rağmen inkontinans ve yüksek basınç sürüyor. Bir sonraki en uygun basamak?","options":["İntradetrusor onabotulinumtoxinA 200 U","Hemen augmentasyon sistoplasti","Kalıcı üretral kateter","Tedaviyi kes, izleme al"],"correct":0,"answer":"Antimuskariniğe yanıtsız NDO/düşük kompliyansta <b>2. basamak = intradetrusor botoks 200 U.</b> Augmentasyon, tüm daha az invaziv seçenekler (botoks dahil) başarısız olursa düşünülür. DLPP &gt;40 → böbrek riski, basıncı düşürmek şart.","cat":"vaka","id":"norouroloji_742","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Nörojenik mesanede üst üriner sistem hasarı için klasik DLPP eşiği?","options":["&gt;20 cmH₂O","&gt;40 cmH₂O","&gt;60 cmH₂O","&gt;90 cmH₂O"],"correct":1,"answer":"<b>DLPP &gt;40 cmH₂O</b> (McGuire) renal bozulma için yüksek risk eşiğidir. Tedavinin amacı depolama basıncını bu eşiğin altına çekmektir.","cat":"mcq","id":"norouroloji_743","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Detrusor-sfinkter dissinerjisi (DSD) tanısında altın standart?","options":["Üroflowmetri","Dış üretral sfinkter basınç ölçümü","Video-ürodinami ve/veya sfinkter EMG","Mesane duvar kalınlığı ölçümü"],"correct":2,"answer":"<b>VUDS ve/veya pelvik taban (sfinkter) EMG</b> DSD tanısında en güvenilir yöntemlerdir; dış sfinkter basınç ölçümünden üstündür.","cat":"mcq","id":"norouroloji_744","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Kontrol amaçlı gelen, 8 yıldır TAK yapan komplet suprasakral SCI'lı asemptomatik hastanın idrar kültüründe üreme var; ateş, ağrı veya başka semptom yok. En uygun yaklaşım?","options":["Geniş spektrumlu antibiyotikle hemen tedavi","Sürekli profilaktik antibiyotik başla","Tedavi etme, sadece semptomatik enfeksiyonu tedavi et","Kalıcı kateter tak"],"correct":2,"answer":"TAK yapan nöro hastada <b>asemptomatik bakteriüri neredeyse evrenseldir; tedavi edilmez.</b> Yalnızca semptomatik enfeksiyon tedavi edilir. Gereksiz antibiyotik direnç oluşturur.","cat":"vaka","id":"norouroloji_745","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Akut SCI sonrası 'spinal şok' döneminde tipik mesane tablosu?","options":["Yüksek basınçlı NDO","Detrusor arefleksisi ve idrar retansiyonu","DSD ile refleks işeme","Stres inkontinansı"],"correct":1,"answer":"Spinal şokta detrusor <b>arefleksiktir → retansiyon</b> → TAK ile boşaltılır. NDO/DSD paterni haftalar içinde (suprasakral lezyonda) gelişir. Bu yüzden kalıcı ürodinamik patern için şok sonrası beklenir.","cat":"mcq","id":"norouroloji_746","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Pontin miksiyon merkezinin üzerinde izole bir lezyonu olan hasta (ör. frontal kortikal inme). Sfinkter koordinasyonu açısından ne beklenir?","options":["DSD beklenir, çünkü koordinasyon bozulur","DSD beklenmez, çünkü PMC korunduğu için koordinasyon sağlamdır","Detrusor arefleksisi beklenir","Mesane boynu dissinerjisi beklenir"],"correct":1,"answer":"<b>PMC</b> detrusor–sfinkter sinerjisinin merkezidir. PMC üstü (suprapontin) lezyonda PMC korunur → koordinasyon sağlam → <b>DSD görülmez</b> (tipik bulgu DO'dur). DSD ancak PMC ile sakral merkez arası lezyonlarda ortaya çıkar.","cat":"vaka","id":"norouroloji_747","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Nörojenik boşaltma disfonksiyonunda çıkış direncini azaltmak için kullanılabilen tek oral ilaç sınıfı?","options":["Antimuskarinikler","β3 agonistleri","α-blokerler","5-alfa redüktaz inhibitörleri"],"correct":2,"answer":"<b>α-blokerler</b> (tamsulosin, silodosin vb.) mesane boynu düz kasını gevşetip çıkış direncini azaltır; nörojenik boşaltma disfonksiyonunda hem erkek hem kadında kullanılabilen tek oral seçenektir.","cat":"mcq","id":"norouroloji_748","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Cüneyt Hoca tarzı sözlü: 'Uzun süredir tıkanıklığı olan, akut retansiyonla gelip sonda takılan bir hastada sonda sonrası saatlik idrar çıkışı çok arttı, hasta halsiz.' Bu tabloyu ve riskini nasıl tanımlarsın?","options":["Otonomik disrefleksi; tansiyonu düşür","Postobstrüktif diürez; sıvı-elektrolit takibi ve replasman","Diyabetik sistopati; insülin ayarla","DSD; sfinkterotomi planla"],"correct":1,"answer":"Uzamış obstrüksiyon sonrası dekompresyonla gelişen <b>postobstrüktif diürez</b>: tübüler konsantrasyon defekti + birikmiş üre/sodyum diürezi. Hipovolemi/elektrolit bozukluğu riski → <b>yakın sıvı-elektrolit takibi ve dikkatli replasman.</b> (Cüneyt Hoca'nın klasik başlığı.)","cat":"vaka","id":"norouroloji_749","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"mcq","q":"Botulinum toksin A'nın detrusordaki temel moleküler etki mekanizması?","options":["M3 reseptörünü bloke eder","SNAP-25'i keserek ACh salınımını engeller","β3 reseptörünü uyarır","Kalsiyum kanallarını açar"],"correct":1,"answer":"OnabotulinumtoxinA <b>SNARE kompleksindeki SNAP-25'i keser</b> → asetilkolin vezikül salınımı engellenir (geçici flask paralizi). Ayrıca afferent yolu baskılar (ATP, substance P, CGRP, NGF azalır).","cat":"mcq","id":"norouroloji_750","topic":"norouroloji","group":1,"topicTitle":"Nöroüroloji & Ürodinami","src":"","flag":false},{"type":"open","q":"İnsan detrusorundaki β-reseptörlerin baskın tipi ve klinik karşılığı?","answer":"<b>β3</b> (~%97). Mesaneyi gevşetir → <b>mirabegron, vibegron</b> tedavi rasyonu.","cat":"","id":"kadinuroloji_751","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Detrusor kontraksiyonunda fonksiyonel olarak baskın muskarinik reseptör?","answer":"<b>M3</b> (sayıca M2 baskın, fonksiyonel M3). Antimuskariniklerin hedefi.","cat":"","id":"kadinuroloji_752","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Çizgili eksternal üretral sfinkterin somatik kontrol merkezi ve siniri?","answer":"<b>Onuf çekirdeği</b> (S2–S4 ön boynuz) → <b>pudendal sinir</b>. Duloksetinin etki yeri.","cat":"","id":"kadinuroloji_753","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Depolama↔boşaltma fazı switch'inin santral pivotu?","answer":"<b>Periakuaduktal gri (PAG)</b>; boşaltmanın ON anahtarı <b>PMC (Barrington)</b>.","cat":"","id":"kadinuroloji_754","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Suprasakral spinal lezyonu suprapontin lezyondan ayıran ürodinamik bulgu?","answer":"Her ikisinde DO var ama <b>DSD (detrusor-sfinkter dissinerji) yalnızca suprasakral</b>'da → yüksek basınç, üst yol riski.","cat":"","id":"kadinuroloji_755","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"McGuire'ın üst üriner sistem bozulması için tanımladığı kritik basınç eşiği?","answer":"<b>DLPP ≥ 40 cmH₂O</b>. Yüksek DLPP'lilerde 2 yılda %100 üst yol bozulması (1981/83).","cat":"","id":"kadinuroloji_756","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"T6 ve üzeri SCI'da hayatı tehdit eden, mesane distansiyonuyla tetiklenen tablo?","answer":"<b>Otonomik disrefleksi</b>: ani sistolik HT, baş ağrısı, flushing, terleme, bradikardi/disritmi.","cat":"","id":"kadinuroloji_757","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Antimuskarinik başarısız nörojenik DO'da EAU'nun Grade A önerdiği tedavi?","answer":"<b>İntradetrusor onabotulinumtoksin A</b>. Etki ~9 ay; voiding yapanlarda PVR↑ → CIC gerekebilir.","cat":"","id":"kadinuroloji_758","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Boşaltamayan, el becerisi olan nörojenik hastada birinci seçim boşaltma yöntemi?","answer":"<b>Temiz aralıklı kateterizasyon (CIC)</b>; indwelling'e üstün. Credé/Valsalva önerilmez.","cat":"","id":"kadinuroloji_759","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Spina bifidada \"tipik\" ürodinamik/anatomik bulgu?","answer":"<b>Areflektik mesane + açık mesane boynu</b>. Tethered cord ile zamanla değişebilir.","cat":"","id":"kadinuroloji_760","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"MSA'yı (Shy-Drager) Parkinson'dan ayıran ürolojik ipuçları?","answer":"Semptom tanıdan ~4 yıl önce; <b>açık mesane boynu</b>, düşük komplians; <b>Onuf etkilenir</b> (sfinkter EMG denervasyon).","cat":"","id":"kadinuroloji_761","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Erkekte BOOI formülü ve obstrüksiyon eşiği?","answer":"<b>BOOI = PdetQmax − 2·Qmax</b>. &gt;40 obstrükte, &lt;20 değil, 20–40 belirsiz. Kadında geçerli değil.","cat":"","id":"kadinuroloji_762","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Mesane kontraktilite indeksi (BCI) formülü ve yorumu?","answer":"<b>BCI = PdetQmax + 5·Qmax</b>. &gt;150 güçlü, 100–150 normal, &lt;100 zayıf.","cat":"","id":"kadinuroloji_763","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"ALPP değerine göre ISD yorumu?","answer":"<b>&lt;60 cmH₂O → ISD</b>; 60–90 belirsiz; <b>&gt;90 → ISD yok</b>. VLPP genelde CLPP'den düşük.","cat":"","id":"kadinuroloji_764","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Üroflowmetri için minimum işenen hacim ve normal Qmax (erkek)?","answer":"Min <b>150 mL</b>. Erkek Qmax <b>&gt;15 normal</b>, &lt;10 anormal, 10–15 belirsiz; kadın 20–36.","cat":"","id":"kadinuroloji_765","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"OAB'li hastalarda DO yokluğu tanıyı dışlar mı?","answer":"<b>Hayır.</b> Hastaların %50'ye kadarı tek ÜDS'de DO göstermez (clinical principle).","cat":"","id":"kadinuroloji_766","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Komplike olmayan SUI'de rutin preop ÜDS gerekli mi? Kanıt?","answer":"<b>Gereksiz.</b> <b>ValUE (Nager 2012, NEJM)</b> noninferior; van Leijsen destekler.","cat":"","id":"kadinuroloji_767","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"İşeme sırasında EMG susmazsa — nörolojik tanı VARSA / YOKSA?","answer":"Var → <b>DESD</b>; yok → <b>disfonksiyonel işeme</b>.","cat":"","id":"kadinuroloji_768","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"EAU'nun şiddet derecelendirmesinde kullanmamayı önerdiği ürodinamik testler?","answer":"<b>UPP (üretral basınç profili) ve LPP</b> — inkontinans şiddetini derecelendirmede kullanma.","cat":"","id":"kadinuroloji_769","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"DeLancey hammock hipotezinin ana iddiası?","answer":"Üretra <b>destek tabakasına</b> karşı sıkışır; <b>destek stabilitesi</b> üretra pozisyonundan önemli.","cat":"","id":"kadinuroloji_770","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"EAU 2025'e göre SUI/MUI'de birinci basamak tedavi?","answer":"<b>Denetimli yoğun PFMT ≥3 ay</b> (Strong) — tüm kadınlara (yaşlı, pre/postnatal dâhil).","cat":"","id":"kadinuroloji_771","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Kadın SUI'sinde standart cerrahi ve mesh tartışmasının kilometre taşı?","answer":"<b>Mid-üretral sling (TVT/TOT)</b>. <b>UK 2018 → mesh pause</b>; riskler paylaşılmalı, non-mesh (Burch/otolog sling) sunulmalı.","cat":"","id":"kadinuroloji_772","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Yaşlı OAB hastasında neden β3-agonist (mirabegron/vibegron) tercih edilir?","answer":"Antimuskariniklerin <b>demans/kognisyon riski</b>nden kaçınmak için. Vibegron: EMPOWUR, yüksek β3 selektivite.","cat":"","id":"kadinuroloji_773","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"OAB ilaç kombinasyonunu destekleyen trialler?","answer":"<b>BESIDE ve SYNERGY</b> (solifenasin + mirabegron) → daha iyi semptom kontrolü.","cat":"","id":"kadinuroloji_774","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Refrakter OAB'de botoks ile SNM'yi karşılaştıran trial?","answer":"<b>ROSETTA/ABC (Amundsen 2016, JAMA)</b>: botoks hafif üstün epizot azalması, ancak CIC/UTI riski artar. Botox etki 3–6 ay.","cat":"","id":"kadinuroloji_775","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Overflow inkontinansta tanısal PVR eşiği ve akontraktil detrusor tedavisi?","answer":"<b>PVR &gt;200 mL</b> overflow (&lt;50 normal). Akontraktil → <b>CIC</b> (kalıcı kateterden iyi).","cat":"","id":"kadinuroloji_776","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"MUI tedavisinde hangi bileşen önce ele alınır?","answer":"<b>En rahatsız edici bileşen</b>; eşit rahatsız ediyorsa <b>urge bileşeni</b> önce.","cat":"","id":"kadinuroloji_777","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"AUS'un en sık kullanıldığı endikasyon ve yaklaşık kuru oran?","answer":"Dirençli olgu, özellikle <b>erkek post-radikal prostatektomi</b>; 32 ayda ~kuru çoğunluk (Tutolo 2019).","cat":"","id":"kadinuroloji_778","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Kız çocukta distal üretral stenozda gerçek obstrüksiyon nerede? Kanıt?","answer":"Bladder neck değil <b>çizgili dış sfinkter spazmı</b> (Lyon-Tanagho; curare ile basınç normale döner).","cat":"","id":"kadinuroloji_779","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Disfonksiyonel işemede (Hinman) neden Kegel önerilmez?","answer":"Pelvik tabanı <b>sıkar → kötüleştirir</b>. Tedavi: retraining + biofeedback + pelvik fizyoterapi.","cat":"","id":"kadinuroloji_780","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Üretral divertikülün klasik semptom triadı (3D)?","answer":"<b>Dizüri, Disparoni, post-void Dribbling</b>. Nadiren tam görülür; %20 asemptomatik.","cat":"","id":"kadinuroloji_781","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Üretral divertikül için en iyi görüntüleme ve ostium tipik yerleşimi?","answer":"<b>MRI</b> en iyi. Ostium &gt;%90 <b>posterolateral mid/distal üretra</b> (Skene bezi kaynaklı).","cat":"","id":"kadinuroloji_782","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Anterior vajinal duvar kistik kitlesinin ayırıcı tanısı?","answer":"<b>Üretral divertikül, Skene kisti/abse, Gartner kanal kisti, leiomyom, bulking ajan, sistosel.</b>","cat":"","id":"kadinuroloji_783","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Postmenopozal atrofik üretrit/tekrarlayan UTI tedavisinde anahtar?","answer":"<b>Topikal vajinal östrojen</b> → laktobasil↑, pH↓, tekrarlayan UTI azalır (Raz-Stamm).","cat":"","id":"kadinuroloji_784","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"Üretral karunkülde biyopsi ne zaman zorunlu?","answer":"<b>Atipik görünüm / indurasyon / Ca şüphesi</b>. Ayırıcı: atrofik üretrit polibi (en sık), melanom, lenfoma.","cat":"","id":"kadinuroloji_785","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"open","q":"EAU'ya göre üretral divertikülektomi sırasında bothersome SUI nasıl ele alınır?","answer":"Eşzamanlı <b>non-sentetik (otolog) sling</b>, danışmanlıkla (sentetik mesh erozyon riski).","cat":"","id":"kadinuroloji_786","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"İnsan detrusorunda bulunan β-adrenoseptörlerin yaklaşık %97'sini oluşturan ve mesane gevşemesinden sorumlu alt tip hangisidir?","options":["β1","β2","β3","α1a"],"correct":2,"answer":"<b>β3.</b> Detrusor relaksasyonunun ana yolu; mirabegron ve vibegron bu reseptörü hedefler.","cat":"EBU MCQ","id":"kadinuroloji_787","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Detrusor-sfinkter dissinerjisi (DSD) aşağıdaki lezyon seviyelerinden hangisinde beklenir?","options":["Suprapontin (kortikal)","Suprasakral spinal (pons-sakral arası)","Sakral (S2-S4)","Periferik pelvik sinir"],"correct":1,"answer":"<b>Suprasakral spinal.</b> DSD, PMC ile sakral omurilik arasındaki kopukluktan kaynaklanır; suprapontin lezyonda DO olur ama DSD olmaz.","cat":"EBU MCQ","id":"kadinuroloji_788","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Miyelomeningoselli bir çocukta ürodinamide detrusor leak point pressure (DLPP) ölçülüyor. Üst üriner sistem için hangi eşik kritik kabul edilir?","options":["≥10 cmH₂O","≥20 cmH₂O","≥40 cmH₂O","≥60 cmH₂O"],"correct":2,"answer":"<b>≥40 cmH₂O</b> (McGuire 1981/83). Bu eşiğin üzerindeki hastalarda takipte üst yol bozulması neredeyse evrensel; CIC + antimuskarinik ile basınç düşürülmeli.","cat":"Sözlü / Vaka","id":"kadinuroloji_789","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"T5 seviyesinde komplet SCI'lı hastada kateterizasyon sırasında ani baş ağrısı, yüzde kızarıklık ve sistolik kan basıncında keskin yükselme oluyor. İlk düşünülecek tanı ve mekanizma?","options":["Ortostatik hipotansiyon","Otonomik disrefleksi","Panik atak","Üriner sepsis"],"correct":1,"answer":"<b>Otonomik disrefleksi.</b> T6 ve üzeri lezyonlarda mesane/rektum distansiyonu gibi uyaranlar lezyon altı kontrolsüz sempatik deşarja yol açar — acil. Mesaneyi boşalt, uyaranı kaldır.","cat":"Sözlü / Vaka","id":"kadinuroloji_790","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Antimuskarinik tedaviye dirençli nörojenik detrusor overaktivitesinde EAU'nun Grade A önerdiği tedavi nedir?","options":["Sakral nöromodülasyon","İntradetrusor onabotulinumtoksin A","Augmentasyon sistoplasti","Desmopressin"],"correct":1,"answer":"<b>İntradetrusor onabotulinumtoksin A.</b> EAU Grade A; etki ~9 ay. Voiding yapan hastalarda PVR artabilir → CIC gerekebilir.","cat":"EBU MCQ","id":"kadinuroloji_791","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Erkekte mesane çıkış obstrüksiyon indeksi (BOOI) formülü ve obstrüksiyon eşiği hangisidir?","options":["PdetQmax + 5·Qmax; >150","PdetQmax − 2·Qmax; >40","PdetQmax − 5·Qmax; >20","Qmax/Pdet; <0.5"],"correct":1,"answer":"<b>BOOI = PdetQmax − 2·Qmax; >40 obstrükte</b> (<20 değil, 20-40 belirsiz). Kadında geçerli değildir.","cat":"EBU MCQ","id":"kadinuroloji_792","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Komplike olmayan saf SUI'li bir kadın cerrahi planlanıyor. Rutin preoperatif ürodinami gerekli midir, hangi çalışma temel alınır?","options":["Evet, her olguda zorunlu","Hayır; ValUE çalışması noninferiorite gösterdi","Sadece UPP yapılmalı","Sadece sistoskopi yeterli"],"correct":1,"answer":"<b>Hayır.</b> ValUE (Nager 2012, NEJM): preop ÜDS vs ofis değerlendirmesi → 12 ayda başarı eşdeğer (noninferior). ÜDS ek depolama semptomu, tip belirsizliği, voiding disfonksiyonu veya POP/önceki cerrahi varsa yapılır.","cat":"Sözlü / Vaka","id":"kadinuroloji_793","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"OAB semptomları olan bir hastada tek seans ürodinamide detrusor overaktivite (DO) saptanmadı. Bu bulgu ne anlama gelir?","options":["OAB tanısı kesin dışlanır","OAB tanısı dışlanamaz (hastaların %50'ye kadarında DO görülmez)","Mutlaka stres inkontinans vardır","Test tekrar edilmemelidir"],"correct":1,"answer":"<b>OAB dışlanamaz.</b> Semptomatik bireylerin %50'ye kadarı tek ÜDS'de DO göstermez (AUA/SUFU clinical principle).","cat":"EBU MCQ","id":"kadinuroloji_794","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"ALPP (abdominal leak point pressure) değeri <60 cmH₂O olması en çok hangisini düşündürür?","options":["Üretral hipermobilite","İntrinsik sfinkter yetmezliği (ISD)","Detrusor overaktivite","Normal sfinkter"],"correct":1,"answer":"<b>ISD.</b> <60 → ISD; 60-90 belirsiz; >90 → ISD yok. VLPP genelde CLPP'den düşüktür.","cat":"EBU MCQ","id":"kadinuroloji_795","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"EAU 2025 kılavuzuna göre stres ve mikst üriner inkontinanslı kadında birinci basamak tedavi nedir?","options":["Mid-üretral sling","Denetimli yoğun PFMT (≥3 ay)","Antimuskarinik","Bulking ajan enjeksiyonu"],"correct":1,"answer":"<b>Denetimli yoğun PFMT ≥3 ay (Strong)</b> — yaşlı, pre/postnatal dâhil tüm kadınlara. Cerrahi konservatif başarısızlıkta gündeme gelir.","cat":"Sözlü / Vaka","id":"kadinuroloji_796","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Kadın SUI cerrahisinde mid-üretral sling (mesh) ile ilgili önemli güvenlik gelişmesi nedir?","options":["FDA tarafından ilk basamak olarak zorunlu kılındı","UK'da 2018 incelemesi sonrası kullanımı duraklatıldı (mesh pause)","Otolog fasyadan daha güvenli bulundu","Tamamen yasaklandı"],"correct":1,"answer":"<b>UK 2018 mesh pause.</b> Erozyon, ağrı, disparoni komplikasyonları nedeniyle. Riskler hastayla paylaşılmalı; Burch/otolog sling gibi non-mesh alternatifler sunulmalı.","cat":"EBU MCQ","id":"kadinuroloji_797","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Yaşlı bir OAB hastasında antimuskarinik yerine β3-agonist (mirabegron/vibegron) tercih etmenin temel gerekçesi?","options":["Daha ucuz olması","Antikolinerjiklerin demans/kognisyon riskinden kaçınma","Tek doz olması","Böbrek yetmezliğinde kontrendike olmaması"],"correct":1,"answer":"<b>Antikolinerjik-demans riski.</b> β3-agonistler bu yükü taşımaz. Vibegron (EMPOWUR) yüksek β3 selektif, CYP450'den az etkilenir.","cat":"EBU MCQ","id":"kadinuroloji_798","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Refrakter OAB'de intradetrusor botoks ile sakral nöromodülasyonu karşılaştıran ROSETTA (Amundsen) çalışmasının ana mesajı?","options":["SNM kesin üstün","Botoks epizot azalmasında hafif üstün ancak CIC/UTI riski artar","İkisi de etkisiz","Botoks etkisi kalıcıdır"],"correct":1,"answer":"<b>Botoks hafif üstün</b> epizot azalması sağladı, fakat geçici CIC ve UTI riski daha yüksek. Botoks etkisi idiyopatik OAB'de 3-6 ay sürer.","cat":"Sözlü / Vaka","id":"kadinuroloji_799","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Overflow inkontinans tanısında kabul edilen postvoid rezidü eşiği?","options":[">50 mL",">100 mL",">200 mL",">500 mL"],"correct":2,"answer":"<b>>200 mL</b> overflow düşündürür; <50 mL normal kabul edilir. Akontraktil detrusorda tedavi CIC'dir.","cat":"EBU MCQ","id":"kadinuroloji_800","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"5 yaşında kız çocukta tekrarlayan UTI ve işeme güçlüğü; ürodinamide midüretral segmentte yüksek basınç. Tarihsel kanıt (Lyon-Tanagho) obstrüksiyonun nereden kaynaklandığını gösterdi?","options":["Mesane boynu darlığı","Çizgili dış sfinkter spazmı","Posterior üretral valv","Üreterosel"],"correct":1,"answer":"<b>Çizgili dış sfinkter spazmı.</b> Curare ile kapanma basıncı normale döndü → spazm kanıtlandı. İnternal üretrotomi başarısız (sfinkteri kesmez).","cat":"Sözlü / Vaka","id":"kadinuroloji_801","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Üretral divertikülün klasik \"3D\" semptom triadı nedir?","options":["Disuri, Disparoni, Dribbling","Dizüri, Distansiyon, Dizenteri","Disparoni, Diyabet, Dribbling","Dolgunluk, Dizüri, Dispne"],"correct":0,"answer":"<b>Dizüri, Disparoni, post-void Dribbling.</b> Nadiren tam görülür; %20 hasta asemptomatik. Boyut semptomla korele değil.","cat":"EBU MCQ","id":"kadinuroloji_802","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Üretral divertikül için en yararlı görüntüleme yöntemi hangisidir?","options":["Direkt grafi","MRI","Sintigrafi","PET-BT"],"correct":1,"answer":"<b>MRI.</b> Tek altın standart yok; double-balloon üretrografi, VCUG, USG de kullanılır ama MRI en yararlı. Ostium >%90 posterolateral mid/distal üretra.","cat":"EBU MCQ","id":"kadinuroloji_803","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Postmenopozal kadında anterior vajinal duvarda kistik kitle, \"milking\" ile meatustan pürülan akıntı. En olası tanı ve ayırıcılar?","options":["Sistosel; ayırıcı yok","Üretral divertikül; ayırıcı: Skene/Gartner kisti, leiomyom, bulking ajan","Üretral karunkül; ayırıcı: Ca","Üretral prolapsus; ayırıcı: ureterosel"],"correct":1,"answer":"<b>Üretral divertikül.</b> Skene bezi enfeksiyonu kaynaklı. Ayırıcı: Skene kisti/abse, Gartner kanal kisti, vajinal leiomyom, periüretral bulking ajan.","cat":"Sözlü / Vaka","id":"kadinuroloji_804","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Postmenopozal atrofik üretrit ve tekrarlayan UTI tedavisinde temel yaklaşım?","options":["Sistemik HRT","Topikal vajinal östrojen","Profilaktik uzun antibiyotik","Cerrahi"],"correct":1,"answer":"<b>Topikal vajinal östrojen.</b> Laktobasil kolonizasyonunu artırır, pH'ı düşürür, tekrarlayan UTI'yi azaltır (Raz-Stamm). Minimal sistemik emilim.","cat":"EBU MCQ","id":"kadinuroloji_805","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Üretral karunkülde, lezyon atipik görünümlü ve indure ise hangi adım zorunludur?","options":["Topikal östrojen yeterli","Biyopsi (üretra Ca dışlanmalı)","Sadece sitz banyo","Hemen total üretrektomi"],"correct":1,"answer":"<b>Biyopsi.</b> İndurasyon/atipi → üretra kanseri dışlanmalı. En sık ayırıcı atrofik üretrit polibidir; melanom, lenfoma da bildirilmiş.","cat":"Sözlü / Vaka","id":"kadinuroloji_806","topic":"kadinuroloji","group":1,"topicTitle":"Fonksiyonel & Kadın Ürolojisi","src":"","flag":false},{"type":"mcq","q":"Disfonksiyonel işeme (Hinman) tedavisinde aşağıdakilerden hangisi UYGUNSUZDUR?","options":["Mesane retraining","Biofeedback","Kegel ile pelvik tabanı sıkma","Bağırsak düzeni"],"correct":2,"answer":"<b>Kegel uygunsuzdur</b> — pelvik tabanı sı
