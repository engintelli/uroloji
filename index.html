<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Üroloji · Çalışma Merkezi</title>
<style>
:root{--bg:#0c1116;--surface:#161f29;--surface2:#1d2935;--ink:#e9eef4;--muted:#8ea3b5;--line:#27333f;--teal:#4db6ac;--amber:#f0b15a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(circle at 12% 0%,rgba(77,182,172,.08),transparent 42%),radial-gradient(circle at 90% 5%,rgba(240,177,90,.06),transparent 40%),var(--bg);
  color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;line-height:1.55}
.wrap{max-width:640px;margin:0 auto;padding:30px 18px 60px}
.kick{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:700}
h1{font-family:ui-serif,Georgia,serif;font-size:1.9rem;font-weight:800;margin:6px 0 4px}
.sub{color:var(--muted);font-size:.88rem;margin-bottom:22px}
.list{display:flex;flex-direction:column;gap:12px}
a.card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:16px 17px;text-decoration:none;color:var(--ink);transition:.15s}
a.card:hover{border-color:var(--teal);transform:translateY(-1px)}
a.card .ic{width:44px;height:44px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex:0 0 auto}
a.card .t{font-size:1.02rem;font-weight:800}
a.card .d{font-size:.76rem;color:var(--muted);margin-top:2px}
a.card .go{margin-left:auto;color:var(--muted);font-size:1.2rem}
.note{margin-top:24px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:.8rem;color:var(--muted)}
.note b{color:var(--ink)}
.loading{color:var(--muted);font-size:.85rem;padding:20px 2px}
.err{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:11px;padding:13px 15px;font-size:.82rem;color:var(--muted);margin-top:6px}
footer{text-align:center;color:var(--muted);font-size:.68rem;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick">Kocaeli · Doçentlik Hazırlık</div>
  <h1>Üroloji Çalışma Merkezi</h1>
  <div class="sub">Tüm materyaller tek yerde. Birine dokun, çalışmaya başla.</div>
  <div class="list" id="list"><div class="loading">Materyaller yükleniyor…</div></div>
  <div class="note">📌 <b>Ana ekrana ekle:</b> Safari'de alttaki paylaş ikonu → "Ana Ekrana Ekle" → bu sayfa uygulama gibi açılır, hepsine buradan ulaşırsın.</div>
  <footer id="foot"></footer>
</div>
<script>
// Bilinen dosyalara güzel ad/ikon/açıklama ver; bilinmeyenleri dosya adından türet.
const META={
  "uroloji_atlas.html":{t:"Üroloji Atlas",d:"20 konu · Tam Not + Kart + Test",ic:"📚"},
  "soru_bankasi.html":{t:"Soru Bankası",d:"1499 soru · test, sözlü, aralıklı tekrar",ic:"🧠"},
  "index.html":null
};
function pretty(fn){
  let n=fn.replace(/\.html$/i,'').replace(/[_-]+/g,' ').replace(/\b\d+\b/g,'').trim();
  n=n.charAt(0).toUpperCase()+n.slice(1);
  return n||fn;
}
function render(files){
  const list=document.getElementById('list'); list.innerHTML='';
  // önce bilinenler (atlas, banka) sırayla
  const orderKnown=["uroloji_atlas.html","soru_bankasi.html"];
  const seen=new Set();
  const ordered=[];
  orderKnown.forEach(k=>{ if(files.includes(k)){ordered.push(k);seen.add(k);} });
  files.forEach(f=>{ if(!seen.has(f)) ordered.push(f); });
  ordered.forEach(f=>{
    if(f.toLowerCase()==='index.html') return;
    const m=META[f];
    const t=m?m.t:pretty(f), d=m?m.d:f, ic=m?m.ic:"📄";
    const a=document.createElement('a'); a.className='card'; a.href=f;
    a.innerHTML=`<div class="ic">${ic}</div><div><div class="t">${t}</div><div class="d">${d}</div></div><div class="go">›</div>`;
    list.appendChild(a);
  });
  if(!list.children.length) list.innerHTML='<div class="err">Depoda .html dosyası bulunamadı.</div>';
}
function fallback(){
  // API çalışmazsa bilinen iki dosyayı yine de göster (relatif link)
  render(["uroloji_atlas.html","soru_bankasi.html"]);
  const f=document.createElement('div'); f.className='err';
  f.textContent='Otomatik liste alınamadı; bilinen dosyalar gösteriliyor. Eklediğin diğer dosyalar açılmıyorsa adlarını bana yaz.';
  document.getElementById('list').appendChild(f);
}
(function(){
  // URL'den kullanıcı + repo çöz: <user>.github.io/<repo>/
  const host=location.hostname;          // ezgiuro.github.io
  const parts=location.pathname.split('/').filter(Boolean);
  const user=host.split('.')[0];
  const repo=parts[0];
  document.getElementById('foot').textContent=user&&repo?(user+'/'+repo):'';
  if(!user||!repo||host.indexOf('github.io')<0){ fallback(); return; }
  fetch(`https://api.github.com/repos/${user}/${repo}/contents/`)
    .then(r=>r.ok?r.json():Promise.reject())
    .then(items=>{
      const html=items.filter(x=>x.type==='file'&&/\.html?$/i.test(x.name)).map(x=>x.name);
      if(html.length) render(html); else fallback();
    })
    .catch(fallback);
})();
</script>
</body>
</html>
